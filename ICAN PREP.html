<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICAN B&F Exam Prep | Adullam Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1c2536;
  --border: #2a3550;
  --accent: #f59e0b;
  --accent2: #10b981;
  --danger: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --correct: #065f46;
  --wrong: #7f1d1d;
  --correct-border: #10b981;
  --wrong-border: #ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent);letter-spacing:0.02em}
.nav-brand span{color:var(--text);font-style:italic;font-size:0.9rem;display:block;font-family:'Space Grotesk',sans-serif;font-weight:300}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--muted);transition:all .2s;border:none;background:none}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--accent);background:rgba(245,158,11,0.1)}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:24px 16px}

/* HERO */
.hero{text-align:center;padding:48px 0 32px}
.hero h1{font-family:'Playfair Display',serif;font-size:2.8rem;line-height:1.2;margin-bottom:12px}
.hero h1 em{color:var(--accent);font-style:italic}
.hero p{color:var(--muted);font-size:1.05rem;max-width:540px;margin:0 auto 32px}
.stats-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 24px;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif}
.stat-card .lbl{font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.card-title{font-size:1.1rem;font-weight:600;margin-bottom:16px;color:var(--text)}
.card-title span{color:var(--muted);font-weight:400;font-size:0.9rem}

/* SESSION GRID */
.session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.session-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.session-btn:hover{border-color:var(--accent);background:rgba(245,158,11,0.05)}
.session-btn.active{border-color:var(--accent);background:rgba(245,158,11,0.1)}
.session-btn .s-year{font-size:1rem;font-weight:600;color:var(--text)}
.session-btn .s-sub{font-size:0.75rem;color:var(--muted)}
.session-btn .s-badge{display:inline-block;margin-top:6px;font-size:0.7rem;padding:2px 8px;border-radius:20px;background:rgba(16,185,129,0.15);color:var(--accent2)}

/* MODE BUTTONS */
.mode-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.mode-btn{padding:10px 20px;border-radius:10px;cursor:pointer;font-size:0.9rem;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .2s;font-family:inherit}
.mode-btn:hover{border-color:var(--accent);background:rgba(245,158,11,0.08)}
.mode-btn.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.mode-btn.primary:hover{background:#d97706;border-color:#d97706}
.mode-btn:disabled{opacity:0.4;cursor:not-allowed}

/* TIMER */
.timer-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.timer-display{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}
.timer-display.warning{color:var(--danger)}
.progress-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;margin:0 20px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}

/* QUESTION */
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.q-counter{font-size:0.85rem;color:var(--muted)}
.q-session-tag{font-size:0.75rem;padding:3px 10px;border-radius:20px;background:rgba(245,158,11,0.15);color:var(--accent)}
.q-text{font-size:1.1rem;line-height:1.6;margin-bottom:24px;font-weight:500}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--surface2)}
.option:hover:not(.locked){border-color:var(--accent);background:rgba(245,158,11,0.05)}
.option.selected{border-color:var(--accent);background:rgba(245,158,11,0.1)}
.option.correct{border-color:var(--correct-border)!important;background:var(--correct)!important}
.option.wrong{border-color:var(--wrong-border)!important;background:var(--wrong)!important}
.option.locked{cursor:default}
.option-letter{width:28px;height:28px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;transition:all .2s}
.option.selected .option-letter{background:var(--accent);color:#000}
.option.correct .option-letter{background:var(--correct-border);color:#000}
.option.wrong .option-letter{background:var(--wrong-border);color:#fff}
.option-text{font-size:0.95rem;line-height:1.5;padding-top:2px}

/* EXPLANATION */
.explanation{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px}
.explanation.hidden{display:none}
.exp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.exp-title{font-size:0.9rem;font-weight:600;color:var(--accent)}
.exp-body{font-size:0.9rem;line-height:1.6;color:var(--muted)}
.ai-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:0.8rem;font-family:inherit;transition:all .2s}
.ai-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.ai-btn:disabled{opacity:0.5;cursor:wait}
.ai-response{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:0.9rem;line-height:1.6;color:var(--text)}
.ai-loading{color:var(--muted);font-style:italic}

/* NAV BTNS */
.q-nav{display:flex;align-items:center;justify-content:space-between;margin-top:24px;gap:12px}
.q-nav .spacer{flex:1}

/* RESULTS */
.results-header{text-align:center;padding:32px 0}
.score-ring{width:140px;height:140px;margin:0 auto 20px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .score-pct{font-size:2rem;font-weight:700;color:var(--accent)}
.score-ring .score-lbl{font-size:0.7rem;color:var(--muted);text-transform:uppercase}
.results-meta{color:var(--muted);font-size:0.95rem;margin-bottom:32px}
.results-breakdown{display:flex;flex-direction:column;gap:12px}
.result-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:16px;cursor:pointer;transition:border-color .2s}
.result-item:hover{border-color:var(--border)}
.result-item.correct-item{border-left:3px solid var(--correct-border)}
.result-item.wrong-item{border-left:3px solid var(--wrong-border)}
.ri-num{font-size:0.8rem;color:var(--muted);min-width:24px;padding-top:2px}
.ri-text{font-size:0.9rem;flex:1;line-height:1.5}
.ri-answers{display:flex;gap:8px;font-size:0.8rem;margin-top:4px}
.ri-yours{color:var(--danger)}
.ri-correct{color:var(--accent2)}

/* DASHBOARD */
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.perf-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px}
.perf-card .pc-session{font-size:0.8rem;color:var(--muted);margin-bottom:8px}
.perf-card .pc-score{font-size:1.5rem;font-weight:700;color:var(--accent)}
.perf-card .pc-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.perf-card .pc-bar-fill{height:100%;background:var(--accent);border-radius:2px}
.empty-state{text-align:center;padding:60px 0;color:var(--muted)}
.empty-state .es-icon{font-size:3rem;margin-bottom:12px}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1{font-size:2rem}
  .nav-tabs{display:none}
  .stats-row{gap:8px}
  .stat-card{padding:12px 16px}
}

/* SECTIONS */
.section{display:none}
.section.active{display:block}

/* PILL TAG */
.tag{display:inline-block;font-size:0.72rem;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-green{background:rgba(16,185,129,0.15);color:var(--accent2)}
.tag-amber{background:rgba(245,158,11,0.15);color:var(--accent)}
.tag-red{background:rgba(239,68,68,0.15);color:var(--danger)}

.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>

ty of shares and bonds to be traded by investors","D":"Ensure that there is an efficient system for providing new financial information about companies to investors in the market","E":"Provide a system for recording information about the prices at which shares are bought and sold and making them available to participants"},"answer":"C"},{"num":13,"text":"It is usual for accountants to associate public interest with the following matters EXCEPT","options":{"A":"Detecting and reporting any serious misdemeanour or crime","B":"Protecting health and public safety","C":"Preventing the public from being misled by a statement or action of an individual or an organisation","D":"Protecting health and personal safety","E":"Revealing the existence of any conflict of interests of those individuals who are in a position of power or influence"},"answer":"D"},{"num":14,"text":"The general public might consider that it has a stake or interest in major companies, because the actions of these companies can affect society as a whole. Areas of public concern may include any of the following EXCEPT","options":{"A":"Public health, especially in the case of food manufacturers and manufacturers of drugs and medicines","B":"Protection of the environment, reducing pollution, and creating ‘sustainable businesses’","C":"Corruption in business practices","D":"The exploitation of the consumer through misleading descriptions of goods","E":"Excess profit made by these companies"},"answer":"E"},{"num":15,"text":"","options":{"A":"role of management in building a team is to provide ................... to teams and workgroups, so that the term can be successful. Supervision","B":"Coordination","C":"Leadership","D":"Control","E":"Motivate"},"answer":"C"},{"num":16,"text":"In work places, as in all aspects of living, people must communicate. What are the TWO ways of exchanging information?","options":{"A":"Formal and informal communication","B":"Telephone and fax messages","C":"Television and newspapers n these THREE strategies.                                 (15 Marks) (Total 20 Marks) QUESTION 3 a.    Professional Accountants and Managers’ attitude to ethics and ethical issues are based on their backgrounds, experiences, culture, religion and individual values. Explain the FIVE fundamental principles of professional ethics established in the ICAN Code of Conduct and Guide for members.                                      (10 Marks) b.    Explain the concepts: i.     Social ecology ii.    Ecological footprint iii.   Sustainable development iv.    Social footprint                                                        (10 Marks) (Total 20 Marks) QUESTION 4 a.   National income, gross national product and gross domestic product are all measures of total economic activity for a particular country during a given time period, usually one year. Required: Identify and explain TWO broad approaches to the measurement of total economic activity during a given time period.                                  (5 Marks) b.    The terms “Demand and Supply” refer to the behaviour of people as they interact with ONE another in the markets. Required: Explain the terms i.    Demand ii.   Supply iii.  Market Pricing Mechanism                                                 (15 Marks) (Total 20 Marks) QUESTION 5 a.      A workgroup is a group of employees who act with a common purpose and a sense of identity. Required: List and explain briefly TWO types of workgroups.                               (5 Marks) b. Bruce Tuckman (1965) provided an analysis of how small teams develop and change character over time. The appropriate form of team leadership changes as the team goes through each new stage of development. Required: List and explain briefly FIVE stages of team development.                      (15 Marks) (Total 20 Marks) QUESTION 6 a.      List FIVE disadvantages of accounting rate of return.                           (5 Marks) b.      Gidado Nigeria Limited is considering TWO mutually exclusive projects with the following project data: Project A    Project B N            N Year 0            (40,000)    (140,000) 1            24,000        74,000 2            16,000        56,000 3            15,000        55,000 The company’s cost of capital is 16%. You are required to advise Gidado on the better project to accept using the NPV and IRR methods.                                                                      (15 Marks) (Total 20 Marks) MULTIPLE CHOICE SOLUTIONS 1         E 2         E 3         E 4         B 5         A 6         D 7         D 8         D 9         B 10        D 11        D 12        C 13        D 14        E 15        C 16        A 17        A 18        C 19        A 20        B Solution to MCQ Question 9 Average Rate of Return (ARR)              =     Average profit         x 100% Average investments Profit for the period after depreciation = (200,000+ 195,000 + 90,000+75,000 -350,000)/4 = 52,500 Average investment                 = (initial investment + residual value)/2 = (350,000+0)/2 = 175,000 ARR                                =  52,500     x 100% 175,000 = 30% EXAMINER’S REPORT Section A tests all the areas of business and finance concepts and principles. The performance of the candidates that took the paper was average. The major pitfall was that the candidates displayed inadequate knowledge of basic business concepts and principles. Candidates are advised to cover the syllabus for better performance in subsequent examinations. SECTION B:      ESSAY QUESTIONS SOLUTION: QUESTION 1 (a)    Meaning of Financial Engineering Financial engineering involves the use of mathematical techniques to solve financial problems. It involves the use of tools and knowledge drawn from the fields of statistics, economics, computer science and applied mathematics to address current financial issues and devise new and innovative financial products. Financial engineering is sometimes referred to as quantitative analysis and is primarily used by investment banks, insurance agencies, hedge funds and commercial banks. Financial engineering can also be used to refer to strategies adopted by companies to maximise profits or other metrics through: i. Derivatives that address unusual risks faced by a party in a transaction; ii. Instructing a purchase or sale in a way that better addresses the interests of the buyer or seller. iii. Using new methods to compute the fair value of new or existing financial instruments. (b)    The financial objective of an organisation can be expressed in a number of different ways, and each of them has its advantages and weaknesses or limitations with each of them. Three commonly-used financial objectives are to maximise: •    Shareholder wealth •    Profits •    Growth in earnings per share. i.      Maximising shareholder wealth The overall objective of a company might be stated as maximising the wealth of its owners. Shareholders’ wealth is increased by dividend payments and a higher share price. Corporate strategies are therefore desirable if they result in higher dividends, a higher share price, or both. There are some problems with assuming that the financial objective of a company should be shareholders wealth maximisation. The considerations here include: • Setting the time period for wealth maximisation. • Measuring the wealth creation and dividing the wealth created into the portion for dividend payments and share price growth. •   Consideration of share prices which are often affected by general stock market sentiment, and short-term increases or falls in a share price might be caused by investor attitudes rather than any real success or failing of the company itself. The objective of maximising shareholder wealth is generally accepted as a sound basis for financial planning, but is not practical in terms of actually setting financial performance targets and measuring actual performance against the target. Other financial objectives might therefore be used instead, in the expectation that if these objectives are achieved, shareholder wealth will be increased by an optimal amount. ii.    Maximising profits and targets can be set for profit growth over a strategic planning period, as profit after tax is what is distributable to the company’s owners. Profit growth objectives have the advantage of simplicity. When a company states that its aim is to increase profits by 20% per year for the next three years, the intention is quite clear and easily understood – by managers, investors and others. The main problem with an objective of maximising profits is to decide the time period over which profit performance should be measured. •      Short-term profits might be increased only by taking action that will have a harmful effect on profits in the longer term. For example, a company might avoid replacing ageing equipment in order to avoid higher depreciation and interest charges, or might avoid investing in new projects if they will make losses initially – regardless of how profitable they might be in the longer term. •      It is often necessary to invest now to improve profits over the longer term. Innovation and taking business risks are often essential for long-term success. However, longer-term success is usually only achieved by making some sacrifices in the short term. In practice, managers often focus on short-term profitability, and give insufficient thought to the longer term because: •      Their remuneration might depend on meeting annual performance targets. Annual cash bonuses, for example, might be dependent on making a specified minimum amount of profit for the year. •      Managers often do not expect to remain in the same job for more than a few years; therefore short-term achievements might mean more to them than longer- term benefits after they have moved on to a different position or job. •      Profits can be increased by raising and investing more capital. When share capital is increased, total profits might increase due to the bigger investment, but the profit per share might fall. This is why a company’s financial objective might be expressed in terms of profit per share or growth in profit per share. iii.   Maximising growth in earnings per share The most common measure of profit per share is earnings per share (EPS). The financial objective might be to increase the earnings per share each year and possibly to grow EPS by a target amount each year for the next few years. If there is growth in EPS, there will be more profits to pay out in dividends per share, or there will be more retained profits to reinvest with the intention of increasing earnings per share even more in the future. EPS growth should therefore result in growth in shareholder wealth over the long term. However, there are some problems with using EPS growth as a financial objective. It might be possible to increase EPS through borrowing and debt capital. If a company needs more capital to expand its operations, it can raise the money by borrowing. Tax relief is available on the interest charges, and this reduces the effective cost of borrowing. Shareholders benefit from any growth in profits after interest, allowing for tax relief on the interest, and EPS increases. However, higher financial gearing (the ratio of debt capital to total capital) can expose shareholders to greater financial risk. As a consequence of higher gearing, the share price might fall even when EPS increases. Marking Guide (a)                                                                               Marks i.      Description of the term attracts                                    2 ii.     Further detailed explanation of the meaning and what it entails                                                               3 (b)    i.      Stating the three main financial objectives properly attracts 2 marks each                                                            6 ii.     Detailed explanation of each of the three main financial objectives attracts 3 marks each                                     9 Total                                                             20 EXAMINER’S REPORT This question tests the ability of candidates on their understanding of the basics of financial engineering and financial objectives of an organisation. About half of the candidates that attempted this question scored average marks. Many of the candidates could not clearly explain the features of the three main financial objectives of an organisation. Candidates are therefore advised to read and have a good understanding of this aspect of the syllabus. SOLUTION 2 (a)   Competitive advantage is the ability of an entity to do something which other organisations cannot do, or doing something far better than other organisations. It means offering something better to customers than competitors. Competitive advantage gives organisations superior performance in the market place. Having some competitive advantage over rival firms is essential. Without it, there is no reason why customers should buy the company’s product instead of the products of a competitor. Essentially, competitive advantage arises from customers’ perception of value for money being offered through the product/service on sale. Types of competitive advantage include the following:-"},"answer":"B"}],"answers":{"1":"E","2":"E","3":"E","4":"B","5":"A","6":"D","7":"D","8":"D","9":"B","10":"D","11":"D","12":"C","13":"D","14":"E","15":"C","16":"A","17":"A","18":"C","19":"A","20":"B"},"examiner_report":"Section A tests all the areas of business and finance concepts and principles. The performance of the candidates that took the paper was average. The major pitfall was that the candidates displayed inadequate knowledge of basic business concepts and principles. Candidates are advised to cover the syllabus for better performance in subsequent examinations."},{"session":"Nov 2016","questions":[{"num":1,"text":"Content theories of motivation deal mainly with wha ven work situation.                                                        (8 Marks) (Total 20 Marks) QUESTION 4 Godwin Plc invested N500,000 for a period of 3 years at 12% interest rate per annum. Calculate the future value of the investment of Godwin Plc if interest rate is compounded. a.    Annually b.    Semi-annually c.    Monthly d.    Weekly e.    Continuously                                                  (4 Marks each) (Total 20 Marks) QUESTION 5 For an organisation to function and survive, the managers must at all times apply the most appropriate management principles. a.    Define the term “Span of Control” and explain briefly FOUR factors that influence the most appropriate size of the span of control for a manager. (10 marks) b.    Explain briefly the following concepts: i.     Outsourcing ii.    Offshore outsourcing iii.   Divisional structure iv.    Operational planning v.     Stakeholder                                                  (10 marks) (Total 20 Marks) QUESTION 6 Managers need to understand the nature, processes and complexity of their business environment as well as how they affect the various operations of their organisation. a.    Explain briefly any FIVE political, legal, and environmental factors that could affect the performance of a business organisation.                 (10 Marks) b.    Explain briefly the following concepts: i.    Mission statement ii.   Objective iii.  Stakeholder mapping iv.   Deliberate strategy v.    Emergent strategy                                               (10 Marks) (Total 20 Marks) SOLUTIONS SUGGESTION SOLUTION Multiple Choice Questions (MCQ)"},"answer":"B"}],"answers":{"1":"A","2":"A","3":"E","4":"B","5":"D","6":"B","7":"B","8":"C","9":"D","10":"A","11":"A","12":"E","13":"E","14":"C","15":"C","16":"C","17":"A","18":"C","19":"C","20":"B"},"examiner_report":""},{"session":"May 2017","questions":[{"num":1,"text":"Which of the following organisational structures is MOST appropriate for a business in it s."},"answer":"E"},{"num":15,"text":"Who amongst the following theorists is associated with the Human Relations School of Management?","options":{"A":"Max Weber","B":"Elton Mayo","C":"Henry Mintzberg","D":"Rosemary Stewart","E":"Lyndall Urwick"},"answer":"B"},{"num":16,"text":"","options":{"A":"written communication of factual information on a specific subject presented in an orderly and formal manner is called a(n) Operating report","B":"Business plan","C":"Feasibility study","D":"Business report","E":"Business proposal"},"answer":"D"},{"num":17,"text":"","options":{"A":"club culture or spider‟s web culture is also known as Personal culture","B":"Existential culture","C":"Task culture","D":"Role culture","E":"Power culture"},"answer":"E"},{"num":18,"text":"The process of using the right words in the right order to achieve the objective of a message is called","options":{"A":"Communication Style","B":"Communication Skills","C":"Communication Personality","D":"Communication Structure","E":"Communication Creativity"},"answer":"A"},{"num":19,"text":"Which of the following options is NOT a feature of an effective work team?","options":{"A":"Good communication","B":"Focus","C":"Collaboration","D":"Doing your own job","E":"Positive conflicts"},"answer":"D"},{"num":20,"text":"The theory of motivation, which states that our behaviour is the result of conscious choices that we make between different alternatives, is known as","options":{"A":"Maslow‟s hierarchy of needs","B":"Vroom‟s expectancy model","C":"McClelland‟s motivational needs","D":"Heifetz‟s activity model","E":"Herzberg‟s hygiene and motivational factors SECTION B:                 OPEN-ENDED QUESTIONS                      (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 In order to make subordinates perform better, managers can use different types of reward systems. Assuming you are a manager in an accounting firm, you are required to: a.     Define a reward system.                                            (1 Mark) b.     Explain intrinsic and extrinsic rewards.                          (2 Marks) c.    List SIX examples each of intrinsic and extrinsic rewards that your subordinates could receive from doing their jobs.         (12 Marks) d.    State TWO extrinsic rewards you could give to your subordinates. (2 Marks) e.    State THREE benefits of management by objectives (MBO).               (3 Marks) (Total 20 Marks) QUESTION 2 The following are extracts from the financial position and income statement of TYX Limited for 2014 and 2015 I Jan      31 Dec         I Jan   31 Dec 2014        2014          2015    2015 N           N             N        N Share capital of N1 each      200,000      200,000      200,000 200,000 Share premium                 100,000         100,000     100,000    100,000 Accumulated profits           500,000         600,000     600,000    750,000 Bank loans                    200,000         600,000     600,000    350,000 2014         2015 N            N Profit Before Taxation                             210,000      294,000 Taxation                                          75,000         100,000 Profit after taxation                            135,000         194,000 Interest charges on bank loans                    30,000          25,000 Dividend                                          45,000          45,000 Sales                                         5, 800, 000      6,670,000 a.    You are required to compute the following ratios: i.   Return On Equity ii.   Return On Capital Employed iii.   Net Profit Percentage iv.    Earnings Per Share v.    Dividend Per Share                                              (10 Marks) b.    Nike Kenny is a student of a state-owned polytechnic in Yobe. She planned to save N5,000 each year out of the emolument she collects from the work study club of a school. How much will she have at the end of the tenth year, if interest on her savings is 6% ":"International Federation of Accounting","C":"International Federation of Accountants","D":"Intermediate Federation of Accountancy","E":"Intermediate Federation of Accounting"},"answer":"C"},{"num":7,"text":"An arrangement between rival firms in an industry to operate the same policies on pricing is known as","options":{"A":"Licensing","B":"Strategic group","C":"Pricing System","D":"Cartel","E":"Franchising"},"answer":"D"},{"num":8,"text":"As suggested by the strategic clock, what strategy would be required to sell a product that offers above-average benefits for a higher-than-average price?","options":{"A":"Differentiation strategy","B":"Focus differentiation strategy","C":"Hybrid strategy","D":"Focus hybrid strategy","E":"Low cost strategy"},"answer":"B"},{"num":9,"text":"Bonds issued by companies that are considered high credit risk is called","options":{"A":"Debenture","B":"Company stock","C":"Junk bonds","D":"Gilts edge securities","E":"Active bonds"},"answer":"C"},{"num":10,"text":"The main categories of stakeholder group in an organisation includes the following, except","options":{"A":"Directors and Senior managers","B":"Other employees","C":"Entrepreneurs","D":"Shareholders","E":"Society as a whole"},"answer":"C"},{"num":11,"text":"Financial management is about ............................ the financial affairs of an organisation to ensure that the organisation achieves its objectives","options":{"A":"Planning and controlling","B":"Controlling","C":"Planning and executing","D":"Planning or controlling","E":"Planning, controlling and reviewing"},"answer":"A"},{"num":12,"text":"Financial management has a strong accounting element, in large organisations it is usual to find professional accountants being involved in","options":{"A":"Financial accounting and management accounting","B":"Financial accounting, management accounting and financial management","C":"Financial accounting and financial management","D":"Management accounting and financial management"," r but a strong interest?","options":{"A":"Ignore the stakeholder","B":"Minimal effort is required to inform the stakeholder","C":"Keep the stakeholder informed","D":"Keep the stakeholder satisfied","E":"Obtain and keep the stakeholder‟s support"},"answer":"C"},{"num":19,"text":"Short-term financial instruments in the money market are instruments that have ....................... to maturity when they are issued","options":{"A":"One year or less","B":"Two years","C":"One year or more","D":"One year and eighteen months","E":"Three years"},"answer":"A"},{"num":20,"text":"In the BCG matrix, businesses that have low market shares in a high growth market are classified as ……………………. businesses","options":{"A":"Coward","B":"Cashless","C":"Landmark","D":"Benchmark","E":"Question mark SECTION B:             OPEN - ENDED QUESTIONS                      (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ANSWER FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 Companies can acquire assets through lease arrangement instead of buying with equity or debt capital. a.    State and explain briefly the two main classifications of leases.     (5 Marks) b.    Explain two features of each of the classifications in (a) above.      6 Marks) c.    State four advantages and two disadvantages of debt finance to the investor. (9 Marks) (Total 20 Marks) QUESTION 2 Economies of scale leads to overall decrease in unit cost as output increases. a.    State and explain four examples of economies of scale.                (6 Marks) b.    Explain briefly the terms below with appropriate illustrative graphs. i.     Fixed cost ii.    Variable cost iii.   Marginal cost iv.    Total cost                                                    (14 Marks) (Total 20 Marks) QUESTION 3 a.    Professional accountants and managers are expected to be resolute when they are faced with ethical considerations. State five examples of work situations where a professional accountant might be faced with ethical considerations. (10 Marks) b.    List three methods of issuing new shares for cash and briefly explain any two. (10 Marks) (Total 20 Marks) QUESTION 4 a. There are many models for dealing with both internal and external factors that affect businesses. Identify and explain briefly the factors included in the SWOT model.                                                                  (6 Marks) b. Ogifa Farms Limited, an agro-allied business, was incorporated in Nigeria to trade in rice. Rice is a staple food in Nigeria and the company had enjoyed good patronage since its establishment. In recent time, the company has been experiencing dwindling market.       Scarcity of foreign currency and high exchange rate in Nigeria have been blamed for this development. The recent policy of the Federal Government which emphasised local production of rice has compounded the company‟s problem. You are required to identify and explain four threats and three opportunities available to the business.                                         (14 Marks) (Total 20 Marks) QUESTION 5 Abraham Maslow propounded the hierarchy of needs theory of motivation to explain that the need at a lower level is dominant until it has been satisfied. Assuming you want to apply this theory to motivate your subordinates: a.    Identify and explain briefly the two „higher order‟ intrinsic needs that must be met before the other hierarchical needs are satisfied.                 (4 Marks) b.    Explain, with examples, the significance of Maslow‟s theory.           (6 Marks) c.    State five limitations of Maslow‟s hierarchy of needs theory.        (10 Marks) (Total 20 Marks) QUESTION 6 Working in a business organisation affects behaviour of employees in different ways. a.    Explain briefly four behavioural patterns of workers in an organisation. (6 Marks) b.    Assuming you have been invited by a fairly large auditing firm to give a talk on the characteristics of workgroups. Use a tabular model to illustrate seven differences between formal and informal workgroups that can exist in an organisation.                                                     (14 Marks) (Total 20 Marks) MULTIPLE CHOICE ANSWERS SECTION A"},"answer":"E"}],"answers":{"1":"B","2":"B","3":"D","4":"D","5":"B","6":"C","7":"D","8":"B","9":"C","10":"C","11":"A","12":"B","13":"E","14":"A","15":"C","16":"D","17":"A","18":"C","19":"A","20":"E"},"examiner_report":""},{"session":"May 2019","questions":[{"num":1,"text":"Which of the following is NOT an investment appraisal technique?","options":{"A":"Accounting rate of return (ARR)","B":"Payback","C":"Net present value (NPV)","D":"Internal rate of return (IRR)","E":"Return on asset"},"answer":"E"},{"num":2,"text":"Financial engineering is also called quantitative analysis and is primarily used by the following, EXCEPT","options":{"A":"Investment banks","B":"Hedge funds","C":"Commercial banks","D":"Trading companies","E":"Insurance companies"},"answer":"D"},{"num":3,"text":"The following are advantages of Internal Rate of Return (IRR) method of investment appraisal EXCEPT","options":{"A":"It is based on cash flows, not accounting profits","B":"It recognises the time value of money","C":"It is easier to understand investment return as a percentage return on investment","D":"For accept/reject decisions on individual projects, the IRR method will achieve the same decision as the NPV method","E":"It is a relative measure and not an absolute measure in N terms"},"answer":"E"},{"num":4,"text":"Which of the following statements is CORRECT?","options":{"A":"The buyer of a bill must hold the bill until maturity","B":"The bill holder can sell the bill in a secondary market before maturity","C":"Bills are redeemable at face value plus interest","D":"The market value of bills is always above their redemption value","E":"Bills are traded at „par‟"},"answer":"B"},{"num":5,"text":"Which of the following fully guides how people and institutions should behave in the world of commerce?","options":{"A":"Rule of law","B":"Values","C":"Honesty","D":"Integrity","E":"Ethics"},"answer":"E"},{"num":6,"text":"If a company does not want to pay to underwrite a rights issue, it might offer the new shares at a very low price compared to the market price of the existing shares. This type of lower-priced share issue is called a","options":{"A":"Deep discounted issue","B":"Discounted share issue","C":"Discounted share","D":"Deep price discounted","E":"Lower-priced share issue"},"answer":"A"},{"num":7,"text":"Which of the following is NOT a feature of a profession?","options":{"A":"Strict membership rules including a code of ethics","B":"The existence of a relationship of trust with clients","C":"The need to write a set of examination before being able to practice","D":"An extensive period of rigorous academic training in a particular area","E":"High entry requirements"},"answer":"C"},{"num":8,"text":"Which of the following represents the act of reporting suspicious, illegal or improper behaviour to the person in authority?","options":{"A":"Professional ethics","B":"Ethical threat","C":"Warning","D":"Grapevine communication","E":"Whistle blowing"},"answer":"E"},{"num":9,"text":"The threat that a professional accountant will promote a client‟s or employer‟s position to the point that the professional accountant‟s objectivity is compromised is known as a/an","options":{"A":"Advocacy threat","B":"Self review threat","C":"Self interest threat","D":"Familiarity threat","E":"Intimidation threat"},"answer":"A"},{"num":10,"text":"The two broad categories of money market instruments are","options":{"A":"Coupon-bearing and discount instruments","B":"Coupon-bearing and bankers acceptance","C":"Treasury bills and discount instruments","D":"Bills of exchange and commercial paper","E":"Discount instruments and commercial paper"},"answer":"A"},{"num":11,"text":"The management scholar who believed that there are principles of good management that apply to all types of organisation, and that these principles should therefore be applied consistently is","options":{"A":"Frederick Taylor","B":"Henri Fayol","C":"Lyndall Urwick","D":"Max Weber","E":"Elton Mayo"},"answer":"B"},{"num":12,"text":"The principle of management that states that employees should have only one direct supervisor is known as","options":{"A":"Discipline","B":"Unity of direction","C":"Division of work","D":"Scalar chain","E":"Unity of command"},"answer":"E"},{"num":13,"text":"The management scholar who developed a system for deciding whether a leader is task-oriented or relationship-oriented is","options":{"A":"Abraham Maslow","B":"Rensis Likert","C":"Tannenbaum Schmidt","D":"Paul Hersey","E":"Fred Fiedler"},"answer":"E"},{"num":14,"text":"The following are factors that affect the interests of executive directors and senior managers in any organization EXCEPT","options":{"A":"Remuneration","B":"Power and status","C":"Career prospects","D":"Job security","E":"Lower dividend payments"},"answer":"E"},{"num":15,"text":"The term “TSR” denotes","options":{"A":"Total shareholders‟ return","B":"Total stocks return","C":"Total shares return","D":"Total stakeholder‟s return","E":"Total stock returns"},"answer":"A"},{"num":16,"text":"Kanter argued that the re-birth and success of business organisations will depend on THREE factors, namely","options":{"A":"Innovation, entrepreneurship and participative management","B":"Efficiency, effectiveness and management","C":"Management, competency and marketing","D":"Production, finance and accounting","E":"Innovation, market survey and management"},"answer":"A"},{"num":17,"text":"Which of the following is NOT a stage or phase in the product life cycle?","options":{"A":"Introduction","B":"Growth","C":"Maturity","D":"Development","E":"Decline"},"answer":"D"},{"num":18,"text":"","options":{"A":"consumer contract where the terms are on “take it or leave it basis” is known as Legal contracts","B":"Contract law","C":"Freedom of contracts","D":"General form contracts","E":"Standard form contracts"},"answer":"E"},{"num":19,"text":"Elton Mayo concluded that lack of attention to …………….. was a major weakness in earlier theories of management.","options":{"A":"Material","B":"Method","C":"Work","D":"People","E":"Machinery"},"answer":"D"},{"num":20,"text":"Expectancy captures a person‟s perception about the relationship between two variables, namely:","options":{"A":"Instrumentality and valence","B":"Effort and persistence","C":"The direction of a person‟s behaviour and persistence","D":"Effort and performance","E":"Reward and performance SECTION B:                 OPEN – ENDED QUESTIONS                   (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 Macro economics is a branch of economics that studies whole economies rather than individual buyers, sellers and firms. Required: a.    Identify and explain the THREE approaches to the measurement of total economic activity during a given time period.                  (12 Marks) b.    Explain the main objective of government economic policy         (5 Marks) c.    Explain the term “economic cycle”                                (3 Marks) (Total 20 Marks) QUESTION 2 a.   A newly-employed Accounting Technician at Obudu Bakery Limited discovered that the expenditure recorded in the company‟s books were classified as either capital expenditure or revenue expenditure. Required: State briefly FOUR differences between capital and revenue expenditures of a company and give THREE examples of each.                          (12 Marks) b.   Identify and explain FOUR methods of investment appraisal              (8 Marks) (Total 20 Marks) QUESTION 3 The creation of “environmental footprint” as well as a “social footprint” by an organisation is considered a visible mark on the environment and the society. Required: Explain the following terms: i.   Environmental footprint                                                (4 Marks) ii. Social footprint                                                        (4 Marks) iii.   Carbon neutrality                                                      (4 Marks) iv.    Sustainable development                                                (4 Marks) v.     Sustainability reporting                                               (4 Marks) (Total 20 Marks) QUESTION 4 a.  Explain briefly the concept of management by objectives (MBO).             (2 Marks) b.     Explain the MBO process.                                             (12 Marks) c.     State THREE disadvantages of MBO.                                      (6 Marks) (Total 20 Marks) QUESTION 5 a. Explain briefly the TWO ways in which information can be exchanged in an accounting firm.                                                  (6 Marks) b. State THREE reasons why an accounting firm needs to rely on a mixture of formal and informal communication to operate effectively.         (9 Marks) c.     State FIVE benefits of effective communication in an accounting firm. (5 Marks) (Total 20 Marks) QUESTION 6 a.   Identify and explain FIVE fundamental principles which professional accountants are required to comply with.                         (10 Marks) b.      State and explain FIVE organisational values that would help professional accountants to promote adherence to the fundamental principles of their profession.                                                       (10 Marks) (Total 20 Marks) SECTION A MULTIPLE CHOICE QUESTIONS SOLUTION TO MCQs"},"answer":"D"}],"answers":{"1":"E","2":"D","3":"E","4":"B","5":"E","6":"A","7":"C","8":"E","9":"A","10":"A","11":"B","12":"E","13":"E","14":"E","15":"A","16":"A","17":"D","18":"E","19":"D","20":"D"},"examiner_report":""},{"session":"Nov 2019","questions":[{"num":1,"text":"The management of an organisation is accountable to its owners for the performance of the firm. From the foregoing, which of the following statements is incorrect?","options":{"A":"Charities are accountable to stakeholders","B":"Limited liability partnership is accountable to the government","C":"The directors of a company are accountable to equity holders","D":"Managers of public sector enterprises are accountable to government","E":"Partners in a business partnership are accountable to the stakeholders"},"answer":"B"},{"num":2,"text":"An arrangement between the rival firms in an industry to operate the same policies on pricing is called a/an","options":{"A":"Cartel","B":"Alliance","C":"Franchising","D":"Collaboration","E":"Joint venture"},"answer":"A"},{"num":3,"text":"„Classical‟ theories of organisation and management are associated with the following theorists EXCEPT","options":{"A":"Max Weber","B":"Henri Fayol","C":"William Ouchi","D":"Frederick Taylor","E":"Rosemary Stewart"},"answer":"C"},{"num":4,"text":"Which of the following is NOT a reason government has interest in all business organisations?","options":{"A":"Tax on profits","B":"Safety regulations","C":"Level of unemployment","D":"Creation of strong economy","E":"Provision of affordable goods"},"answer":"E"},{"num":5,"text":"The functions of the treasury department include the following EXCEPT","options":{"A":"Investing surplus cash","B":"Managing the cash generated by the business","C":"Obtaining new funds from financial markets","D":"Arranging insurance of the assets of the company","E":"Ensuring that the company has money to settle financial obligations"},"answer":"D"},{"num":6,"text":"","options":{"A":"business entity can be classified as any of the following in its market EXCEPT Nicher","B":"Leader","C":"Follower","D":"Prospect","E":"Challenger"},"answer":"D"},{"num":7,"text":"Professional accountants are required to comply with the following fundamental principles EXCEPT","options":{"A":"Integrity","B":"Efficiency","C":"Objectivity","D":"Competence","E":"Confidentiality"},"answer":"B"},{"num":8,"text":"Which of the following is outside the scope of the functions of a supervisor?","options":{"A":"Empowering staff","B":"Front line management","C":"Administrative management","D":"Staff development and training","E":"Conceptualise corporate strategy"},"answer":"E"},{"num":9,"text":"Which of the following is true of a leader?","options":{"A":"Maintenance","B":"Obedience","C":"Administration","D":"Reliance on control","E":"Focusing on systems and structures"},"answer":"B"},{"num":10,"text":"Jeta borrowed N800,000 at 6% simple interest for 7 months. What is the value of interest due at the end of the period?","options":{"A":"N25,000","B":"N26,000","C":"N27,000","D":"N28,000","E":"N29,000"},"answer":"D"},{"num":11,"text":"Suppose N1million is deposited in a money deposit bank that is paying 7.5% interest per annum compounded annually. What will be the compound amount at the end of the third year?","options":{"A":"N 1,242,300","B":"N 1,243,400","C":"N 1,344,500","D":"N 1,345,600","E":"N 1,446,700"},"answer":"A"},{"num":12,"text":"Suppose Bonde invested N240,000 in a savings account that paid interest twice in a year. After 8 years the money had accumulated to N 380,980. What was the annual compound interest rate?","options":{"A":"3.64%","B":"4.75%","C":"5.86%","D":"6.65%","E":"6.76%"},"answer":"C"},{"num":13,"text":"What is the present value of N10million in 8 years, if money could be deposited at 6.5 % compounded quarterly?","options":{"A":"N 15.73 million","B":"N 16.75 million","C":"N 17.73 million","D":"N 18.75 million","E":"N 19.46 million"},"answer":"B"},{"num":14,"text":"Larry wishes to save money towards his new-born daughter‟s wedding. He intends to save ₦50,000 on the first day of every 6 months for 18 years, starting immediately. The account pays interest of 6% compounded semi- annually. What will be the balance on the account at the end of 18 years?","options":{"A":"₦3,258,748.33","B":"₦4,368,748.34","C":"₦5,278,748.33","D":"₦6,588,748.33","E":"₦6,788,748.33"},"answer":"A"},{"num":15,"text":"Which aspect of these finance functions is ory","D":"Econometrics","E":"Simulation"},"answer":"D"},{"num":7,"text":"What is the maturity value for N120,000 loan at 6.3% simple interest for 150 days?","options":{"A":"N 123,150","B":"N 123,160","C":"N 125,150","D":"N 125,160","E":"N 126,180"},"answer":"A"},{"num":8,"text":"What is the amount of interest earned on a deposit of N245,000 for 8.5 years at 5.50% compounded semi-annually?","options":{"A":"N123,570","B":"N 133,680","C":"N 143,570","D":"N 153,680","E":"N 155,680"},"answer":"C"},{"num":9,"text":"What will be the effective rate for an account that pays 8% compounded quarterly?","options":{"A":"5.21%","B":"6.24%","C":"7.21%","D":"8.24%","E":"9.21%"},"answer":"D"},{"num":10,"text":"Fattie Limited wishes to make some savings to replace an existing machine with a better model at a cost of ₦10,000,000 in 7 years‟ time. Assuming that the current rate of interest is 9 % per annum, what fixed annual amount must the company set aside at the end of each year to achieve its target?","options":{"A":"₦ 1,053,926.50","B":"₦ 1,064,956.50","C":"₦ 1,075,926.52","D":"₦ 1,086,956.52","E":"₦ 1,093,926.50"},"answer":"D"},{"num":11,"text":"","options":{"A":"savings scheme involves investing ₦300,000 per annum on the last day of the year. If the interest rate is 6.5%, what is the sum to be received at the end of 9 years? ₦3,419,591.31","B":"₦3,519,692.31","C":"₦3,619,793.31","D":"₦3,659,894.31","E":"₦3,719,894.31"},"answer":"B"},{"num":12,"text":"Which of the following financial decisions can impede the achievement of organisational objectives?","options":{"A":"Investing short term cash surpluses","B":"Rewarding equity holders appropriately","C":"Protecting the organisation against financial risks","D":"Financing long-term expenditure with short-term sources of funds","E":"Maintaining a balance between long-term and short-term finance"},"answer":"D"},{"num":13,"text":"Financial engineering draws tools and knowledge to develop new and innovative financial products from the fol  may be due to any employee","E":"Certain rights against unfair dismissal by an employer"},"answer":"D"},{"num":4,"text":"Strategic decision making by the Board of Directors include the following, EXCEPT","options":{"A":"Decision to fix appropriate price for the company‟s product","B":"Setting strategic objectives for the business","C":"Decision to withdraw from a market","D":"Deciding the major business strategies","E":"Setting total borrowing limits for the company"},"answer":"D"},{"num":5,"text":"Which of the following is NOT a role associated with junior managers and supervisors?","options":{"A":"Employee discipline and morale","B":"Decide strategy","C":"Technical direction of work activities","D":"Efficiency control","E":"Short term planning"},"answer":"C"},{"num":6,"text":"In Lippitt and White‟s leadership style, which of the following is NOT true of groups with democratic leaders?","options":{"A":"Members are rebellious and display aggressive behaviour","B":"Relationship between the group members and leader is friendly","C":"The group members are capable of working independently when the leader is not around","D":"The group morale is high","E":"Reasonable amount of originality in the work done by the group members"},"answer":"E"},{"num":7,"text":"Ronny wants to borrow N160,000 from his friend. He is willing to pay back N174,400 in 3 months, what simple interest rate will be applicable?","options":{"A":"34%","B":"35.5%","C":"36%","D":"36.5%","E":"37%"},"answer":"B"},{"num":8,"text":"What is the amount of interest earned by a deposit of N414,000 for 11 years at 6.50% compounded quarterly?","options":{"A":"N427,455","B":"N427,467","C":"N437,455","D":"N437,467","E":"N447,467"},"answer":"B"},{"num":9,"text":"Lokoson must pay a lump sum of N960,000 in 5 years. What amount deposited today at 5.8% compounded annually will make up the sum of money?","options":{"A":"N724,200.36","B":"N724,300.37","C":"N725,200.36","D":"N725,300.37","E":"N725,300.37"},"answer":"C"},{"nu ":"The bond markets are accessible to small companies","E":"While in issue, the issuer pays interest to the bondholders in each year"},"answer":"D"},{"num":12,"text":"According to the works of Warren Bennis, which of the following describes a leader?","options":{"A":"Imitates","B":"Maintains","C":"Originates","D":"Does things rightly","E":"Places reliance on control"},"answer":"C"},{"num":13,"text":"One of the contingency theories of leadership was developed by","options":{"A":"Lippitt and White","B":"Blake and Mouton","C":"Shannon and Weaver","D":"Hersey and Blanchard","E":"Tannenbaum and Schmidt"},"answer":"D"},{"num":14,"text":"Which of the following CANNOT be categorised as an act of Non-Compliance with Laws and Regulations (NOCLAR)?","options":{"A":"Bribery","B":"Whistle blowing","C":"False accounting","D":"Fraudulent practice","E":"Mutilated financial records"},"answer":"B"},{"num":15,"text":"The concept of cash flow is of vital importance to capital investment appraisal. Which of the following costs is relevant to investment decisions?","options":{"A":"Future costs","B":"Notional costs","C":"Committed cost","D":"Absorbed Cost","E":"Apportionment Cost"},"answer":"A"},{"num":16,"text":"Separating the risk and return characteristics of market investments from the individual investment decisions is known as","options":{"A":"Risk transformation","B":"Separation theorem","C":"Financial intermediation","D":"Maturity transformation","E":"Amortisation"},"answer":"B"},{"num":17,"text":"Agency theory was developed in 1976 by","options":{"A":"Fayol and Mayo","B":"Kanter and Urwick","C":"Jensen and Meckling","D":"Mintzberg and Ouchi","E":"Frank and Lillian Gilbreth"},"answer":"C"},{"num":18,"text":"Shannon and Weaver‟s communication model was developed in","options":{"A":"1929","B":"1937","C":"1949","D":"1957","E":"1969"},"answer":"C"},{"num":19,"text":"Banks are important financial intermediaries because they","options":{"A":"Create new debit","B":"Are the only source of etition by government measures against imports. State TWO policies Nigeria may adopt to protect her cottage industry from foreign competition.                                                 (4 Marks) (Total 20 Marks) QUESTION 4 a.   State and explain FIVE categories of management‟s responsibility as suggested by Peter Drucker.                                             (10 Marks) b.   State FOUR main features of bureaucracy as identified by Rosemary Stewart. (4 Marks) c.   Explain THREE reasons for the growth of bureaucracy as put forward by Stewart.                                                            (6 Marks) (Total 20 Marks) QUESTION 5 a. State THREE advantages and THREE disadvantages of Accounting Rate of Return (ARR) method of investment appraisal.                           (6 Marks) b. McPat Investment Limited is considering investing in either of two mutually exclusive projects, namely Axiom and Axis. Each project costs N1.5 billion. The cost of capital to the company is 15%. The projected cash flows from the two projects are as stated below: Year              Axiom            Axis N „000         N „000 1               220,000        200,000"},"answer":"B"},{"num":6,"text":"300,000        340,000 7               280,000        280,000 You are required to evaluate the projects using Net Present Value method to decide which one to accept.                                                  (14 Marks) (Total 20 Marks) QUESTION 6 a.    Explain the following terms: i.    Technological business model ii.    Project management.                                              (4 Marks) b.    State TWO disadvantages each of Matrix and Virtual organisational structures. (4 Marks) c.    In order to put the fundamental principles of ethics into practice, organisations need to adopt values that promote adherence to these principles. State and explain SIX of these values.                                       (12 Marks) (Total 20 Marks) SOLUTION SECTION A 1            D 2            E 3            B 4            D 5            A 6            B 7            C 8            D 9            B 10           C 11           D 12           C 13           D 14           B 15           A 16           B 17           C 18           C 19           D 20           B Examiner’s report Section A of the paper is mandatory and so all candidates attempted the twenty MCQs questions. The questions test candidates‟ comprehension of the various aspects of the syllabus. About 55 % of the candidates that attempted this section scored below 50%. For better performance in future examinations, prospective candidates should cover the entire syllabus while preparing for this subject. ICAN study text and Pathfinder will offer the required guidance. Marking guide Award 1 mark each for any correct option chosen to a maximum of 20 marks SECTION B SOLUTION 1 (a)     Group cohesion describes the strength of the bond uniting the group. When cohesion is strong the group will remain strong and stable and continue to exist. Conversely, when cohesion is weak, the group may ultimately disband. i. Size of group: Smaller groups tend to display greater cohesion than larger groups. ii. Heterogeneous vs. homogeneous: Homogeneous groups who share common characteristics such as race, gender and religion will typically demonstrate greater cohesion than groups who are more diverse (heterogeneous) sharing fewer common characteristics. iii. Group success This is arguably a „self-fulfilling prophecy‟ – the more successful a group the greater the incentive to be part of it and hence the greater the cohesion. The less successful, the lower the cohesion. iv. Barriers to entry and prestige: Human nature means that the more difficult it is to become a member of a group the greater the desire for outsiders to join the group. Subsequently, the group becomes prestigious and more cohesive. A good example might be an elite academic institution. v. Task cohesion: The greater the need for a task to be completed by a group rather than individuals (e.g. a sports team or military operation) the more cohesive the group becomes as members on the whole accept the need to work together to achieve the shared objective. vi. Rewards and punishment: The availability of reward for membership and/or punishment for leaving can have a bearing on the attractiveness of being part of a group and hence influence group cohesion. vii. Competition from external groups: A lack of competition from alternative groups can lead to erosion in cohesion as members do not feel any pressure to perform. However, with the emergence of competition, groups typically become more cohesive as their competitive instincts amplify and the desire to defeat a rival drives them on. viii. Location: Groups who enjoy segregation from others will tend to be more cohesive as strong interpersonal communication patterns develop and a sense of visible identify builds. ix. Leadership style: An effective leadership style that matches the skills and personalities of the group can have a significant impact on promoting group cohesion. An ineffective leadership style for that particular group of people is likely to have the opposite effect and erode group cohesion. x. Social cohesion: Social cohesion is the degree to which group members enjoy each other‟s company and how much they like each other. Group cohesion will be highest when members enjoy the social side of being part of the group. (b)    Commercial paper (CP) is an unsecured promissory note.","options":{"A":"promissory note is a promise by the issuer of the note to pay a specific amount of money on a specified date. When a company issues CP, it promises to pay the face value of the paper at a specified date in the future. Meanwhile, non-financial companies issue CP through a bank, as part of a commercial paper programme. The bank issues the CP on behalf of the company and sells it to investors. All CP is negotiable, which means that it can be sold in the money market. In practice, however, investors buying CP normally hold it to maturity when they are paid the face value of the paper they have bought. The company issuing the CP therefore receives immediate cash (at a discount to the face value of the paper) and makes a payment when the paper reaches maturity. The advantages of convertibles for companies are as follows: (i) The company can issue bonds now, and receive tax relief on the interest charges, but hope to convert the debt capital into equity in the future. (ii) The interest rate on convertibles is lower than the interest rate on similar straight bonds. This is because investors in the convertibles are expected to accept a lower interest rate in return for the option to convert the bonds into equities in the future. (iii) Occasionally, there is strong demand from investors for convertibles, and companies can respond to investors‟ demand by issuing convertibles in order to raise new capital. The advantages of convertibles for investors are as follows: (i) Investors receive a minimum annual income up to the conversion date, in the form of fixed interest. (ii) In addition, investors in convertibles will be able to benefit from a rise in the company‟s share price, and hope to make an immediate capital gain on conversion. (iii) Convertibles therefore combine some fixed annual income and the opportunity to benefit from a rising share price. The first part of the question tests candidates‟ knowledge of Teams and Team Roles with particular emphasis on Group Cohesion. The second part examines money market instruments with particular reference to Commercial Paper. Examiner’s report The first part of the question tests candidates‟ knowledge of teams and team roles with particular emphasis on group cohesion. The second part examines money market instruments with particular reference to commercial paper The question was attempted by 35% of the candidates. Performance was poor, as about 70% of the candidates who attempted t
