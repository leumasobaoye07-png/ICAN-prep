effectively communicate the message. It enables the sender to convey the message in a way that achieves the desired outcome.\n\n**Why the other options are wrong:**\nA. B is related to communication (communication skills) but it encompasses all aspects, not just language.\nC. Communication personality is not a standard term in communication theory, and it does not directly relate to language usage.\nD. Communication structure refers to the organization and arrangement of messages, not the choice of words.\nE. Communication creativity involves generating unique ideas, whereas communication style focuses on the effective use of language to convey those ideas.\n\n**Key concept:** The concept of communication style is tested in this question, which is a fundamental aspect of business and finance communication."}, {"num": 19, "text": "Which of the following options is NOT a feature of an effective work team?", "options": {"A": "Good communication", "B": "Focus", "C": "Collaboration", "D": "Doing your own job", "E": "Positive conflicts"}, "answer": "D", "explanation": "**Why D is correct:** Doing your own job is not a feature of an effective work team because it implies an individualistic approach rather than a team-oriented mindset. In effective teams, members work together to achieve a common goal, not just focus on their own tasks. This mindset fosters cooperation and a cohesive group dynamic.\n\n**Why other options are wrong:**\nA. Good communication is a vital feature of an effective work team.\nB. Focus is essential for a team to work towards a common goal.\nC. Collaboration is at the heart of what an effective work team does.\nE. Positive conflicts can lead to healthier discussions and better decision-making in a team.\n\n**Key concept:** Group Behavior"}, {"num": 20, "text": "The theory of motivation, which states that our behaviour is the result of conscious choices that we make between different alternatives, is known as", "options": {"A": "Maslow‟s hierarchy of needs", "B": "Vroom‟s expectancy model", "C": "McClelland‟s motivational needs", "D": "Heifetz‟s activity model", "E": "Herzberg‟s hygiene and motivational factors SECTION B:                 OPEN-ENDED QUESTIONS                      (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 In order to make subordinates perform better, managers can use different types of reward systems. Assuming you are a manager in an accounting firm, you are required to: a.     Define a reward system.                                            (1 Mark) b.     Explain intrinsic and extrinsic rewards.                          (2 Marks) c.    List SIX examples each of intrinsic and extrinsic rewards that your subordinates could receive from doing their jobs.         (12 Marks) d.    State TWO extrinsic rewards you could give to your subordinates. (2 Marks) e.    State THREE benefits of management by objectives (MBO).               (3 Marks) (Total 20 Marks) QUESTION 2 The following are extracts from the financial position and income statement of TYX Limited for 2014 and 2015 I Jan      31 Dec         I Jan   31 Dec 2014        2014          2015    2015 N           N             N        N Share capital of N1 each      200,000      200,000      200,000 200,000 Share premium                 100,000         100,000     100,000    100,000 Accumulated profits           500,000         600,000     600,000    750,000 Bank loans                    200,000         600,000     600,000    350,000 2014         2015 N            N Profit Before Taxation                             210,000      294,000 Taxation                                          75,000         100,000 Profit after taxation                            135,000         194,000 Interest charges on bank loans                    30,000          25,000 Dividend                                          45,000          45,000 Sales                                         5, 800, 000      6,670,000 a.    You are required to compute the following ratios: i.   Return On Equity ii.   Return On Capital Employed iii.   Net Profit Percentage iv.    Earnings Per Share v.    Dividend Per Share                                              (10 Marks) b.    Nike Kenny is a student of a state-owned polytechnic in Yobe. She planned to save N5,000 each year out of the emolument she collects from the work study club of a school. How much will she have at the end of the tenth year, if interest on her savings is 6% compounded semi- annually?        (4 Marks) c.    Agency conflicts are the differences in the interests of a company‟s owners and managers. However, several remedies have been recommended to lessen this age long managerial problem. Required: Explain briefly THREE of these remedies                                       (6 Marks) (Total 20 Marks) QUESTION 3 a.    High unemployment rate is a challenge in any economy. Attempts have been made to classify unemployment so as to resolve it. State and explain briefly FIVE categories of unemployment.                                  (10 Marks) b.    State the implications of a fall in the value of a nation‟s currency. (4 Marks) c.     Explain briefly the following business terms: i.   Fiscal policy ii.   Monetary policy iii.   Monopoly iv.    Downsizing v.    De-layering vi.    Outsourcing                                                      (6 Marks) (Total 20 Marks) QUESTION 4 a.   State FOUR characteristics of a perfectly competitive market             (4 Marks) b.    Explain the term monopolistic competition and state its SIX main features. (8 Marks) c.    Many businesses expand beyond their national markets and have competitors all over the world. Explain FOUR reasons for internationalisation of markets and competition. (8 Marks) (Total 20 Marks) QUESTION 5 a.    Corporate financial objectives may be expressed as maximising shareholders‟ wealth, as well as profit or growth in earnings. State and explain briefly the weaknesses of THREE commonly-used corporate financial objectives.                                           (14 Marks) b.     State briefly the features of the following operational techniques: i.     Mathematical logic ii.     Game theory iii.     Mathematical optimisation                                      (6 Marks) (Total 20 Marks) QUESTION 6 Effective communication skills are essential to any manager or professional accountant in the 21st century. a.    List FIVE methods of communication and state FIVE benefits of using e-mail. (10 Marks) b.    Explain briefly the advantages and disadvantages of video conferencing. (10 Marks) (Total 20 Marks) MULTIPLE CHOICE SOLUTIONS - SECTION A"}, "answer": "B", "explanation": "**Why B is correct:** \nVroom's expectancy model proposes that motivation occurs when an individual believes that a specific behaviour will lead to a desired outcome. This model is based on conscious choices made between different alternatives, which aligns with the given description. It is a rational choice theory that emphasizes the role of expectation and effort.\n\n**Why the other options are wrong:**\nA. Maslow's hierarchy of needs is a theory that explains human motivation based on the satisfaction of different levels of needs, not a rational choice process.\nB. McClelland's motivational needs, which include achievement, affiliation, and power needs, also focus on different drivers of motivation rather than conscious choices.\nC. Heifetz' theory is not a well-recognized model in motivation, and it does not relate to the concept of conscious choice.\nD. Herzberg's hygiene and motivational factors is a two-factor theory of job satisfaction that does not describe individual choices between alternatives.\nE. This option is not relevant to the question as no theory with this name is widely recognized in motivation.\n\n**Key concept:** Vroom's expectancy model is a motivational theory that explains human behaviour through conscious choices made between different alternatives."}], "answers": {"1": "A", "2": "E", "3": "D", "4": "A", "5": "C", "6": "A", "7": "B", "8": "E", "9": "B", "10": "D", "11": "C", "12": "D", "13": "A", "14": "E", "15": "B", "16": "D", "17": "E", "18": "A", "19": "D", "20": "B"}, "examiner_report": ""}, {"session": "Nov 2018", "questions": [{"num": 1, "text": "Ability to give orders or guidance to others and expect the orders to be obeyed or the guidance to be followed is known as", "options": {"A": "Influence", "B": "Authority", "C": "Militancy", "D": "Coercion", "E": "Delegation"}, "answer": "B", "explanation": "**Why B is correct:** Authority is the ability to give orders or guidance to others and expect them to be obeyed or followed. This concept is fundamental in management and organizations. It implies a position of power and responsibility.\n\n**Why the other options are wrong:** \nA. Influence refers to the ability to persuade or induce others to act, but does not necessarily imply obedience.\nB. Coercion involves the use of force or threat to obtain compliance, not a voluntary obedience.\nC. Militancy refers to a state of being strongly dedicated or zealous, which may not necessarily relate to giving orders or guidance.\nD. Delegation involves the transfer of authority and responsibility to another person or group, but does not necessarily imply expectation of obedience.\n\n**Key concept:** This question tests the concept of 'Authority and Delegation', a fundamental topic in the Business & Finance (Foundation Level) module."}, {"num": 2, "text": "The objective of market skimming is to maximise", "options": {"A": "The marketing strategy", "B": "The gross profit per unit sold", "C": "The net profit per unit sold", "D": "Effectiveness", "E": "Efficiency"}, "answer": "B", "explanation": "**Why B is correct:** Market skimming involves setting an initial high price to capture revenue and profit early on, with the aim of maximizing the gross profit per unit sold before the entry of competitors or as the market becomes more competitive.\n\n**Why the other options are wrong:**\nA. The marketing strategy is a broader objective that may include skimming as a tactic, but it is not the specific objective of market skimming.\nB. Net operating profit per unit (NOPU) is not the primary focus of market skimming, making option C more relevant.\nD. Effectiveness is too vague and does not directly relate to the pricing objective in market skimming.\nE. Efficiency refers to achieving a goal with minimal resources or waste, which is not the primary objective of market skimming.\n\n**Key concept:** Market skimming is a pricing strategy aimed at maximizing the gross profit per unit sold at the initial stage, typically employed in the introduction phase of a product's life cycle."}, {"num": 3, "text": "Which of the following is not a financial instrument traded on the capital market?", "options": {"A": "Development stock", "B": "Debenture", "C": "Bonds", "D": "Stabilisation securities", "E": "Warrant"}, "answer": "D", "explanation": "**Why D is correct:** Stabilisation securities are traded in the inter-bank market, not on the capital market. They are used to maintain market price of a company or an investment. They are not a financial instrument traded directly on the capital market.\n\n**Why the other options are wrong:**\nA. Development stock is traded on the capital market to raise long-term funds for development projects.\nB. Debenture is a financial instrument traded on the capital market, typically issued by companies to raise long-term debt.\nC. Bonds are traded on the capital market as they are a type of long-term debt security issued by companies or governments.\nE. Warrant is a financial instrument traded on the capital market, representing the right to purchase a security at a specified price.\n\n**Key concept:** Capital market instruments."}, {"num": 4, "text": "Which of the fundamental principles of ethical behaviour states that an accountant must not allow his professional judgement to be affected by conflict of interest and undue influence from others?", "options": {"A": "Integrity", "B": "Technical standards", "C": "Confidentiality", "D": "Objectivity", "E": "Professional behaviour"}, "answer": "D", "explanation": "**Why D is correct**: The principle of objectivity emphasizes that accountants must not allow their professional judgement to be influenced by personal interests, relationships, or pressures from others. This means they must be impartial and make decisions based solely on facts and evidence. Objectivity is essential in maintaining the trust and confidence of stakeholders.\n\n**Why the other options are wrong**:\nA. Integrity relates to acting with honesty and ethics, but it does not specifically address the influence of others on professional judgement.\nB. Technical standards refer to the application of established methods and procedures in auditing and accounting, rather than external influences on decision-making.\nC. Confidentiality pertains to maintaining the secrecy of sensitive information, which is not directly related to the impact of external factors on professional judgement.\nE. Professional behaviour is a broad term that covers various aspects of an accountant's conduct, but it does not specifically focus on the influence of conflict of interest or undue influence.\n\n**Key concept**: The fundamental principle of ethical behaviour governing accountant's professional judgement and decision-making in the face of external influences."}, {"num": 5, "text": "The process whereby a relatively small number of new shares are sold to selected institutional investors is called", "options": {"A": "Offer for sale by tender", "B": "Placing", "C": "Underwriting of new shares", "D": "Offer for subscription", "E": "Rights issues"}, "answer": "B", "explanation": "**Why B is correct:** Placing refers to a method of issue whereby a company sells a small number of new shares to select institutional investors, which is characterized by the company approaching a nominated stockbroker or investment bank with the details of the issue and the price at which the shares are to be placed. This method allows for targeted sales without going through a full public offer process. It provides discretion over the timing, size, and price of the issue.\n\n**Why A is wrong:** A is incorrect because 'offer for sale by tender' is a method of issue where a company invites offers from the market for a new issue, and investors place a bid with the lead merchant bank who underwrites the issue.\n\n**Why C is wrong:** C is incorrect because 'underwriting of new shares' refers to the responsibility assumed by the lead underwriter and syndicate members of purchasing the entire issue from the new issue issuer and then selling the same in the market.\n\n**Why D is wrong:** D is incorrect because 'offer for subscription' refers to a method of issue where shares are offered directly to existing shareholders by means of a renounceable letter of allotment, usually on a proportionate basis to their existing holding.\n\n**Why E is wrong:** E is incorrect because 'Rights issue' refers to a method of issue of new shares to existing shareholders, usually at a discounted price to the current market price, in proportion to their existing holdings.\n\n**Key concept:** This question tests the ability to identify and describe the different methods of issue under the equity financing topic."}, {"num": 6, "text": "IFAC code establishes a minimum world-wide code of ethical conduct for accountants. Which of the following represents the full meaning of “IFAC”?", "options": {"A": "International Federation of Accountancy", "B": "International Federation of Accounting", "C": "International Federation of Accountants", "D": "Intermediate Federation of Accountancy", "E": "Intermediate Federation of Accounting"}, "answer": "C", "explanation": "**Why C is correct:** The International Federation of Accountants (IFAC) is an international organization that represents accountancy globally and establishes professional standards and guidelines for accountants. This correct spelling reflects its actual name. It is recognized worldwide for its ethical guidance and standards for accountants.\n\n**Why A is wrong:** This option incorrectly includes \"of Accountancy\" instead of \"of Accountants\".\n**Why B is wrong:** This option lacks the singular form \"Accountants\" used in the actual name of IFAC.\n**Why D is wrong:** This option introduces the incorrect term \"Intermediate\" which is not part of the official name.\n**Why E is wrong:** Similar to D, this option introduces the incorrect term \"Intermediate\" and incorrect plural form of \"Accounting\" which is not used in IFAC's official name.\n\n**Key concept:** The full meaning and acronym of IFAC in relation to ethical conduct for accountants as per the IFAC code."}, {"num": 7, "text": "An arrangement between rival firms in an industry to operate the same policies on pricing is known as", "options": {"A": "Licensing", "B": "Strategic group", "C": "Pricing System", "D": "Cartel", "E": "Franchising"}, "answer": "D", "explanation": "**Why D is correct:** A cartel is an agreement among rival companies in the same industry to operate the same policies on pricing, output, and other factors. This type of cooperation is often considered restrictive of competition and is regulated by many countries' antitrust laws. The primary goal of a cartel is to maintain or increase profits by sharing a market and coordinating business activities.\n\n**Why A is wrong:** Licensing involves granting a firm the right to use a process, product, or trademark of another firm, usually under a contract.\n\n**Why B is wrong:** Strategic group refers to a group of firms that operates in the same business but adopts distinct strategies or business models to compete in the market.\n\n**Why C is wrong:** Pricing system does not specifically refer to an agreement between rival firms; it is a broader term that involves the techniques or methods used to set prices.\n\n**Why E is wrong:** Franchising is an agreement where a business allows an individual or company to operate a store or business under licence or permission from the main business owner.\n\n**Key concept:** Industry structure and organization, specifically the concept of cartels and other restrictive of competition practices."}, {"num": 8, "text": "As suggested by the strategic clock, what strategy would be required to sell a product that offers above-average benefits for a higher-than-average price?", "options": {"A": "Differentiation strategy", "B": "Focus differentiation strategy", "C": "Hybrid strategy", "D": "Focus hybrid strategy", "E": "Low cost strategy"}, "answer": "B", "explanation": "**Why B is correct:** \nA focus differentiation strategy is chosen when a company wants to differentiate its product in a specific market segment, where the product offers higher benefits than those of its competitors, but at a relatively high price. This strategy helps the company to target specific customers who are willing to pay the premium price for the benefits offered. By doing so, it creates a competitive advantage and builds customer loyalty.\n\n**Why other options are wrong:**\nA. A differentiation strategy is broader and aims to differentiate the product from competitors on a broader scale, rather than targeting specific customers.\nC. A hybrid strategy combines features of cost leadership and differentiation, but is not specifically designed to price above-average products.\nD. A focus hybrid strategy aims to combine a cost leadership strategy with a focus strategy, which does not align with the given scenario.\nE. A low-cost strategy is about reducing prices to gain competitive advantage, not charging higher-than-average prices.\n\n**Key concept:** A key concept tested is the strategic clock, which helps to determine the best competitive strategy based on pricing and the level of differentiation offered."}, {"num": 9, "text": "Bonds issued by companies that are considered high credit risk is called", "options": {"A": "Debenture", "B": "Company stock", "C": "Junk bonds", "D": "Gilts edge securities", "E": "Active bonds"}, "answer": "C", "explanation": "**Why C is correct:** \nC is correct because junk bonds refer to high-risk corporate debt that has a greater likelihood of default, and are issued by companies with a lower credit rating or those considered high credit risk.\n\n**Why the other options are wrong:**\nA. Debenture - This is a type of loan that is typically considered lower risk and backed by the issuing company's creditworthiness.\nB. Company stock - This is a security that represents ownership in a company, not a type of debt.\nD. Gilts edge securities - This option is not relevant, as gilts typically refer to government securities.\nE. Active bonds - This term does not describe a specific type of bond related to credit risk.\n \n**Key concept:** Understanding different types of corporate debt securities and their associated credit risk levels is a key concept in the ICAN Business & Finance syllabus."}, {"num": 10, "text": "The main categories of stakeholder group in an organisation includes the following, except", "options": {"A": "Directors and Senior managers", "B": "Other employees", "C": "Entrepreneurs", "D": "Shareholders", "E": "Society as a whole"}, "answer": "C", "explanation": "**Why C is correct:** Entrepreneurs are not typically classified as a stakeholder group in an organisation, rather they are the owners or those who create the organisations in the first place.\n\n**A. Incorrect because:** Directors and Senior managers are considered stakeholders as they have vested interests in the success of the organisation.\n\n**B. Incorrect because:** Other employees are stakeholders as they have a vested interest in the success of the organisation, affecting their employment and financial well-being.\n\n**D. Incorrect because:** Shareholders are stakeholders as they hold ownership interest in the organisation and benefit from its success.\n\n**E. Incorrect because:** Society as a whole can be considered a stakeholder due to the potential impact of the organisation's operations on the broader community.\n\n**Key concept:** Stakeholder identification is a fundamental concept in business and finance, involving the recognition of groups or individuals who have a vested interest in an organisation's success or failure."}, {"num": 11, "text": "Financial management is about ............................ the financial affairs of an organisation to ensure that the organisation achieves its objectives", "options": {"A": "Planning and controlling", "B": "Controlling", "C": "Planning and executing", "D": "Planning or controlling", "E": "Planning, controlling and reviewing"}, "answer": "A", "explanation": "**Why A is correct:** Financial management involves both planning and controlling to ensure the organisation achieves its objectives. This is because planning involves setting financial goals and objectives, while controlling involves implementing and monitoring strategies to meet those objectives. \n\n**Why B is wrong:** B only mentions controlling, which is a part of financial management, but it doesn't cover the entire scope, which includes planning.\n**Why C is wrong:** C mentions planning and executing, but financial management does not only involve executing strategies but also evaluating their success.\n**Why D is wrong:** D mentions 'or controlling', which implies an either-or situation, but financial management requires both planning and controlling to achieve organisational objectives.\n**Why E is wrong:** E mentions reviewing in addition to planning and controlling, but while reviewing is an important aspect of financial management, it is not the primary scope of financial management.\n\n**Key concept:** This question tests the understanding of the definition of financial management."}, {"num": 12, "text": "Financial management has a strong accounting element, in large organisations it is usual to find professional accountants being involved in", "options": {"A": "Financial accounting and management accounting", "B": "Financial accounting, management accounting and financial management", "C": "Financial accounting and financial management", "D": "Management accounting and financial management", "E": "Financial accounting, mathematical accounting and financial management"}, "answer": "B", "explanation": "**Why B is correct:** In large organisations, financial management draws heavily from accounting knowledge, particularly financial accounting which deals with historical financial reporting, management accounting which deals with providing information for decision-making, making option B the most comprehensive and correct answer.\n\n**Why A is wrong:** A excludes management accounting which is crucial in financial management.\n**Why C is wrong:** C excludes management accounting which would leave a large gap in financial management.\n**Why D is wrong:** D excludes financial accounting, which provides valuable historical financial information essential for financial management.\n**Why E is wrong:** E introduces the non-existent 'mathematical accounting' concept.\n\n**Key concept:** The involvement of professional accountants in financial management, specifically combining the roles of financial accounting and management accounting."}, {"num": 13, "text": "Which of the following is not a discounted cashflow (DCF) investment appraisal technique?", "options": {"A": "Net present value", "B": "Internal Rate of Return", "C": "Profitability index", "D": "Discounted payback period", "E": "Payback period"}, "answer": "E", "explanation": "**Why E is correct:** The payback period, unlike the other options under the discounted cashflow (DCF) category, is a non-discounted cashflow investment appraisal technique as it does not take into account the time value of money. It measures the number of years it takes for a project to recoup its initial investment. This method is primarily a simple comparison tool.\n\n**Why the other options are wrong:**\nA. Net present value is a DCF technique used to discount the future cash flows into their present value.\nB. Internal Rate of Return is also a DCF technique used to calculate the rate at which the NPV becomes zero.\nC. Profitability index is a DCF technique used to evaluate whether the project's NPV or IRR is profitable or not compared to its initial investment cost.\nD. Discounted payback period is a modified payback period that involves discounting the future cash flows to their present value.\n\n**Key concept:** This question tests the student's understanding of the types of cashflow investment appraisal techniques."}, {"num": 14, "text": "Agency theory was developed by Jensen and Meckling (1976) who defined the agency relationship as a form of contract between", "options": {"A": "Company‟s owners and its managers", "B": "Company‟s directors and the employees", "C": "Company and its directors", "D": "Company‟s managers and its employees", "E": "Company‟s employees and line managers"}, "answer": "A", "explanation": "**Why A is correct:** Agency theory focuses on the relationship between the company's owners ( principals) and its managers ( agents), as they have conflicting goals and objectives. Jensen and Meckling (1976) identified this as a fundamental agency relationship. A is therefore the correct option.\n\n**Why B is wrong:** B is incorrect because the relationship between directors and employees is not the key focus of agency theory.\n\n**Why C is wrong:** C is incorrect as the company is not considered to be an agent or principal in agency theory; rather, it is the context in which the agency relationship exists.\n\n**Why D is wrong:** D is incorrect because the focus of agency theory is on the relationship between owners and managers, not on the hierarchical relationship between managers and employees.\n\n**Why E is wrong:** E is incorrect as agency theory does not specifically focus on the relationship between employees and line managers.\n\n**Key concept:** Agency theory examines the principal-agent relationship in the context of a company, highlighting the conflict of interests between shareholders (principals) and management (agents)."}, {"num": 15, "text": "Which of the following is not true about business/project financing?", "options": {"A": "Borrowers of finance include companies, governments and individuals", "B": "Providers of finance are individuals, companies and other organisations with surplus funds to invest", "C": "It is not possible for borrowers to obtain funding directly from an investor", "D": "It is usual for borrowers and investors/lenders to be brought together by financial intermediaries in the financial markets", "E": "A financial intermediary is a person or organisation that operates between savers (investors) and borrowers"}, "answer": "C", "explanation": "**Why C is correct:** Option C is incorrect because borrowers can obtain funding directly from an investor, also known as direct investment, where the investor lends to the borrower or purchases a security such as a bond or share.\n\n**Why the other options are wrong:**\nA. Borrowers of finance include companies, governments and individuals - This is true.\nB. Providers of finance are individuals, companies and other organisations with surplus funds to invest - This is true.\nD. It is usual for borrowers and investors/lenders to be brought together by financial intermediaries in the financial market - This is true.\nE. A financial intermediary is a person or organisation that operates between savers (investors) and borrowers - This is true.\n\n**Key concept:** The specific topic tested in this question is Business/Project Financing."}, {"num": 16, "text": "Which of the following is not a characteristic of Theory Z?", "options": {"A": "Long term employment", "B": "Collective decision making", "C": "Individual responsibility", "D": "Non-specialised career path", "E": "Slow promotion"}, "answer": "D", "explanation": "**Why D is correct:** Theory Z emphasizes the importance of employee commitment and job security, often associated with a long-term and relatively stable career path. Non-specialised career paths, which involve frequent job changes or a focus on individual career advancement, contradict the core principles of Theory Z. This approach prioritizes collective success and employee commitment over individual goals.\n\nA. Bennis's (not Theory Z) Humanistic approach emphasizes individual responsibility and freedom.\nB. Collective decision making is a feature of Theory Z, which involves shared decisions among team members.\nC. Individual responsibility is not a primary characteristic of Theory Z, which focuses more on the team's success.\nE. Slow promotion is an aspect of Theory Z, which values employee retention and job security over rapid career advancement.\n\n**Key concept:** Theory Z is a management approach that originated from William Ouchi's research in the 1980s, emphasizing characteristics such as collective decision making, slow promotion, and long-term employment to foster teamwork and employee commitment."}, {"num": 17, "text": "The objectives formulated by the strategic planners should be „SMART‟. Which of the following is not part of the „SMART‟ acronym?", "options": {"A": "Sponsored", "B": "Measurable", "C": "Agreeable", "D": "Realistic", "E": "Time-bound"}, "answer": "A", "explanation": "**Why A is correct:** The term „Sponsored‟ is not a component of the „SMART‟ acronym, which stands for Specific, Measurable, Achievable, Relevant, and Time-bound. This option does not pertain to the original SMART criteria. \n\n**Why the other options are wrong:**\nB. Measurable - This is actually one of the core components of the SMART criteria.\nC. Agreeable - This is another term that can be related to objectives, but it is not a recognized component of SMART.\nD. Realistic - This is actually another synonym for the „A‟ in SMART, which can be seen as short for Achievable or Attainable.\nE. Time-bound - This is the correct definition for the „T‟ in SMART, which signifies that objectives should have specific deadlines.\n\n**Key concept:** Key concept tested here is the definition of SMART objectives in strategic planning, specifically the characteristics of an objective being Specific, Measurable, Achievable, Relevant, and Time-bound."}, {"num": 18, "text": "In Mendelow‟s power/interest matrix, what approach would be required to deal with a stakeholder who has very little power but a strong interest?", "options": {"A": "Ignore the stakeholder", "B": "Minimal effort is required to inform the stakeholder", "C": "Keep the stakeholder informed", "D": "Keep the stakeholder satisfied", "E": "Obtain and keep the stakeholder‟s support"}, "answer": "C", "explanation": "**Why C is correct:** Mendelow's power/interest matrix categorizes stakeholders into four quadrants: (1) powerful and interested, (2) powerful and uninterested, (3) unpowerful and interested, and (4) unpowerful and uninterested. To deal with a stakeholder who is unpowerful but highly interested, the best approach is to keep them informed, as this will help address their concerns and maintain a positive relationship.\n\n**Why the other options are wrong:**\nA. Ignore the stakeholder - This approach is too dismissive, and ignoring stakeholders can lead to dissatisfaction and conflict.\nB. Minimal effort is required to inform the stakeholder - This is incorrect as high interest stakeholders require regular communication to mitigate potential resistance or dissatisfaction.\nD. Keep the stakeholder satisfied - This is too ambitious a goal, and focusing solely on satisfaction may lead to resource-intensive efforts.\nE. Obtain and keep the stakeholder's support - This is still too ambitious, as the stakeholder's power is low, and the key priority is to maintain a positive relationship through regular communication.\n\n**Key concept:** Mendelow's power/interest matrix is a stakeholder analysis tool used to identify and categorize stakeholders based on their power and interest levels."}, {"num": 19, "text": "Short-term financial instruments in the money market are instruments that have ....................... to maturity when they are issued", "options": {"A": "One year or less", "B": "Two years", "C": "One year or more", "D": "One year and eighteen months", "E": "Three years"}, "answer": "A", "explanation": "**Why A is correct:** Short-term financial instruments, by definition, have a maturity period of less than 1 year, which allows them to be classified as money market instruments.\n\n**Why B is wrong:** B (Two years) exceeds the typical maturity period associated with money market instruments.\n\n**Why C is wrong:** C (One year or more) includes time periods longer than what is considered short-term.\n\n**Why D is wrong:** D (One year and eighteen months) may be considered a short-term term, but the specific cut-off point for money market instruments is usually at 1 year.\n\n**Why E is wrong:** E (Three years) clearly exceeds the definition of short-term financial instruments in the money market.\n\n**Key concept:** The definition and classification of short-term financial instruments in the money market."}, {"num": 20, "text": "In the BCG matrix, businesses that have low market shares in a high growth market are classified as ……………………. businesses", "options": {"A": "Coward", "B": "Cashless", "C": "Landmark", "D": "Benchmark", "E": "Question mark SECTION B:             OPEN - ENDED QUESTIONS                      (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ANSWER FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 Companies can acquire assets through lease arrangement instead of buying with equity or debt capital. a.    State and explain briefly the two main classifications of leases.     (5 Marks) b.    Explain two features of each of the classifications in (a) above.      6 Marks) c.    State four advantages and two disadvantages of debt finance to the investor. (9 Marks) (Total 20 Marks) QUESTION 2 Economies of scale leads to overall decrease in unit cost as output increases. a.    State and explain four examples of economies of scale.                (6 Marks) b.    Explain briefly the terms below with appropriate illustrative graphs. i.     Fixed cost ii.    Variable cost iii.   Marginal cost iv.    Total cost                                                    (14 Marks) (Total 20 Marks) QUESTION 3 a.    Professional accountants and managers are expected to be resolute when they are faced with ethical considerations. State five examples of work situations where a professional accountant might be faced with ethical considerations. (10 Marks) b.    List three methods of issuing new shares for cash and briefly explain any two. (10 Marks) (Total 20 Marks) QUESTION 4 a. There are many models for dealing with both internal and external factors that affect businesses. Identify and explain briefly the factors included in the SWOT model.                                                                  (6 Marks) b. Ogifa Farms Limited, an agro-allied business, was incorporated in Nigeria to trade in rice. Rice is a staple food in Nigeria and the company had enjoyed good patronage since its establishment. In recent time, the company has been experiencing dwindling market.       Scarcity of foreign currency and high exchange rate in Nigeria have been blamed for this development. The recent policy of the Federal Government which emphasised local production of rice has compounded the company‟s problem. You are required to identify and explain four threats and three opportunities available to the business.                                         (14 Marks) (Total 20 Marks) QUESTION 5 Abraham Maslow propounded the hierarchy of needs theory of motivation to explain that the need at a lower level is dominant until it has been satisfied. Assuming you want to apply this theory to motivate your subordinates: a.    Identify and explain briefly the two „higher order‟ intrinsic needs that must be met before the other hierarchical needs are satisfied.                 (4 Marks) b.    Explain, with examples, the significance of Maslow‟s theory.           (6 Marks) c.    State five limitations of Maslow‟s hierarchy of needs theory.        (10 Marks) (Total 20 Marks) QUESTION 6 Working in a business organisation affects behaviour of employees in different ways. a.    Explain briefly four behavioural patterns of workers in an organisation. (6 Marks) b.    Assuming you have been invited by a fairly large auditing firm to give a talk on the characteristics of workgroups. Use a tabular model to illustrate seven differences between formal and informal workgroups that can exist in an organisation.                                                     (14 Marks) (Total 20 Marks) MULTIPLE CHOICE ANSWERS SECTION A"}, "answer": "E", "explanation": "**Why E is correct:** \nThe BCG matrix classifies businesses as 'Question mark' when they have low market shares in high growth markets, indicating a potential for significant growth with investment.\n\n**A. Why Coward is wrong:** \nCoward is not a classification in the BCG matrix, but rather a colloquialism for someone who is afraid to take risks.\n\n**B. Why Cashless is wrong:** \nCashless is unrelated to the BCG matrix and refers to a financial system where money is digitized.\n\n**C. Why Landmark is wrong:** \nLandmark is not a classification in the BCG matrix, but rather a reference point or notable location.\n\n**D. Why Benchmark is wrong:** \nBenchmark is not a classification in the BCG matrix, but rather a standard or point of reference for comparison.\n\n**Key concept:** The BCG matrix categorizes businesses into four types based on their market growth and share."}], "answers": {"1": "B", "2": "B", "3": "D", "4": "D", "5": "B", "6": "C", "7": "D", "8": "B", "9": "C", "10": "C", "11": "A", "12": "B", "13": "E", "14": "A", "15": "C", "16": "D", "17": "A", "18": "C", "19": "A", "20": "E"}, "examiner_report": ""}, {"session": "May 2019", "questions": [{"num": 1, "text": "Which of the following is NOT an investment appraisal technique?", "options": {"A": "Accounting rate of return (ARR)", "B": "Payback", "C": "Net present value (NPV)", "D": "Internal rate of return (IRR)", "E": "Return on asset"}, "answer": "E", "explanation": "**Why E is correct:** Return on asset (ROA) is a financial performance measure, not an investment appraisal technique. It measures the return an organization earns on its assets, whereas investment appraisal techniques evaluate the viability of new investment projects. \n\n**Why the other options are wrong:** \nA. Accounting rate of return (ARR) is an investment appraisal technique used to evaluate the viability of a project.\nB. Payback is an investment appraisal technique used to determine how quickly an investment will generate cash to recover the initial investment.\nC. Net present value (NPV) is an investment appraisal technique used to determine the present value of expected future cash flows from an investment.\nD. Internal rate of return (IRR) is an investment appraisal technique used to evaluate the return on an investment before taxes and after taxes, by finding the rate that makes the NPV zero. \n\n**Key concept:** This question tests the knowledge of investment appraisal techniques in accounting."}, {"num": 2, "text": "Financial engineering is also called quantitative analysis and is primarily used by the following, EXCEPT", "options": {"A": "Investment banks", "B": "Hedge funds", "C": "Commercial banks", "D": "Trading companies", "E": "Insurance companies"}, "answer": "D", "explanation": "**Why D is correct:** Financial engineering is less likely used by trading companies, as they primarily focus on commodity trading and purchasing/selling physical goods, rather than complex financial instruments and derivatives.\n\n**Why A is wrong:** Investment banks, like Goldman Sachs and Morgan Stanley, extensively use financial engineering to design and issue complex financial instruments, such as derivatives and structured products, to clients.\n\n**Why B is wrong:** Hedge funds, which focus on high-risk, high-return investments, utilize financial engineering to create sophisticated investment products and strategies.\n\n**Why C is wrong:** Commercial banks also apply financial engineering to optimize their investments, manage risk, and design financial products for clients.\n\n**Why E is wrong:** Insurance companies leverage financial engineering to assess and manage risk, develop actuarial models, and price insurance products.\n\n**Key concept:** The correct application of financial engineering by various financial institutions."}, {"num": 3, "text": "The following are advantages of Internal Rate of Return (IRR) method of investment appraisal EXCEPT", "options": {"A": "It is based on cash flows, not accounting profits", "B": "It recognises the time value of money", "C": "It is easier to understand investment return as a percentage return on investment", "D": "For accept/reject decisions on individual projects, the IRR method will achieve the same decision as the NPV method", "E": "It is a relative measure and not an absolute measure in N terms"}, "answer": "E", "explanation": "**Why E is correct:** \nThe IRR method is actually an absolute measure as it provides a specific rate of return on investment, rather than a relative measure like the Net Present Value (NPV) method. A relative measure would compare projects based on their NPV, rather than their IRR. \nThe statement in option E is incorrect because IRR is indeed an absolute measure in NPV terms.\n\n**Why the other options are wrong:**\nA. It is based on cash flows, not accounting profits - This is a correct advantage of the IRR method.\nB. It recognises the time value of money - This is a correct advantage of the IRR method.\nC. It is easier to understand investment return as a percentage return on investment - This is a correct advantage of the IRR method.\nD. For accept/reject decisions on individual projects, the IRR method will achieve the same decision as the NPV method - This is a correct statement as both methods will yield the same accept/reject decision when used to evaluate individual projects.\n\n**Key concept:** \nThe Internal Rate of Return (IRR) method is an investment appraisal technique that calculates the rate of return on investment and is based on present value of cash flows."}, {"num": 4, "text": "Which of the following statements is CORRECT?", "options": {"A": "The buyer of a bill must hold the bill until maturity", "B": "The bill holder can sell the bill in a secondary market before maturity", "C": "Bills are redeemable at face value plus interest", "D": "The market value of bills is always above their redemption value", "E": "Bills are traded at „par‟"}, "answer": "B", "explanation": "**Why B is correct:** The bill holder can sell a bill in the secondary market before maturity, allowing them to liquidate the investment and earn a profit if the market value exceeds the face value. This is because the bill can be traded on an exchange, allowing buyers and sellers to interact. The buyer of the bill will still earn the face value and interest on maturity.\n\n**Why A is wrong:** A is incorrect because the bill can be sold in the secondary market, not held until maturity.\n\n**Why C is wrong:** C is incorrect because while bills are indeed redeemable at face value plus interest, this option is vague, as the wording does not explicitly state the secondary market aspect tested.\n\n**Why D is wrong:** D is incorrect because the market value of a bill may be below, at, or above its redemption value.\n\n**Why E is wrong:** E is incorrect because bills are not always traded at par, as their market value is determined by supply and demand in the secondary market."}, {"num": 5, "text": "Which of the following fully guides how people and institutions should behave in the world of commerce?", "options": {"A": "Rule of law", "B": "Values", "C": "Honesty", "D": "Integrity", "E": "Ethics"}, "answer": "E", "explanation": "**Why E is correct:** Ethics is a system of moral principles governing an individual's or business' actions, providing a code of conduct for people and institutions to follow in the world of commerce. It encompasses rules and guidelines that facilitate trust and credibility in business dealings. By adhering to a set of ethics, businesses can foster a positive business culture.\n\n**Why the other options are wrong:**\nA. Rule of law refers to a set of laws that governs the country, but it doesn't prescribe how individuals or businesses should behave.\nB. Values are personal or business beliefs that drive decision-making, but they are not a comprehensive guide for behaviour in commerce.\nC. Honesty is an essential element of ethics, but it is not a comprehensive set of rules guiding business behaviour.\nD. Integrity is a character trait, often resulting from adherence to ethics, but it is not a code of conduct for businesses or institutions.\n**Key concept:** Understanding the concept of ethics in business."}, {"num": 6, "text": "If a company does not want to pay to underwrite a rights issue, it might offer the new shares at a very low price compared to the market price of the existing shares. This type of lower-priced share issue is called a", "options": {"A": "Deep discounted issue", "B": "Discounted share issue", "C": "Discounted share", "D": "Deep price discounted", "E": "Lower-priced share issue"}, "answer": "A", "explanation": "**Why A is correct:** A deep discounted issue is a type of share issue where the price of the new shares is significantly lower than the market price of the existing shares. This reduces the flotation costs for the company as it does not have to pay for underwriting the issue. The lower price of the new shares incentivizes existing shareholders to subscribe to more shares, thus maintaining ownership.\n\n**Why the other options are wrong:**\nA. B is incorrect because while 'discounted' is related to the concept, it does not specifically describe a deep discounted issue.\nC. is incorrect because a 'discounted share' can refer to any share priced lower than its market price, not specifically a low-priced issue.\nD. is incorrect because 'deep price discounted' is a redundant and awkward term.\nE. is incorrect because 'lower-priced share issue' is a general term that does not convey the specific concept of a deep-discounted issue.\n\n**Key concept:** The question tests the student's understanding of Deep Discounted Issue as a type of share issue where new shares are issued at a significantly lower price than the market price of existing shares."}, {"num": 7, "text": "Which of the following is NOT a feature of a profession?", "options": {"A": "Strict membership rules including a code of ethics", "B": "The existence of a relationship of trust with clients", "C": "The need to write a set of examination before being able to practice", "D": "An extensive period of rigorous academic training in a particular area", "E": "High entry requirements"}, "answer": "C", "explanation": "**Why C is correct:** The need to write a set of examinations before being able to practice is not a specific characteristic of a profession. Other professions have varying requirements, including academic qualifications, training periods, and examinations. However, these requirements do not universally include writing a set of examinations before practicing.\n\n**Why other options are wrong:**\nA. Strict membership rules including a code of ethics are typical features of a professional body.\nB. A relationship of trust with clients is a fundamental aspect of a professional-client relationship.\nD. An extensive period of rigorous academic training in a particular area is often a requirement for entering a profession.\nE. High entry requirements are necessary to distinguish a profession from other occupations.\n\n**Key concept:** The key concept tested is the characteristics of a profession and how they differ from other occupations."}, {"num": 8, "text": "Which of the following represents the act of reporting suspicious, illegal or improper behaviour to the person in authority?", "options": {"A": "Professional ethics", "B": "Ethical threat", "C": "Warning", "D": "Grapevine communication", "E": "Whistle blowing"}, "answer": "E", "explanation": "**Why E is correct:** Whistle blowing refers to the act of reporting suspicious, illegal or improper behaviour to the person in authority, often without fear of retaliation or reprisal. It involves revealing wrongdoing or unethical practices within an organization. This can be a difficult decision, but it is considered a responsible action in the interest of justice and corporate governance.\n\n**Why the other options are wrong:**\nA. Professional ethics - This option is related to the principles of conduct that guide professional behaviour, but it does not specifically represent reporting of suspicious or improper behaviour.\nB. Ethical threat - This refers to a situation that requires a professional to weigh competing interests and make a difficult ethical decision.\nC. Warning - This is a general term for a caution or alert, but it does not specifically describe the act of reporting wrongdoing.\nD. Grapevine communication - This refers to informal, unofficial channels of communication within an organization, often used to spread information quickly, but it is not related to reporting suspicious behaviour.\nE. (None needed as E is the correct answer)"}, {"num": 9, "text": "The threat that a professional accountant will promote a client‟s or employer‟s position to the point that the professional accountant‟s objectivity is compromised is known as a/an", "options": {"A": "Advocacy threat", "B": "Self review threat", "C": "Self interest threat", "D": "Familiarity threat", "E": "Intimidation threat"}, "answer": "A", "explanation": "**Why A is correct:** The Advocacy threat occurs when a professional accountant promotes a client's or employer's position to the point that their objectivity is compromised, thereby giving undue weight to the client's or employer's interests. This threat arises from the natural tendency to advocate for the client or employer. The Advocacy threat is a key threat to professional objectivity.\n\n**Why B is wrong:** B. Self-review threat refers to the threat that arises when a member is in a position to review their own work, thereby reducing objectivity.\n\n**Why C is wrong:** C. Self-interest threat is a threat where a member's personal financial gain or benefit is at stake, causing them to compromise their objectivity.\n\n**Why D is wrong:** D. Familiarity threat arises when a member develops a close relationship with a client or employer, leading to an overfamiliarity that may compromise objectivity.\n\n**Why E is wrong:** E. Intimidation threat occurs when a client or employer exercises undue influence or pressure on a member, thereby affecting their objectivity.\n\n**Key concept:** The Advocacy threat in the context of risk and control within IFRS."}, {"num": 10, "text": "The two broad categories of money market instruments are", "options": {"A": "Coupon-bearing and discount instruments", "B": "Coupon-bearing and bankers acceptance", "C": "Treasury bills and discount instruments", "D": "Bills of exchange and commercial paper", "E": "Discount instruments and commercial paper"}, "answer": "A", "explanation": "**Why A is correct:** Coupon-bearing instruments, which are securities offering a return in the form of interest payments, and discount instruments, where investors pay less than the face value and earn the difference, are the two broad categories of money market instruments. These instruments are commonly used for short-term borrowing or lending purposes in the money market. \n\n**Why B is wrong:** B is incorrect because bankers acceptance is a specific type of discount instrument, rather than a separate category.\n\n**Why C is wrong:** C is incorrect because both Treasury bills and discount instruments belong to the same category as Treasury bills are a type of discount instrument.\n\n**Why D is wrong:** D is incorrect because Bills of exchange and commercial paper both belong to the same category, being discount instruments.\n\n**Why E is wrong:** E is incorrect because commercial paper is a specific type of coupon-bearing instrument and discount instruments cannot be grouped separately.\n\n**Key concept:** The key concept tested in this question is the classification of money market instruments into two broad categories."}, {"num": 11, "text": "The management scholar who believed that there are principles of good management that apply to all types of organisation, and that these principles should therefore be applied consistently is", "options": {"A": "Frederick Taylor", "B": "Henri Fayol", "C": "Lyndall Urwick", "D": "Max Weber", "E": "Elton Mayo"}, "answer": "B", "explanation": "**Why B is correct:** \nHenri Fayol believed in the universality of management principles, proposing that there are general principles of management that are applicable to all types of organizations. This idea is central to the Administrative Theory of Management. Fayol's work emphasized the importance of consistency in management principles.\n\n**Why the other options are wrong:**\nA. Frederick Taylor focused on scientific management and efficiency, rather than the universality of management principles.\nB. Lyndall Urwick emphasized the importance of management as a separate function, but did not specifically propose universal principles of management.\nC. Max Weber's work focused on bureaucracy, not the universality of management principles.\nD. Elton Mayo was associated with the Hawthorne Studies and human relations approach, which does not emphasize universal management principles.\n\n**Key concept:** Universality of management principles."}, {"num": 12, "text": "The principle of management that states that employees should have only one direct supervisor is known as", "options": {"A": "Discipline", "B": "Unity of direction", "C": "Division of work", "D": "Scalar chain", "E": "Unity of command"}, "answer": "E", "explanation": "**Why E is correct:** Unity of command refers to the principle where each employee has only one direct supervisor to report to, reducing confusion and conflicting instructions. This principle helps in efficient management and clear communication within the organization. It is a fundamental concept in management that enables effective supervision and coordination.\n\n**Why the other options are wrong:**\nA. Discipline focuses on the process of enforcing rules and standards within an organization.\nB. Unity of direction requires all parts of an organization to work towards a common goal.\nC. Division of work separates tasks among different employees based on their skills and expertise.\nD. Scalar chain refers to the hierarchical structure of management, showing the chain of command within an organization."}, {"num": 13, "text": "The management scholar who developed a system for deciding whether a leader is task-oriented or relationship-oriented is", "options": {"A": "Abraham Maslow", "B": "Rensis Likert", "C": "Tannenbaum Schmidt", "D": "Paul Hersey", "E": "Fred Fiedler"}, "answer": "E", "explanation": "**Why E is correct:** Fred Fiedler is known for his Contingency Model, which classifies leaders into task-oriented or relationship-oriented, depending on the situation.\n\n**Why the other options are wrong:**\nA. Abraham Maslow is known for his Hierarchy of Needs, which is unrelated to leader style.\nB. Rensis Likert is known for his Likert Scale, a method for gathering opinions, and does not relate to leader style classification.\nC. Tannenbaum Schmidt is known for their Continuum of Leadership Styles, which focuses on the continuum from autocratic to participative leadership.\nD. Paul Hersey is known for his Situational Leadership Theory, which categorizes leaders based on maturity and task-orientedness but is different from Fiedler's model, as it does not categorize as task or relationship-oriented.\n\n**Key concept:** Contingency Model of Leadership."}, {"num": 14, "text": "The following are factors that affect the interests of executive directors and senior managers in any organization EXCEPT", "options": {"A": "Remuneration", "B": "Power and status", "C": "Career prospects", "D": "Job security", "E": "Lower dividend payments"}, "answer": "E", "explanation": "**Why E is correct:** Lower dividend payments would benefit shareholders but not negatively affect executive directors and senior managers; their primary concern is their own interests, not dividend payments which impact investors. This option does not inherently pose a threat to or impact on executive interests. The key is understanding that lower dividend payments wouldn't be a concern for them.\n\n**Why A is wrong:** Remuneration affects the interests of executive directors and senior managers as their salaries are directly related to their compensation packages and financial gain.\n\n**Why B is wrong:** Power and status, as part of their executive roles, play a significant role in their interests, shaping their authority and influence within the organization.\n\n**Why C is wrong:** Career prospects directly relate to the interests of executive directors and senior managers as they consider their future growth, promotions, and professional development.\n\n**Why D is wrong:** Job security impacts their interests, as losing their positions would negatively affect them financially and professionally.\n\n**Key concept:** The key concept tested here is the self-interest of executive directors and senior managers, specifically how various factors can influence their motivations and decision-making."}, {"num": 15, "text": "The term “TSR” denotes", "options": {"A": "Total shareholders‟ return", "B": "Total stocks return", "C": "Total shares return", "D": "Total stakeholder‟s return", "E": "Total stock returns"}, "answer": "A", "explanation": "**Why A is correct:** Total shareholders' return (TSR) is a widely used financial metric that measures the return on investment (ROI) to shareholders, taking into account both dividend payments and changes in stock price. It provides a comprehensive picture of a company's overall performance from the shareholders' perspective. TSR is a common metric used in equity valuation.\n\n**A is wrong:** Total stocks return (B) is a broader concept that focuses only on the value of the stocks, excluding dividend payments. \n**B is wrong:** Total shares return (C) is similar to total stocks return. \n**D is wrong:** Total stakeholder's return (D) refers to the return on investment to stakeholders, including not only shareholders but also employees, customers, and suppliers. \n**E is wrong:** Total stock returns (E) is a generic term that refers to the return on investment in stocks, which does not necessarily account for dividend payments. \n**Key concept:** TSR - Total Shareholders Return"}, {"num": 16, "text": "Kanter argued that the re-birth and success of business organisations will depend on THREE factors, namely", "options": {"A": "Innovation, entrepreneurship and participative management", "B": "Efficiency, effectiveness and management", "C": "Management, competency and marketing", "D": "Production, finance and accounting", "E": "Innovation, market survey and management"}, "answer": "A", "explanation": "**Why A is correct:** Kanter's theory emphasizes that innovation leads to the creation of new products and services, entrepreneurship provides the drive for business growth, and participative management fosters an inclusive work environment which boosts creativity and employee engagement.\n\n**Why B is wrong:** Efficiency and effectiveness are important but not the three key factors highlighted in Kanter's theory.\n**Why C is wrong:** Management, competency, and marketing are unrelated to Kanter's key factors for business re-birth and success.\n**Why D is wrong:** Production, finance, and accounting are functional areas of business and do not represent the core factors identified by Kanter's theory.\n**Why E is wrong:** While innovation and market survey are relevant, participative management is a key factor as per Kanter but management is already mentioned and does not represent one of the three crucial elements.\n\n**Key concept:** Business Re-birth and Success"}, {"num": 17, "text": "Which of the following is NOT a stage or phase in the product life cycle?", "options": {"A": "Introduction", "B": "Growth", "C": "Maturity", "D": "Development", "E": "Decline"}, "answer": "D", "explanation": "**Why D is correct:** The product life cycle consists of well-defined stages, starting with introduction, followed by growth, maturity, and decline. Development is not a recognized stage in the standard model of product life cycle. It is often considered part of research and development which happens prior to the introduction phase.\n\n**Why A is wrong:** A. Introduction is indeed the first stage in the product life cycle.\n\n**Why B is wrong:** B. Growth is one of the stages in the product life cycle.\n\n**Why C is wrong:** C. Maturity is another stage in the product life cycle.\n\n**Why E is wrong:** E. Decline is the final stage in the product life cycle.\n\n**Key concept:** The product life cycle, also known as the PLC, refers to the stages companies' products go through from introduction to decline in sales and market share."}, {"num": 18, "text": "", "options": {"A": "consumer contract where the terms are on “take it or leave it basis” is known as Legal contracts", "B": "Contract law", "C": "Freedom of contracts", "D": "General form contracts", "E": "Standard form contracts"}, "answer": "E", "explanation": "**Why E is correct:** Standard form contracts refer to consumer contracts where terms are imposed on one party, typically the consumer, on a \"take it or leave it\" basis. This is often the case with mass-produced, pre-printed contracts such as those found with consumer goods. The consumer's freedom to negotiate the terms is limited.\n\n**Why other options are wrong:**\nA. Legal contracts is incorrect because it is a general term that encompasses any legally binding agreement.\nB. Contract law is incorrect because it refers to the broader field of law governing all types of contracts, not just standard form contracts.\nC. Freedom of contracts is incorrect because it actually refers to the ability of parties to freely negotiate contract terms, which is restricted in standard form contracts.\nD. General form contracts is incorrect because it is an outdated term and does not specifically refer to consumer contracts where terms are imposed on one party.\n\n**Key concept:** Standard form contracts are a specific type of contract that restricts the freedom of one party, typically the consumer."}, {"num": 19, "text": "Elton Mayo concluded that lack of attention to …………….. was a major weakness in earlier theories of management.", "options": {"A": "Material", "B": "Method", "C": "Work", "D": "People", "E": "Machinery"}, "answer": "D", "explanation": "**Why D is correct:** Elton Mayo concluded that lack of attention to people was a major weakness in earlier theories of management, as seen in his study of the Hawthorne Works, which led to the development of human relations theory.\n\n**Why the other options are wrong:**\nA. Material - Mayo's study was not about the lack of attention to physical materials.\nB. Method - The focus was not on management methods or procedures.\nC. Work - While work is related to people, Mayo specifically pointed out the lack of focus on people themselves.\nE. Machinery - The study did not involve the use of machinery as a key concern.\n\n**Key concept:** Human Relations Theory and the Hawthorne Studies."}, {"num": 20, "text": "Expectancy captures a person‟s perception about the relationship between two variables, namely:", "options": {"A": "Instrumentality and valence", "B": "Effort and persistence", "C": "The direction of a person‟s behaviour and persistence", "D": "Effort and performance", "E": "Reward and performance SECTION B:                 OPEN – ENDED QUESTIONS                   (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 Macro economics is a branch of economics that studies whole economies rather than individual buyers, sellers and firms. Required: a.    Identify and explain the THREE approaches to the measurement of total economic activity during a given time period.                  (12 Marks) b.    Explain the main objective of government economic policy         (5 Marks) c.    Explain the term “economic cycle”                                (3 Marks) (Total 20 Marks) QUESTION 2 a.   A newly-employed Accounting Technician at Obudu Bakery Limited discovered that the expenditure recorded in the company‟s books were classified as either capital expenditure or revenue expenditure. Required: State briefly FOUR differences between capital and revenue expenditures of a company and give THREE examples of each.                          (12 Marks) b.   Identify and explain FOUR methods of investment appraisal              (8 Marks) (Total 20 Marks) QUESTION 3 The creation of “environmental footprint” as well as a “social footprint” by an organisation is considered a visible mark on the environment and the society. Required: Explain the following terms: i.   Environmental footprint                                                (4 Marks) ii. Social footprint                                                        (4 Marks) iii.   Carbon neutrality                                                      (4 Marks) iv.    Sustainable development                                                (4 Marks) v.     Sustainability reporting                                               (4 Marks) (Total 20 Marks) QUESTION 4 a.  Explain briefly the concept of management by objectives (MBO).             (2 Marks) b.     Explain the MBO process.                                             (12 Marks) c.     State THREE disadvantages of MBO.                                      (6 Marks) (Total 20 Marks) QUESTION 5 a. Explain briefly the TWO ways in which information can be exchanged in an accounting firm.                                                  (6 Marks) b. State THREE reasons why an accounting firm needs to rely on a mixture of formal and informal communication to operate effectively.         (9 Marks) c.     State FIVE benefits of effective communication in an accounting firm. (5 Marks) (Total 20 Marks) QUESTION 6 a.   Identify and explain FIVE fundamental principles which professional accountants are required to comply with.                         (10 Marks) b.      State and explain FIVE organisational values that would help professional accountants to promote adherence to the fundamental principles of their profession.                                                       (10 Marks) (Total 20 Marks) SECTION A MULTIPLE CHOICE QUESTIONS SOLUTION TO MCQs"}, "answer": "D", "explanation": "**Why D is correct:** Expectancy is a key component of the theory of motivation, specifically referring to an individual's belief in their ability to exert effort to achieve a desired outcome or performance. \n\n**Why other options are wrong:**\nA. Instrumentality captures the relationship between a particular effort and a reward, not expectation about outcome.\nB. Persistence is not directly related to expectation, it is related to motivation.\nC. The direction of a person's behaviour refers to valence rather than expectation.\nE. Reward should be instrumentality as per above reason.\n\n**Key concept:** The expectancy theory of motivation, specifically the relationship between effort and performance."}], "answers": {"1": "E", "2": "D", "3": "E", "4": "B", "5": "E", "6": "A", "7": "C", "8": "E", "9": "A", "10": "A", "11": "B", "12": "E", "13": "E", "14": "E", "15": "A", "16": "A", "17": "D", "18": "E", "19": "D", "20": "D"}, "examiner_report": ""}, {"session": "Nov 2019", "questions": [{"num": 1, "text": "The management of an organisation is accountable to its owners for the performance of the firm. From the foregoing, which of the following statements is incorrect?", "options": {"A": "Charities are accountable to stakeholders", "B": "Limited liability partnership is accountable to the government", "C": "The directors of a company are accountable to equity holders", "D": "Managers of public sector enterprises are accountable to government", "E": "Partners in a business partnership are accountable to the stakeholders"}, "answer": "B", "explanation": "**Why B is correct:** \nA limited liability partnership (LLP) is a hybrid business structure combining elements of a partnership and a company. LLPs have limited liability for their partners, similar to private companies, but they are not required to submit accounts to the government like companies. LLPs are accountable to their partners, and the general statement provided does not accurately describe their accountability.\n\n**Why the other options are wrong:**\nA. Charities are accountable to stakeholders, as they rely heavily on donations and therefore have a responsibility to their stakeholders.\nC. The directors of a company are accountable to equity holders, as they are managing the company on their behalf.\nD. Managers of public sector enterprises are accountable to government, as they work on behalf of the government.\nE. Partners in a business partnership are accountable to the stakeholders, as they have a responsibility to those who have invested in the partnership.\n\n**Key concept:** Accountability of an organisation to its stakeholders, specifically under the context of different business structures and entities."}, {"num": 2, "text": "An arrangement between the rival firms in an industry to operate the same policies on pricing is called a/an", "options": {"A": "Cartel", "B": "Alliance", "C": "Franchising", "D": "Collaboration", "E": "Joint venture"}, "answer": "A", "explanation": "**Why A is correct:** A cartel is a situation where rival firms within an industry agree to act together, often to restrict competition by adopting uniform pricing policies, thus increasing their collective influence over the market.\n\n**Why B is wrong:** A business alliance refers to a cooperative arrangement between firms that operate independently, often with a goal to expand their offerings or capabilities.\n**Why C is wrong:** Franchising is a contract in which the right to operate a business is granted by a franchisor to an individual, in exchange for a fee, often tied to specific operating policies.\n**Why D is wrong:** Collaboration simply implies working together to achieve a common goal, which is not necessarily tied to market coordination or pricing agreements.\n**Why E is wrong:** A joint venture involves the cooperative operation of an independent business project by two or more firms, although it may lead to market cooperation, it's not the term used for pricing coordination.\n\n**Key concept:** The key concept tested in this question is \"Barriers to market competition\", specifically focusing on the term \"cartel\" in industrial organization theory."}, {"num": 3, "text": "„Classical‟ theories of organisation and management are associated with the following theorists EXCEPT", "options": {"A": "Max Weber", "B": "Henri Fayol", "C": "William Ouchi", "D": "Frederick Taylor", "E": "Rosemary Stewart"}, "answer": "C", "explanation": "**Why C is correct:** William Ouchi is associated with the 'theory Z', a model of organisational management which is derived from Japanese business practices. His theory does not fit under the 'classical' theories of organisation and management, which are focused on scientific management approaches. Instead, he is more aligned with modern management theories.\n\n**A. Max Weber:** Max Weber is a key figure in classical theory, known for his concept of bureaucracy and the idealised characteristics of an organisation.\n\n**B. Henri Fayol:** Henri Fayol is a classical theorist who is widely regarded as one of the founders of management theory.\n\n**D. Frederick Taylor:** Frederick Taylor is a proponent of scientific management, a key aspect of classical organisation and management theory.\n\n**E. Rosemary Stewart:** Rosemary Stewart is associated with human relations theory, which shares some similarities with classical theory, particularly in its focus on interpersonal relationships within organisations."}, {"num": 4, "text": "Which of the following is NOT a reason government has interest in all business organisations?", "options": {"A": "Tax on profits", "B": "Safety regulations", "C": "Level of unemployment", "D": "Creation of strong economy", "E": "Provision of affordable goods"}, "answer": "E", "explanation": "**Why E is correct:** Government has interest in all business organisations because the primary focus of business is to generate profits for shareholders, not to provide affordable goods to the public.\n\n**A. Tax on profits:** Government has an interest in taxing businesses on their profits because it generates revenue for the government.\n**B. Safety regulations:** Government has an interest in implementing safety regulations to protect consumers and employees.\n**C. Level of unemployment:** Government has an interest in the business sector to address unemployment levels in the economy.\n**D. Creation of strong economy:** Government has an interest in business organisations as a key driver of economic growth and development.\n\n**Key concept:** The role of government in regulating business organisations to serve the public interest."}, {"num": 5, "text": "The functions of the treasury department include the following EXCEPT", "options": {"A": "Investing surplus cash", "B": "Managing the cash generated by the business", "C": "Obtaining new funds from financial markets", "D": "Arranging insurance of the assets of the company", "E": "Ensuring that the company has money to settle financial obligations"}, "answer": "D", "explanation": "**Why D is correct:**  Arranging insurance of assets is typically the role of an insurer or risk manager, not the treasury department. Treasury focuses on managing cash and financial resources, not insurance.\n\n**Why A is wrong:** Investing surplus cash is a key function of the treasury department to maximize returns on idle cash.\n\n**Why B is wrong:** Managing the cash generated by the business is a primary responsibility of the treasury department.\n\n**Why C is wrong:** Obtaining new funds from financial markets is another crucial function of the treasury department.\n\n**Why E is wrong:** Ensuring that the company has money to settle financial obligations falls under the treasury function of liquidity management.\n\n**Key concept:** Cash management and financial resources are essential topics in understanding the functions of a treasury department."}, {"num": 6, "text": "", "options": {"A": "business entity can be classified as any of the following in its market EXCEPT Nicher", "B": "Leader", "C": "Follower", "D": "Prospect", "E": "Challenger"}, "answer": "D", "explanation": "**Why D is correct:** A business entity cannot be classified as a Prospect, as a Prospect is an outsider looking in at what the market leaders are doing and trying to identify opportunities to enter the market.\n\n**A. business entity can be classified as a Nicheer, as a Nicheer is a business that focuses on a narrow area or sector of a market.**\n**B. business entity can be classified as a Leader, as a business can be a market leader due to its dominance, size, or reputation in its industry.**\n**C. business entity can be classified as a Follower, as a Follower is a business that adopts the market leader's strategies, often to gain market share or avoid risk.**\n**E. business entity can be classified as a Challenger, as a Challenger is a business that seeks to take market share from the existing market leaders by introducing innovative products or strategies.**\n\n**Key concept:** Market structure and competitors."}, {"num": 7, "text": "Professional accountants are required to comply with the following fundamental principles EXCEPT", "options": {"A": "Integrity", "B": "Efficiency", "C": "Objectivity", "D": "Competence", "E": "Confidentiality"}, "answer": "B", "explanation": "**Why B is correct:** Efficiency is not considered one of the fundamental principles of professional accountants. The Chartered Institute of Management Accountants (CIMA) and the Institute of Management Accountants (IMA) consider the fundamental principles to be objectivity, integrity, confidentiality, and competence. \n\nA. The concept of integrity is a fundamental principle as it means being honest and truthful.\nB. Efficiency is not fundamental but rather a goal to be achieved.\nC. Objectivity is a fundamental principle as it requires accountants to avoid personal biases.\nD. Competence is a fundamental principle as it requires accountants to possess the necessary skills and knowledge.\nE. Confidentiality is a fundamental principle as it ensures the secrecy of sensitive information.\n\n**Key concept:** The question tests the knowledge of the fundamental principles of professional accountants."}, {"num": 8, "text": "Which of the following is outside the scope of the functions of a supervisor?", "options": {"A": "Empowering staff", "B": "Front line management", "C": "Administrative management", "D": "S
