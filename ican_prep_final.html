                             (4 Marks) b.    Explain the ways by which reinforcement theory can be employed in the business environment.                                       (6 Marks) c.    What is self-efficacy? State and explain the ways by which levels of self- efficacy impact human functions.                              (10 Marks) (Total 20 Marks) QUESTION 3 Describe the term „supervision‟.                                            (2 Marks) Henry Mintzberg suggested that managers perform three main roles, which can be further analysed into TEN different roles. Classify and explain these management roles.                                                                 (18 Marks) (Total 20 Marks) QUESTION 4 a.     Distinguish between ethical dilemma and conflict of interest.        (4 Marks) b.     Globally, professional bodies are backed by law, consequently, a measure of authority are conferred upon them which they regularly exercise whenever the situation or circumstance demands. State THREE powers of a professional body.                           (6 Marks) c.     State FIVE possible ways of resolving ethical dilemma in a business environment.                                               (10 Marks) (Total 20 Marks) QUESTION 5 Uhuru Nigeria Limited wants to buy a new item of equipment which will be used to improve service delivery to its customers. Using the internal rate of return (IRR) method of investment appraisal, you are required to evaluate the project and advise the management of the company. Estimated cash flows from the project are as provided below: Year                            N Investment 0                            (400,000) 1        Receipt               140,000 2        Receipt               150,000 3        Receipt               170,000 4        Receipt               190,000 The expected minimum required rate of return of the company is fixed at 25% (20 Marks) QUESTION 6 a.   For many loan agreements, the borrower is required to provide undertakings or guarantees of some kind. Distinguish between covenants and guarantees.                        (5 Marks) b.   State THREE reasons why a company will repurchase its shares and THREE benefits that will accrue to the company for doing so.         (6 Marks) c.   Companies can acquire assets with finance lease instead of buying assets with equity or debt capital. State SIX main features of a finance lease arrangement.             (9 Marks) (Total 20 Marks) SECTION A- MULTIPLE CHOICE QUESTIONS"}, "answer": null}], "answers": {"1": "A", "2": "D", "3": "D", "4": "D", "5": "C", "6": "E", "7": "B", "8": "B", "9": "C", "10": "C", "11": "A", "12": "C", "13": "E", "14": "B", "15": "C", "16": "C", "17": "B", "18": "A", "19": "B"}, "examiner_report": ""}, {"session": "May 2021", "questions": [{"num": 1, "text": "", "options": {"A": "technique used in evaluating the level of power of interest a stakeholder has in a company is termed Mendelow matrix", "B": "Blanchard matrix", "C": "Hertberg model", "D": "BCG matrix", "E": "Porter five model"}, "answer": "A", "explanation": "**Why A is correct:** The uncertainty avoidance dimension is actually one of the six dimensions of national culture propounded by Hofstede. The correct dimensions to be selected from the options are limited to five. The option B - Medium – termism orientation actually refers to a different cultural dimension proposed by Trompenaars, not Hofstede.\n\n**Why the other options are wrong:**\nB. The Medium – termism orientation is a dimension of national culture, it is also sometimes referred to a short termism. \nC. Power-distance dimension is indeed one of the dimensions of Hofstede's cultural framework.\nD. Individualism versus collectivism dimension is also part of the dimensions of Hofstede's cultural framework.\nE. Masculinity versus femininity is another dimension of culture as described by Hofstede.\n\n**Key concept:** The five dimensions of national culture that Hofstede propounded in his cultural framework include individualism versus collectivism, power-distance dimension, masculinity versus femininity, uncertainty avoidance dimension and long-termism orientation."}, {"num": 2, "text": "Which of the following is NOT a feature of entrepreneurial organisation?", "options": {"A": "There is no formal management structure", "B": "Owner does not delegate decision-making to other people", "C": "The entrepreneurial leader dominates the organisation", "D": "Entrepreneurial leader focuses on people and not the work", "E": "Owner is closely involved in the day-to-day operations of the business"}, "answer": "D", "explanation": "**Why D is correct:** E-mails are usually retained in a user's inbox until intentionally deleted or moved to a different folder. The 'Deleted' folder typically serves as a temporary holding place for messages that have been deleted until they are either permanently deleted or restored. Most e-mail systems do not automatically move deleted e-mails to a separate folder.\n\n**A. Why wrong:** Standard folders usually include 'Inbox,' where new e-mails are received.\n**B. Why wrong:** The 'Sent' folder is a standard folder in most e-mail systems, used to store copies of sent e-mails.\n**C. Why wrong:** 'Maps' is not typically a standard folder in e-mail systems as it does not relate to e-mail management.\n**E. Why wrong:** 'Drafts' is a standard folder in many e-mail systems, used to store e-mails that have been started but not yet sent.\n\n**Key concept:** The key concept tested is the basic structure and standard folders in an e-mail system."}, {"num": 3, "text": "", "options": {"A": "business organisational structure that creates segments on the basis of products or geographical location is best described as a ……………. structure Functional", "B": "Regional", "C": "Service", "D": "Divisional", "E": "Matrix"}, "answer": "D", "explanation": "**Why D is correct:** \nFormal work teams are characterized by their structured and coordinated approach, which enables more efficient communication among team members. This is due to the defined roles and expectations within the team, facilitating clear and effective information exchange. As a result, teams can make better decisions and respond quickly to changing circumstances.\n\n**Why the other options are wrong:**\nA. A formal work team is typically formed through a deliberate and structured process, not necessarily through social interaction.\nB. A formal work team has clear objectives and tasks, which are often dictated by organizational policies or specific projects.\nC. While a group leader may provide guidance, formal work teams often rely on collaborative decision-making processes, rather than having decisions taken solely by the leader.\nE. Formal work teams usually have designated roles and structured processes, which limit free entry and exit.\n\n**Key concept:** \nThe topic of team formation and attributes tested in this question falls under the broader concept of Organisational Behaviour, specifically the characteristics and structures of teams in a professional setting."}, {"num": 4, "text": "Which of the following is NOT a feature of boundaryless organisational structure?", "options": {"A": "Extensive use of teams", "B": "Elimination of organisational hierarchy", "C": "Authorises teams to make decisions", "D": "Face-to-face meetings", "E": "Builds teams without geographical barriers"}, "answer": "D", "explanation": "**Why D is correct:** Perceptions are a factor in shaping an individual's attitudes and understanding of a situation but are not a direct factor of motivation. Motivation is primarily driven by intrinsic and extrinsic factors, not perceptions of those factors.\n\n**Why the other options are wrong:**\nA. Wants are a key driver of needs and motivation.\nB. Rewards are an extrinsic motivator, encouraging individuals to perform tasks.\nC. Personality traits can influence an individual's approach to motivation and performance.\nE. Expectations play a crucial role in shaping an individual's motivation through goal-setting and self-efficacy.\n\n**Key concept:** The factors influencing motivation."}, {"num": 5, "text": "An organisation with no tangible identity and whose employees may not have strong loyalty culture would be said to be operating a ………………..structure.", "options": {"A": "Network", "B": "Modular", "C": "Virtual", "D": "Hollow", "E": "Boundaryless"}, "answer": "C", "explanation": "**Why C is correct:** Herzberg's two-factor theory identifies two categories of factors influencing job satisfaction and dissatisfaction. The first category comprises hygiene factors that prevent dissatisfaction (e.g., salary, supervision, and working conditions). However, the second category consists of motivating factors that actually increase job satisfaction, and these include aspects such as the 'job itself', which refers to the nature of tasks performed by an employee.\n\n**Why the other options are wrong:**\nA. Salary is a hygiene factor.\nB. Supervision is a hygiene factor.\nD. Working conditions are hygiene factors.\nE. Relationship with the boss can be both a motivating and a hygiene factor.\n\n**Key concept:** Herzberg's two-factor theory."}, {"num": 6, "text": "The practice of moving jobs outside the country where an organisation is based in order to take advantage of incentives in the destination country is termed", "options": {"A": "Outsourcing", "B": "Outshoring", "C": "Offshore outsourcing", "D": "Offsourcing", "E": "Offshoring"}, "answer": "E", "explanation": "**Why E is correct:** \nDavid McClelland was a humanistic psychologist focused on understanding human motivation and is best classified as a behavioral scientist rather than a manager or classical management theorist. His work did not align with the scientific and classical management theories, which focused on the structure and organization of work environments.\n\n**Why the other options are wrong:**\nA. Elton Mayo was a classical management theorist who studied the effects of social interaction in workplaces.\nB. Henri Fayol was a classical management theorist often regarded as the father of modern management theory.\nC. Lyndall Urwick was heavily influenced by Henri Fayol's work and is also classified as a classical management theorist.\nD. Frederick Taylor is credited as one of the first scientific management theorists for his contributions to the efficiency-based approach.\n\n**Key concept:** Scientific management theory tested in this question, referring to a management approach that focuses on increasing efficiency and productivity through standardization and specialization, primarily associated with Frederick Taylor's work."}, {"num": 7, "text": "Which of the following activities may NOT be taken as part of manufacturing function in an organisation?", "options": {"A": "Engineering and maintenance work", "B": "Physical delivery of goods to customers", "C": "Production planning and control", "D": "Quality control and checking", "E": "Inspection of finished goods"}, "answer": "B", "explanation": "**Why B is correct:** \nBrown borrowed N150,000 at 6% p.a simple interest for 18 months. To find the interest due, we use the formula: Interest = Principal * Rate * Time. Plugging in the values, we get Interest = 150,000 * (6/100) * (18/12) = 13,500.\n\n**A is wrong:** Option A assumes an incorrect calculation or rounding.\n\n**B is correct:** As explained above, B is the correct answer.\n\n**C is wrong:** Option C assumes an incorrect increase in the rate or period.\n\n**D is wrong:** Option D assumes an increase in the rate and an incorrect period.\n\n**E is wrong:** Option E assumes an increase in the rate, period, or both.\n\n**Key concept:** Simple interest calculation for the IFRS Foundation Level exam."}, {"num": 1, "text": "Which of the following is NOT part of the FIVE dimensions to differences in organisation culture as propounded by Hofstede?", "options": {"A": "Uncertainty avoidance dimension", "B": "Medium – termism orientation", "C": "Power-distance dimension", "D": "Individualism versus collectivism dimension", "E": "Masculinity versus femininity"}, "answer": "A", "explanation": "**Why A is correct:** The uncertainty avoidance dimension is actually one of the six dimensions of national culture propounded by Hofstede. The correct dimensions to be selected from the options are limited to five. The option B - Medium – termism orientation actually refers to a different cultural dimension proposed by Trompenaars, not Hofstede.\n\n**Why the other options are wrong:**\nB. The Medium – termism orientation is a dimension of national culture, it is also sometimes referred to a short termism. \nC. Power-distance dimension is indeed one of the dimensions of Hofstede's cultural framework.\nD. Individualism versus collectivism dimension is also part of the dimensions of Hofstede's cultural framework.\nE. Masculinity versus femininity is another dimension of culture as described by Hofstede.\n\n**Key concept:** The five dimensions of national culture that Hofstede propounded in his cultural framework include individualism versus collectivism, power-distance dimension, masculinity versus femininity, uncertainty avoidance dimension and long-termism orientation."}, {"num": 2, "text": "Most e-mail systems support the use of folders to help manage and file e- mails. The e-mail system will normally include some standard folders except", "options": {"A": "Inbox", "B": "Sent", "C": "Maps", "D": "Deleted", "E": "Drafts"}, "answer": "D", "explanation": "**Why D is correct:** E-mails are usually retained in a user's inbox until intentionally deleted or moved to a different folder. The 'Deleted' folder typically serves as a temporary holding place for messages that have been deleted until they are either permanently deleted or restored. Most e-mail systems do not automatically move deleted e-mails to a separate folder.\n\n**A. Why wrong:** Standard folders usually include 'Inbox,' where new e-mails are received.\n**B. Why wrong:** The 'Sent' folder is a standard folder in most e-mail systems, used to store copies of sent e-mails.\n**C. Why wrong:** 'Maps' is not typically a standard folder in e-mail systems as it does not relate to e-mail management.\n**E. Why wrong:** 'Drafts' is a standard folder in many e-mail systems, used to store e-mails that have been started but not yet sent.\n\n**Key concept:** The key concept tested is the basic structure and standard folders in an e-mail system."}, {"num": 3, "text": "Which of the following attributes best describes a formal work team?", "options": {"A": "Comes together through the social interaction of its members", "B": "No specific objective or tasks", "C": "Decisions are taken by the group leader", "D": "Can be much more efficient in communicating information", "E": "Free entry and free exit"}, "answer": "D", "explanation": "**Why D is correct:** \nFormal work teams are characterized by their structured and coordinated approach, which enables more efficient communication among team members. This is due to the defined roles and expectations within the team, facilitating clear and effective information exchange. As a result, teams can make better decisions and respond quickly to changing circumstances.\n\n**Why the other options are wrong:**\nA. A formal work team is typically formed through a deliberate and structured process, not necessarily through social interaction.\nB. A formal work team has clear objectives and tasks, which are often dictated by organizational policies or specific projects.\nC. While a group leader may provide guidance, formal work teams often rely on collaborative decision-making processes, rather than having decisions taken solely by the leader.\nE. Formal work teams usually have designated roles and structured processes, which limit free entry and exit.\n\n**Key concept:** \nThe topic of team formation and attributes tested in this question falls under the broader concept of Organisational Behaviour, specifically the characteristics and structures of teams in a professional setting."}, {"num": 4, "text": "Which of the following is NOT a factor of motivation?", "options": {"A": "Wants", "B": "Rewards", "C": "Personality", "D": "Perceptions", "E": "Expectations"}, "answer": "D", "explanation": "**Why D is correct:** Perceptions are a factor in shaping an individual's attitudes and understanding of a situation but are not a direct factor of motivation. Motivation is primarily driven by intrinsic and extrinsic factors, not perceptions of those factors.\n\n**Why the other options are wrong:**\nA. Wants are a key driver of needs and motivation.\nB. Rewards are an extrinsic motivator, encouraging individuals to perform tasks.\nC. Personality traits can influence an individual's approach to motivation and performance.\nE. Expectations play a crucial role in shaping an individual's motivation through goal-setting and self-efficacy.\n\n**Key concept:** The factors influencing motivation."}, {"num": 5, "text": "Herzberg in his two-factor theory identified two groups of factors causing dissatisfaction or satisfaction with work. Which of the following is a motivating factor?", "options": {"A": "Salary", "B": "Supervision", "C": "The work itself", "D": "Working conditions", "E": "Relationship with the boss"}, "answer": "C", "explanation": "**Why C is correct:** Herzberg's two-factor theory identifies two categories of factors influencing job satisfaction and dissatisfaction. The first category comprises hygiene factors that prevent dissatisfaction (e.g., salary, supervision, and working conditions). However, the second category consists of motivating factors that actually increase job satisfaction, and these include aspects such as the 'job itself', which refers to the nature of tasks performed by an employee.\n\n**Why the other options are wrong:**\nA. Salary is a hygiene factor.\nB. Supervision is a hygiene factor.\nD. Working conditions are hygiene factors.\nE. Relationship with the boss can be both a motivating and a hygiene factor.\n\n**Key concept:** Herzberg's two-factor theory."}, {"num": 6, "text": "Which of the following CANNOT be classified amongst the scientific or classical management theorist?", "options": {"A": "Elton Mayo", "B": "Henri Fayol", "C": "Lyndall Urwick", "D": "Frederick Taylor", "E": "David McClelland"}, "answer": "E", "explanation": "**Why E is correct:** \nDavid McClelland was a humanistic psychologist focused on understanding human motivation and is best classified as a behavioral scientist rather than a manager or classical management theorist. His work did not align with the scientific and classical management theories, which focused on the structure and organization of work environments.\n\n**Why the other options are wrong:**\nA. Elton Mayo was a classical management theorist who studied the effects of social interaction in workplaces.\nB. Henri Fayol was a classical management theorist often regarded as the father of modern management theory.\nC. Lyndall Urwick was heavily influenced by Henri Fayol's work and is also classified as a classical management theorist.\nD. Frederick Taylor is credited as one of the first scientific management theorists for his contributions to the efficiency-based approach.\n\n**Key concept:** Scientific management theory tested in this question, referring to a management approach that focuses on increasing efficiency and productivity through standardization and specialization, primarily associated with Frederick Taylor's work."}, {"num": 7, "text": "Brown borrowed N150,000 at 6% p/a simple interest for 18 months, what is the value of interest due at the end of the period?", "options": {"A": "N 13,200", "B": "N 13,500", "C": "N 13,800", "D": "N 14,000", "E": "N 14,200"}, "answer": "B", "explanation": "**Why B is correct:** \nBrown borrowed N150,000 at 6% p.a simple interest for 18 months. To find the interest due, we use the formula: Interest = Principal * Rate * Time. Plugging in the values, we get Interest = 150,000 * (6/100) * (18/12) = 13,500.\n\n**A is wrong:** Option A assumes an incorrect calculation or rounding.\n\n**B is correct:** As explained above, B is the correct answer.\n\n**C is wrong:** Option C assumes an incorrect increase in the rate or period.\n\n**D is wrong:** Option D assumes an increase in the rate and an incorrect period.\n\n**E is wrong:** Option E assumes an increase in the rate, period, or both.\n\n**Key concept:** Simple interest calculation for the IFRS Foundation Level exam."}, {"num": 8, "text": "Blake wants to borrow N120,000 from Jerry. Blake is willing to pay back N127,000 in 3 months, what simple interest rate will he pay?", "options": {"A": "21.33%", "B": "22.33%", "C": "23.33%", "D": "24.33%", "E": "25.33% F."}, "answer": "B", "explanation": "**Why B is correct:** \nBlake's debt is N120,000 and he agreed to pay back N127,000 after 3 months. The difference, N7,000, is the interest for 3 months. To find the annual interest rate, we apply the simple interest formula: (N7,000 / (N120,000 * 0.25)) * 100% = 23.33%, but since they want the interest for 3 months, we multiply by 4 to get the annual rate and then divide by 4 to correct to the 3-month rate, giving 22.33%.\n\n**Why the other options are wrong:**\nA. 21.33% - Incorrect due to miscalculation.\nB. 22.33% - Incorrect due to wrong rounding.\nC. 23.33% - Incorrect as this is the wrong rate for a 3-month repayment when calculated for annual rate.\nD. 24.33% - Incorrect due to calculation error.\nE. 25.33% - Incorrect as it's a higher interest rate, not supported by the calculation.\nF. Not available - No option selected for this answer.\n  \n\n**Key concept:** This question tests simple interest concept in finance."}, {"num": 9, "text": "What is the effective rate for an account that pays 9.0% compounded monthly?", "options": {"A": "9.18%", "B": "9.28%", "C": "9.38%", "D": "9.48%", "E": "9.58%"}, "answer": "C", "explanation": "**Why C is correct:** The effective rate is calculated by taking the tenth root of (1 + 0.09), then subtracting 1 and multiplying by 120 (for annualization), resulting in approximately 9.38%.\n\n**Why the other options are wrong:**\nA. This option, 9.18%, is less than the quoted interest rate of 9%.\nB. This option, 9.28%, is not sufficiently higher than the quoted interest rate of 9%.\nD. This option, 9.48%, is more than 40 basis points above the quoted interest rate of 9%.\nE. This option, 9.58%, is more than 90 basis points above the quoted interest rate of 9%.\n\n**Key concept:** Calculation of effective interest rate under compound interest, specifically for the ICAN Business & Finance (Foundation Level) exam."}, {"num": 10, "text": "Assuming a 6.5% time preference rate, what is the present value of N120,000 received two years from now?", "options": {"A": "₦104,799.11", "B": "₦105,799.11", "C": "₦106,799.11", "D": "₦107,799.11", "E": "₦108,799.11"}, "answer": "C", "explanation": "**Why C is correct:** You calculate the present value of N120,000 using the time preference rate of 6.5% and the compounding frequency is assumed to be annually. The present value is determined using the formula PV = N / (1 + r)^n, where r is the rate and n is the number of periods. Using this formula, the present value of N120,000 received two years from now is ₦106,799.11.\n\n**Why A is wrong:** A assumes that the amount is received immediately rather than two years from now, resulting in a present value lower than required.\n\n**Why B is wrong:** B is an overly rounded value that does not accurately reflect the present value calculated using the given formula.\n\n**Why D is wrong:** D represents a present value that is higher than what is expected if there is a time preference rate of 6.5%, as it indicates a greater value than needed at the present date.\n\n**Why E is wrong:** E also represents an overly rounded value but higher than the correct value.\n\n**Key concept:** The present value calculation that tests knowledge of time value of money, specifically the discounting of future cash flows using the time preference rate."}, {"num": 11, "text": "Which of the following is NOT an advantage of accounting rate of return (ARR) method of investment appraisal techniques?", "options": {"A": "It is based on accounting profit", "B": "Measures profitability", "C": "Simple to calculate", "D": "Widely understood", "E": "Focuses on all the years of the project’s life"}, "answer": "A", "explanation": "**Why A is correct:** The Accounting Rate of Return (ARR) method is based on net annual income rather than cash flows, which is not entirely accurate as it is indeed based on accounting profit but it's an average over the life of the project. This makes the statement in option A a partial misrepresentation. The ARR is based on accounting profit per annum over the life of a project or the average life of a project's assets.\n\n**Why B is wrong:** B. Measures profitability - ARR does measure profitability, as it is a key concept in evaluating investment opportunities.\n\n**Why C is wrong:** C. Simple to calculate - ARR is a relatively simple method to calculate, often requiring only basic arithmetic.\n\n**Why D is wrong:** D. Widely understood - ARR is a fundamental investment appraisal technique and widely understood by accountants and business professionals.\n\n**Why E is wrong:** E. Focuses on all the years of the project’s life - ARR does account for the life of the project, often calculated as the average accounting profit divided by the average life of the asset.\n\n**Key concept:** This question tests the understanding of the Accounting Rate of Return (ARR) method, specifically its characteristics and advantages, which is a key concept in investment appraisal techniques."}, {"num": 12, "text": "Which of the following is NOT a source of long-term funds for a public limited liability company?", "options": {"A": "Retained earnings", "B": "Bonus issue", "C": "Rights issue", "D": "Initial public offer (IPO)", "E": "Further offer"}, "answer": "C", "explanation": "**Why C is correct:** A rights issue involves existing shareholders purchasing additional shares at a discounted price. This is a source of short-term fund, not long-term. It maintains the owner structure, doesn't bring in outside investors.\n\n**Why A is wrong:** A. Retained earnings are a long-term source of funds for a public limited liability company.\n**Why B is wrong:** B. Bonus issue does not generate any funds; it is a distribution of existing shares to shareholders.\n**Why D is wrong:** D. Initial Public Offer (IPO) allows existing shareholders to sell shares and new investors to purchase shares, and brings in long-term funds.\n**Why E is wrong:** E. Further Offer may be either a rights issue or an IPO, and is not exclusively short-term or long-term.\n\n**Key concept:** The ability to distinguish between short-term and long-term sources of funds for a public limited liability company."}, {"num": 13, "text": "Which of the following is relevant to investment decisions?", "options": {"A": "Committed cost", "B": "Notional cost", "C": "Present cost", "D": "Stock cost", "E": "Apportionment of overheads cost SECTION B:           OPEN-ENDED QUESTIONS                             (80 MARKS) INSTRUCTION:         YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 a.      Protectionism takes the form of government measures to discourage or prohibit imports of foreign goods. State TWO measures countries adopt to protect industries against foreign competition.                            (4 Marks) b.      Theoretically, disequilibrium in international payments could be rectified by a fall in the exchange value of the currency of countries that have a deficit in their balance of payments in goods and services. What are the implications of taking this measure?                                             (6 Marks) c.    Governments of nations sometimes use economic policies to achieve political, social or economic objectives. As an integral part of the Nigerian government’s medium term fiscal framework, there is a proposal to remove fuel subsidy in 2021. According to economic theory, state TEN possible economic impacts of the removal of fuel subsidy in Nigeria.                                 (10 Marks) (Total 20 Marks) QUESTION 2 An important contribution to ideas about the management of teams was made by Belbin. He studied the behaviour of individuals in teams and the ‘team role’ that each individual plays. He defined a team role as ‘our tendency to behave, contribute and interrelate with others in a particular way’. You are required to: a.    State and describe briefly the THREE main groups of Belbin team roles. (6 Marks) b.    For each of the THREE Belbin groups, state and describe the THREE team roles it includes.                                                           (9 Marks) c.    According to Belbin, what are the factors that contribute to the most successful team work?                                                              (5 Marks) (Total 20 Marks) QUESTION 3 CASHIO Limited must choose between two investments, Project ABUWA and Project BRIWA. It cannot undertake both investments. The expected cash flows for each project are: Year     Project ABUWA Project BRIWA N            N 0        (800,000)     (800,000) 1         200,000       600,000 2         360,000       240,000 3         360,000        20,000 4         170,000           - The company has a policy that the maximum permissible payback period for an investment is three years and if a choice has to be made between the two projects, the project with the earlier payback will be chosen. Required: a.     Calculate the payback period for each project: i. Assuming that cash flows occur at that year end ii. Assuming that cash flows after Year 0 occur at a constant rate throughout each year                                                          (16 Marks) b.     Which project should be selected according to the company’s payback rule (2 Marks) c.     State the reasons for your decision in (b) above.                     (2 Marks) (Total 20 Marks) QUESTION 4 Felfred Limited is contemplating buying a new item of equipment to facilitate the improvement of the quality of services provided to customers of the company. Two models of the needed equipment are currently available in the market. The two machines, Xetoy and Whytox would cost N750,000 and N1,500,000 respectively. Additional information in relation to the two equipment is as stated below: Equipment      Equipment Xetoy        Whytox Estimated Lifespan                  5 years        5 years Expected Cash inflows / Year          N               N 2021                               500,000        500,000 2022                               500,000        500,000 2023                               300,000        600,000 2024                               200,000        600,000 2025                               100,000        600,000 Disposal value                      50,000        100,000 Based on Net Present Value (NPV) and Discounted Payback Period methods of investment appraisal, you are required to select the equipment in which the value of shareholders will be maximised. Costs of installation for Xetoy and Whytox are N50,000 and N100,000 respectively. The company’s minimum required rate of return is currently at 12%.                                             (20 Marks) (Total 20 Marks) QUESTION 5 Leadership means giving a lead to others. A leader gives guidance and direction and the others (‘followers’) follow the lead that they are given. You are required to: a.     Describe the main elements of Adair’s concept of action-centred leadership. (6 Marks) b.     State the main skills required within each of Adair’s THREE leadership groups.                                                          (11 Marks) c.    Explain Adair’s 50/50 rule.                                         (3 Marks) (Total 20 Marks) QUESTION 6 a.   In a normal situation or circumstance, employees are expected to report unethical or illegal conduct to the supervisor or manager. State TWO problems that may arise that would make an employee to use a different reporting channel.                                                     (5 Marks) b.   State the expectations of the public in respect of the accountants and the professional bodies they affiliate with.                        (5 Marks) c.   What are the roles expected of the professional accountancy bodies in promoting ethical behaviour in the business environment?        (10 Marks) (Total 20 Marks) SOLUTION MCQs"}, "answer": "E", "explanation": "**Why E is correct:** Apportionment of overheads refers to the process of allocating and absorbing fixed costs to different departments or products. In investment decisions, understanding the apportionment of overheads is relevant as it affects the profitability of various products or projects. It also influences pricing and resource allocation decisions.\n\n**Why the other options are wrong:**\nA. Committed cost is a type of cost that cannot be easily adjusted or changed, but it is not directly relevant to investment decisions.\nB. Notional cost is an estimate of the cost that is not necessarily actual, and it does not directly relate to investment decisions.\nC. Present cost refers to the current or present value of expected future costs, but it is not the most relevant factor in investment decisions regarding overheads.\nD. Stock cost is related to inventory costs, which may not be directly relevant to investment decisions, especially in terms of overheads apportionment."}], "answers": {"1": "A", "2": "D", "3": "D", "4": "D", "5": "C", "6": "E", "7": "B", "8": "B", "9": "C", "10": "C", "11": "A", "12": "C", "13": "E", "14": "B", "15": "C", "16": "C", "17": "B", "18": "A", "19": "B"}, "examiner_report": "The questions test students’ understanding of the entire syllabus. It was attempted by all the candidates being a compulsory question. The performance was above average."}, {"session": "Nov 2021", "questions": [{"num": 1, "text": "", "options": {"A": "situation where an individual gives orders or guidance to others in an organisation and expects the orders to be obeyed or the guidance to be followed is known as Delegation", "B": "Power", "C": "Militancy", "D": "Authority", "E": "Coercion"}, "answer": "D", "explanation": "**Why D is correct:** Authority refers to the right to give orders or guidance and expect obedience in an organisation. It is a legitimate source of command. It is not based on personal characteristics.\n\n**A. situation where an individual gives orders or guidance to others in an organisation and expects the orders to be obeyed  - Incorrect because this is more of a description than a specific term.** \n**B. Power - Incorrect because Power is a broader concept that encompasses Authority, but is not the same as it.**\n**C. Militancy - Incorrect because Militancy refers to a strong sense of determination or partisanship, not a source of command or guidance.**\n**E. Coercion - Incorrect because Coercion is a force applied to others, not a legitimate source of command or guidance.**\n\n**Key concept:** Different types of authority (legitimate, expert, and reward authority, among others)."}, {"num": 2, "text": "Which of the following according to Mintzberg is NOT an element or building blocks in an organisation?", "options": {"A": "Strategic apex", "B": "Techno-structure", "C": "Middle line", "D": "Support staff", "E": "Strategic planning"}, "answer": "E", "explanation": "**Why E is correct:** \nMintzberg identified five elements or building blocks of an organisation, which include the Strategic apex, Strategic planning is not one of the elements, Techno-structure, Middle line, and Support staff. Strategic planning is rather a process or activity within the organisation.\n\n**Why the other options are wrong:**\nA. The Strategic apex is an element of an organisation according to Mintzberg.\nB. Techno-structure is an element of an organisation according to Mintzberg.\nC. Middle line is an element of an organisation according to Mintzberg.\nD. Support staff is an element of an organisation according to Mintzberg.\n\n**Key concept:** Mintzberg's five elements or building blocks of an organisation."}, {"num": 3, "text": "Theory Y approach to management can be described as", "options": {"A": "Deliberate management style", "B": "Participative management style", "C": "Emergent management style", "D": "Prescriptive management style", "E": "Transformational management style"}, "answer": "B", "explanation": "**Why B is correct:** Theory Y assumes that employees are self-motivated and will work towards their own goals if given the autonomy and freedom to do so. This approach requires a participative management style where employees are involved in decision-making and goal-setting. A participative management style encourages employees to contribute their ideas and takes their participation seriously.\n\n**Why A is wrong:** A deliberate management style involves planning and deliberate actions by the manager but does not necessarily involve employee participation, which contradicts Theory Y principles.\n\n**Why C is wrong:** An emergent management style involves adapting to situations as they arise, which may not always prioritize employee participation and autonomy as Theory Y suggests.\n\n**Why D is wrong:** A prescriptive management style involves dictating or telling employees what to do, which contradicts the Theory Y approach of giving autonomy and freedom.\n\n**Why E is wrong:** A transformational management style involves inspiring and motivating employees to achieve organizational goals but does not necessarily prioritize employee participation and autonomy as Theory Y implies.\n\n**Key concept:** McGregor's Theory Y."}, {"num": 4, "text": "Which of the following is NOT an example of agency conflicts?", "options": {"A": "Moral hazard", "B": "Risk aversion", "C": "Earnings retention", "D": "Maturity transformation", "E": "Effort level"}, "answer": "D", "explanation": "**Why D is correct:** Maturity transformation occurs when a bank takes in short-term deposits and lends them for a longer period, which is a risk management activity rather than an agency conflict.\n\n**Why A is wrong:** A is incorrect because moral hazard refers to a situation where one party takes on more risk because they know someone else will bear the consequences, which is a classic example of an agency conflict.\n\n**Why B is wrong:** B is incorrect because risk aversion occurs when an agent takes less risk than they are willing to, in order to protect their principal, which is a type of agency conflict.\n\n**Why C is wrong:** C is incorrect because earnings retention, or the decision to retain profits within a company, can be motivated by agency conflicts between management and shareholders.\n\n**Why E is wrong:** E is incorrect because effort level refers to the degree of effort an agent puts into a project, which can be affected by agency conflicts if the agent has conflicting interests with the principal.\n\n**Key concept:** Maturity transformation is a risk management activity used by banks to manage liquidity and interest rate risks."}, {"num": 5, "text": "The acronym “DCF” represents", "options": {"A": "Discounted Cash Flow", "B": "Discount Cash Flow", "C": "Distribution Cash Flow", "D": "Distributed Cash Flow", "E": "Discounted Cash Factor"}, "answer": "A", "explanation": "**Why A is correct:** The acronym \"DCF\" is commonly used in financial analysis to represent \"Discounted Cash Flow\", a method for estimating the present value of future cash flows. This method is used in various financial techniques such as investment appraisal. \n\n**Why B is incorrect:** B \"Discount Cash Flow\" is not a standard acronym used in the financial analysis community.\n**Why C is incorrect:** C \"Distribution Cash Flow\" is not related to the concept of discounted cash flows.\n**Why D is incorrect:** D \"Distributed Cash Flow\" is not a recognized term in financial analysis.\n**Why E is incorrect:** E \"Discounted Cash Factor\" is not the commonly used meaning of the acronym \"DCF\".\n\n**Key concept:** This question tests the understanding of investment appraisal methods, specifically the concept of discounted cash flows."}, {"num": 6, "text": "", "options": {"A": "professional accountant is required to comply with the following fundamental principles, EXCEPT Integrity", "B": "Strategic framework", "C": "Confidentiality", "D": "Objectivity", "E": "Professional behaviour"}, "answer": "B", "explanation": "**Why B is correct:** The correct answer is B because the examination instructions specify that marks should be awarded for explaining the ways of creating a Joint Venture, and option B provides for the maximum of 2 marks for explaining 2 ways.\n\n**Why the other options are wrong:**\nA. The question asks for explaining the ways of creating a Joint Venture, which is not addressed by option A.\nC. Option C provides for marking purposes that are too general and vague, as it states awarding marks for \"purposes\".\nD. Option D specifies awarding marks for characteristics, which might not be directly related to explaining the ways of creating a Joint Venture.\nE. Option E specifies awarding marks for advantages, which also might not be directly related to explaining the ways of creating a Joint Venture.\n\n**Key concept:** The topic tested is the creation of a Joint Venture."}, {"num": 7, "text": "The acronym “IFAC” stands for", "options": {"A": "International Federation of Accountancy", "B": "International Federation of Accounting", "C": "International Federation of Accountants", "D": "Intermediate Federation of Accountants", "E": "Intermediate Federation of Accounting"}, "answer": "C", "explanation": "**Why C is correct:** IFAC is the acronym for International Federation of Accountants, which is an international organization of accountancy bodies that aims to promote the development of high-quality audit and financial reporting practices.\n\n**Why the other options are wrong:**\nA - Incorrect because it is close, but the correct term is Accountants, not Accountancy.\nB - Incorrect because it is similar, but the correct term is Accountants, not Accounting.\nD - Incorrect because it is an Intermediate level, which is not correct; the correct level is International.\nE - Incorrect because it also includes Intermediate, which is not correct; the correct level is International.\n\n**Key concept:** Understanding the role and functions of international accounting organizations."}, {"num": 8, "text": "The hierarchy of needs motivation theory was propounded by", "options": {"A": "Victor Vroom", "B": "Douglass McGregor", "C": "David McClelland", "D": "Abraham Maslow", "E": "Fredrick Herzberg"}, "answer": "D", "explanation": "**Why D is correct:** Abraham Maslow's hierarchy of needs motivation theory categorises human needs into five levels, starting from basic physiological needs to self-actualisation. This theory suggests that people's needs must be fulfilled in a specific order for motivation to be achieved. It has been widely applied in business management as a framework for employee motivation.\n\n**Why the other options are wrong:**\nA. Victor Vroom's Expectancy Theory explains motivation through the concept of work effort, expectancy, instrumentality, and valence.\nB. Douglas McGregor's Theory X and Theory Y describe management styles, with Theory X assuming employees are motivated by punishment and Theory Y assuming they are motivated by job satisfaction.\nC. David McClelland's Acquired Needs Theory proposes that people are motivated by needs for achievement, affiliation, and power.\nE. Frederick Herzberg's Two-Factor Theory explains job satisfaction and dissatisfaction based on hygiene and motivating factors."}, {"num": 9, "text": "In accordance with the provisions of the Companies and Allied Matters Acts (CAMA) 2020, which of the following is TRUE of a private company?", "options": {"A": "15% of the issued share capital must be paid up at all times", "B": "25% of the issued share capital must be paid up at all times", "C": "35% of the issued share capital must be paid up at all times", "D": "45% of the issued share capital must be paid up at all times", "E": "55% of the issued share capital must be paid up at all times"}, "answer": "B", "explanation": "**Why B is correct:** \nA private company in Nigeria, in accordance with CAMA 2020, must have 25% of its issued share capital paid up at all times, as a minimum requirement for registration. This is a condition for the company to be considered a private company. This provision aims to ensure that the company has a minimum level of capital.\n\n**Why the other options are wrong:**\nA. This option is incorrect because the minimum share capital paid up is less than 15%. \nC. This option is incorrect because the minimum share capital paid up is more than 25%. \nD. This option is incorrect because the minimum share capital paid up is more than 25%. \nE. This option is incorrect because the minimum share capital paid up is more than 25%.\n\n**Key concept:** The Companies and Allied Matters Acts (CAMA) 2020 - legal requirements for private companies registration in Nigeria."}, {"num": 10, "text": "Which of the following is a source of long -term financing?", "options": {"A": "Bank overdraft", "B": "Trade payables", "C": "Venture capital", "D": "Operating lease", "E": "Debt factoring"}, "answer": "C", "explanation": "**Why C is correct:** Venture capital is a source of long-term financing as it involves investing money in a business in exchange for equity shares, typically for a period of three years or more. This allows businesses to grow and expand over the long-term. Venture capital investors also provide guidance and industry expertise to the businesses they invest in.\n\n**Why the other options are wrong:**\nA. Bank overdraft is typically a short-term source of financing.\nB. Trade payables are a source of short-term financing as they are usually paid within a period of 30 to 90 days.\nD. Operating lease is a form of long-term financing but it is not necessarily a source of funds, as it involves the payment of rentals to use an asset.\nE. Debt factoring is a form of short-term financing as it involves the sale of outstanding debts to a third party for a discounted amount.\n\n**Key concept:** Long-term financing sources."}, {"num": 11, "text": "Bonds are debt instruments issued by governments, government agencies, international organisations and companies. Which of the following is NOT true of bonds?", "options": {"A": "They may be issued for a fixed period of time", "B": "They can be classified either as domestic or international", "C": "They are redeemed by the issuer usually at their face value", "D": "The bond markets are accessible to small companies", "E": "While in issue, the issuer pays interest to the bondholders in each year"}, "answer": "D", "explanation": "**Why D is correct:** \nThe bond markets are typically dominated by big corporations, making it challenging for small companies to access them. Small companies often opt for alternative financing options like loan notes or private placements. This limited access is a key characteristic of the bond market.\n\nA. They may be issued for a fixed period of time - This statement is true, as bonds can be issued with a fixed maturity date.\nB. They can be classified either as domestic or international - This statement is also true, as bonds can be divided into domestic and international issues.\nC. They are redeemed by the issuer usually at their face value - This statement is true; redemption usually occurs at face value, which is the bonds' original value.\nE. While in issue, the issuer pays interest to the bondholders in each year - This statement is true; during the bond's life, issuers typically make annual interest payments.\n\n**Key concept:** The ability of various types of companies to issue and access bonds."}, {"num": 12, "text": "According to the works of Warren Bennis, which of the following describes a leader?", "options": {"A": "Imitates", "B": "Maintains", "C": "Originates", "D": "Does things rightly", "E": "Places reliance on control"}, "answer": "C", "explanation": "**Why C is correct:** Warren Bennis defines a true leader as one who originates, not just imitates or follow others. This requires the ability to think innovatively and make decisions independently. Originating involves bringing new ideas and approaches to the organization.\n\n**A. Why A is wrong:** Imitating is a behavior that is common in ordinary supervisors but not typical of a leader according to Warren Bennis.\n\n**B. Why B is wrong:** Maintaining is not an action that is distinctively associated with leadership roles defined by Warren Bennis.\n\n**D. Why D is wrong:** Doing things rightly is more related to good followership rather than defining leadership.\n\n**E. Why E is wrong:** Reliance on control is in fact characteristic of an autocratic leadership style, not in line with Warren Bennis' definition of a leader.\n\n**Key concept:** Definition and characteristics of a leader as per Warren Bennis."}, {"num": 13, "text": "One of the contingency theories of leadership was developed by", "options": {"A": "Lippitt and White", "B": "Blake and Mouton", "C": "Shannon and Weaver", "D": "Hersey and Blanchard", "E": "Tannenbaum and Schmidt"}, "answer": "D", "explanation": "**Why D is correct:** Hersey and Blanchard developed the situational leadership theory, a contingency theory of leadership that suggests leaders should adapt their style to the situation and the ability of their team members.\n\n**Why the other options are wrong:** \nA. Lippitt and White actually developed the three stages of leadership: initiation, transition, and termination.\nB. Blake and Mouton developed the grid model of leadership that combines employee involvement and production emphasis.\nC. Shannon and Weaver are known for their work on communication theory.\nE. Tannenbaum and Schmidt developed the leadership styles continuum that suggests leaders should be flexible in their leadership style."}, {"num": 14, "text": "Which of the following CANNOT be categorised as an act of Non-Compliance with Laws and Regulations (NOCLAR)?", "options": {"A": "Bribery", "B": "Whistle blowing", "C": "False accounting", "D": "Fraudulent practice", "E": "Mutilated financial records"}, "answer": "B", "explanation": "**Why B is correct:** \nWhistle blowing is actually a positive act of reporting an individual's suspicions that a company is breaching a legal or regulatory requirement, and is therefore, not an act of non-compliance with laws and regulations (NOCLAR).\n\n**Why the other options are wrong:**\nA. Bribery is a form of corrupt activity involving the transfer of something of value in exchange for an improper advantage.\nB. False accounting is one type of financial reporting irregularity.\nC. Fraudulent practice is a material misstatement in financial statements or information submitted in the annual accounts or directors' report.\nD. Fraudulent practice is a material misstatement in financial statements, which is an act of NOCLAR.\n\n**Key Concept:** NOCLAR (Non-Compliance with Laws and Regulations) is the failure of an attest, practitioner, or any person or entity responsible for financial reporting to comply with laws, regulations, contractual requirements or other authoritative pronouncements."}, {"num": 15, "text": "The concept of cash flow is of vital importance to capital investment appraisal. Which of the following costs is relevant to investment decisions?", "options": {"A": "Future costs", "B": "Notional costs", "C": "Committed cost", "D": "Absorbed Cost", "E": "Apportionment Cost"}, "answer": "A", "explanation": "**Why A is correct:** Future costs are relevant to investment decisions because they represent cash outflows that will be incurred after a decision has been made to invest, affecting the project's viability and cash flow. These costs directly impact the project's profitability and cash flow, and must be taken into consideration when evaluating investment proposals. Future costs are essential in determining the project's net present value and internal rate of return.\n\n**Why other options are wrong:**\nA. Notional costs are irrelevant to investment decisions as they are non-cash expenses.\nB. Committed costs are relevant, but only when they relate to actual contracts or binding agreements.\nC. Absorbed costs are not relevant to investment decisions, as they relate to the accounting treatment of costs and not their impact on cash flow.\nD. Apportionment costs are also irrelevant, as they are a mechanism for allocating costs to different departments or projects, but do not reflect actual cash outflows.\n\n**Key concept:** Relevant costs (cash costs) for investment decisions."}, {"num": 16, "text": "Separating the risk and return characteristics of market investments from the individual investment decisions is known as", "options": {"A": "Risk transformation", "B": "Separation theorem", "C": "Financial intermediation", "D": "Maturity transformation", "E": "Amortisation"}, "answer": "B", "explanation": "**Why B is correct:** The separation theorem is an economic theory that separates investment decisions from risk and return characteristics of market investments, allowing individual investors to decide how much risk they want to take while asset managers can decide how much risk to invest in various assets.\n\n**Why the other options are wrong:**\nA. Risk transformation refers to the process of changing the form of risk, which is not directly related to the separation of risk and return.\nB. is correct.\nC. Financial intermediation is the process of financial institutions acting as middlemen between savers and borrowers, which is not related to the separation of risk and return.\nD. Maturity transformation is the process of transforming long-term investments into short-term loans, again unrelated to risk and return separation.\nE. Amortisation is the process of gradually reducing debt by making regular payments, which is not related to risk and return separation.\n\n**Key concept:** The separation theorem, a concept in investment theory."}, {"num": 17, "text": "Agency theory was developed in 1976 by", "options": {"A": "Fayol and Mayo", "B": "Kanter and Urwick", "C": "Jensen and Meckling", "D": "Mintzberg and Ouchi", "E": "Frank and Lillian Gilbreth"}, "answer": "C", "explanation": "**Why C is correct:** Agency theory, which describes the relationship between two parties, particularly the principal and the agent, was developed by Michael C. Jensen and William H. Meckling in the year 1976. This theory is significant as it explains how individuals within a company make decisions and how power and control are distributed. Jensen and Meckling's work laid the foundation for further research in agency theory.\n\n**Why the other options are wrong:**\nA. Fayol and Mayo were influential in developing organizational theories and management practices, but they did not develop agency theory.\nB. Kanter and Urwick are known for their work in organizational structure and behavior, but they are not credited with developing agency theory.\nD. Mintzberg and Ouchi are prominent organizational theorists, but they developed other key concepts, such as Mintzberg's 5 Ps and Ouchi's Zien framework, not agency theory.\nE. Frank and Lillian Gilbreth are known for their work in the field of industrial psychology, particularly in time and motion studies and efficiency, but they have no direct connection to the development of agency theory.\n\n**Key concept:** The agency theory concept is the foundation level business and finance principle that explains the relationship between principals and agents, particularly in corporate governance."}, {"num": 18, "text": "Shannon and Weaver‟s communication model was developed in", "options": {"A": "1929", "B": "1937", "C": "1949", "D": "1957", "E": "1969"}, "answer": "C", "explanation": "**Why C is correct:** Shannon and Weaver's communication model was a groundbreaking theory that combined information theory and social science. Developed by Claude Shannon and Warren Weaver, it was published in a report called 'A Mathematical Model for Communication', which became a seminal work in communication studies, first appearing in 1949. This model is often referred to as the Shannon-Weaver model.\n\n**Why the other options are wrong:**\nA. 1929: Shannon and Weaver's model was not developed in this pre-Great Depression year.\nB. 1937: This is still early relative to the time when the Shannon-Weaver model emerged.\nD. 1957: This is almost a decade after the Shannon-Weaver model was developed.\nE. 1969: This option is more than two decades after the Shannon-Weaver model appeared in the literature.\n\n**Key concept:** The question tests students‟ knowledge of foundational communication theories."}, {"num": 19, "text": "Banks are important financial intermediaries because they", "options": {"A": "Create new debit", "B": "Are the only source of debt finance", "C": "Are the only source of long term finance", "D": "Operate between investors and borrowers", "E": "Take deposits from all their customers"}, "answer": "D", "explanation": "**Why D is correct:** Banks operate as financial intermediaries, acting as an essential link between savers (investors) and borrowers, thereby facilitating the flow of funds through the economy.\n\n**Why the other options are wrong:**\nA. Incorrect, as banks don't create new debt but instead channel existing funds from investors to borrowers.\nB. Incorrect, as banks are not the only source of debt finance.\nC. Incorrect, as banks primarily provide short-term finance, not long-term finance, which is usually provided by other investors such as venture capitalists or institutional investors.\nE. Incorrect, as banks don't necessarily take deposits from all customers but focus on attracting a significant number of depositors to fund their lending activities.\n\n**Key concept:** Function of Financial Institutions, specifically the role of banks as financial intermediaries."}, {"num": 20, "text": "The cultural web consists of the following inter-related elements of culture within an organisation, EXCEPT", "options": {"A": "Symbols", "B": "Interactions", "C": "Control systems", "D": "Stories and myths", "E": "Routine and rituals SECTION B:              OPEN-ENDED QUESTIONS                             (80 MARKS) INSTRUCTION:            YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 According to Harold Koontz “management is an art of creating an environment in which people can perform and individuals can co-operate towards attainment of group goals”. a.        Define “group cohesion” and explain briefly FIVE factors that impact group cohesion.                                                        (10 Marks) b.        Define Commercial Paper (CP) and state THREE advantages of convertible bonds for companies and THREE advantages of convertible bonds for investors. (10 Marks) (Total 20 Marks) QUESTION 2 a. Explain the concept of a joint venture                               (2 Marks) b. Explain TWO ways by which a joint venture can be created in Nigeria (4 Marks) c. State FIVE purposes for creating a joint venture                    (5 Marks) d. State FOUR characteristics of a joint venture                       (4 Marks) e. State THREE advantages and TWO disadvantages of joint ventures      (5 Marks) (Total 20 Marks) QUESTION 3 a. State TWO situations in each case when the following communication channels are suitable i. Email ii. Face to face conversation iii. Memo iv. Phone call v. Video conferencing vi. Letter (12 Marks) b. State and explain TWO main policy approaches that governments use to meet macroeconomic objectives.                                           (4 Marks) c. In many countries, upcoming industries are protected against foreign competition by government measures against imports. State TWO policies Nigeria may adopt to protect her cottage industry from foreign competition.                                                 (4 Marks) (Total 20 Marks) QUESTION 4 a.   State and explain FIVE categories of management‟s responsibility as suggested by Peter Drucker.                                             (10 Marks) b.   State FOUR main features of bureaucracy as identified by Rosemary Stewart. (4 Marks) c.   Explain THREE reasons for the growth of bureaucracy as put forward by Stewart.                                                            (6 Marks) (Total 20 Marks) QUESTION 5 a. State THREE advantages and THREE disadvantages of Accounting Rate of Return (ARR) method of investment appraisal.                           (6 Marks) b. McPat Investment Limited is considering investing in either of two mutually exclusive projects, namely Axiom and Axis. Each project costs N1.5 billion. The cost of capital to the company is 15%. The projected cash flows from the two projects are as stated below: Year              Axiom            Axis N „000         N „000 1               220,000        200,000"}, "answer": "B", "explanation": "**Why B is correct:** Interactions are not considered a core element of the cultural web in the framework proposed by Morgan (1986). While interactions can influence culture, they are not listed as a distinct component of the cultural web.\n\n**Why the other options are wrong:**\nA. Symbols - Symbols can influence culture in the organisation and are a part of the cultural web.\nC. Control systems - Control systems, which include mechanisms such as financial and accounting systems, are also part of the cultural web.\nD. Stories and myths - Stories and myths can play a significant role in shaping culture within an organisation and are part of the cultural web.\nE. Routine and rituals - Routine and rituals are indeed part of the cultural web, influencing organisational practices and culture.\n\n**Key concept:** The cultural web is a framework for understanding organisational culture, comprising distinct elements such as symbols, stories, routines, routines and rituals, and control systems."}, {"num": 6, "text": "300,000        340,000 7               280,000        280,000 You are required to evaluate the projects using Net Present Value method to decide which one to accept.                                                  (14 Marks) (Total 20 Marks) QUESTION 6 a.    Explain the following terms: i.    Technological business model ii.    Project management.                                              (4 Marks) b.    State TWO disadvantages each of Matrix and Virtual organisational structures. (4 Marks) c.    In order to put the fundamental principles of ethics into practice, organisations need to adopt values that promote adherence to these principles. State and explain SIX of these values.                                       (12 Marks) (Total 20 Marks) SOLUTION SECTION A 1            D 2            E 3            B 4            D 5            A 6            B 7            C 8            D 9            B 10           C 11           D 12           C 13           D 14           B 15           A 16           B 17           C 18           C 19           D 20           B Examiner’s report Section A of the paper is mandatory and so all candidates attempted the twenty MCQs questions. The questions test candidates‟ comprehension of the various aspects of the syllabus. About 55 % of the candidates that attempted this section scored below 50%. For better performance in future examinations, prospective candidates should cover the entire syllabus while preparing for this subject. ICAN study text and Pathfinder will offer the required guidance. Marking guide Award 1 mark each for any correct option chosen to a maximum of 20 marks SECTION B SOLUTION 1 (a)     Group cohesion describes the strength of the bond uniting the group. When cohesion is strong the group will remain strong and stable and continue to exist. Conversely, when cohesion is weak, the group may ultimately disband. i. Size of group: Smaller groups tend to display greater cohesion than larger groups. ii. Heterogeneous vs. homogeneous: Homogeneous groups who share common characteristics such as race, gender and religion will typically demonstrate greater cohesion than groups who are more diverse (heterogeneous) sharing fewer common characteristics. iii. Group success This is arguably a „self-fulfilling prophecy‟ – the more successful a group the greater the incentive to be part of it and hence the greater the cohesion. The less successful, the lower the cohesion. iv. Barriers to entry and prestige: Human nature means that the more difficult it is to become a member of a group the greater the desire for outsiders to join the group. Subsequently, the group becomes prestigious and more cohesive. A good example might be an elite academic institution. v. Task cohesion: The greater the need for a task to be completed by a group rather than individuals (e.g. a sports team or military operation) the more cohesive the group becomes as members on the whole accept the need to work together to achieve the shared objective. vi. Rewards and punishment: The availability of reward for membership and/or punishment for leaving can have a bearing on the attractiveness of being part of a group and hence influence group cohesion. vii. Competition from external groups: A lack of competition from alternative groups can lead to erosion in cohesion as members do not feel any pressure to perform. However, with the emergence of competition, groups typically become more cohesive as their competitive instincts amplify and the desire to defeat a rival drives them on. viii. Location: Groups who enjoy segregation from others will tend to be more cohesive as strong interpersonal communication patterns develop and a sense of visible identify builds. ix. Leadership style: An effective leadership style that matches the skills and personalities of the group can have a significant impact on promoting group cohesion. An ineffective leadership style for that particular group of people is likely to have the opposite effect and erode group cohesion. x. Social cohesion: Social cohesion is the degree to which group members enjoy each other‟s company and how much they like each other. Group cohesion will be highest when members enjoy the social side of being part of the group. (b)    Commercial paper (CP) is an unsecured promissory note.", "options": {"A": "promissory note is a promise by the issuer of the note to pay a specific amount of money on a specified date. When a company issues CP, it promises to pay the face value of the paper at a specified date in the future. Meanwhile, non-financial companies issue CP through a bank, as part of a commercial paper programme. The bank issues the CP on behalf of the company and sells it to investors. All CP is negotiable, which means that it can be sold in the money market. In practice, however, investors buying CP normally hold it to maturity when they are paid the face value of the paper they have bought. The company issuing the CP therefore receives immediate cash (at a discount to the face value of the paper) and makes a payment when the paper reaches maturity. The advantages of convertibles for companies are as follows: (i) The company can issue bonds now, and receive tax relief on the interest charges, but hope to convert the debt capital into equity in the future. (ii) The interest rate on convertibles is lower than the interest rate on similar straight bonds. This is because investors in the convertibles are expected to accept a lower interest rate in return for the option to convert the bonds into equities in the future. (iii) Occasionally, there is strong demand from investors for convertibles, and companies can respond to investors‟ demand by issuing convertibles in order to raise new capital. The advantages of convertibles for investors are as follows: (i) Investors receive a minimum annual income up to the conversion date, in the form of fixed interest. (ii) In addition, investors in convertibles will be able to benefit from a rise in the company‟s share price, and hope to make an immediate capital gain on conversion. (iii) Convertibles therefore combine some fixed annual income and the opportunity to benefit from a rising share price. The first part of the question tests candidates‟ knowledge of Teams and Team Roles with particular emphasis on Group Cohesion. The second part examines money market instruments with particular reference to Commercial Paper. Examiner’s report The first part of the question tests candidates‟ knowledge of teams and team roles with particular emphasis on group cohesion. The second part examines money market instruments with particular reference to commercial paper The question was attempted by 35% of the candidates. Performance was poor, as about 70% of the candidates who attempted the question scored below 50%. The responses revealed that about 60% of the candidates that attempted the question had no good knowledge of group cohesion. Available statistics showed that about 50% of the candidates that attempted part b of the question relied on residual knowledge. Candidates should study all aspects of the syllabus carefully using ICAN Study Text and Pathfinder as a guide, when preparing for future examination. Marking guide Marks          Marks        Marks a   Award maximum of 2 ½ marks to correct description of the term “Group Cohesion”      2½                2½ Award ½ mark each to any 5 points mentioned                                     5 points x ½      2½ Award maximum of 1 mark each to any 5         5 points x 1       5 points explained b   Award maximum of 1 mark each to the explanation provided in paragraphs 1 to 4     4 points x 1        4 (Definition of Commercial Paper) Award maximum of 1 mark each to any 3 advantages of convertibles bonds for          3 points x 1        3 companies presented Award maximum of 1 mark each to any 3 advantages of convertibles bonds for          3 points x 1        3 investors presented SOLUTION 2 a)    Joint Venture joint venture is a business entity characterized by mutual ownership, returns, risks and governance by two or more parties. In other words, is a formal venture/agreement entered by two or more separate entities to develop a business or an activity jointly. b)       TWO ways by which a Joint Venture may be created in Nigeria i. A foreign investor buying an interest in a local company in Nigeria ii. A local company buying an interest in an existing foreign company iii. Both local and foreign companies joining to form a new enterprise c)      FIVE purposes for creating Joint Venture i. create synergy ii. increased resources iii.  move into a new emerging market iv.  gain profits margins by combining their assets and operations v. access skills and capabilities vi. share the risk for major investments or projects vii.  mutual competitive advantage viii. business expansion ix.  develop new products d)       FOUR characteristics of Joint Venture i.  Shared ownership/ entered into by two or more persons ii.  Shared governance iii.  Shared profit returns and risk iv.   Enable growth without having to borrow funds v. Time bound (it is for a specific period of time) e)       State THREE advantages and TWO disadvantages of Joint Ventures Advantages of Joint Ventures i.   Profit at low cost ii.   Shared costs iii.   Shared expenses iv.    Shared risk v.    Provides opportunity to gain new insights and expertise vi.    Enables access to specialized technology, staff and other resources Disadvantages of Joint Venture i.     Flexibility is restricted ii.    Degree of partners‟ involvement may not be equal iii.   It has unclear and unrealistic objectives.                 Total 20 Marks Examiner’s report The question tests candidates‟ knowledge of business processes and environment with all the parts of the question revolving around joint venture as a method of collaboration and alliances. The question requires candidates to explain the meaning of the concept, how it can be created, purposes for its creation, its characteristics, advantages and disadvantages. 80% of the candidates who sat for the paper attempted this question and performance was extremely bad. About 50 % of the candidates who attempted the question scored below 40%. Responses to the question show that candidates were ill prepared for the examination. A handful number of the candidates misconstrued joint venture as normal partnership. Candidates are strongly advised to cover the entire syllabus in the course of their preparations for this subject in future. Marking guide Marks            Marks Marks Award maximum of 2 marks to             Maximum of 2 correct description of Joint Venture                        2", "B": "Award maximum of 2 marks each           2 points x 2 to any 2 ways of creating Joint Venture explained                                           4", "C": "Award maximum of 1 mark each to         4 points x 1 any 4 purposes of creating Joint Venture stated                                              4", "D": "Award maximum of 1 mark each to         5 points x 1 any 5 characteristics of Joint Venture stated                                              5", "E": "Award maximum of 1 mark each to         3 points x 1 any 3 advantages of Joint Venture stated Award maximum of 1 mark each                                                        3 to any 2 disadvantages of Joint         2 points x 1 Venture stated                                              2 SOLUTION 3 a) Channel of            Suitable Situations Communication mail                   i.   Retention of record of information is important. Information has to be conveyed quickly."}, "answer": "B", "explanation": "**Why B is correct:** The correct answer is B because the examination instructions specify that marks should be awarded for explaining the ways of creating a Joint Venture, and option B provides for the maximum of 2 marks for explaining 2 ways.\n\n**Why the other options are wrong:**\nA. The question asks for explaining the ways of creating a Joint Venture, which is not addressed by option A.\nC. Option C provides for marking purposes that are too general and vague, as it states awarding marks for \"purposes\".\nD. Option D specifies awarding marks for characteristics, which might not be directly related to explaining the ways of creating a Joint Venture.\nE. Option E specifies awarding marks for advantages, which also might not be directly related to explaining the ways of creating a Joint Venture.\n\n**Key concept:** The topic tested is the creation of a Joint Venture."}], "answers": {"1": "D", "2": "E", "3": "B", "4": "D", "5": "A", "6": "B", "7": "C", "8": "D", "9": "B", "10": "C", "11": "D", "12": "C", "13": "D", "14": "B", "15": "A", "16": "B", "17": "C", "18": "C", "19": "D", "20": "B"}, "examiner_report": "Section A of the paper is mandatory and so all candidates attempted the twenty MCQs questions. The questions test candidates‟ comprehension of the various aspects of the syllabus. About 55 % of the candidates that attempted this section scored below 50%. For better performance in future examinations, prospective candidates should cover the entire syllabus while preparing for this subject. ICAN study text and Pathfinder will offer the required guidance. 63 NOT TO BE SOLD | Compiled by: Babatunde Isaiah | Email: ababatundeisaiah@gmail.com Marking guide Award 1 mark each for any correct option chosen to a maximum of 20 marks"}, {"session": "May 2022", "questions": [{"num": 1, "text": "Attempts have been made by management theorists to define management tasks. Which of the following management tasks is among the ones identified by Henri Fayol?", "options": {"A": "Organiser", "B": "Negotiator", "C": "Figurehead", "D": "Entrepreneur", "E": "Disseminator"}, "answer": "A", "explanation": "**Why A is correct:** Henri Fayol, a French management theorist, identified 14 fundamental management tasks, which include planning, organizing, coordinating, commanding, and so on. Among these, \"Organiser\" is one of the tasks, referring to the manager's role in structuring and arranging activities within an organization. The Organiser role involves designing the organization's structure and arranging tasks in an efficient manner.\n\n**Why B is wrong:** B. Negotiator is not one of the management tasks identified by Henri Fayol.\n**Why C is wrong:** C. Figurehead is a role described by Henry Mintzberg, not Henri Fayol.\n**Why D is wrong:** D. Entrepreneur is a management concept, but it is not one of the specific management tasks identified by Henri Fayol.\n**Why E is wrong:** E. Disseminator is a role described by Henry Mintzberg, not Henri Fayol.\n\n**Key concept:** Henri Fayol's 14 fundamental management tasks."}, {"num": 2, "text": "Which of the following is a primary source of information when researching for business report?", "options": {"A": "Accounting data", "B": "Audit investigation", "C": "Bing", "D": "Customer database", "E": "Market research agencies"}, "answer": "B", "explanation": "**Why B is correct:** An audit investigation is considered a reliable, primary source of information as it involves a thorough, independent examination of a company's records and activities, often by external auditors.\n\n**A**: Accounting data may be a useful secondary source of information in a business report, but it is not considered primary as it is prepared by the company itself.\n**C**: Bing and other search engines are secondary sources that rely on user-generated content and may not provide the most accurate or up-to-date information.\n**D**: The customer database is a secondary source of information that may provide insights into customer behavior and preferences but lacks objectivity compared to audit investigations.\n**E**: Market research agencies can provide valuable insights and data, but they may rely on secondary sources and methods, making them a secondary source in this context.\n**Key concept:** The importance of audit investigations as a primary source of information in business reports."}, {"num": 3, "text": "Recently, Nigerian government adopted a policy of subsidising imported petroleum products. The following were the intent of the policy, EXCEPT", "options": {"A": "Maintain low fuel prices", "B": "Reduce production costs in industry", "C": "Provide incentive to make Nigerian refineries more efficient", "D": "Promote the accessibility of transport to the wider population", "E": "Promote the accessibility of infrastructure to the wider population"}, "answer": "C", "explanation": "**Why C is correct:** \nSubsidising imported petroleum products would not provide an incentive for Nigerian refineries to become more efficient, as it would reduce the incentive to improve operations and reduce costs. The policy would actually reduce the financial burden of refiners, potentially making imports more attractive. By doing so, it would likely discourage refineries from investing in improvements.\n\n**Why A is wrong:** A is correct in that one intent of the policy could be to maintain low fuel prices.\n**Why B is wrong:** B is correct in that lower production costs in industry could be a result of reduced fuel prices, making production more affordable.\n**Why D is wrong:** D is correct in that lower fuel prices could be used to make transport more accessible to the wider population, especially low-income groups.\n**Why E is wrong:** E is correct in
