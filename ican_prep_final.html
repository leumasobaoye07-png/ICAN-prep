or free-flowing information exchange but can become cumbersome with a large number of members.\n\n**Why the other options are wrong:**\nA. Circle - Characterized by communication in a single direction, where messages flow through one person, then to another, in a circular pattern.\nB. Wheel - A central person (hub) communicates with a group of others, who then communicate with each other, but it is not a two-way communication system between all members.\nC. The Y - This pattern involves a central figure or a team that communicates directly with smaller, specialized groups, while these groups remain unaware of each other's interactions.\nD. Chain - A linear pattern where communication flows through a single path, from one person to the next, with no return of information.\n\n**Key concept:** Organisational communication modes and patterns."}, {"num": 5, "text": "Which of the following describes how the national income of a country increases or falls from one year to the next?", "options": {"A": "Economic learning curve", "B": "Economic recession", "C": "Economic development", "D": "Economic trends", "E": "Economic cycle"}, "answer": "E", "explanation": "**Why E is correct:** An economic cycle, also known as a business cycle, describes the fluctuations in a country's national income over time, including periods of expansion, contraction, and eventual recovery. This cycle reflects changes in aggregate output, income, and employment. The economic cycle provides a framework for understanding how national income increases or falls from one year to the next.\n\n**Why the other options are wrong:**\nA. Economic learning curve refers to the process of reducing the learning period and achieving higher productivity as experience is gained in a new product or production process.\nB. Economic recession is a specific period of the economic cycle, characterized by a decline in national income, often defined as two or more consecutive quarters of negative economic growth.\nC. Economic development is a broader concept referring to sustained economic growth and improvements in human welfare over a longer period of time.\nD. Economic trends refer to the general direction or pattern of economic activity, but do not necessarily describe cyclical changes in national income.\nE. There is no option F; it is option E.\n\n**Key concept:** The economic cycle or business cycle."}, {"num": 6, "text": "Decentralised decision-making is advantageous because", "options": {"A": "Managers at the head office are able to apply a corporate view of the entire business", "B": "It gives senior managers greater control over business activities thereby allowing them to coordinate activities more effectively", "C": "It is possible to use specialised management support teams for the whole organization", "D": "It helps to develop junior managers with initiative and talents and prepare them for higher positions", "E": "It is cheaper since fewer managers are needed"}, "answer": "D", "explanation": "**Why D is correct:** Decentralised decision-making provides junior managers with opportunities to develop initiative and talents, preparing them for higher positions. This allows them to gain experience and expertise in making decisions, which is essential for their career progression. By giving them more autonomy, organisations can identify and nurture potential leaders.\n\n**Why other options are wrong:**\nA. Decentralised decision-making actually allows managers to make decisions independently, rather than the head office applying a corporate view.\nB. Centralised decision-making allows senior managers to control business activities, whereas decentralised decision-making delegates decision-making to lower levels.\nC. Specialised management support teams can be used in either centralised or decentralised organisations, but are not unique to decentralisation.\nE. While decentralisation may lead to fewer managers needed at head office, cost savings are not its primary advantage.\n\n**Key concept:** The question tests the understanding of the advantages of decentralised decision-making, a key concept in organisational structure and management control."}, {"num": 7, "text": "Which of the following organisations handles registration of businesses and companies in Nigeria?", "options": {"A": "Nigeria Enterprise Promotion Board", "B": "Corporate Affairs Commission", "C": "Customs and Excise", "D": "NAFDAC", "E": "Ministry of Industry"}, "answer": "B", "explanation": "**Why B is correct:** The Corporate Affairs Commission (CAC) is the Nigerian Government agency responsible for regulating and supervising companies and allied matters, including the registration of businesses and companies in Nigeria. \n\n**A is wrong:** The Nigeria Enterprise Promotion Board primarily focuses on promoting entrepreneurial skills among Nigerian youths and providing support services to small and medium-sized enterprises (SMEs).\n\n**C is wrong:** The Nigerian Customs Service and National Excise Tariff is responsible for collecting customs duties and excise duties on imported and locally produced goods.\n\n**D is wrong:** The National Agency for Food and Drug Administration and Control (NAFDAC) is responsible for regulating and controlling the sale and distribution of food, drugs, and other products.\n\n**E is wrong:** The Ministry of Industry's role is more aligned with policy formulation and provision of guidance than the actual registration of businesses and companies.\n\n**Key concept:** Corporate Governance and Law."}, {"num": 8, "text": "The administration function of an organisation is", "options": {"A": "Pollution control and waste disposal", "B": "Direct selling by sales executives", "C": "Ensuring compliance with regulations", "D": "Obtaining new funds from the financial markets", "E": "Delivering products to customers"}, "answer": "C", "explanation": "**Why C is correct:** The administration function of an organisation encompasses various activities and processes. Ensuring compliance with regulations is one such aspect that falls under the purview of administration. It involves maintaining records and adhering to applicable laws and standards.\n\n**Why other options are wrong:**\nA. Pollution control and waste disposal is a function typically associated with operational activities.\nB. Direct selling by sales executives is a characteristic of the selling function.\nD. Obtaining new funds from the financial markets is a part of the financial function.\nE. Delivering products to customers is a key activity of the operational function.\n\n**Key concept:** The management functions of an organisation, particularly the administration function."}, {"num": 9, "text": "", "options": {"A": "business partnership is an entity in which two or more individuals share the ownership of the business. The document which specifies the obligations and rights of each partner is called A partnership deed", "B": "A contract", "C": "An article of association", "D": "A memorandum of association", "E": "A tort"}, "answer": "A", "explanation": "**Why A is correct:** \nA business partnership involves shared ownership between two or more individuals, making it the correct definition. This matches the description provided in option A. The mention of a document within the description supports the idea that option A is the correct answer.\n\n**Why B is wrong:** \nA contract is an agreement between two or more parties that is legally binding, and it is not necessarily tied to business partnerships.\n\n**Why C is wrong:** \nAn article of association outlines the rules and regulations of a company, but it does not define a business partnership.\n\n**Why D is wrong:** \nA memorandum of association is a document that defines the company's existence and the relationship between its members, but it does not describe a business partnership.\n\n**Why E is wrong:** \nA tort is a wrong committed against an individual's rights, and it is unrelated to business partnerships.\n\n**Key concept:** \nThe definition of a business partnership and its associated document."}, {"num": 10, "text": "Which of the following is NOT a usual source of short-term finance?", "options": {"A": "Short-term bank loans", "B": "Commercial paper", "C": "Trade payables", "D": "Bank overdraft", "E": "Lease finance"}, "answer": "E", "explanation": "**Why E is correct:** Lease finance is a long-term financing option where one party uses an asset for a specified period in exchange for rental payments. It is not typically used for short-term financing needs. The agreement length and repayment terms of lease finance usually exceed those of short-term financing.\n\n**A. Short-term bank loans**\nA is incorrect because short-term bank loans are a common source of short-term finance.\n\n**B. Commercial paper**\nB is incorrect because commercial paper is a type of corporate debt security used for short-term financing.\n\n**C. Trade payables**\nC is incorrect because trade payables are accounts payable to suppliers arising from purchases of goods and services, a standard source of short-term finance.\n\n**D. Bank overdraft**\nD is incorrect because bank overdrafts are facilities allowing businesses to withdraw more money than they have in their current account, typically used for short-term liquidity needs.\n\n**Key concept:** Short-term finance."}, {"num": 11, "text": "Which of the following is a strategic alliance?", "options": {"A": "Joint venture", "B": "People alliance", "C": "Geographic specific", "D": "Investment", "E": "Sale"}, "answer": "A", "explanation": "**Why A is correct:** A strategic alliance, in this case, a joint venture, is a long-term collaboration between two or more businesses to achieve a common objective. This type of alliance is formed through a mutually beneficial partnership. Examples include Sony-Ericsson and Apple-IBM partnerships.\n\n**Why B is wrong:** B. People alliance is not a commonly used term and does not accurately describe a strategic alliance.\n**Why C is wrong:** C. Geographic specific does not describe the type of alliance but rather a possible focus or scope.\n**Why D is wrong:** D. Investment, although a possible component of a strategic alliance, is not the alliance itself.\n**Why E is wrong:** E. Sale is not a type of strategic alliance at all.\n\n**Key concept:** Strategic alliances refer to long-term collaborative partnerships between businesses to achieve mutual objectives."}, {"num": 12, "text": "Which of the following is NOT regarded as a non-financial consideration in investment decisions?", "options": {"A": "Payback", "B": "Reliability", "C": "Efficiency", "D": "Speed of service", "E": "Customer satisfaction"}, "answer": "A", "explanation": "**Why A is correct:** Payback is a financial consideration, as it measures the time needed to recover the initial investment, rather than a non-financial consideration like customer satisfaction or efficiency.\n\n**Why the other options are wrong:**\nB. Reliability is a non-financial consideration as it refers to the consistency of the product or service.\nC. Efficiency is a non-financial consideration as it refers to the effectiveness and productivity of the business.\nD. Speed of service is a non-financial consideration as it refers to the time taken to complete transactions or provide customer service.\nE. Customer satisfaction is a non-financial consideration as it refers to the level of satisfaction of customers with the product or service.\n\n**Key concept:** Non-financial considerations in investment decisions."}, {"num": 13, "text": "Which of the following is a theorist associated with the Classical Theories of Management?", "options": {"A": "Peter Drucker", "B": "William Ouchi", "C": "Henri Fayol", "D": "Douglas McGregor", "E": "Rosabeth M. Kanter"}, "answer": "C", "explanation": "**Why C is correct:** Henri Fayol is a key theorist associated with the Classical Theories of Management, which emerged in the late 19th and early 20th centuries. His work, particularly 'General and Industrial Management', outlined the 14 principles of management and emphasized a strict hierarchical structure. Fayol's work heavily influenced the development of classical management theories.\n\n**A is incorrect:** Peter Drucker is associated with Human Relations and Contingency Theories of Management, not classical theories.\n\n**B is incorrect:** William Ouchi is associated with Contingency Theories of Management, not classical theories.\n\n**D is incorrect:** Douglas McGregor is associated with Human Relations Theory, also known as the Theory X and Theory Y, not classical theories.\n\n**E is incorrect:** Rosabeth M. Kanter is associated with Human Relations and Contingency Theories of Management, not classical theories.\n\n**Key concept:** Classical Theories of Management"}, {"num": 14, "text": "You recently won ₦50 million from the popular NTA show “Who wants to be a billionaire?” A financial expert counselled that you invest the money in a bank at 6% interest rate per annum. How much will you have at the end of ten years?", "options": {"A": "N88,550,000", "B": "N89,550,000", "C": "N90,550,000", "D": "N91,550,000", "E": "N92,550,000"}, "answer": "B", "explanation": "**Why B is correct:** To calculate the future value of the investment, use the formula FV = PV * (1 + r)^n, where PV = ₦50,000,000, r = 6% or 0.06 as a decimal, and n = 10 years. Substituting the given values, FV ≈ ₦50,000,000 * (1 + 0.06)^10 ≈ ₦89,550,000.\n\n**Why other options are wrong:**\nA. N88,550,000: This result is lower than the actual future value.\nB. N89,550,000: None.\nC. N90,550,000: This result is higher than the actual future value.\nD. N91,550,000: This result is more than twice the actual difference.\nE. N92,550,000: This result is nearly three times the actual difference.\n\n**Key concept:** Time Value of Money (TVFM) is applicable in this context."}, {"num": 15, "text": "Operations Research (OR) is associated with ……………. approach.", "options": {"A": "Human relations", "B": "Classical", "C": "Bureaucratic", "D": "Management science", "E": "Scientific management"}, "answer": "D", "explanation": "**Why D is correct:** Operations research (OR) is an interdisciplinary approach that utilizes scientific methods and tools to analyze and solve complex business problems. This field combines mathematics, statistics, engineering, and computer science to aid in decision-making. Management science is a term that encompasses operations research and other related disciplines.\n\n**Why the other options are wrong:**\nA. Human relations - Human relations is a field that focuses on the social and behavioral aspects of organizations.\nB. Classical - The classical approach is a management style that emphasizes efficiency and standardization.\nC. Bureaucratic - Bureaucratic management is a style characterized by a hierarchy and formal rules.\nE. Scientific management - Scientific management is a management approach proposed by Taylor that aimed to improve efficiency through the scientific study of work processes.\n\n**Key concept:** Operations Research (OR) is an interdisciplinary approach associated with management science."}, {"num": 16, "text": "Which of the following is NOT a main source of long-term capital?", "options": {"A": "Venture capital", "B": "Equity finance", "C": "Debt factoring", "D": "Lease finance", "E": "Debt finance"}, "answer": "C", "explanation": "**Why C is correct:** Debt factoring is a short-term financing method that involves selling receivables to a third party, so it's not a main source of long-term capital. It provides immediate liquidity to the firm and can be used to overcome cash flow problems. As such, it does not qualify as a long-term capital source.\n\n**Why the other options are wrong:**\nA. Venture capital is a long-term financing method used by start-up and growing firms.\nB. Equity finance involves issuing shares to non-owners to raise capital, typically for long-term needs.\nD. Lease finance can provide long-term capital to companies through lease agreements.\nE. Debt finance provides financing for long-term needs through the issuance of debt securities.\n**Key concept:** Sources of long-term capital."}, {"num": 17, "text": "Which of the following options best describes a case where it may be extremely difficult to measure qualitative performance in quantitative terms?", "options": {"A": "„High quality‟", "B": "„Being the „best‟", "C": "„Brand recognition‟", "D": "„Better than competitors‟", "E": "„Meeting customer needs‟"}, "answer": "C", "explanation": "**Why C is correct:** Brand recognition is an abstract concept that cannot be easily quantified or measured using numerical variables, making it difficult to express in quantitative terms. It involves customer perceptions and emotions, which are hard to quantify. \n\n**Why A is wrong:** A high-quality performance can be measured and expressed in quantitative terms, such as through customer satisfaction surveys or product reviews.\n**Why B is wrong:** Being the \"best\" can be measured through competitive benchmarking and quantitative comparison.\n**Why D is wrong:** Being better than competitors can be measured through market share, revenue, or market research data.\n**Why E is wrong:** Meeting customer needs can be measured through customer feedback, retention rates, or sales data.\n\n**Key concept:** Measuring qualitative performance in quantitative terms relates to the concept of intangible assets and how they can be expressed in monetary values for accounting and financial reporting purposes."}, {"num": 18, "text": "Which of the following is a measure of success in meeting customer needs?", "options": {"A": "Quality measures", "B": "Time lost in production", "C": "Number of make or buy decisions", "D": "Number of new products developed", "E": "Measures of repeat business obtained"}, "answer": "E", "explanation": "**Why E is correct:** Measures of repeat business obtained is a key indicator that a company is successfully meeting customer needs, as satisfied customers are more likely to continue doing business with the same company. It is also a measure of customer retention and loyalty. \n\n**Why the other options are wrong:**\nA. Quality measures - These are important for ensuring customer needs are met, but they don't necessarily measure success in this regard.\nB. Time lost in production - This measures inefficiency, not customer needs.\nC. Number of make or buy decisions - This pertains to supply chain management, not customer needs.\nD. Number of new products developed - This is a measure of innovation, not customer satisfaction.\n\n**Key concept:** Measuring customer needs and satisfaction."}, {"num": 19, "text": "Which of the following is NOT a fundamental principle required to be strictly adhered to by professional accountants?", "options": {"A": "Professional incompetence", "B": "Professional behavior", "C": "Confidentiality", "D": "Objectivity", "E": "Integrity"}, "answer": "A", "explanation": "**Why A is correct:** Professional incompetence is not a principle required to be strictly adhered to by professional accountants, but rather a situation that accountants should avoid. In fact, the opposite is true; professional accountants should be competent and strive for proficiency in their work. This principle emphasizes the accountants' responsibility to maintain their skills.\n\n**Why B is wrong:** B. Professional behavior is indeed one of the fundamental principles required of professional accountants, which involves acting with integrity and in accordance with relevant laws and regulations.\n\n**Why C is wrong:** C. Confidentiality is a fundamental principle required of professional accountants, which obliges them to protect the confidentiality of their clients' information.\n\n**Why D is wrong:** D. Objectivity is a fundamental principle required of professional accountants, which requires them to act with impartiality and maintain their independence in professional judgments.\n\n**Why E is wrong:** E. Integrity is a fundamental principle required of professional accountants, which involves acting with honesty and fairness in professional and business relationships.\n\n**Key concept:** The key concept being tested in this question is the Fundamental Principles of Professional Accountants, specifically ICAEW's Fundamental Principles of Professional Conduct."}, {"num": 20, "text": "Which of the following actions will NOT be in the best interest of the public?", "options": {"A": "Preventing the public from being misled by an action of an organisation", "B": "Detecting and concealing any serious misdemeanor", "C": "Exposing the misuse of public funds", "D": "Exposing corruption in government", "E": "Protecting health and public safety SECTION B                          OPEN-ENDED QUESTION                    (80 MARKS) INSTRUCTION:         YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 a. In order to survive and achieve a competitive advantage, companies may need to enter into collaboration with stakeholders. Required: Using Strategic Alliances and Joint Ventures, explain how collaboration can be used in business to achieve competitive advantage.           (10 Marks) b.      Explain briefly „Restricting Competition‟                            (5 Marks) c.      Explain briefly the concept of Cartel.                               (5 Marks) (Total 20 Marks) QUESTION 2 a.      Communication is important for organisational efficiency, but the effectiveness of a communication system depends on the effectiveness of each of its elements. With the aid of a diagram illustrate the basic elements of a communication system.                                            (6 Marks) b.      Structures in organisations could be tall or flat. i.     Explain briefly what tall and flat organisational structures are. (2 Marks) ii.   Describe briefly THREE disadvantages each of flat and tall organisational structures.                                  (12 Marks) (Total 20 Marks) QUESTION 3 a. High level of unemployment are unwelcome in any economy. Attempts have been made at one time or the order to classify unemployment to facilitate lasting solution. State and explain briefly five categories of unemployment. (10 Marks) b.      Explain briefly the implications of a fall in the value of a nation‟s currency. (4 Marks) c.      Define briefly the following business terms: i.    Fiscal policy; ii.   Monetary policy; iii.  Monopoly; iv.   Down sizing; v.    De-layering; and vi.   Outsourcing;                                                   (6 Marks) (Total 20 Marks) QUESTION 4 Scholars have come up with different approaches to management. One of them is Douglas McGregor who propounded the Theory X and theory Y approaches to managing people. a.      Explain McGregor‟s theory X and theory Y.                           (16 Marks) b.      List FOUR conditions in which theory Y are applicable.                (4 Marks) (Total 20 Marks) QUESTION 5 The following projections relate to XYZ Automobiles Nigeria Limited. Month                       Sales        Purchases       Wages     Overheads N              N             N           N November 2016              400,000        204,000        76,000     38,000 December 2016              420,000        200,000        76,000     42,000 January 2017               460,000        196,000        80,000     46,000 February 2017              500,000        200,000        84,000     48,000 March 2017                 600,000        216,000        90,000     50,000 Additional information: (i)    Cash balance on January 1, 2017 is expected to be N80,000. (ii)    A plant will be installed in November 2016 at a cost of N1,000,000 and the monthly installment of N50,000 is payable from January 2017. (iii)   A sum of N30,000 will be paid as dividends in the month of March 2017. (iv)    Company income tax of N45,000 will be due for payment in March 2017. (v)     Advance payment of N800,000 in respect of a sale of a truck will be received in March 2017. (vi)     In line with the company‟s policy, 50% of sales are on cash basis. 50% of credit sales are collected in the month immediately following the month of sales while the balance is paid a month after the payment of the first installment. (vii)    All purchases are on credit and the creditors are paid fully two months after the month of purchase. (viii) Wages and overheads are paid as and when due. Required: Prepare a cash budget for each of the THREE months ending March 31, 2017. (20 Marks) QUESTION 6 Baseline Limited plans to buy a machine costing N500 million which will last for four years and then be sold for N5 million. Additional working capital in the sum of N5million will be required as soon as the project starts. Net cashflow before tax are expected to be as follows: Period 1      Period 2     Period 3     Period 4 Net Cashflow (N millions)         244           286          374          156 Baseline Limited has a targeted Return on Capital Employed of 20%. Depreciation is charged on a straight-line basis over the life of an asset. Required: a.    What is the Accounting Rate of Return (ARR) of this machine?          (10 Marks) b.       State FIVE advantages and disadvantages each of Internal Rate of Return (IRR) as a method used in appraising capital investments.        (10 Marks) (Total 20 Marks) SUGGESTED SOLUTIONS SECTION A:    MULTIPLE-CHOICE QUESTIONS                  (20 Marks)"}, "answer": "B", "explanation": "**Why B is correct:** \nDetecting and concealing any serious misdemeanor is a contradiction, as detection implies exposing the issue rather than concealing it. Thus, concealing it after detection goes against the principle of transparency. This act hinders the public's right to know and the accountability of the organisation.\n\n**Why the other options are wrong:**\nA. - Preventing the public from being misled by an organisation's action aligns with the objective of protecting public interest.\nC. - Exposing the misuse of public funds is consistent with the public's right to accountability.\nD. - Exposing corruption in government upholds the public's trust in governance.\nE. - Protecting health and public safety is crucial for the well-being of the public.\n\n**Key concept:** Public Interest."}], "answers": {"1": "D", "2": "C", "3": "C", "4": "E", "5": "E", "6": "D", "7": "B", "8": "C", "9": "A", "10": "E", "11": "A", "12": "A", "13": "C", "14": "B", "15": "D", "16": "C", "17": "C", "18": "E", "19": "A", "20": "B"}, "examiner_report": ""}, {"session": "Nov 2017", "questions": [{"num": 1, "text": "Which of these is NOT a financial instrument traded in the money market?", "options": {"A": "Treasury Bills", "B": "Call Money", "C": "Development Stock", "D": "Stabilization Securities", "E": "Bill Finance Scheme"}, "answer": "C", "explanation": "**Why C is correct:** Development Stocks are not typically considered money market instruments, but rather debt securities issued by the government or quasi-governmental agencies to finance development projects. They may have features such as long-term maturities and higher yields, which are characteristic of capital market instruments. Therefore, they are not considered a part of the money market.\n\n**A. Incorrect - Treasury Bills are a common money market instrument, issued by governments or other entities with short-term maturities.**\n**B. Incorrect - Call Money is a type of short-term loan in the money market, used for liquidity purposes.**\n**D. Incorrect - Stabilization Securities can be considered a type of money market instrument, issued to finance government interventions in the economy.**\n**E. Incorrect - Bill Finance Scheme is a type of instrument used in the money market, involving the sale of commercial bills by banks to investors.**\n\n**Key concept:** The money market and its instruments, specifically the characteristics and features of various financial instruments."}, {"num": 2, "text": "The decision rule for the acceptance of an investment proposal using Net Present Value (NPV) method is, accept if the", "options": {"A": "NPV ≥          0", "B": "NPV >          0", "C": "NPV <          0", "D": "NPV ≤          0", "E": "NPV =          0"}, "answer": "A", "explanation": "**Why A is correct:** The decision rule for accepting an investment proposal using the Net Present Value (NPV) method is to accept the proposal if the NPV is greater than or equal to zero, indicating that the investment creates value for the business. This is because the NPV measures the difference between the present value of cash inflows and outflows, and a positive NPV shows a net benefit. Therefore, an NPV of ≥0 indicates that the investment should be accepted.\n\nB. NPV > 0 is not the correct answer because it does not consider a scenario where the NPV is exactly equal to zero.\n\nC. NPV < 0 is not correct because it implies that the investment is rejected regardless of the magnitude of the NPV.\n\nD. NPV ≤ 0 is incorrect because it does not allow for the possibility of an NPV greater than zero, which indicates a beneficial investment.\n\nE. NPV = 0 is not the correct answer because it suggests indifference to the investment decision, whereas the rule is to accept investments that create value.\n\n**Key concept:** The decision rule for the acceptance of an investment proposal using the Net Present Value (NPV) method."}, {"num": 3, "text": "", "options": {"A": "manager representing his/her organisation at events as a “public face” of the organisation is performing? Leadership role", "B": "Spokesman role", "C": "Liaison role", "D": "Figurehead role", "E": "Initiator role"}, "answer": "D", "explanation": "**Why D is correct:** A figurehead is an individual who serves only to represent their organization to the public and stakeholders by performing ceremonial and symbolic tasks, with minimal day-to-day decision-making involvement. This role is essential for maintaining the organization's public image. The individual represents the company in formal events, public functions, and other external activities.\n\n**Why the other options are wrong:**\nA. Manager representing his/her organisation at events, as a “public face” is more in alignment with a figurehead role.\nB. Spokesman role is someone who acts as a representative, but also communicates the organization's policies and views on various matters, which is more than just a figurehead's role.\nC. Liaison role is an individual who acts as a link between departments or with external parties to facilitate communication and collaboration, which may or may not involve public representation.\nE. Initiator role is often associated with an individual who takes the lead in new project development or ideas, but does not necessarily involve public representation.\n\n**Key concept:** Different types of roles played by senior management personnel, specifically the distinction between a figurehead, spokesperson, liaison, and other roles in an organization."}, {"num": 4, "text": "The management approach called “Management By Objectives (MBO)” was developed by", "options": {"A": "Elton Mayo", "B": "Fredrick Taylor", "C": "Michael Porter", "D": "Henri Fayol", "E": "Peter Drucker"}, "answer": "E", "explanation": "**Why E is correct:** Peter Drucker is credited with developing the Management By Objectives (MBO) approach, which emphasizes setting specific, measurable goals for employees.\n\n**Why A is wrong:** Elton Mayo is associated with the Hawthorne studies and human relations approach.\n**Why B is wrong:** Fredrick Taylor is a pioneer of scientific management, focusing on efficiency and standardization.\n**Why C is wrong:** Michael Porter is known for his work in strategic management, particularly in developing the Five Forces framework.\n**Why D is wrong:** Henri Fayol is considered the father of modern management, emphasizing principles and functions of management.\n**Key concept:** Management By Objectives (MBO), a management approach focusing on setting specific, measurable goals for employees."}, {"num": 5, "text": "Members of a formal work team are appointed by", "options": {"A": "Workgroups", "B": "Team leaders", "C": "Management", "D": "Labour union", "E": "President"}, "answer": "C", "explanation": "**Why C is correct:** Management is typically responsible for appointing and overseeing team members within a formal work environment. This decision is often made based on the team's objectives, skills and expertise required for the task. In a hierarchical structure, management has the authority to make appointments.\n\n**Why the other options are wrong:**\nA. Workgroups cannot appoint members as they are groups of people working together, not decision-making bodies.\nB. Team leaders may influence the appointing process, but they typically do not have the authority to appoint team members without management approval.\nD. Labour unions may be involved in negotiations and collective bargaining, but they do not have a direct role in team member appointments.\nE. The President is not directly involved in formal team appointments unless acting as management in a small company, which is not a common scenario.\n\n**Key concept:** Management and Team Structures"}, {"num": 6, "text": "The following are required to incorporate a limited liability company EXCEPT", "options": {"A": "Memorandum of Association", "B": "Articles of Association", "C": "Statement of authorised share capital", "D": "Notice of the registered office", "E": "Source of Finance"}, "answer": "E", "explanation": "**Why E is correct:** \nA statement of authorised share capital is indeed required, but a specific disclosure of the source of finance is not. This information, though helpful, is not required to incorporate a limited liability company.\n\n**Why the other options are wrong:**\nA. Memorandum of Association is required.\nB. Articles of Association is required.\nC. Statement of authorised share capital is required.\nD. Notice of the registered office is required.\n\n**Key concept:** The required documents for incorporating a limited liability company under the UK Companies Act 2006."}, {"num": 7, "text": "Which of the following is NOT recognised as a type of unemployment?", "options": {"A": "Transitional unemployment", "B": "Fictional unemployment", "C": "Structural unemployment", "D": "Economical unemployment", "E": "Regional unemployment"}, "answer": "D", "explanation": "**Why D is correct:** There is no widely recognised category of unemployment referred to as 'Economical unemployment'. This term does not appear in standard discussions on types of unemployment. \n\n**Why other options are wrong:**\nA. Transitional unemployment - a recognised type of unemployment, often referred to as frictional unemployment, which occurs when workers transition between jobs or industries.\nB. Fictional unemployment - not a standard type of unemployment in economics, but this term is sometimes used to describe individuals who claim to be unemployed but are not actively seeking work.\nC. Structural unemployment - a recognised type of unemployment that occurs when there is a mismatch between the skills of the workforce and the requirements of the labour market.\nE. Regional unemployment - sometimes referred to as spatial mismatch, this is a real issue but not classified as a type of unemployment under standard categorisations.\n\n**Key concept:** The various types of unemployment, including frictional, structural, seasonal and cyclical unemployment."}, {"num": 8, "text": "Which of the following sources of finance available to business is the most frequently used for short-term financing?", "options": {"A": "Bank borrowing", "B": "Rights issues", "C": "New share issues", "D": "Retained earnings", "E": "Trade credit"}, "answer": "E", "explanation": "**Why E is correct:** \nTrade credit, also known as accounts payable, is a commonly used and easily accessible source of short-term financing for businesses. Companies can purchase goods and services from suppliers on credit, thereby delaying payment and using the time to utilize the funds. This is an attractive option for short-term financing requirements.\n\n**Why the other options are wrong:**\nA. Bank borrowing - Bank loans can be used for both short-term and long-term financing purposes.\nB. Rights issues - Rights issues are used to raise long-term capital through the issue of new shares.\nC. New share issues - New share issues are another source of long-term financing for businesses.\nD. Retained earnings - Retained earnings are accumulated profits that can be used for long-term or long-term strategic investments.\n\n**Key concept:** Identifying the most frequently used source of short-term financing for businesses."}, {"num": 9, "text": "Which of the following is NOT a feature of Theory Z?", "options": {"A": "Long term employment", "B": "Collective decision making", "C": "Individual responsibility", "D": "Non-specialised career path", "E": "Slow promotion"}, "answer": "D", "explanation": "**Why D is correct:** \nTheory Z is a management style developed by William Ouchi, which emphasizes lifetime employment, slow promotion, and collective decision-making. It encourages employees to develop a high sense of job security and commitment to the company, allowing them to contribute fully in their roles. Non-specialized career paths are contrary to this approach.\n\n**Why the other options are wrong:**\nA. Long term employment is a key feature of Theory Z.\nB. Collective decision making is another hallmark of Theory Z.\nC. Individual responsibility is also encouraged in Theory Z.\nE. Slow promotion is a common practice in Theory Z to ensure career stability and employee commitment.\n\n**Key concept:** The Theory Z managerial approach emphasizes lifetime employment, slow promotion, and collective decision-making to foster a committed work force."}, {"num": 10, "text": "In Ashridge Leadership Model, which of the following is an equivalent of laissez-faire style?", "options": {"A": "Tells", "B": "Bells", "C": "Joins", "D": "Consults", "E": "Free"}, "answer": "C", "explanation": "**Why C is correct:** In the Ashridge Leadership Model, the 'Joins' style refers to a laissez-faire approach, where the leader gives autonomy to team members and encourages them to work independently.\n\n**Why the other options are wrong:**\nA. **Tells** is a directive style, where the leader gives instructions and expects team members to follow.\nB. **Bells** is actually an 'Achieving' style, which focuses on achieving specific outcomes.\nD. **Consults** is a participative style, where the leader seeks input from team members and involves them in decision-making.\nE. **Free** is not a specific leadership style mentioned in the Ashridge Leadership Model."}, {"num": 11, "text": "In which of the following management functions is “NOISE” a critical challenge?", "options": {"A": "Planning", "B": "Organising", "C": "Directing", "D": "Communication", "E": "Controlling"}, "answer": "D", "explanation": "**Why D is correct:** Noise is a critical challenge in communication as it can hinder the effective exchange of information between sender and receiver, often leading to misunderstandings or misinterpretation of messages.\n\n**Why A is wrong:** Planning involves making decisions about future actions and goals, and noise does not directly impact the planning process.\n\n**Why B is wrong:** Organising is concerned with allocating resources and people to achieve organisational objectives, and while effective communication is important, it is not the only challenge in this function.\n\n**Why C is wrong:** Directing involves guiding and motivating employees to work towards organisational objectives, and while communication is critical in this function, noise is not a unique challenge specifically associated with directing.\n\n**Why E is wrong:** Controlling involves monitoring and evaluating performance to ensure it meets organisational objectives, and noise is not a direct challenge in this function.\n\n**Key concept:** The impact of external environment factors, including noise, on organisational effectiveness is a key concept tested in communication management."}, {"num": 12, "text": "Which of the following is NOT the generic type of industry as suggested by Porter?", "options": {"A": "Fragmented industries", "B": "Emerging industries", "C": "Specialised industries", "D": "Mature industries", "E": "Global industries"}, "answer": "C", "explanation": "**Why C is correct:** Porter's generic types of industry include fragmented, emerging, mature, and global industries. Fragmented, emerging, and mature industries describe the stage of an industry, while global industries refer to industries where competition is not restricted geographically. \n\nA. Fragmented industries\n- Fragmented industries is a valid type of industry as per Porter.\n\nB. Emerging industries\n- Emerging industries is a valid type of industry as per Porter.\n\nD. Mature industries\n- Mature industries is a valid type of industry as per Porter.\n\nE. Global industries\n- Global industries is a valid type of industry as per Porter."}, {"num": 13, "text": "The financial structure of a firm is made up of the following components EXCEPT", "options": {"A": "Ordinary shares", "B": "Preference shares", "C": "Debentures", "D": "Undistributed profits", "E": "Dividends"}, "answer": "E", "explanation": "**Why E is correct:** Dividends are a distribution of profits to shareholders and are not a financial structure component of a firm itself. A firm's financial structure refers to the makeup of its capital, not the payment of profits. The other components listed influence or are influenced by the firm's capital.\n\n**A. Ordinary shares**: These are one of the primary components of a firm's financial structure, representing ownership in the firm and bearing some level of risk.\n\n**B. Preference shares**: Like ordinary shares, preference shares are a component of a firm's financial structure, providing a return to investors with a priority claim on dividends over ordinary shareholders.\n\n**C. Debentures**: Debentures are bonds issued by a firm that are considered a component of its financial structure, providing a specific return in exchange for capital.\n\n**D. Undistributed profits**: Undistributed profits are retained earnings and can influence a firm's financial structure by potentially being used to reissue or redeem existing capital components, or to provide additional financing.\n\n**Key concept:** The correct financial components of a firm's capital structure, also known as capital structure, which includes ordinary shares, preference shares, debentures, and undistributed profits."}, {"num": 14, "text": "The act of reporting suspicious, illegal or improper behaviour to the person in authority is known as", "options": {"A": "Professional ethics", "B": "Ethical threat", "C": "Warning", "D": "Grapevine communication", "E": "Whistleblowing"}, "answer": "E", "explanation": "**Why E is correct:** Whistleblowing refers to the act of reporting suspicious, illegal or improper behaviour to an authority, as required by professional standards and ethics. It is a crucial mechanism for maintaining organisational accountability and preventing unethical behaviour. This concept is essential in the context of business and finance.\n\n**Why the other options are wrong:**\nA. Professional ethics - Refers to a set of moral principles guiding the professional conduct of accountants, rather than the specific act of reporting suspicious behaviour.\nB. Ethical threat - Describes a situation or influence that could compromise an individual's professional ethics, not the act of reporting itself.\nC. Warning - Refers to a general alert or caution, rather than the formal reporting of suspicious behaviour.\nD. Grapevine communication - Describes informal, unofficial communication within an organisation, not the formal process of reporting suspicious behaviour.\n\n**Key concept:** This question tests the concept of whistleblowing, a key component of business and finance ethics."}, {"num": 15, "text": "The threat that a professional accountant will promote a client‟s or employer‟s position to the point that the professional accountant‟s objectivity is compromised is known as a/an", "options": {"A": "Advocacy threat", "B": "Self review threat", "C": "Self interest threat", "D": "Familiarity threat", "E": "Intimidation threat"}, "answer": "A", "explanation": "**Why A is correct:** \nThe advocacy threat arises when an auditor compromises their objectivity by promoting their client's or employer's position to such an extent that they neglect their professional responsibilities.\n\n**Why the other options are wrong:**\nB. Self-review threat refers to the auditor assessing their own work, which compromises independence.\nC. Self-interest threat occurs when the auditor's personal interests influence their professional judgment.\nD. Familiarity threat arises when the auditor develops an overly close relationship with their client, impairing their objectivity.\nE. Intimidation threat occurs when the auditor feels threatened or coerced into deviating from their professional responsibilities.\n\n**Key concept:** Independence threats in auditing."}, {"num": 16, "text": "", "options": {"A": "practice whereby workers deliberately cut down on their output is called Taylorism", "B": "Systematic soldering", "C": "Mass production", "D": "Darwinism", "E": "Output reduction"}, "answer": "B", "explanation": "**Why B is correct:** Systematic soldering is indeed the process of manufacturing through the use of standardized, interchangeable parts. This concept is a characteristic of Scientific Management.\n\n**A. practice whereby workers deliberately cut down on their output**: This is a description of sabotage, not Taylorism.\n\n**C. Mass production**: While related, mass production is not systematic soldering.\n\n**D. Darwinism**: Darwinism refers to the theory of natural selection and has no relation to the topic.\n\n**E. Output reduction**: This is the opposite of what systematic soldering aims to achieve.\n\n**Key concept:** The concept being tested is Scientific Management, a key topic in the Business and Finance foundation exam."}, {"num": 17, "text": "The principle that says that employees should have only ONE direct supervisor is known as", "options": {"A": "Authority", "B": "Unity of command", "C": "Discipline", "D": "Order", "E": "Subordination of individual interests to the general interest"}, "answer": "B", "explanation": "**Why B is correct:** Unity of command is a principle of management that states that each employee should have only one direct supervisor to whom they report. This helps to avoid confusion, overlapping authority, and conflicting instructions. It ensures that employees know who to report to and receive clear instructions.\n\n**Why A is wrong:** A is incorrect because Authority refers to the power and responsibility given to a person to take actions or make decisions.\n**Why C is wrong:** C is incorrect because Discipline refers to the rules and punishments in place to ensure employees behave in a certain way.\n**Why D is wrong:** D is incorrect because Order typically refers to a specific type of organization or ranking.\n**Why E is wrong:** E is incorrect because Subordination of individual interests to the general interest relates to the concept of putting the needs of the organization ahead of individual needs, rather than a principle of management structure.\n\n**Key concept:** The key concept tested here is Unity of Command, a principle of management structure."}, {"num": 18, "text": "Mayo concluded that lack of attention to _______ was a major weakness in earlier theories of management", "options": {"A": "Materials", "B": "Methods", "C": "Work", "D": "People", "E": "Machinery"}, "answer": "D", "explanation": "**Why D is correct:** Mayo concluded that lack of attention to people was a major weakness in earlier theories of management through his work in the Hawthorne studies, which highlighted the importance of social factors in workplace productivity.\n\n**Why the other options are wrong:**\nA. Materials - This is unrelated to Mayo's conclusion in the Hawthorne studies.\nB. Methods - While the Hawthorne studies did involve changes in working methods, this is not what Mayo identified as a major weakness in earlier theories of management.\nC. Work - This is too broad and does not accurately reflect the focus of Mayo's work.\nE. Machinery - The Hawthorne studies did not focus on the use of machinery in production.\n\n**Key concept:** The Hawthorne studies are a significant example of the human relations approach to management, which emphasizes the importance of social factors in workplace productivity."}, {"num": 19, "text": "Which of the following is a cashflow item?", "options": {"A": "Depreciation of fixed assets", "B": "Loss on disposal of fixed assets", "C": "Profit on disposal of investments", "D": "Surplus on revaluation of fixed assets", "E": "Proceeds from disposal of fixed assets"}, "answer": "E", "explanation": "**Why E is correct:** Proceeds from disposal of fixed assets represents a cash flow item as it shows actual receipt or payment of cash at the time of disposal of fixed assets. It directly relates to inflows or outflows of cash. This item is part of the cash cycle and is required for the cash flow statement.\n\n**A.** Depreciation of fixed assets is a non-cash item, as it is a charge made to profit or loss in the period, but it does not represent any cash transaction.\n**B.** Loss on disposal of fixed assets is an expense that reduces profit but represents a non-cash transaction.\n**C.** Profit on disposal of investments is a non-cash item as it represents an increase in profit but does not involve cash flows.\n**D.** Surplus on revaluation of fixed assets is a non-cash item, which arises from changes in value of fixed assets and does not involve any cash flows.\n**Key concept:** This question tests the identification of cash flow items, which relates to Statement of Cash Flows as per the FRSSE 2015."}, {"num": 20, "text": "The process of giving responsibility and authority to an individual worker, instead of relying on managers to tell their workers what to do is known as", "options": {"A": "Delegation of authority", "B": "Restructuring", "C": "Management by objective", "D": "Empowerment", "E": "Unity of command SECTION B:                    OPEN - ENDED QUESTION                      (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 a.   Companies can raise equity capital externally by issuing new shares for cash. State and explain the FOUR main methods of issuing new shares for cash. (12 Marks) b.   Explain the following terms: i.   Redeemable debts;                                               (2 Marks) ii. Secured debts;                                                   (2 Marks) iii. Committed funds; and                                            (2 Marks) iv. Straight debts.                                                  (2 Marks) (Total 20 Marks) QUESTION 2 a.   Finance lease is an option that is open to companies to acquire assets. Explain the concept of finance lease.                                        (5 Marks) b.   Explain briefly, any FIVE features of a finance lease.               (10 Marks) c.   Chakibim Limited obtained a quarry machine worth N2,500,000 under a finance lease arrangement. The company agreed to make five annual lease payments of N600,000 over the life of the lease agreement. Compute the annual interest payment made by Chakibim Limited and state where the interest payment should be recorded in the financial statement.     (5 Marks) (Total 20 Marks) QUESTION 3 a.   State FOUR differences between Accounting Rate of Return (ARR) and Internal Rate of Return (IRR).                                            (8 Marks) b.   Explain the term “convertible bonds” .                                 (4 Marks) c.   State TWO advantages of convertible bonds to: i.   Investors; and                                                    (4 Marks) ii.  The company.                                                      (4 Marks) (Total 20 Marks) QUESTION 4 a.    Management are expected to provide reasons for making investment decisions. Although most reasons presented to support investment decisions are financial, however, non-financial considerations are equally tenable. State the THREE financial reasons that might be used to make a capital investment decision.                                        (6 Marks) b.    XYZ Limited is considering investing in two mutually exclusive water processing plants. The following cashflows are considered relevant to the investment proposals. Year                                    Plant 1(N)         Plant 2(N) 0         Initial outlay              (2,000,000)        (1,850,000) 1         Net cashflows                   900,000            950,000 2         Net cashflows                   850,000            800,000 3         Net cashflows                   600,000            450,000 4         Net cashflows                   350,000            300,000 5         Net cashflows                   200,000            150,000 Assuming the company‟s cost of capital is 18%, you are required to advise management on the best choice of plant to invest in, using the NPV. (14 Marks) (Total 20 Marks) QUESTION 5 Culture is the set of dominant beliefs, attitudes, values and norms that is shared by several people. ai. Explain briefly how culture differs between informal and formal organisations. (4 Marks) ii.    Describe briefly TWO factors that shape organisational culture.         (4 Marks) b.     Johnson and Scholes suggested the cultural web approach to analysing corporate culture. Describe briefly FOUR cultural web elements. (12 Marks) (Total 20 Marks) QUESTION 6 To make decisions in a scientific manner, accountants sometimes need to apply operations research techniques. a.     List and describe briefly FOUR operations research techniques that accountants can use for effective and efficient decision-making. (16 Marks) b.    State FOUR real-world examples of areas where operations research may be applicable.                                                      (4 Marks) (Total 20 Marks) SECTION A – MULTIPLE CHOICE QUESTIONS"}, "answer": "A", "explanation": "**Why A is correct:** Delegation of authority is the process of assigning responsibility and authority to a subordinate, allowing them to take actions and make decisions without direct supervision. This concept emphasizes the distribution of authority and responsibility within an organization.\n\n**Why the other options are wrong:**\nB. Restructuring refers to the reorganization of an organization's structure, including the creation of new positions or departments, which is not directly related to the distribution of responsibility and authority.\nC. Management by objective involves setting goals and objectives for employees, providing them with the necessary resources, and monitoring their progress, but it does not directly involve giving responsibility and authority to employees.\nD. Empowerment is a broader concept that involves giving employees the freedom and encouragement to take ownership of their work, but it is not a specific process of assigning responsibility and authority.\nE. Unity of command is a principle that states that each employee should receive instructions from and report to only one supervisor, which is not relevant to the concept of delegating authority.\n\n**Key concept:** The key concept tested is Delegation of Authority, which is a key part of the management process that involves assigning responsibility and authority to subordinates."}], "answers": {"1": "C", "2": "A", "3": "D", "4": "E", "5": "C", "6": "E", "7": "D", "8": "E", "9": "D", "10": "C", "11": "D", "12": "C", "13": "E", "14": "E", "15": "A", "16": "B", "17": "B", "18": "D", "19": "E", "20": "A"}, "examiner_report": ""}, {"session": "May 2018", "questions": [{"num": 1, "text": "Which of the following is NOT a characteristic of a well stated corporate mission statement?", "options": {"A": "Ambiguity", "B": "Precision", "C": "Motivation", "D": "Clarity", "E": "Distinctiveness"}, "answer": "A", "explanation": "**Why A is correct:** \nA well-stated corporate mission statement is meant to clearly communicate the company's purpose and objectives, and ambiguity directly contradicts this requirement. A mission statement that is ambiguous would be confusing and ineffective in conveying the company's identity and goals. Ambiguity can make a mission statement unclear and difficult to understand.\n\n**Why other options are wrong:**\nB. Precision (not ambiguity) is a desirable characteristic of a well-stated corporate mission statement.\nC. Motivation is actually a goal of a well-stated corporate mission statement, as it aims to inspire employees and stakeholders.\nD. Clarity is a core characteristic of a well-stated corporate mission statement, making it easy to understand the company's purpose.\nE. Distinctiveness is a key element of a well-stated corporate mission statement, as it differentiates the company from its competitors.\n\n**Key concept:** A well-stated corporate mission statement should convey the company's purpose, objectives, and identity in a clear and concise manner."}, {"num": 2, "text": "Which of the following options is NOT a tool for developing organisational strategy?", "options": {"A": "SWOT analysis", "B": "Critical question analysis", "C": "PEST analysis", "D": "Business portfolio analysis", "E": "Profitability ratio"}, "answer": "E", "explanation": "**Why E is correct:** Profitability ratios are a tool for performance analysis, not strategy development. They help to evaluate a company's financial performance over time. This is not a tool for developing organisational strategy.\n\n**Why the other options are wrong:**\nA. SWOT analysis (Strengths, Weaknesses, Opportunities, Threats) is a widely used tool for developing organisational strategy.\nB. Critical question analysis is another method used for developing organisational strategy, particularly focusing on key questions or issues that need to be addressed.\nC. PEST analysis (Political, Economic, Social, Technological) is a tool used for developing organisational strategy, providing an environment scan to identify factors that may affect a company.\nD. Business portfolio analysis is a tool used by companies to develop their strategy, helping to identify the business units and their potential in the portfolio.\n\n**Key concept:** This question tests the concept of developing organisational strategy using various tools and techniques."}, {"num": 3, "text": "Which of the following is NOT a barrier to international business?", "options": {"A": "Tariff", "B": "Quota", "C": "Embargoes", "D": "Market Growth", "E": "Infrastructure"}, "answer": "D", "explanation": "**Why D is correct:** Market growth is not a barrier to international business. It is actually an opportunity for businesses to expand into new markets and increase revenue. Instead of hindering international trade, market growth can facilitate it.\n\n**Why the other options are wrong:**\nA. Tariff - Tariffs are a barrier to international business as they impose taxes on imported goods, making them more expensive.\nB. Quota - Quotas limit the quantity of goods that can be imported, restricting international trade.\nC. Embargoes - Embargoes completely ban the import or export of certain goods or from specific countries, posing a significant barrier to international business.\nE. Infrastructure - Poor or inadequate infrastructure can hinder the logistics of international trade, making it difficult or expensive to transport goods.\n\n**Key concept:** Barriers to international business."}, {"num": 4, "text": "Which of the following is a benefit derivable through international business?", "options": {"A": "Economies of scale", "B": "Low profit", "C": "High cost", "D": "Short supply of goods and services", "E": "Insufficient capital accumulation"}, "answer": "A", "explanation": "**Why A is correct:** Economies of scale refer to the benefits companies derive from reducing their average costs per unit as production volume increases. This is often achieved through international business by leveraging global market presence and production facilities. As a result, companies can produce goods and services at a lower cost.\n\n**Why B is wrong: D. Low profit**\nB. Low profit - International business is often associated with higher profits due to increased market share, not low profits.\n\n**Why C is wrong: C. High cost**\nC. High cost - Economies of scale derived from international business typically result in lower costs, not higher costs.\n\n**Why D is wrong: D. Short supply of goods and services**\nD. Short supply of goods and services - International business actually aims to meet global demand by expanding production and supply capacity.\n\n**Why E is wrong: E. Insufficient capital accumulation**\nE. Insufficient capital accumulation - International business can provide access to new funding sources and markets, reducing the likelihood of insufficient capital accumulation.\n\n**Key concept:** Economies of scale in the context of international business."}, {"num": 5, "text": "Which of the following is NOT a feature of an informal organisation?", "options": {"A": "It is a network of personal and social relationships", "B": "It develops from the way in which individuals meet and communicate with each other", "C": "It has been created and maintained by its leaders", "D": "It develops friendships and personal relationships", "E": "It focuses on people, not the work"}, "answer": "C", "explanation": "**Why C is correct:** Option C is incorrect because informal organisation develops spontaneously, often without any deliberate planning or direction from leaders. It is a natural and organic process that arises from interactions among individuals, contrasting with a formal organisation that is created and maintained by its leaders.\n\n**Why the other options are wrong:**\nA. It is a network of personal and social relationships - This is a key feature of an informal organisation.\nB. It develops from the way in which individuals meet and communicate with each other - This accurately describes the development process of an informal organisation.\nD. It develops friendships and personal relationships - Informal organisations are often characterised by close relationships and friendships among members.\nE. It focuses on people, not the work - Informal organisations often blur the lines between personal and professional relationships.\n\n**Key concept:** The key concept tested here is the difference between formal and informal organisations, specifically the features of informal organisations that arise from their natural and spontaneous development."}, {"num": 6, "text": "", "options": {"A": "company that needs to innovate and continually produce new services is likely to have a/n ……… function. Research and development", "B": "Procurement", "C": "Operations", "D": "Finance", "E": "Administration"}, "answer": "A", "explanation": "**Why A is correct:** The term Research and Development (R&D) function refers to the department responsible for developing new products, services, and processes within an organization, making it suitable for a company that innovates and produces new services.\n\n**Why B is wrong:** B. Procurement is the function responsible for purchasing materials, goods, and services, not innovating new products or services.\n\n**Why C is wrong:** C. Operations manage the day-to-day activities within an organization, including the production and delivery of goods and services, but are not specifically focused on innovative development.\n\n**Why D is wrong:** D. Finance is responsible for managing an organization's financial resources, including budgeting and accounting, not innovating new products or services.\n\n**Why E is wrong:** E. Administration manages the general affairs and operations of an organization, including personnel and office management, but does not typically involve new product or service development.\n\n**Key concept:** The concept of organizational structure and functions, specifically identifying the role of Research and Development within an organization."}, {"num": 7, "text": "The level of culture in which unconscious beliefs, perceptions and thoughts are taken for granted is the ……….. level.", "options": {"A": "Artefacts", "B": "Basic underlying assumptions", "C": "Inner layer", "D": "Outer skin", "E": "Espoused values"}, "answer": "B", "explanation": "**Why B is correct:** The basic underlying assumptions refer to the level of culture where unconscious beliefs, perceptions, and thoughts are taken for granted. This level is often difficult to identify and can significantly influence an individual's or organization's behavior and decision-making. It is a key component of Edgar Schein's model of organizational culture.\n\n**Why the other options are wrong:**\nA. Artefacts refers to visible and tangible manifestations of an organization's culture, such as language, symbols, and rituals, not the underlying assumptions.\nC. Inner layer is not a recognized term in the context of organizational culture.\nD. Outer skin is also not a recognized term and does not accurately describe a level of culture.\nE. Espoused values are the explicit statements of what an organization stands for, but they may not reflect the underlying assumptions that drive behavior.\n\n**Key concept:** Basic underlying assumptions are a level of an organization's culture as described in Edgar Schein's model."}, {"num": 8, "text": "Which of the following options is NOT directly related to financial management?", "options": {"A": "Sourcing for funds", "B": "Decision making", "C": "Assessment of risk", "D": "Evaluation of return", "E": "Recording data accurately and reporting business transactions"}, "answer": "E", "explanation": "**Why E is correct:** \nE is correct because recording data accurately and reporting business transactions is a key aspect of accounting, which is related to financial management but is a separate function. Financial management is more focused on planning, decision-making, and control. The accurate recording and reporting of financial data is a prerequisite for financial management decisions.\n\n**Why A is wrong:** \nA is incorrect because sourcing for funds is a fundamental financial function that involves planning and managing the financing of a business.\n\n**Why B is wrong:** \nB is incorrect because decision making is a key aspect of financial management, involving the evaluation and selection of courses of action.\n\n**Why C is wrong:** \nC is incorrect because the assessment of risk is also related to financial management, as part of the financial planning and strategy development process.\n\n**Why D is wrong:** \nD is incorrect because the evaluation of return is a key aspect of financial management, involving the appraisal of business performance in terms of profitability and other financial metrics.\n\n**Key concept:** \nThe key concept tested by this question is Financial Management Functions."}, {"num": 9, "text": "", "options": {"A": "source of financing, negotiated between a bank and a company for a duration of 4-10 years at a fixed rate of interest is called Finance lease", "B": "Term loan", "C": "Acceptance credit", "D": "Factoring of debtors", "E": "Preference share"}, "answer": "B", "explanation": "**Why B is correct:** A term loan is a type of loan that is negotiated between a bank and a company for a specific duration, typically 4-10 years, at a fixed rate of interest. This loan is usually a lump sum and is repaid in installments. It is a common source of financing for companies.\n\n**Why A is wrong:** A doesn't directly match any of the given options.\n**Why C is wrong:** Acceptance credit is a type of revolving credit facility that allows a company to draw down funds as necessary, it may not be for a fixed duration.\n**Why D is wrong:** Factoring of debtors involves selling accounts receivable to a third party, it is not a type of financing or loan.\n**Why E is wrong:** Preference shares are a type of equity instrument that pays a fixed dividend, it is not a source of financing or a type of loan.\n\n**Key concept:** Long-term financing options, specifically term loans."}, {"num": 10, "text": "Managerial functions like planning, organising, co-ordinating and communicating require …….. because they involve giving guidance and direction to employees.", "options": {"A": "Management", "B": "Foresight", "C": "Experience", "D": "Leadership", "E": "Intuition"}, "answer": "D", "explanation": "**Why D is correct:** Managerial functions involve leading employees by giving guidance and direction, which requires leadership to be effective. Leadership is about influencing, motivating and guiding others to achieve organizational goals. This is a critical skill for managers to possess.\n\n**Why the other options are wrong:**\nA. Management is too general, it's the overall process of planning, organizing, implementing and controlling business operations.\nB. Foresight refers to the ability to anticipate future events or trends, but it doesn't necessarily involve giving guidance and direction to employees.\nC. Experience is a necessary qualification for a manager, but it doesn't guarantee leadership abilities.\nE. Intuition is a gut feeling or instinct, but it's not a deliberate act of giving guidance and direction to employees.\n\n**Key concept:** This question tests the concept of Leadership in the context of Managerial Functions."}, {"num": 11, "text": "Expenditure that does not create a long-term asset is called a(n)", "options": {"A": "Capital expenditure", "B": "Investment expenditure", "C": "Revenue expenditure", "D": "Sundry expenditure", "E": "Capital budgeting expenditure"}, "answer": "C", "explanation": "**Why C is correct:** Revenue expenditure is classified as expenditure that does not create a long-term asset. This is because such expenses are typically incurred to operate or maintain the existing business and result in no future benefit beyond the relevant accounting period. They are often associated with ongoing activities and do not contribute to the company's long-term growth.\n\n**Why the other options are wrong:**\nA. Capital expenditure refers to expenditure that results in the creation of a long-term asset.\nB. Investment expenditure is a type of capital expenditure that involves investing in other businesses or assets.\nD. Sundry expenditure is an umbrella term encompassing various small, miscellaneous expenses and may or may not result in long-term assets.\nE. Capital budgeting expenditure is a type of expenditure used to determine the feasibility of investing in projects with long-term prospects.\n\n**Key concept:** Classification of Expenditure as Revenue or Capital Expenditure."}, {"num": 12, "text": "The factors that impact group cohesiveness EXCLUDE", "options": {"A": "Group success", "B": "Task cohesion", "C": "Location", "D": "Finance", "E": "Leadership style"}, "answer": "D", "explanation": "**Why D is correct:** The factor that impacts group cohesiveness refers to a psychological or interpersonal factor. Finance is not a psychological or interpersonal factor that typically impacts group cohesiveness, making it the correct answer. \n\n**Why the other options are wrong:** \nA. Group success is a factor that can impact cohesiveness, as a team's success can foster camaraderie and improve relationships among group members.\nB. Task cohesion is indeed a factor that impacts group cohesiveness, as a shared task or goal can bring team members together and build cohesion.\nC. Location can also impact group cohesiveness, as being physically close or working together in a shared space can foster connections and relationships among team members.\nE. Leadership style is an important factor that impacts group cohesiveness, as a leadership style that fosters open communication and teamwork can contribute to a cohesive team.\n\n**Key concept:** The key concept tested in this question is the factors that impact group cohesiveness, a topic related to Group Dynamics, which is part of the Behavioural and Group Dynamics section of the ICAN syllabus."}, {"num": 13, "text": "The main threats to ethical behaviour in the accountancy profession fall into the following categories EXCEPT", "options": {"A": "Professional competence threat", "B": "Intimidation threat", "C": "Self interest threat", "D": "Familiarity threat", "E": "Advocacy threat"}, "answer": "A", "explanation": "**Why A is correct:** Professional competence threat is actually a main safeguard against threats to ethical behavior, not a threat itself. It involves the maintenance of professional knowledge and skills to ensure compliance with relevant laws and regulatory requirements. \n\nC. Self interest threat: This is indeed a category of threats to ethical behavior, as it involves accountants acting in their own interests rather than in the best interests of their organization or clients.\nD. Familiarity threat: This is a category of threats to ethical behavior, as it involves accountants becoming too close to the entity or situation they are serving and losing objectivity.\nE. Advocacy threat: This is also a category of threats to ethical behavior, as it involves accountants promoting the interests of a particular client, management group, or other entity rather than remaining impartial and objective.\nB. Intimidation threat: This is a category of threats to ethical behavior, as it involves accountants being coerced or pressured into making non-ethical decisions.\n\n**Key concept:** The main threats to ethical behavior in the accountancy profession as identified by the Code of Ethics for Professional Accountants, specifically threats to compliance with relevant laws and regulations."}, {"num": 14, "text": "The code of conduct in respect of employees as a stakeholder group might include all of the following EXCEPT", "options": {"A": "Equal opportunities for all employees regardless of gender, race or religion", "B": "Refusal to tolerate harassment of employees by colleagues and managers", "C": "Respect for the privacy of confidential information about each employee", "D": "Concern for the health and safety of employees", "E": "Unfair dealing with the company‟s customers."}, "answer": "E", "explanation": "**Why E is correct:** Unfair dealing with the company's customers is not relevant to the code of conduct for employees as a stakeholder group. The focus of the code should be on the treatment and behavior of employees rather than external parties. \n\n**Why the other options are wrong:**\nA. Equal opportunities for all employees regardless of gender, race or religion is included in the code of conduct for employees.\nB. Refusal to tolerate harassment of employees by colleagues and managers is a part of the code of conduct for employees.\nC. Respect for the privacy of confidential information about each employee is a component of the code of conduct for employees.\nD. Concern for the health and safety of employees is a key aspect of the code of conduct for employees.\n\n**Key concept:** The code of conduct for employees is one of the primary components of the Stakeholder Group Management component of the Business & Finance (Foundation Level) syllabus."}, {"num": 15, "text": "Who amongst the following theorists is associated with the Human Relations School of Management?", "options": {"A": "Max Weber", "B": "Elton Mayo", "C": "Henry Mintzberg", "D": "Rosemary Stewart", "E": "Lyndall Urwick"}, "answer": "B", "explanation": "**Why B is correct:** Elton Mayo was a key figure in the Human Relations School of Management, which emphasizes the importance of employee motivation, job satisfaction, and the social and emotional aspects of work. His research in the Hawthorne studies highlighted the impact of workplace relationships and social factors on employee productivity. \n\n**Why A is wrong:** A. Max Weber is more associated with the theory of bureaucracy and the concept of organizational structure.\n**Why C is wrong:** C. Henry Mintzberg is known for his work on the five Ps of strategy and the managerial roles framework.\n**Why D is wrong:** D. Rosemary Stewart is a management theorist and psychologist, but not specifically associated with the Human Relations School.\n**Why E is wrong:** E. Lyndall Urwick was a management theorist and consultant, but more closely associated with the Scientific Management School.\n\n**Key concept:** The Human Relations School of Management."}, {"num": 16, "text": "", "options": {"A": "written communication of factual information on a specific subject presented in an orderly and formal manner is called a(n) Operating report", "B": "Business plan", "C": "Feasibility study", "D": "Business report", "E": "Business proposal"}, "answer": "D", "explanation": "**Why D is correct:** A business report is a written communication of factual information on a specific subject presented in an orderly and formal manner.\n\n**Why the other options are wrong:**\nA. written communication of factual information does not specifically relate to the definition of an offer or a tender, more of a general statement of a business document.\nB. A business plan outlines an organization's short- and long-term goals, strategies, and methods to achieve those objectives.\nC. A feasibility study is an analysis of the practicality of a proposed project or plan.\nE. A business proposal is a written document that offers products or services to meet a customer's or client's specific needs."}, {"num": 17, "text": "", "options": {"A": "club culture or spider‟s web culture is also known as Personal culture", "B": "Existential culture", "C": "Task culture", "D": "Role culture", "E": "Power culture"}, "answer": "E", "explanation": "**Why E is correct:** In the context of organizational culture, power culture refers to a structure where one person holds all the power and decision-making authority. In this culture, the culture is driven by a powerful individual with strong control over all aspects of the organization. This type of culture is often seen as a spider's web where the leader dictates the path.\n\n**Why the other options are wrong:**\nA. Club culture is not a term used to describe a specific type of organizational culture.\nB. Existential culture is a humanistic theory and has nothing directly to do with organizational structure.\nC. Task culture focuses on getting the job done and emphasizes teamwork, but it is not a type of culture driven by one person.\nD. Role culture emphasizes the structure and hierarchy of an organization, where people have well-defined roles and responsibilities.\n\n**Key concept:** Organizational culture - power culture, and specifically the description of the spider's web (power culture) in the context of ICAN exam."}, {"num": 18, "text": "The process of using the right words in the right order to achieve the objective of a message is called", "options": {"A": "Communication Style", "B": "Communication Skills", "C": "Communication Personality", "D": "Communication Structure", "E": "Communication Creativity"}, "answer": "A", "explanation": "**Why A is correct:** Communication style refers to the manner in which messages are conveyed to achieve the intended objective. This involves choosing the right words in the right order, tone, and language to
