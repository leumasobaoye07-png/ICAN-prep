"Social cognition", "C": "Leadership", "D": "Bullying", "E": "Health"}, "answer": "B", "explanation": "**Why B is correct:** Social cognition is a broader psychological concept that encompasses various processes such as perception, attention, memory, and social perception, which are not specifically explained by emotional intelligence. Emotional intelligence is a subset of social cognition but not all aspects of social cognition can be attributed to emotional intelligence. It has a separate theoretical framework and measures.\n\n**Why the other options are wrong:**\nA. Job performance - Job performance is indeed influenced by emotional intelligence as it affects an individual's ability to effectively interact with colleagues, manage stress, and build strong working relationships.\nC. Leadership - Emotional intelligence plays a crucial role in effective leadership, as leaders with high emotional intelligence tend to possess better communication and interpersonal skills, which are essential for achieving organizational success.\nD. Bullying - Bullying can be linked to individuals with low emotional intelligence, as they may struggle with empathy and social skills, leading them to engage in such behaviors.\nE. Health - Research has shown that emotional intelligence is positively correlated with mental and physical well-being, indicating that emotional intelligence can have a significant impact on health.\n\n**Key concept:** The question tests understanding of the relationship between emotional intelligence and various psychological and behavioral outcomes."}, {"num": 7, "text": "Which of the following is an advantage of electronic communication?", "options": {"A": "Over-dependence on technology", "B": "Rapid changes in technology", "C": "Information overload", "D": "Cost of development", "E": "Online real time"}, "answer": "E", "explanation": "**Why E is correct:** Electronic communication enables communication in real-time, facilitating efficient and instantaneous exchange of information across geographical distances. This is especially advantageous for businesses that require fast decision-making. The real-time aspect of electronic communication reduces wait times and improves communication speed.\n\n**Why A is wrong:** A over-dependence on technology is actually a disadvantage of electronic communication, as it may lead to technical glitches and data loss.\n\n**Why B is wrong:** B rapid changes in technology is not an advantage of electronic communication, but rather poses challenges for businesses trying to keep up with the latest technological advancements.\n\n**Why C is wrong:** C information overload is a common issue with electronic communication, but it is considered a disadvantage rather than an advantage.\n\n**Why D is wrong:** D cost of development is a potential risk of implementing electronic communication systems, but it is not an advantage of the technology itself.\n\n**Key concept:** The specific topic tested here is the advantages and disadvantages of electronic communication, a key concept in the Business & Finance (Foundation Level) exam."}, {"num": 8, "text": "", "options": {"A": "collection of Web pages is called Web addresses", "B": "Web browser", "C": "Web hosting", "D": "Hyperlinks", "E": "Websites"}, "answer": "E", "explanation": "**Why E is correct:** \nA collection of related web pages is indeed referred to as a website, which is a fundamental concept in computer science and business operations.\n\n**Why the other options are wrong:**\nA. collection of Web pages is called Web addresses - This is incorrect as a web address is a URL or a link to a specific web page, not a collection of pages.\nB. Web browser - This is incorrect as a web browser is used to access and view websites, but it is not the collection of web pages itself.\nC. Web hosting - This is incorrect as web hosting refers to the service provided to host a website, but it is not the collection of web pages.\nD. Hyperlinks - This is incorrect as hyperlinks are the links between web pages, but they are not the collection of web pages themselves.\n**Key concept:** Understanding of the basic structure and terminology of the internet, specifically the definition and purpose of a website."}, {"num": 9, "text": "When the basis for making an investment decision is for the reason of the time it will take to recover the cash invested in the project, which of the following investment appraisal techniques will be considered the most appropriate?", "options": {"A": "Accounting rate of return", "B": "Internal rate of return", "C": "Net present value", "D": "Profitability index", "E": "Payback period"}, "answer": "E", "explanation": "**Why E is correct:** \nThe payback period method is the most appropriate when the basis for making an investment decision is for the reason of the time it will take to recover the cash invested in the project. This method calculates the time it will take for the initial investment to be repaid. It does not consider the return or profitability of the project, only the time required to recover the initial investment.\n\n**Why the other options are wrong:**\nA. Accounting rate of return is used to evaluate the profitability of an investment but does not consider the time it takes to recover the investment.\nB. Internal rate of return is a method used to evaluate investments based on their rate of return but does not specifically focus on the time to recover the initial investment.\nC. Net present value evaluates an investment based on its present value, but it also doesn't specifically focus on the time to recover the initial investment.\nD. Profitability index evaluates the relationship between the net present value and the initial investment but does not directly calculate the time to recover the investment.\nE. (Note: this option is actually correct, so there is no need to write anything here)\n\n**Key concept:** Time value of money is crucial in determining the most suitable investment appraisal technique, often requiring consideration of present values, rates of return, or payback periods."}, {"num": 10, "text": "Which of the following is NOT a feature of payback period method", "options": {"A": "It can be used to eliminate projects that will take too long to pay back", "B": "Often used by companies that have liquidity problems", "C": "Ignores the total cash returns from the project", "D": "Analyses accounting profits", "E": "Simple to calculate"}, "answer": "D", "explanation": "**Why D is correct:** The payback period method does not focus on accounting profits, making it inappropriate for investment decisions involving projects with large initial cash outflows but eventually generating significant accounting profits.\n\n**Why the other options are wrong:**\nA. It can indeed be used to eliminate projects that will take too long to pay back.\nB. Many companies with liquidity problems use the payback period method as it is straightforward and easy to understand.\nC. The payback period method does not entirely ignore the total cash returns from the project, as it considers cash inflows.\nE. It is indeed simple to calculate as the formula only involves dividing the net cash outflow by the average cash inflow per period.\n\n**Key concept:** The payback period method is a technique for estimating the time it takes for the initial cash outlay on a project to be repaid."}, {"num": 11, "text": "Laniya planned to deposit N1,000 annually in her savings account for a period of 6 years. The annual interest rate is 8 percent. What will be the sum of money in her account at the end of the period?", "options": {"A": "N7,036", "B": "N7,136", "C": "N7,236", "D": "N7,336", "E": "N7,436"}, "answer": "D", "explanation": "**Why D is correct:** This is an example of a compound interest problem with an annuity, specifically a future value problem where future payments are made at the end of each year. We can use the formula for the future value of an annuity to solve this problem.\n\n**Why A is wrong:** Option A incorrectly assumes the compounding frequency and interest rate to be too low to produce the correct answer.\n**Why B is wrong:** Option B also incorrectly assumes the interest rate would not be able to produce the given future value with the given number of payments.\n**Why C is wrong:** Option C is incorrect as the annual interest rate is not high enough to cause the future value to be more than what is given in option D.\n**Why E is wrong:** Option E incorrectly assumes the compounding effects would increase the future value to an unrealistic amount.\n**Key concept:** Compounding interest with annuities (FV of an Annuity formula)."}, {"num": 12, "text": "From the point of view of investors, which of the following features of convertibles is FALSE?", "options": {"A": "Investors are expected to accept a lower interest rate in return for the option to convert the bonds into equities in the future", "B": "Investors receive no annual income up to the conversion date", "C": "Convertibles combine some fixed annual income and the opportunity to benefit from a rising share price", "D": "Investors hope to make an immediate capital gain on conversion", "E": "Investors will benefit from a rise in the company‟s share price"}, "answer": "B", "explanation": "**Why B is correct:** Investors typically receive fixed annual interest payments, similar to those on traditional bonds, in addition to the opportunity to convert the convertible bond into equities at a later date. This means that they do receive annual income and the statement in option B is therefore false. Therefore, the correct answer is B.\n\n**Why the other options are wrong:**\nA. This is a correct feature of convertibles and reflects the potential trade-off between the lower interest rate and the upside potential from conversion.\nC. This accurately describes the combination of fixed income and the potential to benefit from a rising share price when converting the bond.\nD. This statement is true, as investors may be able to make an immediate capital gain if the share price has appreciated significantly at the time of conversion.\nE. This is a key benefit of convertibles for investors, as they can benefit from a rise in the company's share price if they choose to convert their bond.\n\n**Key concept:** The key concept tested in this question is the features and benefits of convertible notes for investors, specifically the trade-offs between fixed income and the potential for capital appreciation."}, {"num": 13, "text": "The threat that a professional accountant will promote a client‟s or employer‟s position to the point that the professional accountant‟s objectivity is compromised is known as a/an", "options": {"A": "Advocacy threat", "B": "Self review threat", "C": "Self interest threat", "D": "Familiarity threat", "E": "Intimidation threat"}, "answer": "A", "explanation": "**Why A is correct:** \nAn Advocacy threat arises when a professional accountant takes on a role that advocates for a client's or employer's position, potentially compromising their objectivity. This can manifest as strongly promoting a particular point of view. The threat of Advocacy can lead to the accountant's impartiality being compromised.\n\n**Why the other options are wrong:**\nA. Advocacy threat: \n- B. Self review threat: This threat occurs when a professional accountant performs a review of their own work, which has nothing to do with promoting a client's position.\nC. Self interest threat: This threat occurs when a professional accountant's personal interests conflict with their professional judgment, but does not involve promoting a client's position.\nD. Familiarity threat: This threat occurs when a professional accountant has a close relationship with someone they are auditing, which can impair their judgment, but does not involve promoting a client's position.\nE. Intimidation threat: This threat occurs when external pressures or intimidation forces a professional accountant to compromise their objectivity, which is different from strongly promoting a client's position.\n\n**Key concept:** The key concept here is threats to professional scepticism and objectivity."}, {"num": 14, "text": "Which of the following is specifically designed to govern organisations that enjoy incentives like shared profits or benefits apart from the fact that such is jointly owned and administered by its members?", "options": {"A": "Agricultural Credit Guarantee Scheme Fund (Amendment) Act, 2019", "B": "The National Office of Technology Acquisition and Promotion Act", "C": "The Nigerian Co-operative Societies Act", "D": "The Nigeria Data Protection Regulation", "E": "The Correctional Service Act"}, "answer": "C", "explanation": "**Why C is correct:** The Nigerian Co-operative Societies Act specifically governs organisations that enjoy incentives like shared profits or benefits, as well as shared ownership and administration by its members. This act provides a legal framework for co-operatives, which are organisations owned and controlled by their members. Co-operatives often share profits and benefits in accordance with their members' contributions or ownership stakes.\n\n**Why the other options are wrong:**\n\nA. Agricultural Credit Guarantee Scheme Fund (Amendment) Act, 2019 - This act is designed to provide credit guarantee facilities to farmers and agricultural businesses, not to govern organisations with shared profits or benefits.\nB. The National Office of Technology Acquisition and Promotion Act - This act focuses on promoting the acquisition and transfer of technology in Nigeria, not governing co-operative societies or organisations with shared incentives.\nC. The Nigeria Data Protection Regulation - This regulation governs the collection and use of personal data in Nigeria, not co-operative societies or organisations with shared ownership or administration.\nE. The Correctional Service Act - This act is related to the management and administration of correctional facilities in Nigeria, not co-operative societies or organisations with shared incentives.\n\n**Key concept:** The key concept tested in this question is the Nigerian Co-operative Societies Act and its application to organisations with shared profits or benefits, demonstrating knowledge of co-operative societies and applicable laws."}, {"num": 15, "text": "Which of the following presents a summarised description of the historical financial performance of the organisation, its achievements and problems experienced during the period under review?", "options": {"A": "Chairman‟s performance report", "B": "Chairman‟s appraisal report", "C": "Chairman‟s progress report", "D": "Chairman‟s annual report", "E": "Chairman‟s project report"}, "answer": "D", "explanation": "**Why D is correct:** The Chairman's annual report provides a comprehensive overview of the organisation's historical financial performance, achievements, and problems experienced during the period under review. This report is typically presented to the stakeholders, such as shareholders and the board of directors. It usually includes an analysis of the financial statements, along with the organisation's overall performance and challenges.\n\n**Why the other options are wrong:**\nA. Chairman's performance report - This is usually focused on the performance of the chairman themselves, rather than the organisation as a whole.\nB. Chairman's appraisal report - This would typically evaluate the performance of the chairman, not the organisation.\nC. Chairman's progress report - This would provide an update on current progress, rather than a historical overview.\nE. Chairman's project report - This would focus on a specific project, rather than the organisation's overall financial performance.\n\n**Key concept:** Historical financial performance of an organisation, its achievements and problems experienced during a period under review."}, {"num": 16, "text": "Performance can be measured and evaluated in relation to the key performance objectives. Which of the following is NOT a performance measure of quality?", "options": {"A": "Average time between receiving an order and completing the work", "B": "Average number of defects per unit produced", "C": "Percentage of items rejected or scrapped", "D": "Number or cost of warranty claims", "E": "Number of customer complaints"}, "answer": "A", "explanation": "**Why A is correct:** Average time between receiving an order and completing the work (lead time) is a performance measure of efficiency, not quality. It reflects how long it takes to complete a project or task, rather than the quality of the outcome. This is a non-quality performance measure.\n\n**Why B is wrong:** B is incorrect because the average number of defects per unit produced (defect rate) is a key performance measure of quality, indicating the extent to which a process meets customer specifications.\n**Why C is wrong:** C is incorrect because the percentage of items rejected or scrapped (scrap rate) is a performance measure of quality, as it reflects the inefficiency of a process in producing defect-free products.\n**Why D is wrong:** D is incorrect because the number or cost of warranty claims is a performance measure of quality, indicating the likelihood of products having defects or malfunctioning after delivery.\n**Why E is wrong:** E is incorrect because the number of customer complaints is a performance measure of quality, reflecting customer dissatisfaction with products or services.\n\n**Key concept:** The key concept tested here is Performance Metrics of Organisations, specifically identifying quality performance measures."}, {"num": 17, "text": "Which of the following features is TRUE of a finance lease?", "options": {"A": "The leased asset is reported in the statement of financial position of the lessor as a non-current asset", "B": "The lessor is responsible for insurance, running and maintenance costs for the asset", "C": "The purchase cost of the leased asset is paid by the lessor", "D": "The lessee can claim the tax depreciation allowances", "E": "The lessee is the legal owner of the asset"}, "answer": "C", "explanation": "**Why C is correct:** A finance lease (also known as a capital lease) is a form of lease where the lessor essentially finances the acquisition of the leased asset and the lessee gains significant control over the asset, indicating the lessor has paid the purchase cost. This aligns with option C. The lessor bears the risks associated with the asset, which are similar to those associated with ownership.\n\n**Why the other options are wrong:**\nA. This is incorrect because a finance lease is reported in the statement of financial position of the lessor as a non-current liability, not a non-current asset.\nB. This is incorrect as the lessee is typically responsible for maintenance and other running costs rather than the lessor.\nD. This is incorrect as under a finance lease, the lessee typically recognises the asset as an asset and claims the tax depreciation allowances, not the lessor.\nE. This is incorrect as the lessor retains the legal ownership of the asset in a finance lease, not the lessee.\n\n**Key concept:** The key concept tested here is the key features of a finance lease, a type of lease recognised under IFRS."}, {"num": 18, "text": "Which of the following features of the net present value method of investment appraisal is NOT CORRECT?", "options": {"A": "Decision rule is not consistent with the objective of maximising shareholders‟ wealth", "B": "Uncertainty about what the appropriate cost of capital or discount rate should be", "C": "The time value of money is a concept that is used", "D": "It takes account of the timing of the cash flows", "E": "It evaluates all cash flows from the project"}, "answer": "A", "explanation": "**Why A is correct:** \nThe net present value (NPV) method uses the weighted average cost of capital (WACC) as the discount rate, which maximises shareholders' wealth as it reflects their required rate of return. Therefore, using WACC as a discount rate is consistent with the objective of maximising shareholders' wealth. This makes option A, \"Decision rule is not consistent with the objective of maximising shareholders' wealth\", incorrect.\n\n**Why B is wrong:** B is not correct because the appropriate discount rate can often be estimated with sufficient accuracy, especially for long-term cash flows.\n\n**Why C is wrong:** C is not correct as it's a fundamental concept of NPV that considers the time value of money.\n\n**Why D is wrong:** D is not correct because the NPV method does consider the timing of the cash flows as it calculates present values of future cash flows.\n\n**Why E is wrong:** E is not correct as all cash flows from the project, both inflows (revenue) and outflows (costs), are taken into account when calculating the NPV.\n\n**Key concept:** The key concept tested here is the decision rule for the net present value (NPV) method of investment appraisal."}, {"num": 19, "text": "From the point of view of companies, which of the following features of convertibles is FALSE?", "options": {"A": "Whenever there is a strong demand for convertibles, companies can respond to investors‟ demand by issuing convertibles in order to raise new capital", "B": "Convertibles combine some fixed annual income and the opportunity to benefit from a rising share price", "C": "The interest rate on convertibles is lower than the interest rate on similar straight bonds", "D": "The company can issue bonds now and receive tax relief on the interest charges", "E": "The company hopes to convert the debt capital into equity in the future"}, "answer": "B", "explanation": "**Why B is correct:** Convertibles combine some fixed income and the opportunity to benefit from a rising share price but not both. Convertibles provide a fixed annual income equivalent to a bond and the option to convert into equity. However, they do not provide both benefits simultaneously.\n\n**A.** A is correct because companies can respond to investors' demand by issuing convertibles.\n**C.** C is correct because the interest rate on convertibles is typically lower than the interest rate on similar straight bonds.\n**D.** D is correct because companies can issue convertible bonds now and receive tax relief on the interest charges, as long as the convertible bond is treated as an equity instrument from a tax perspective.\n**E.** E is correct because issuing convertible bonds allows the firm to convert debt capital into equity in the future at the option of the investor or the company.\n\n**Key concept:** The key concept tested in this question is the characteristics of convertibles as a type of hybrid security."}, {"num": 20, "text": "Which of the following features of a finance lease is FALSE?", "options": {"A": "For financial reporting purposes, lease finance is actually reported in the statement of financial position as a debt obligation", "B": "For tax purposes, the lessee can claim the full amount of each lease payment as an allowable expense", "C": "For financial reporting purposes, the principle of „substance over form‟ applies", "D": "For practical purposes, the lessee treats the asset as if it is the owner", "E": "In law, the lessee is the owner of the asset SECTION B:         OPEN-ENDED QUESTIONS                           (80 MARKS) INSTRUCTION:       YOU ARE REQUIRED TO ATTEMPT FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 a.    Describe the term „group cohesion‟                             (2½ Marks) b.    Briefly explain FIVE characteristics of an effective team      (7½ Marks) c.    Briefly explain the following concepts: i.     Formal organisation ii.    Organisation structure iii.   Flat organisation iv.    Outsourcing v.     Shared services (10 Marks) (Total 20 Marks) QUESTION 2 a.    A financial objective can be expressed in a number of different ways and <nav class="nav">
  <div class="nav-brand">
    ICAN <em>Prep</em>
    <span>Business &amp; Finance · Foundation Level</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('home')">Home</button>
    <button class="nav-tab" onclick="showSection('exam')">Exam Simulator</button>
    <button class="nav-tab" onclick="showSection('dashboard')">My Progress</button>
  </div>
</nav>

<main>
  <!-- HOME -->
  <div id="section-home" class="section active">
    <div class="hero">
      <h1>Master ICAN <em>Business &amp; Finance</em></h1>
      <p>10 years of past questions. Auto-marked. Explained. Built for serious candidates.</p>
      <div class="stats-row" id="stats-row"></div>
    </div>

    <div class="card">
      <div class="card-title">Select Exam Session <span>— then choose your mode</span></div>
      <div class="session-grid" id="session-grid"></div>
    </div>

    <div class="card" id="start-card" style="display:none">
      <div class="card-title" id="selected-session-title"></div>
      <div class="mode-row">
        <button class="mode-btn primary" onclick="startExam('timed')">⏱ Timed Exam (36 min)</button>
        <button class="mode-btn" onclick="startExam('practice')">📖 Practice Mode (no timer)</button>
        <button class="mode-btn" onclick="startExam('review')">🔁 Quick Review (5 random)</button>
      </div>
    </div>
  </div>

  <!-- EXAM -->
  <div id="section-exam" class="section">
    <div id="exam-container"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="section-dashboard" class="section">
    <div class="hero" style="padding:32px 0 20px">
      <h1 style="font-size:1.8rem">My <em>Progress</em></h1>
    </div>
    <div id="dashboard-content"></div>
  </div>
</main>

<script>
// Load exam data
const EXAM_DATA = JSON.parse(document.getElementById('exam-data').textContent);

// RECONCILE: Override q.answer with session answers block (answers block = marking scheme)
// q.answer was set by PDF parser and may be wrong; the answers{} block is the authority
EXAM_DATA.forEach(session => {
  if (session.answers && Object.keys(session.answers).length > 0) {
    session.questions.forEach(q => {
      const key = String(q.num);
      if (session.answers[key]) {
        q.answer = session.answers[key];
      }
    });
  }
});

// State
let state = {
  selectedSession: null,
  currentExam: null,
  answers: {},
  startTime: null,
  timerInterval: null,
  examMode: null,
  results: null
};

// Storage key
const STORAGE_KEY = 'ican_prep_history';

function getHistory() {
  try {
    const h = localStorage.getItem(STORAGE_KEY);
    return h ? JSON.parse(h) : [];
  } catch { return []; }
}

function saveResult(result) {
  try {
    const h = getHistory();
    h.unshift(result);
    if (h.length > 50) h.pop();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
  } catch {}
}

// --- UI ---
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    t.classList.toggle('active', ['home','exam','dashboard'][i] === name);
  });
  if (name === 'dashboard') renderDashboard();
  if (name === 'home') renderHome();
}

// --- HOME ---
function renderHome() {
  // Stats
  const totalQ = EXAM_DATA.reduce((a, s) => a + s.questions.length, 0);
  const withAns = EXAM_DATA.reduce((a, s) => a + s.questions.filter(q => q.answer).length, 0);
  const history = getHistory();
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="num">${EXAM_DATA.length}</div><div class="lbl">Exam Sessions</div></div>
    <div class="stat-card"><div class="num">${totalQ}</div><div class="lbl">Questions</div></div>
    <div class="stat-card"><div class="num">${withAns}</div><div class="lbl">With Answers</div></div>
    <div class="stat-card"><div class="num">${history.length}</div><div class="lbl">Attempts</div></div>
  `;

  // Session grid
  const history_sessions = {};
  history.forEach(r => {
    if (!history_sessions[r.session] || history_sessions[r.session] < r.pct) {
      history_sessions[r.session] = r.pct;
    }
  });

  document.getElementById('session-grid').innerHTML = EXAM_DATA.map(s => {
    const best = history_sessions[s.session];
    const badge = best !== undefined
      ? `<div class="s-badge">${best}% best</div>` : '';
    return `<button class="session-btn" onclick="selectSession('${s.session}')" id="sbtn-${s.session.replace(/[^a-z0-9]/gi,'_')}">
      <div class="s-year">${s.session}</div>
      <div class="s-sub">${s.questions.length} questions</div>
      ${badge}
    </button>`;
  }).join('');
}

function selectSession(session) {
  state.selectedSession = session;
  document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
  const id = 'sbtn-' + session.replace(/[^a-z0-9]/gi,'_');
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('active');

  const card = document.getElementById('start-card');
  card.style.display = 'block';
  document.getElementById('selected-session-title').textContent = session + ' Exam — Choose Mode';
  card.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// --- EXAM ---
function startExam(mode) {
  const session = EXAM_DATA.find(s => s.session === state.selectedSession);
  if (!session) return;

  let questions = session.questions.filter(q => q.answer);
  if (mode === 'review') {
    questions = shuffle(questions).slice(0, 5);
  }

  state.currentExam = { session: session.session, questions, examinerReport: session.examiner_report };
  state.answers = {};
  state.startTime = Date.now();
  state.examMode = mode;
  state.currentQ = 0;
  state.revealed = {};

  showSection('exam');
  renderQuestion(0);

  if (mode === 'timed') startTimer(36 * 60);
}

let timerEl = null;
let timeLeft = 0;

function startTimer(seconds) {
  timeLeft = seconds;
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    timeLeft--;
    if (timerEl) {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
      timerEl.className = 'timer-display' + (timeLeft < 300 ? ' warning' : '');
      const fill = document.getElementById('timer-progress-fill');
      if (fill) fill.style.width = (timeLeft / (36*60) * 100) + '%';
    }
    if (timeLeft <= 0) {
      clearInterval(state.timerInterval);
      submitExam();
    }
  }, 1000);
}

function renderQuestion(idx) {
  state.currentQ = idx;
  const qs = state.currentExam.questions;
  const q = qs[idx];
  const total = qs.length;
  const answered = Object.keys(state.answers).length;
  const revealed = state.revealed && state.revealed[idx];

  let timerHTML = '';
  if (state.examMode === 'timed') {
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    timerHTML = `
      <div class="timer-bar">
        <div>Q ${answered}/${total} answered</div>
        <div class="progress-track"><div class="progress-fill" id="timer-progress-fill" style="width:${timeLeft/(36*60)*100}%"></div></div>
        <div class="timer-display" id="timer-display">${m}:${s.toString().padStart(2,'0')}</div>
      </div>`;
  }

  const optLetters = Object.keys(q.options);
  const userAns = state.answers[idx];
  const isRevealed = revealed || state.examMode === 'practice';

  const optionsHTML = optLetters.map(letter => {
    let cls = 'option';
    if (userAns === letter) cls += ' selected';
    if (isRevealed && userAns) {
      if (letter === q.answer) cls += ' correct';
      else if (letter === userAns && userAns !== q.answer) cls += ' wrong';
    }
    if (isRevealed && userAns) cls += ' locked';

    return `<div class="${cls}" onclick="selectAnswer(${idx},'${letter}')">
      <div class="option-letter">${letter}</div>
      <div class="option-text">${q.options[letter]}</div>
    </div>`;
  }).join('');

  let explanationHTML = '';
  if (isRevealed && userAns) {
    const isCorrect = userAns === q.answer;
    const flagKey = `flag_${state.currentExam.session}_${q.num}`;
    const isFlagged = localStorage.getItem(flagKey) === '1';
    const statusText = isCorrect
      ? `<span style="color:var(--accent2)">✓ Correct! — <strong>${q.answer}</strong>: ${q.options[q.answer]}</span>`
      : `<span style="color:var(--danger)">✗ Wrong — correct answer is <strong>${q.answer}</strong>: ${q.options[q.answer]}</span>`;

    explanationHTML = `
      <div class="explanation" id="explanation-box">
        <div class="exp-header">
          <span class="exp-title">${statusText}</span>
          <div style="display:flex;gap:8px;flex-shrink:0">
            <button class="ai-btn" id="flag-btn-${idx}" onclick="toggleFlag('${flagKey}',${idx})"
              style="${isFlagged ? 'color:#f59e0b;border-color:#f59e0b' : ''}"
              title="Flag if you believe the marked answer is wrong">${isFlagged ? '🚩 Flagged' : '⚑ Flag'}</button>
            <button class="ai-btn" id="ai-explain-btn" onclick="getAIExplanation(${idx})">✨ AI Explain</button>
          </div>
        </div>
        ${isFlagged ? `<div style="font-size:0.82rem;color:var(--accent);margin-top:6px;padding:6px 8px;background:rgba(245,158,11,0.08);border-radius:6px">⚠ You flagged this answer as potentially incorrect. Use AI Explain to verify the correct answer.</div>` : ''}
        <div class="ai-response hidden" id="ai-response-${idx}"></div>
      </div>`;
  }

  let navHTML = '';
  if (state.examMode === 'practice' && !userAns) {
    navHTML = '';
  } else if (isRevealed && userAns) {
    const hasPrev = idx > 0;
    const hasNext = idx < total - 1;
    navHTML = `<div class="q-nav">
      <button class="mode-btn" onclick="renderQuestion(${idx-1})" ${!hasPrev?'disabled':''}>← Prev</button>
      <div class="spacer"></div>
      ${hasNext
        ? `<button class="mode-btn primary" onclick="renderQuestion(${idx+1})">Next →</button>`
        : `<button class="mode-btn primary" onclick="submitExam()">Submit Exam</button>`
      }
    </div>`;
  }

  document.getElementById('exam-container').innerHTML = `
    ${timerHTML}
    <div class="card">
      <div class="q-header">
        <span class="q-counter">Question ${idx+1} of ${total}</span>
        <span class="q-session-tag">${state.currentExam.session}</span>
      </div>
      <div class="q-text">${q.text || '(See options below)'}</div>
      <div class="options" id="options-container">${optionsHTML}</div>
      ${explanationHTML}
      ${navHTML}
    </div>`;

  timerEl = document.getElementById('timer-display');
}

function selectAnswer(qIdx, letter) {
  if (state.answers[qIdx]) return; // already answered
  state.answers[qIdx] = letter;

  if (!state.revealed) state.revealed = {};
  state.revealed[qIdx] = true;

  renderQuestion(qIdx);
}

function toggleFlag(flagKey, idx) {
  const current = localStorage.getItem(flagKey) === '1';
  if (current) {
    localStorage.removeItem(flagKey);
  } else {
    localStorage.setItem(flagKey, '1');
  }
  // Re-render to reflect flag state
  renderQuestion(idx);
}

function getAIExplanation(qIdx) {
  var btn = document.getElementById('ai-explain-btn');
  var responseEl = document.getElementById('ai-response-' + qIdx);
  if (!btn || !responseEl) return;
  var q = state.currentExam.questions[qIdx];
  responseEl.className = 'ai-response';
  if (!q.explanation) {
    responseEl.innerHTML = '<em style="color:var(--muted)">No explanation for this question.</em>';
    return;
  }
  var fmt = q.explanation
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  responseEl.innerHTML = '<p>' + fmt + '</p>';
  if (btn) { btn.textContent = '\u2713 Shown'; btn.disabled = true; }
}

function submitExam() {
  if (state.timerInterval) clearInterval(state.timerInterval);

  const qs = state.currentExam.questions;
  let correct = 0;
  qs.forEach((q, i) => {
    if (state.answers[i] && state.answers[i] === q.answer) correct++;
  });

  const pct = Math.round((correct / qs.length) * 100);
  const timeTaken = Math.round((Date.now() - state.startTime) / 1000);

  const result = {
    session: state.currentExam.session,
    mode: state.examMode,
    correct,
    total: qs.length,
    pct,
    timeTaken,
    date: new Date().toISOString(),
    answers: { ...state.answers }
  };

  saveResult(result);
  state.results = result;

  renderResults(result);
}

function renderResults(result) {
  const qs = state.currentExam.questions;
  const pct = result.pct;
  const grade = pct >= 50 ? 'PASS' : 'FAIL';
  const gradeClass = pct >= 50 ? 'tag-green' : 'tag-red';

  const circumference = 2 * Math.PI * 54;
  const offset = circumference - (pct / 100) * circumference;

  const breakdownHTML = qs.map((q, i) => {
    const userAns = result.answers[i];
    const isCorrect = userAns === q.answer;
    const qText = (q.text || 'Question ' + (i+1)).substring(0, 80);
    return `<div class="result-item ${isCorrect ? 'correct-item' : 'wrong-item'}" onclick="reviewQuestion(${i})">
      <div class="ri-num">Q${i+1}</div>
      <div>
        <div class="ri-text">${qText}${qText.length >= 80 ? '...' : ''}</div>
        <div class="ri-answers">
          ${!userAns ? '<span style="color:var(--muted)">Not answered</span>' : `
          <span class="ri-yours">You: ${userAns}</span>
          ${!isCorrect ? `<span class="ri-correct">Correct: ${q.answer}</span>` : ''}
          `}
        </div>
      </div>
    </div>`;
  }).join('');

  const mins = Math.floor(result.timeTaken / 60);
  const secs = result.timeTaken % 60;

  document.getElementById('exam-container').innerHTML = `
    <div class="results-header">
      <div class="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="54" fill="none" stroke="var(--border)" stroke-width="12"/>
          <circle cx="70" cy="70" r="54" fill="none"
            stroke="${pct >= 50 ? 'var(--accent2)' : 'var(--danger)'}"
            stroke-width="12"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"
            stroke-linecap="round"/>
        </svg>
        <div class="score-text">
          <div class="score-pct">${pct}%</div>
          <div class="score-lbl">${result.correct}/${result.total}</div>
        </div>
      </div>
      <div style="margin-bottom:8px"><span class="tag ${gradeClass}" style="font-size:1rem;padding:4px 16px">${grade}</span></div>
      <div class="results-meta">${result.session} · ${mins}m ${secs}s · ${result.mode}</div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <button class="mode-btn primary" onclick="startExam(state.examMode)">Retry This Session</button>
      <button class="mode-btn" onclick="showSection('home')">← Choose Another</button>
      <button class="mode-btn" onclick="showSection('dashboard')">📊 My Progress</button>
    </div>

    <div class="card">
      <div class="card-title">Review All Questions <span>— click any to review</span></div>
      <div class="results-breakdown">${breakdownHTML}</div>
    </div>
  `;
}

function reviewQuestion(idx) {
  state.revealed = state.revealed || {};
  state.revealed[idx] = true;
  if (!state.answers[idx]) {
    // Mark as skipped with wrong
    state.answers[idx] = '__skipped__';
  }
  renderQuestion(idx);
}

// --- DASHBOARD ---
function renderDashboard() {
  const history = getHistory();
  const el = document.getElementById('dashboard-content');

  if (history.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="es-icon">📊</div><div>No attempts yet. Start an exam to track your progress.</div><br><button class="mode-btn primary" onclick="showSection('home')">Start Practising</button></div>`;
    return;
  }

  const bySession = {};
  history.forEach(r => {
    if (!bySession[r.session]) bySession[r.session] = [];
    bySession[r.session].push(r);
  });

  const avgAll = Math.round(history.reduce((a, r) => a + r.pct, 0) / history.length);

  const flagged = getFlaggedAnswers();
  const flaggedHTML = flagged.length > 0 ? `
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">🚩 Flagged Answers <span>— questions you believe have wrong answer keys</span></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${flagged.map(f => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid rgba(245,158,11,0.3);border-radius:8px">
            <span style="font-size:0.9rem"><span style="color:var(--accent)">${f.session}</span> · Q${f.qnum}</span>
            <button class="ai-btn" onclick="localStorage.removeItem('${f.key}');renderDashboard()" style="font-size:0.78rem">Remove flag</button>
          </div>`).join('')}
      </div>
    </div>` : '';

  el.innerHTML = flaggedHTML + `
    <div class="stats-row" style="justify-content:flex-start;margin-bottom:24px">
      <div class="stat-card"><div class="num">${history.length}</div><div class="lbl">Total Attempts</div></div>
      <div class="stat-card"><div class="num">${avgAll}%</div><div class="lbl">Average Score</div></div>
      <div class="stat-card"><div class="num">${history.filter(r=>r.pct>=50).length}</div><div class="lbl">Passes (≥50%)</div></div>
    </div>
    <div class="card">
      <div class="card-title">Session History</div>
      <div class="perf-grid">
        ${history.slice(0, 20).map(r => `
          <div class="perf-card">
            <div class="pc-session">${r.session} · ${new Date(r.date).toLocaleDateString()}</div>
            <div class="pc-score">${r.pct}% <span style="font-size:0.8rem;color:var(--muted)">${r.correct}/${r.total}</span></div>
            <span class="tag ${r.pct >= 50 ? 'tag-green' : 'tag-red'}" style="font-size:0.7rem">${r.pct >= 50 ? 'PASS' : 'FAIL'}</span>
            <div class="pc-bar"><div class="pc-bar-fill" style="width:${r.pct}%"></div></div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

// --- FLAGGED ANSWERS ---
function getFlaggedAnswers() {
  const flagged = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('flag_') && localStorage.getItem(key) === '1') {
      // key format: flag_SESSION_QNUM
      const parts = key.replace('flag_', '').split('_');
      const qnum = parts.pop();
      const session = parts.join('_');
      flagged.push({ session, qnum, key });
    }
  }
  return flagged;
}

// --- UTILS ---
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Init
renderHome();
</script>
