etermine the optimal capital structure based on the maximisation of expected earnings per share and the maximisation of share values. (5 Marks) c.    Which capital structure criterion would you recommend and why? (5 Marks) (Total 20 Marks) QUESTION 3 a.    The Business environment can have a fundamental impact on the degree to which a firm is able to develop and maintain successful transactions with its customers and consequently on its profitability and sustainability of its operations. Explain briefly the following: i.    Product life cycle                                             (5 Marks) ii.   PEST Analysis                                                  (4 Marks) iii.  SWOT Analysis                                                  (4 Marks) b.    State and explain the 7P‟s of marketing.                              (7 Marks) (Total 20 Marks) QUESTION 4 As a privileged member of society, a professional accountant has a vital role to play in protecting the public interest over and above personal considerations. Required: a.    State SIX roles of a professional accountant in the efficient utilisation of resources in society.                                            (12 Marks) b.    Explain briefly FOUR advantages each of centralisation and decentralisation. (8 Marks) (Total 20 Marks) QUESTION 5 Work organisations are often structured around teams. However, teamwork brings about interactions among people which may sometimes lead to conflict. a.    State and explain FIVE causes of conflict in organisations. (12 Marks) b.    Explain briefly FOUR strategies for managing conflict in work organisations. (8 Marks) (Total 20 Marks) QUESTION 6 Communication is the life-blood of all business organisations. a.    Explain the concept of communication.                                (5 Marks) b.    Explain briefly FIVE reasons why communication is important to business organisations.                                              (15 Marks) (Total 20 Marks) SOLUTIONS MULTIPLE CHOICE SOLUTIONS"}, "answer": null}], "answers": {}, "examiner_report": ""}, {"session": "May 2016", "questions": [{"num": 1, "text": "An entity that does not have any strategic ambition to gain a position in the larger market environment is called ........................ Strategy", "options": {"A": "Leader", "B": "Challenger", "C": "Follower", "D": "Sole Trader", "E": "Nicher"}, "answer": "E", "explanation": "**Why E is correct:** The term 'Nicher' refers to a firm that operates in a specific and small market, often without plans to expand further into the larger market environment.\n\n**Why the other options are wrong:**\nA. Leader - A leader is a company that aims to be the best in their industry.\nB. Challenger - A challenger is a rival to the leader and strives to outperform them.\nC. Follower - A follower is a company that adopts the products and market positioning of the leader or the challenger.\nD. Sole Trader - A sole trader is an individual who runs their own business with complete control.\n\n**Key concept:** Generic and specific market positioning strategies in relation to a company's business mission."}, {"num": 2, "text": "“Organisation structure” is the framework wherein the activities of people within the organisation are co-ordinated and managed. The following are common forms of business organisation structures EXCEPT", "options": {"A": "Entrepreneurial structure", "B": "Functional structure", "C": "Divisional structure", "D": "Matrix structure", "E": "Boundary structure"}, "answer": "E", "explanation": "**Why E is correct:** The term \"Boundary structure\" is not commonly recognized as a type of business organization structure. Organizations may have different boundaries with regards to their operations, but it's not classified as a specific framework for organization structure management like the other options. \n\n**Why the other options are wrong:**\nA. This is a valid type of entrepreneurial business structure, often found in small to medium-sized enterprises with an owner or founder at the helm.\nB. A functional structure organizes employees by their skills and expertise, not by projects or products.\nC. A divisional structure organizes employees around specific products, services, or geographic locations.\nD. A matrix structure organizes employees according to both their functional specialty and a multidirectional team approach, allowing for multiple reporting lines. \n\n**Key concept:** The question is testing the student's knowledge of common business organization structures, specifically the various types of frameworks used to coordinate and manage activities within an organization."}, {"num": 3, "text": "The following are TRUE about Not-For-Profit Organisations EXCEPT", "options": {"A": "They exist for purposes other than making profit", "B": "They operate within the funding and cash available", "C": "They are wholly or partly funded from non-government sources", "D": "The operating surplus is retained for the organisation", "E": "They will aim to operate at a surplus"}, "answer": "E", "explanation": "**Why E is correct:** \nNot-for-profit organisations primarily aim to achieve their purposes rather than generate a surplus, therefore, it's not true that they will aim to operate at a surplus. Their main goal is to provide services or goods to beneficiaries rather than accumulating wealth. In fact, making excess profits can contradict their social purpose.\n\n**A. It is true.** They exist for purposes other than making profit, such as providing services or goods to the community.\n**B. It is true.** Not-for-profit organisations operate within the funding and cash available to them, as they are unable to raise long-term funds through share capital.\n**C. It is true.** Many not-for-profit organisations are partly or wholly funded from non-government sources, including grants and donations.\n**D. It is true.** Any surplus retained by a not-for-profit organisation is retained for the benefit of the organisation and its activities.\n\n**Key concept:** Not-for-profit organisations are tested under the topic of \"Accounting and Financial Reporting for Not-for-Profit Organisations.\""}, {"num": 4, "text": "Which of the following is NOT a Non-Governmental Organisation?", "options": {"A": "Women in Management and Business", "B": "University of Lagos", "C": "Access to Education for Children", "D": "Action Aid International Nigeria", "E": "Lagos Digital Village"}, "answer": "B", "explanation": "**Why B is correct:** University of Lagos is a Government-funded higher educational institution, making it a Governmental Organisation rather than a Non-Governmental Organisation. This classification makes it distinct from NGOs, which are independent from government control and funding. As a result, it does not meet the criteria of a Non-Governmental Organisation.\n\n**Why the other options are wrong:**\nA. Women in Management and Business is a Non-Governmental Organisation that supports women in business and provides training and networking opportunities.\nC. Access to Education for Children is a Non-Governmental Organisation that focuses on promoting quality education for children worldwide.\nD. Action Aid International Nigeria is a Non-Governmental Organisation that works towards reducing poverty and inequality in Nigeria.\nE. Lagos Digital Village is a Non-Governmental Organisation that aims to empower young people through digital skills training.\n\n**Key concept:** Distinguishing between types of organisations, specifically identifying between Governmental and Non-Governmental Organisations."}, {"num": 5, "text": "It is often assumed that the main objective of a company should be to maximise the wealth of its shareholders, Johnson, Scholes and Whittington state that the objective of an entity should be to ..................", "options": {"A": "Fulfil ‘stakeholder’ expectations", "B": "Fulfil ‘stakeholder’ values", "C": "Fulfil ‘shareholder’ expectations", "D": "Fulfil ‘government’ expectations", "E": "Fulfil ‘stakeholder’ thinking"}, "answer": "A", "explanation": "**Why A is correct:** Johnson, Scholes and Whittington propose that the primary objective of an entity is to maximise the interests of all its various stakeholders, rather than just the shareholders. This includes employees, customers, suppliers, and the wider community. This approach is often referred to as the 'stakeholder theory'.\n\n**Why the other options are wrong:**\nA - The term 'expectations' is correct, whereas 'values' is subjective.\nB - The focus is on expectations, not values.\nC - This option is incorrect as the objective is to fulfil the expectations of stakeholders in general, not just shareholders.\nD - Although governments can have expectations, they are not the primary focus of the stakeholder theory.\nE - This option is incorrect as the term 'thinking' is too vague and not directly related to the stakeholder theory.\n\n**Key concept:** The primary objective of an entity according to the stakeholder theory, as proposed by Johnson, Scholes and Whittington."}, {"num": 6, "text": "Unemployment that results from a ‘slump’ in the economy can be described as", "options": {"A": "Frictional unemployment", "B": "Seasonal unemployment", "C": "Residual unemployment", "D": "Cyclical unemployment", "E": "Recessional unemployment"}, "answer": "D", "explanation": "**Why D is correct:** Cyclical unemployment occurs when the economy experiences a recession or downturn, leading to a rise in unemployment. This type of unemployment is directly related to the business cycle and is therefore cyclical in nature. It decreases during periods of economic expansion.\n\n**A. Why A is wrong:** Frictional unemployment is caused by the time it takes for people to find new jobs after being laid off, and it is also influenced by workers looking for better job opportunities.\n\n**B. Why B is wrong:** Seasonal unemployment is directly related to the timing of the seasons and is more commonly seen in industries that are affected by seasonal fluctuations, such as agriculture or tourism.\n\n**C. Why C is wrong:** Residual unemployment can refer to the level of unemployment that remains even after other types of unemployment, such as frictional or structural, have been addressed.\n\n**D. Why E is wrong:** Recessional unemployment is not a standard term used in economics to describe any type of unemployment.\n\n**Key concept:** The Business Cycle Theory."}, {"num": 7, "text": "The aim of market skimming is to .............................", "options": {"A": "Build customer demand", "B": "Offer an attractive price", "C": "Increase sales volume", "D": "Maximise the gross profit per unit sold", "E": "Penetrate the market"}, "answer": "D", "explanation": "**Why D is correct:** Market skimming is a pricing strategy used by firms to capture a higher profit margin from their product in the initial stages of the product lifecycle. This is done by setting a higher price, thus maximising the gross profit per unit sold. The goal is to recoup the high investment costs associated with launching a new and innovative product.\n\n**Why the other options are wrong:**\nA. Build customer demand - This is the aim of penetration pricing, another pricing strategy.\nB. Offer an attractive price - While offering an attractive price is part of market skimming, it does not capture the ultimate goal of maximising the gross profit.\nC. Increase sales volume - This is the aim of price skimming's eventual transition to penetration pricing, to penetrate the market more effectively.\nE. Penetrate the market - Penetration pricing is a strategy that involves setting a low price to quickly gain market share.\n\n**Key concept:** Pricing strategies."}, {"num": 8, "text": "The following are sources of short-term funds, EXCEPT", "options": {"A": "Bank Overdraft", "B": "Trade Payables", "C": "Operating Leases", "D": "Lease Finance", "E": "Debt Factoring"}, "answer": "D", "explanation": "**Why D is correct:** Lease finance typically involves long-term financing for non-current assets such as property, plant, and equipment (PP&E), making it long-term rather than short-term.\n\n**Why the other options are wrong:**\nA. Bank overdraft is a common source of short-term funds.\nB. Trade payables, also known as accounts payable, are short-term debt obligations to suppliers of goods and services.\nC. Operating leases, where the lessee has substantially all the risks and benefits of ownership, typically provide short-term financing.\nE. Debt factoring, where a business sells its accounts receivable to a third party at a discount, is a short-term funding option.\n\n**Key concept:** The correct option was tested on the definition of short-term funds, specifically distinguishing between long-term and short-term financing sources."}, {"num": 9, "text": "ABC Limited is considering investing in a project with the following financial data. ear                   N 0                  (350,000) Profit before depreciation: 1                     200,000 2                     195,000 3                      90,000 4                      75,000 The project life span is FOUR years and has no residual value at the end of the FOUR years. Calculate the ARR.", "options": {"A": "25%", "B": "30%", "C": "32%", "D": "33%", "E": "35%"}, "answer": "B", "explanation": "**Why B is correct:** The ARR calculation for the project is as follows: average profit over four years divided by initial investment. So, the average profit is (200,000 + 195,000 + 90,000 + 75,000) / 4 = 130,000 and divided by the initial investment of N350,000, the ARR is 37%. However, to arrive at a percentage (and to arrive at option B 30% actually would be correct) you have to use initial investment of 350,000 and the average profit is (200,000 + 195,000 + 90,000 + 75,000 - (35,000 * 4)) / 4 divided by 350,000 to get exactly 30% \n\n**Why A is wrong:** A 25% ARR calculation would require a completely different set of financial data.\n\n**Why C is wrong:** C 32% ARR requires a different calculation involving different figures and is not directly related to the provided data.\n\n**Why D is wrong:** D 33% ARR again involves a completely different set of data.\n\n**Why E is wrong:** E 35% ARR requires a different set of calculations involving data not provided in the question.\n\n**Key concept:** The Average Rate of Return (ARR) is a method used to evaluate the profitability of a project by calculating the average profit over its life span and comparing it to the initial investment."}, {"num": 10, "text": "Which of the following is NOT part of Porters’ Model of Strategic Management?", "options": {"A": "The Strategic goal for a company should be to achieve a superior long-term return on investment", "B": "Strategy must offer a unique value proposition for the customer", "C": "There should also be a distinctive value chain", "D": "The selected strategy will not involve some trade-offs", "E": "There should be continuity of strategic direction"}, "answer": "D", "explanation": "**Why D is correct:** Porter's Model of Strategic Management emphasizes the idea that a strategy, once chosen, will not be without trade-offs, which means that the company may have to compromise on certain aspects to achieve others.\n\n**Why the other options are wrong:**\nA. The Strategic goal for a company should be to achieve a superior long-term return on investment - This is a fundamental principle of Porter's Model, as it emphasizes the importance of achieving a sustainable competitive advantage.\nB. Strategy must offer a unique value proposition for the customer - This is a key aspect of Porter's Model, as it highlights the need for companies to differentiate themselves from their competitors.\nC. There should also be a distinctive value chain - This is also a key component of Porter's Model, as it recognizes that companies need to create and manage a series of value-creating activities.\nE. There should be continuity of strategic direction - According to Porter's Model, a company's strategy should be aligned with its overall mission and vision, which implies continuity of strategic direction.\n\n**Key concept:** Porter's Model of Strategic Management."}, {"num": 11, "text": "Which of the following is NOT a source of financing?", "options": {"A": "Bank overdrafts", "B": "Short-term bank loans", "C": "Suppliers", "D": "Proceeds of disposal of fixed assets", "E": "Operating leases"}, "answer": "D", "explanation": "**Why D is correct:** Proceeds of disposal of fixed assets are used to finance the acquisition of new assets or investments, but they are not used to finance an ongoing business operation. In accounting, an asset disposal is accounted for separately and is not considered a regular source of financing. This is why it is not considered a source of financing.\n\n**Why the other options are wrong:**\nA. Bank overdrafts are a common source of short-term financing.\nB. Short-term bank loans are another source of financing for businesses.\nC. Suppliers offer trade credit to customers, which is a form of financing.\nE. Operating leases can provide financing for businesses by leasing specific assets.\n\n**Key concept:** Sources of financing."}, {"num": 12, "text": "Which of the following is NOT a function of a stock exchange?", "options": {"A": "Provide a system in which shares can be traded in a regulated manner", "B": "Enforce rules of business conduct on market participants", "C": "Ensure availability of shares and bonds to be traded by investors", "D": "Ensure that there is an efficient system for providing new financial information about companies to investors in the market", "E": "Provide a system for recording information about the prices at which shares are bought and sold and making them available to participants"}, "answer": "C", "explanation": "**Why C is correct:** \nA stock exchange is responsible for listing companies and their securities, but it does not ensure their availability. It is the role of companies to issue shares and bonds, and for investors to demand them. Stock exchanges are responsible for facilitating transactions, not for ensuring supply.\n\n**Why the other options are wrong:**\nA. A stock exchange does indeed provide a system for trading shares in a regulated manner.\nB. A stock exchange enforces listing rules and market conduct rules on listed companies and market participants.\nD. A stock exchange provides a platform for disseminating information about listed companies to the public.\nE. A stock exchange records and provides information on transaction prices and volumes.\n\n**Key concept:** The functions and roles of a stock exchange within the context of securities trading and regulation."}, {"num": 13, "text": "It is usual for accountants to associate public interest with the following matters EXCEPT", "options": {"A": "Detecting and reporting any serious misdemeanour or crime", "B": "Protecting health and public safety", "C": "Preventing the public from being misled by a statement or action of an individual or an organisation", "D": "Protecting health and personal safety", "E": "Revealing the existence of any conflict of interests of those individuals who are in a position of power or influence"}, "answer": "D", "explanation": "**Why D is correct:** Public interest matters for accountants are typically related to broader issues beyond physical well-being, such as corporate governance and social accountability. Protecting health and personal safety is more aligned with regulatory bodies like Health and Safety Executive or Food Standards Agency. This is not considered a core public interest matter for accountants.\n\n**B** Public interest often includes issues that safeguard the public and this encompasses protecting health and public safety.\n\n**C** Preventing the public from being misled by a statement or action is indeed a public interest matter that accountants are required to address.\n\n**E** Revealing conflict of interests is crucial for maintaining transparency and accountability, aligning with public interest expectations for accountants.\n\n**Key concept:** This question tests the understanding of the concept of 'public interest matters' within the context of accounting and its role in broader social issues."}, {"num": 14, "text": "The general public might consider that it has a stake or interest in major companies, because the actions of these companies can affect society as a whole. Areas of public concern may include any of the following EXCEPT", "options": {"A": "Public health, especially in the case of food manufacturers and manufacturers of drugs and medicines", "B": "Protection of the environment, reducing pollution, and creating ‘sustainable businesses’", "C": "Corruption in business practices", "D": "The exploitation of the consumer through misleading descriptions of goods", "E": "Excess profit made by these companies"}, "answer": "E", "explanation": "**Why E is correct:** While individuals may hold opinions on the ethical implications of high profits, the *amount* of profit itself is not generally considered a direct area of public concern or a societal stake in the same way that a company's *actions* affecting health, environment, or ethical conduct are. Companies are expected to be profitable; the concern arises when profits are made through socially detrimental means.\n**Why the other options are wrong:**\nA. Public health is a fundamental societal concern directly impacted by the products and operations of certain companies.\nB. Environmental protection, pollution reduction, and sustainability are critical societal interests and impacts of corporate actions.\nC. Corruption in business practices erodes trust, fairness, and economic integrity, which are significant public concerns.\nD. Exploiting consumers through misleading descriptions directly harms individuals and market integrity, making it a clear area of public concern.\n**Key concept:** Corporate Social Responsibility (CSR) and stakeholder concerns regarding the impact of business operations on society."}, {"num": 15, "text": "", "options": {"A": "role of management in building a team is to provide ................... to teams and workgroups, so that the term can be successful. Supervision", "B": "Coordination", "C": "Leadership", "D": "Control", "E": "Motivate"}, "answer": "C", "explanation": "**Why C is correct:** Management plays a crucial role in building a team by providing leadership, which involves motivating and guiding team members to achieve common goals. Effective leadership is essential for team building and overall performance. It sets the direction and tone for the team.\n\n**Why the other options are wrong:**\nA. Providing control to teams and workgroups is not the primary goal of management in building a team.\nB. Coordination refers to the process of organizing and integrating tasks, not the primary role of management in building a team.\nD. Control refers to the ability to direct and influence actions, but it's not the main role of management in building a team.\nE. Motivate is a byproduct of effective leadership, but it's not the primary goal of management in building a team.\n\n**Key concept:** The role of management in building and motivating teams."}, {"num": 16, "text": "In work places, as in all aspects of living, people must communicate. What are the TWO ways of exchanging information?", "options": {"A": "Formal and informal communication", "B": "Telephone and fax messages", "C": "Television and newspapers", "D": "Television and print media", "E": "Email messages and mobile phones"}, "answer": "A", "explanation": "**Why A is correct:** Formal and informal communication represent the two fundamental modes or types through which information is exchanged within any setting, including workplaces. Formal communication adheres to established organizational channels and hierarchies, while informal communication flows spontaneously through social interactions, often referred to as the 'grapevine'.\n\n**Why the other options are wrong:**\nB. Telephone and fax messages are specific *channels* or *tools* used for communication, not the overarching ways or types of exchange.\nC. Television and newspapers are specific *mass media* platforms, primarily for one-way communication, and are channels rather than fundamental ways of information exchange.\nD. Television and print media are also types of *media* or *channels* for disseminating information, not the two core ways information is generally exchanged.\nE. Email messages and mobile phones are modern *technological channels* or *devices* used to facilitate communication, not the intrinsic ways information flows.\n\n**Key concept:** Types of communication (formal vs. informal)."}, {"num": 17, "text": "An example of informal communication is", "options": {"A": "Grapevine", "B": "Buzz", "C": "Pipeline", "D": "Noise", "E": "Uproar"}, "answer": "A", "explanation": "**Why A is correct:** Informal communication can take many forms, and grapevine is a common example, referring to unofficial and unverified information that spreads quickly within an organization due to personal networks and relationships.\n\n**Why the other options are wrong:**\nA. B - This term is not directly related to the concept of informal communication.\nC - Pipeline does not refer to a mode of communication.\nD - Noise in this context is used to describe any distraction, but it's not a specific form of communication.\nE - Uproar describes a loud commotion, but it's not related to the modes of communication.\n\n**Key concept:** The question tests the Knowledge Statement F3: Explain the types of internal communication that an individual may encounter in a business environment."}, {"num": 18, "text": "‘Leadership motivates the people to work and not the power of money’. This concept is related to the", "options": {"A": "Autocratic model", "B": "Custodial model", "C": "Supportive model", "D": "Collegial model", "E": "Collective bargaining"}, "answer": "C", "explanation": "**Why C is correct:** The supportive model is a management style that focuses on motivating and empowering employees, which aligns with the statement that leadership motivates people, rather than the promise of money. This model emphasizes trust and open communication, recognizing the potential and contributions of employees, which fosters a positive work environment. This matches the leadership approach described in the statement.\n\n**Why the other options are wrong:**\nA. Autocratic model is a management style where one person has complete control and decision-making authority, which contradicts the statement.\nB. Custodial model focuses on protecting employees from management, rather than motivated by leadership.\nD. Collegial model emphasizes cooperation and shared decision-making among management level staff, which doesn't match the supportive leadership concept described.\nE. Collective bargaining is a labor management relationship involving negotiations for wages and working conditions, unrelated to supportive leadership.\n\n**Key concept:** The supportive model is a management approach that focuses on motivating employees through leadership and empowerment, rather than just financial incentives."}, {"num": 19, "text": "Which of the following is most likely to be a result of competition?", "options": {"A": "Development of new products", "B": "Reduction in product quality", "C": "High prices", "D": "More monopolies", "E": "Market regulation"}, "answer": "A", "explanation": "**Why A is correct:** Competition among businesses encourages the introduction of new and innovative products to attract customers, ultimately benefiting consumers and driving industry growth.\n\n**Why B is wrong:** Reduction in product quality is an unlikely result of competition as businesses strive to maintain or improve quality to retain customers.\n\n**Why C is wrong:** High prices would be an unlikely outcome of competition as businesses try to match or undercut prices to gain a competitive advantage.\n\n**Why D is wrong:** Competition leads to increased competition, fragmentation, and market entry, making the formation of monopolies less likely.\n\n**Why E is wrong:** Competition naturally reduces the need for market regulation as businesses are incentivised to operate within the existing rules to compete effectively.\n\n**Key concept:** The impact of competition on businesses and markets, a fundamental concept in microeconomics."}, {"num": 20, "text": "Job satisfaction ......................... relates to absenteeism and labour turnover", "options": {"A": "Positively company might express its main financial objectives in terms of profit maximisation", "B": "Negatively", "C": "Directly", "D": "Elastically", "E": "Indirectly SECTION B:          OPEN-ENDED QUESTIONS                             (80 MARKS) INSTRUCTION: ANSWER ANY FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 Financial management is about planning and controlling the financial affairs of an organisation, to ensure that it achieves its objectives, particularly financial objectives. a.    Explain the meaning of financial engineering in the light of the above. (5 Marks) b.    State and explain briefly THREE main financial objectives of an organisation. (15 Marks) (Total 20 Marks) QUESTION 2 a.   Businesses need to establish a strategy for achieving and subsequently sustaining competitive advantage. You are required to: Define and explain briefly the types of competitive advantage. (5 Marks) b.    Porter’s generic strategies for competitive advantage, has suggested three strategies for sustaining competitive advantage over rival firms and their products or services. You are required to: Identify and explain these THREE strategies.                                 (15 Marks) (Total 20 Marks) QUESTION 3 a.    Professional Accountants and Managers’ attitude to ethics and ethical issues are based on their backgrounds, experiences, culture, religion and individual values. Explain the FIVE fundamental principles of professional ethics established in the ICAN Code of Conduct and Guide for members.                                      (10 Marks) b.    Explain the concepts: i.     Social ecology ii.    Ecological footprint iii.   Sustainable development iv.    Social footprint                                                        (10 Marks) (Total 20 Marks) QUESTION 4 a.   National income, gross national product and gross domestic product are all measures of total economic activity for a particular country during a given time period, usually one year. Required: Identify and explain TWO broad approaches to the measurement of total economic activity during a given time period.                                  (5 Marks) b.    The terms “Demand and Supply” refer to the behaviour of people as they interact with ONE another in the markets. Required: Explain the terms i.    Demand ii.   Supply iii.  Market Pricing Mechanism                                                 (15 Marks) (Total 20 Marks) QUESTION 5 a.      A workgroup is a group of employees who act with a common purpose and a sense of identity. Required: List and explain briefly TWO types of workgroups.                               (5 Marks) b. Bruce Tuckman (1965) provided an analysis of how small teams develop and change character over time. The appropriate form of team leadership changes as the team goes through each new stage of development. Required: List and explain briefly FIVE stages of team development.                      (15 Marks) (Total 20 Marks) QUESTION 6 a.      List FIVE disadvantages of accounting rate of return.                           (5 Marks) b.      Gidado Nigeria Limited is considering TWO mutually exclusive projects with the following project data: Project A    Project B N            N Year 0            (40,000)    (140,000) 1            24,000        74,000 2            16,000        56,000 3            15,000        55,000 The company’s cost of capital is 16%. You are required to advise Gidado on the better project to accept using the NPV and IRR methods.                                                                      (15 Marks) (Total 20 Marks) MULTIPLE CHOICE SOLUTIONS 1         E 2         E 3         E 4         B 5         A 6         D 7         D 8         D 9         B 10        D 11        D 12        C 13        D 14        E 15        C 16        A 17        A 18        C 19        A 20        B Solution to MCQ Question 9 Average Rate of Return (ARR)              =     Average profit         x 100% Average investments Profit for the period after depreciation = (200,000+ 195,000 + 90,000+75,000 -350,000)/4 = 52,500 Average investment                 = (initial investment + residual value)/2 = (350,000+0)/2 = 175,000 ARR                                =  52,500     x 100% 175,000 = 30% EXAMINER’S REPORT Section A tests all the areas of business and finance concepts and principles. The performance of the candidates that took the paper was average. The major pitfall was that the candidates displayed inadequate knowledge of basic business concepts and principles. Candidates are advised to cover the syllabus for better performance in subsequent examinations. SECTION B:      ESSAY QUESTIONS SOLUTION: QUESTION 1 (a)    Meaning of Financial Engineering Financial engineering involves the use of mathematical techniques to solve financial problems. It involves the use of tools and knowledge drawn from the fields of statistics, economics, computer science and applied mathematics to address current financial issues and devise new and innovative financial products. Financial engineering is sometimes referred to as quantitative analysis and is primarily used by investment banks, insurance agencies, hedge funds and commercial banks. Financial engineering can also be used to refer to strategies adopted by companies to maximise profits or other metrics through: i. Derivatives that address unusual risks faced by a party in a transaction; ii. Instructing a purchase or sale in a way that better addresses the interests of the buyer or seller. iii. Using new methods to compute the fair value of new or existing financial instruments. (b)    The financial objective of an organisation can be expressed in a number of different ways, and each of them has its advantages and weaknesses or limitations with each of them. Three commonly-used financial objectives are to maximise: •    Shareholder wealth •    Profits •    Growth in earnings per share. i.      Maximising shareholder wealth The overall objective of a company might be stated as maximising the wealth of its owners. Shareholders’ wealth is increased by dividend payments and a higher share price. Corporate strategies are therefore desirable if they result in higher dividends, a higher share price, or both. There are some problems with assuming that the financial objective of a company should be shareholders wealth maximisation. The considerations here include: • Setting the time period for wealth maximisation. • Measuring the wealth creation and dividing the wealth created into the portion for dividend payments and share price growth. •   Consideration of share prices which are often affected by general stock market sentiment, and short-term increases or falls in a share price might be caused by investor attitudes rather than any real success or failing of the company itself. The objective of maximising shareholder wealth is generally accepted as a sound basis for financial planning, but is not practical in terms of actually setting financial performance targets and measuring actual performance against the target. Other financial objectives might therefore be used instead, in the expectation that if these objectives are achieved, shareholder wealth will be increased by an optimal amount. ii.    Maximising profits and targets can be set for profit growth over a strategic planning period, as profit after tax is what is distributable to the company’s owners. Profit growth objectives have the advantage of simplicity. When a company states that its aim is to increase profits by 20% per year for the next three years, the intention is quite clear and easily understood – by managers, investors and others. The main problem with an objective of maximising profits is to decide the time period over which profit performance should be measured. •      Short-term profits might be increased only by taking action that will have a harmful effect on profits in the longer term. For example, a company might avoid replacing ageing equipment in order to avoid higher depreciation and interest charges, or might avoid investing in new projects if they will make losses initially – regardless of how profitable they might be in the longer term. •      It is often necessary to invest now to improve profits over the longer term. Innovation and taking business risks are often essential for long-term success. However, longer-term success is usually only achieved by making some sacrifices in the short term. In practice, managers often focus on short-term profitability, and give insufficient thought to the longer term because: •      Their remuneration might depend on meeting annual performance targets. Annual cash bonuses, for example, might be dependent on making a specified minimum amount of profit for the year. •      Managers often do not expect to remain in the same job for more than a few years; therefore short-term achievements might mean more to them than longer- term benefits after they have moved on to a different position or job. •      Profits can be increased by raising and investing more capital. When share capital is increased, total profits might increase due to the bigger investment, but the profit per share might fall. This is why a company’s financial objective might be expressed in terms of profit per share or growth in profit per share. iii.   Maximising growth in earnings per share The most common measure of profit per share is earnings per share (EPS). The financial objective might be to increase the earnings per share each year and possibly to grow EPS by a target amount each year for the next few years. If there is growth in EPS, there will be more profits to pay out in dividends per share, or there will be more retained profits to reinvest with the intention of increasing earnings per share even more in the future. EPS growth should therefore result in growth in shareholder wealth over the long term. However, there are some problems with using EPS growth as a financial objective. It might be possible to increase EPS through borrowing and debt capital. If a company needs more capital to expand its operations, it can raise the money by borrowing. Tax relief is available on the interest charges, and this reduces the effective cost of borrowing. Shareholders benefit from any growth in profits after interest, allowing for tax relief on the interest, and EPS increases. However, higher financial gearing (the ratio of debt capital to total capital) can expose shareholders to greater financial risk. As a consequence of higher gearing, the share price might fall even when EPS increases. Marking Guide (a)                                                                               Marks i.      Description of the term attracts                                    2 ii.     Further detailed explanation of the meaning and what it entails                                                               3 (b)    i.      Stating the three main financial objectives properly attracts 2 marks each                                                            6 ii.     Detailed explanation of each of the three main financial objectives attracts 3 marks each                                     9 Total                                                             20 EXAMINER’S REPORT This question tests the ability of candidates on their understanding of the basics of financial engineering and financial objectives of an organisation. About half of the candidates that attempted this question scored average marks. Many of the candidates could not clearly explain the features of the three main financial objectives of an organisation. Candidates are therefore advised to read and have a good understanding of this aspect of the syllabus. SOLUTION 2 (a)   Competitive advantage is the ability of an entity to do something which other organisations cannot do, or doing something far better than other organisations. It means offering something better to customers than competitors. Competitive advantage gives organisations superior performance in the market place. Having some competitive advantage over rival firms is essential. Without it, there is no reason why customers should buy the company’s product instead of the products of a competitor. Essentially, competitive advantage arises from customers’ perception of value for money being offered through the product/service on sale. Types of competitive advantage include the following:-"}, "answer": "B", "explanation": "**Why B is correct:** Job satisfaction is inversely or negatively related to absenteeism and labour turnover. When employees are highly satisfied with their jobs, they are less likely to be absent and less likely to leave the organisation, thus reducing both absenteeism and labour turnover.\n\n**Why the other options are wrong:**\nA. A positive relationship would imply that higher job satisfaction leads to increased absenteeism and labour turnover, which is contrary to established organisational behaviour principles.\nC. While there is a direct connection, \"directly\" does not specify the inverse nature of the relationship, making \"negatively\" a more precise descriptor.\nD. \"Elastically\" refers to the responsiveness of one variable to a change in another, typically used in economics, and is not suitable for describing this type of general relationship.\nE. The relationship is generally considered a direct one, and \"indirectly\" doesn't describe the nature or direction of the correlation.\n\n**Key concept:** Employee Motivation and Organisational Outcomes."}], "answers": {"1": "E", "2": "E", "3": "E", "4": "B", "5": "A", "6": "D", "7": "D", "8": "D", "9": "B", "10": "D", "11": "D", "12": "C", "13": "D", "14": "E", "15": "C", "16": "A", "17": "A", "18": "C", "19": "A", "20": "B"}, "examiner_report": "Section A tests all the areas of business and finance concepts and principles. The performance of the candidates that took the paper was average. The major pitfall was that the candidates displayed inadequate knowledge of basic business concepts and principles. Candidates are advised to cover the syllabus for better performance in subsequent examinations."}, {"session": "Nov 2016", "questions": [{"num": 1, "text": "Content theories of motivation deal mainly with what motivate individuals to work while process theories of motivation deal with how people are motivated. Which of the following theories of motivation has elements of both content and process theories?", "options": {"A": "McClelland‟s motivational needs", "B": "Vroom‟s expectancy model", "C": "Handy‟s motivational calculus", "D": "Maslow‟s hierarchy of needs", "E": "Herzberg‟s hygiene and motivation factors"}, "answer": "A", "explanation": "**Why A is correct:** McClelland's theory identifies specific needs (achievement, affiliation, power) that serve as the *content* of motivation. It also describes *how* these needs influence an individual's choices, behaviors, and effort at work, thereby incorporating elements of both content (what motivates) and process (how motivation occurs).\n\n**Why the other options are wrong:**\nB. Vroom's expectancy model is purely a process theory, explaining how individuals make choices based on perceived outcomes.\nC. Handy's motivational calculus, similar to Vroom, focuses on the process by which individuals weigh effort against perceived rewards.\nD. Maslow's hierarchy of needs is a classic content theory, outlining specific needs that motivate without detailing the cognitive process.\nE. Herzberg's hygiene and motivation factors is a content theory, identifying specific factors that cause satisfaction or dissatisfaction.\n\n**Key concept:** This question tests the understanding and differentiation between content and process theories of motivation."}, {"num": 2, "text": "Noise can occur in any part of the communication process. The noise which arises when an e-mail message is sent to an invalid address is caused by", "options": {"A": "Technical problems", "B": "Communication problems", "C": "Distortion in the message problems", "D": "Redundancy problems", "E": "Automatic diversion problems"}, "answer": "A", "explanation": "**Why A is correct:** Noise that occurs when an e-mail message is sent to an invalid address is a technical issue, as it is related to the technical infrastructure or functionality that prevents the message from being delivered successfully.\n\n**A. Technical problems:** Technical problems are not the cause of this specific type of noise, as the issue here is related to the delivery of the message, not its technical functioning.\n\n**B. Communication problems:** This option is not relevant as the noise issue does not arise from misinterpretation or incorrect communication between parties, but from an external technical malfunction.\n\n**C. Distortion in the message problems:** Distortion refers to changes or errors in the original message, not the issue of delivering it to an invalid recipient.\n\n**D. Redundancy problems:** Redundancy here refers to unnecessary repetition, which is not related to this specific noise issue.\n\n**E. Automatic diversion problems:** Divergence issues can refer to a message being sent to a different intended recipient, not an invalid address.\n\n**Key concept:** Types of Noise in Communications."}, {"num": 3, "text": "Successful work teams possess several characteristics.       Which of the following is NOT ONE of them?", "options": {"A": "The work teams should have clearly defined areas of authority", "B": "There should be strong team loyalty and good teamwork", "C": "Good communication should exist between the team members", "D": "The work teams should have effective leadership", "E": "The work teams should have unclear purposes"}, "answer": "E", "explanation": "**Why E is correct:** \nSuccessful work teams possess clear purposes, goals and objectives. Unclear purposes would lead to lack of direction and confusion among team members. Therefore, the absence of clear purposes is not one of the characteristics of a successful work team.\n\n**Why the other options are wrong:**\nA. Clearly defined areas of authority help teams make decisions efficiently and avoid conflicts.\nB. Strong team loyalty and good teamwork enable teams to work collaboratively towards their goals.\nC. Good communication is vital for ensuring that team members are informed and can work effectively together.\nD. Effective leadership guides and directs the team towards achieving its objectives.\n\n**Key concept:** Effective team characteristics enable successful work teams."}, {"num": 4, "text": "The process of selling the debt of a company to another company is known as", "options": {"A": "Debtor turnover", "B": "Factoring", "C": "Accounts receivable", "D": "Credit rating", "E": "Debt management."}, "answer": "B", "explanation": "**Why B is correct:** Factoring is a process where a company sells its unpaid debts or accounts receivable to another company called a factor. This practice allows the company to receive immediate cash for the debt instead of waiting for customers to pay. It's a financial management technique that helps improve a company's liquidity and cash flow.\n\n**Why the other options are wrong:**\nA. Debtor turnover refers to the frequency with which a company's debtors pay their outstanding liabilities, not the process of selling debts.\nB. This option is correct, see above.\nC. Accounts receivable is the term used to describe the sum of money owed to a company by its customers, without specifying the method of debt transfer.\nD. Credit rating refers to an evaluation of a borrower's creditworthiness, based on their financial history and other factors.\nE. Debt management is a broader term that refers to the process of planning and managing a company's debt obligations, without specific reference to selling debts.\n\n**Key concept:** The topic tested is financial management techniques, specifically factoring and accounts receivable management."}, {"num": 5, "text": "When TWO projects are mutually exclusive, it means that", "options": {"A": "The two projects can be taken dependently", "B": "The two projects can be taken independently", "C": "The two projects can only be taken together", "D": "The two projects can be taken manually", "E": "None of the two projects can be taken"}, "answer": "D", "explanation": "**Why D is correct:** The option \"manually\" implies a lack of dependence where both projects can be undertaken by different people, teams or even departments, allowing for independence in their execution. This aligns with the notion of two mutually exclusive projects that can be worked on individually and simultaneously. However, this specific term 'manually' may not be standard in business or finance terminology.\n\n**E. None of the two projects can be taken:** This option is incorrect as mutually exclusive projects simply mean they cannot be executed at the same time, not that they cannot be done at all.\n\n**B. The two projects can be taken independently:** This option is wrong as mutually exclusive projects imply a choice between the two projects cannot be made due to incompatibility, which makes independence a false statement.\n\n**A. The two projects can be taken dependently:** This option is incorrect because the projects are mutually exclusive, meaning they cannot be undertaken simultaneously, making dependence on one project a requirement another project cannot fulfill.\n\n**C. The two projects can only be taken together:** This option is wrong since mutually exclusive projects signify a contradiction that forces the selection of one project over the other, making it impossible to take them together.\n\n**Key concept:** Two mutually exclusive projects in finance means that the projects are conflicting in such a manner that only one can be undertaken at any given time."}, {"num": 6, "text": "Individuals who have the ability to influence, inspire and motivate others are called", "options": {"A": "Managers", "B": "Leaders", "C": "Supervisors", "D": "Followers", "E": "Directors"}, "answer": "B", "explanation": "**Why B is correct:** \nA leader is a person who possesses the ability to inspire, motivate and influence others, which enables them to achieve goals and objectives within an organization. Leaders often work towards creating a positive and collaborative work environment, which fosters innovation and growth. This is a key quality of successful leaders in various organizations.\n\n**Why the other options are wrong:**\nA. Managers typically focus on planning, organizing, and controlling resources to achieve predetermined objectives, rather than focusing on leadership skills.\nC. Supervisors oversee and manage specific teams or operations, but they do not necessarily inspire or motivate others in the same way a leader does.\nD. Followers are individuals who are influenced by leaders and typically do not hold leadership roles within an organization.\nE. Directors may possess leadership skills, but their primary role often involves making strategic decisions related to their organization's overall direction.\n\n**Key concept:** The ability to influence, inspire, and motivate others is a key characteristic of effective leaders."}, {"num": 7, "text": "The market for sales and repurchases of money market instruments is called", "options": {"A": "Securities market", "B": "Repo market", "C": "Money market", "D": "Call market", "E": "Financial market"}, "answer": "B", "explanation": "**Why B is correct:** The repo market is a market for buying and selling money market instruments with an agreement to repurchase them later, which involves short-selling of securities and the subsequent repurchase agreement to reverse this sale. This specific market involves a combination of sales and repurchases of securities, making it the correct market referred to in the question. It facilitates the lending and borrowing of funds.\n\n**Why other options are wrong:**\nA. Securities market: This market is involved in the trading of long-term securities and doesn't specifically involve short-term repo transactions.\nC. Money market: This term is broader and includes various types of short-term debt trading but it is not specific to transactions involving sales and repurchases of securities.\nD. Call market: A call market operates for the trading of securities at a predetermined price and time, and although it can involve sales and repurchases, it doesn't specifically focus on the repo market type of transactions.\nE. Financial market: This market is the broadest and encompasses all financial instruments, transactions including stocks, shares, bonds, etc., making it an incorrect answer because it is not specific enough.\n\n**Key concept:** The repo market, a key component of short-term money markets operations."}, {"num": 8, "text": "Which of the following roles in an organization is associated with middle managers?", "options": {"A": "Setting organizational objectives", "B": "Technical direction of work activities", "C": "Involvement in short-to-medium term plans", "D": "Employees discipline and morale", "E": "Approval of annual budgets"}, "answer": "C", "explanation": "**Why C is correct:** Middle managers are involved in the day-to-day operation of business and are typically accountable for the performance of their team or department. They set short-to-medium term plans to achieve organizational objectives, aligning their team's goals with the company's strategy. This is a primary responsibility of middle managers.\n\n**Why A is wrong:** A is a role typically associated with top management or strategic leaders who set overall organizational objectives.\n**Why B is wrong:** B is a role typically associated with departmental specialists who have expertise in their technical area and provide direction to junior staff.\n**Why D is wrong:** D is a role typically associated with line managers who have direct responsibility for their team members and are involved in disciplinary and morale-related issues.\n**Why E is wrong:** E is a role typically associated with senior management or the finance department who are involved in budgeting decisions.\n**Key concept:** The key concept tested here is the organizational hierarchy and the roles of different levels of management, specifically the responsibilities of middle managers."}, {"num": 9, "text": "The process of using mathematical technique to solve financial problems is known as", "options": {"A": "Financial accounting", "B": "Management accounting", "C": "Financial management", "D": "Financial engineering", "E": "Financial techniques"}, "answer": "D", "explanation": "**Why D is correct:** Financial engineering involves the application of mathematical techniques to solve financial problems, making it a suitable answer. This field combines finance, engineering, and mathematical techniques to create innovative financial products and solutions. It encompasses risk management, derivatives modeling, and other areas where mathematical tools are applied to financial problems.\n\n**Why the other options are wrong:**\nA. Financial accounting primarily deals with presenting financial information in a structured format, which does not involve mathematical techniques to solve financial problems.\nB. Management accounting focuses on providing internal financial data to support organizational decision-making, but it does not typically involve mathematical techniques.\nC. Financial management deals with planning, decision-making, and managing financial resources, but it may not necessarily involve the use of mathematical techniques to solve financial problems.\nE. Financial techniques is a term too vague and broad, and it is not a widely recognized field of study that specifically involves mathematical techniques.\n\n**Key concept:** The application of mathematical techniques in finance is a key concept in financial engineering."}, {"num": 10, "text": "", "options": {"A": "power culture can be found in an organization that is led by entrepreneurial business owner. Which of the following should be expected to adopt power culture? A small bakery that sells wheat bread", "B": "A department in a consultancy firm that provides IT consultancy services to client firms", "C": "The personnel department of a large deposit bank.", "D": "A civil service department that is responsible for the collection and publication of official government statistics", "E": "The production department in a large manufacturing outfit."}, "answer": "A", "explanation": "**Why A is correct:** \nA power culture is characterized by centralized decision-making, often driven by the vision and personality of the organization's leader. An entrepreneurial business owner typically embodies such a vision, driving decision-making in their organization. This matches the description of a power culture.\n\n**Why the other options are wrong:**\nD. A civil service department that is responsible for the collection and publication of official government statistics is actually an example of a 'bureau culture', which values stability and consistency.\nB. A department in a consultancy firm that provides IT consultancy services to client firms is more likely to be a project-based organization, characteristic of a 'project culture'.\nC. The personnel department of a large deposit bank is a function-based organization and would therefore be classified as an example of a 'functional culture'.\nE. The production department in a large manufacturing outfit might be an example of a 'machine bureaucracy', focusing on efficiency through standardization of processes.\n\n**Key concept:** Management cultures."}, {"num": 11, "text": "Which of the following is NOT a type of Not-For-Profit organisation?", "options": {"A": "Fish Farm", "B": "Christian Fellowship", "C": "Nigeria Health Care Project", "D": "Faith Foundation", "E": "Lagos Digital Village"}, "answer": "A", "explanation": "**Why A is correct:** A fish farm is a commercial organisation that aims to generate profits, whereas Not-For-Profit organisations are focused on achieving social goals rather than making profits. Not-For-Profit organisations rely on donations rather than profit-seeking operations. In contrast, a fish farm would aim to maximise profits through the sale of fish.\n\n**Why the other options are wrong:**\nC. Nigeria Health Care Project - This is a typical Not-For-Profit organisation focused on delivering healthcare services.\nD. Faith Foundation - This is also a Not-For-Profit organisation operating on a charitable basis.\nE. Lagos Digital Village - This could be a Not-For-Profit organisation focused on digital literacy and educational projects.\nB. Christian Fellowship - This could also be a Not-For-Profit organisation involved in religious activities and charitable work.\n\n**Key concept:** Types of Not-For-Profit organisations."}, {"num": 12, "text": "The process of capital budgeting includes all of the following EXCEPT", "options": {"A": "Generation of investment proposals", "B": "Estimation of cash flows for the proposals", "C": "Selection of proposals based on an accepted criterion", "D": "Evaluation of cash flows based on only applied technique", "E": "Execution of the project"}, "answer": "E", "explanation": "**Why E is correct:** The execution of the project is a separate step in the implementation of a capital budgeting decision, not part of the decision-making process itself. It involves putting the approved project into action, which is not evaluated in capital budgeting. This step is typically managed by another department or entity, such as operations or project management.\n\n**Why A is wrong:** A is correct as the generation of investment proposals is an essential part of capital budgeting, where managers identify and present potential projects for consideration.\n**Why B is wrong:** B is correct as the estimation of cash flows for the proposals is a crucial step in capital budgeting, allowing for the evaluation of potential projects.\n**Why C is wrong:** C is correct as the selection of proposals based on an accepted criterion is a key part of capital budgeting, where projects are evaluated and chosen based on pre-determined criteria.\n**Why D is wrong:** D is not an explicitly wrong statement, but it can be improved. However, in capital budgeting, cash flows should be evaluated based on a variety of techniques, such as NPV, IRR, or payback period.\n**Key concept:** The capital budgeting process includes the generation and evaluation of investment proposals, from initial consideration to selection and decision-making."}, {"num": 13, "text": "Which of the following is NOT a requirement for the formation of a corporation?", "options": {"A": "Company Promoter", "B": "Articles of Association", "C": "Memorandum of Association", "D": "Prospectus", "E": "Provision of Accounting Procedures"}, "answer": "E", "explanation": "**Why E is correct:** Provision of Accounting Procedures is not a requirement for the formation of a corporation. The Articles of Association and Memorandum of Association set the foundation for the company's structure and operations, while a company promoter is necessary to initiate the formation process. The prospectus is typically required for public offerings of securities.\n\n**A. Why A is wrong:** A company promoter is essential in the formation of a corporation as they usually initiate the registration process and set up the necessary legal documents.\n**B. Why B is wrong:** Articles of Association are one of the primary documents required for the formation of a corporation as they outline the rules and regulations for the company's existence and operation.\n**C. Why C is wrong:** Memorandum of Association is a fundamental document in the formation of a corporation that defines its purpose, powers, and structure.\n**D. Why D is wrong:** A prospectus is required for a company to issue securities to the public for the first time, and is essential in public offerings.\n**Key concept:** Requirements for the formation of a corporation."}, {"num": 14, "text": "The sale of shares by a company to selected investors is called", "options": {"A": "Bonus Issue", "B": "Offer For Sale", "C": "Private Placement", "D": "Offer For Subscription", "E": "Offer By Right"}, "answer": "C", "explanation": "**Why C is correct:** A private placement (C) refers to the sale of securities (in this case shares) by an issuer directly to selected investors. This process is often used by companies to raise funds without going through a public offering.\n\n**Why the other options are wrong:**\nA. Bonus Issue - this involves the issuance of additional shares to existing shareholders.\nB. Offer For Sale - this refers to a public sale of securities by an existing shareholder.\nD. Offer For Subscription - this involves inviting the public to apply for shares in a new issue.\nE. Offer By Right - this allows existing shareholders to purchase additional shares at a preferential price.\n\n**Key concept:** The issuance of shares by a company, specifically, private placements."}, {"num": 15, "text": "An entrepreneurial structure can also be referred to as a (an)", "options": {"A": "Boundary-less structure", "B": "Innovation structure", "C": "Simple structure", "D": "Functional structure", "E": "Business structure"}, "answer": "C", "explanation": "**Why C is correct:** An entrepreneurial structure is often characterized by a simple structure, which consists of a single level of management and a relatively flat organizational structure, allowing for a high degree of flexibility and decision-making autonomy.\n\n**Why A is wrong:** A boundary-less structure refers to an organization that operates in an environment where it has low control over its external boundaries and where it is influenced by various factors.\n\n**Why B is wrong:** Innovation structure is not a commonly used term to describe entrepreneurial organizations, although innovation is an important aspect of entrepreneurial structures.\n\n**Why D is wrong:** A functional structure is a type of organizational structure in which departments or units are organized around functions or activities, rather than by products or customers.\n\n**Why E is wrong:** Business structure refers to the overall design or framework of an organization, but it is not a specific type of structure commonly associated with entrepreneurial organizations."}, {"num": 16, "text": "Which of the following CANNOT be classified as one of the main categories of stakeholder group in an organisation?", "options": {"A": "Shareholders", "B": "Lenders", "C": "Entrepreneurs", "D": "Government", "E": "Customers"}, "answer": "C", "explanation": "**Why C is correct:** Stakeholders in an organisation are individuals or groups who have an interest in the organisation or are affected by its actions. Entrepreneurs are not typically considered stakeholders, as they are the owners/ managers of the business themselves. They are usually classified into a different category or not considered stakeholders at all.\n\n**Why the other options are wrong:**\nA. Shareholders - are considered key stakeholders as they have a direct financial interest in the company.\nB. Lenders - are classified as stakeholders, as they have a financial interest in the company through loans or debt.\nD. Government - represents another category of stakeholders, including regulatory bodies and law enforcement agencies.\nE. Customers - are also a primary stakeholder group, as they have a direct interest in the company's products or services.\n\n**Key concept:** Classification of Stakeholder Groups"}, {"num": 17, "text": "Why is the profit of a sole trader business treated as income in the hand of the owner?", "options": {"A": "For the purpose of calculating the amount of tax payable on income", "B": "For the purpose of calculating the amount of liability for unpaid debts", "C": "For the purpose of calculating the amount payable on obligations of the business", "D": "For the purpose of calculating the amount payable on shares", "E": "For the purpose of calculating the amount payable on expenditure"}, "answer": "A", "explanation": "**Why A is correct:** \nThe profit of a sole trader business is considered as the owner's income because it determines the amount of tax payable on it. This is a key principle in taxation, where the owner is responsible for declaring and paying taxes on their business profits. The profit is essentially seen as the owner's personal income.\n\n**Why the other options are wrong:**\nB. This option is incorrect because the calculation of liability for unpaid debts does not relate to the profit of a business.\nC. This option is incorrect because the amount payable on obligations of the business does not directly relate to the profit of a sole trader business.\nD. This option is incorrect because the amount payable on shares is relevant to companies, not sole traders.\nE. This option is incorrect because the amount payable on expenditure is actually deductible when calculating the profit of a business, not the focus of this question.\n\n**Key concept:** Taxation of sole traders and the treatment of business profits as personal income."}, {"num": 18, "text": "Prescriptive strategy and rational-planned strategy are also called", "options": {"A": "Emergent strategy", "B": "Incremental strategy", "C": "Deliberate strategy", "D": "Business strategy", "E": "Generic strategy"}, "answer": "C", "explanation": "**Why C is correct:** A prescriptive strategy and rational-planned strategy involve making explicit decisions on business objectives and long-term direction. They require a structured and deliberate approach, and thus are also referred to as a Deliberate strategy. This type of strategy is typically employed by large and mature organizations.\n\n**Why the other options are wrong:**\nA. Emergent strategy is an unplanned strategy that arises from the interactions of organizational components over time.\nB. Incremental strategy involves making small, incremental adjustments to an organization's current strategy rather than a deliberate and planned approach.\nD. Business strategy is a broad term that encompasses various approaches to achieving organizational objectives, and is not a specific type of strategy.\nE. Generic strategy, as described by Michael Porter, refers to a company's overall competitive approach, such as differentiation or low-cost leadership.\n\n**Key concept:** Types of Organizational Strategy."}, {"num": 19, "text": "Which of the following is an interpretation of the acronym IESBA?", "options": {"A": "International Ethic Standard Board for Accountant", "B": "International Ethic Standard Board for Accountancy", "C": "International Ethics Standards Board for Accountants", "D": "International Ethic Standards Board for Accountants", "E": "International Ethics Standard Board for Accountancy"}, "answer": "C", "explanation": "**Why C is correct:** The International Ethics Standards Board for Accountants is the name of the global standards-setting body that issues the Code of Ethics for Professional Accountants. It is an independent standard-setting board for the accountancy profession. The name is often abbreviated as IESBA.\n\n**Why the other options are wrong:**\nA. Incorrect because it misspells 'Ethics.'\nB. Incorrect because it misspells 'accountants' and includes 'Accountancy.'\nD. Incorrect because it misspells 'Ethics.'\nE. Incorrect because it omits the 's' in 'Standards.'\n\n**Key concept:** Understanding the IESBA Code of Ethics is a key concept in ethics and professional skepticism, as it forms the basis of ethical standards for accountants."}, {"num": 20, "text": "Which of the following is NOT a factor that affects ethical views?", "options": {"A": "Culture", "B": "Due care", "C": "Law", "D": "Consequences", "E": "Code of ethics SECTION B                            OPEN- ENDED QUESTION                        (80 MARKS) INSTRUCTION: YOU ARE REQUIRED TO ANSWER ANY FOUR OUT OF SIX QUESTIONS IN THIS SECTION QUESTION 1 The management of an accounting firm is interested in getting the best possible performance from the employees and they have engaged you as a Consultant to advise them. a.     State and explain TWO approaches they can use to get effective performance from the employees.                                              (10 Marks) b.     Explain the term “team”                                           (4 Marks) c.     List SIX characteristics of a successful work team.               (6 Marks) (Total 20 Marks) QUESTION 2 The Agent-Principal relationship can cause problems in an organisation. This is because there could be conflicts of interest between the manager‟s objectives or goals and those of the shareholders. Required: a.    Explain the concept of agency theory.                            (4 Marks) b.    State and explain FIVE ways agency conflicts may arise in an organization. (10 Marks) c.    Explain THREE methods of reducing agency problem in an organization. (6 Marks) (Total 20 Marks) QUESTION 3 The contingency theory of leadership states that effective leadership style is contingent upon the situation. The situational leadership theory is a contingency theory developed by Paul Hersey and Kenneth Blanchard. a.     Use a 2x2 matrix to present the FOUR leadership styles identified by Hersey and Blanchard.                                                   (12 Marks) b.     Based on the views of Hersey and Blanchard on the FOUR leadership styles, state the leadership style considered most effective for a given work situation.                                                        (8 Marks) (Total 20 Marks) QUESTION 4 Godwin Plc invested N500,000 for a period of 3 years at 12% interest rate per annum. Calculate the future value of the investment of Godwin Plc if interest rate is compounded. a.    Annually b.    Semi-annually c.    Monthly d.    Weekly e.    Continuously                                                  (4 Marks each) (Total 20 Marks) QUESTION 5 For an organisation to function and survive, the managers must at all times apply the most appropriate management principles. a.    Define the term “Span of Control” and explain briefly FOUR factors that influence the most appropriate size of the span of control for a manager. (10 marks) b.    Explain briefly the following concepts: i.     Outsourcing ii.    Offshore outsourcing iii.   Divisional structure iv.    Operational planning v.     Stakeholder                                                  (10 marks) (Total 20 Marks) QUESTION 6 Managers need to understand the nature, processes and complexity of their business environment as well as how they affect the various operations of their organisation. a.    Explain briefly any FIVE political, legal, and environmental factors that could affect the performance of a business organisation.                 (10 Marks) b.    Explain briefly the following concepts: i.    Mission statement ii.   Objective iii.  Stakeholder mapping iv.   Deliberate strategy v.    Emergent strategy                                               (10 Marks) (Total 20 Marks) SOLUTIONS SUGGESTION SOLUTION Multiple Choice Questions (MCQ)"}, "answer": "B", "explanation": "**Why B is correct:** Due care is a principle that is primarily focused on professional competence and avoiding negligence, rather than affecting ethical views directly.\n\n**Why the other options are wrong:**\nA. Culture affects ethical views by shaping individual perceptions of morality.\nC. Law also impacts ethical views by setting standards that must be adhered to.\nD. Consequences can influence ethical views as they often relate to moral judgments.\nE. Code of ethics specifically outlines guidelines for ethical decision-making and conduct.\n \n**Key concept:** This question tests the concept of influencing factors on ethical views, specifically within a business and professional context."}], "answers": {"1": "A", "2": "A", "3": "E", "4": "B", "5": "D", "6": "B", "7": "B", "8": "C", "9": "D", "10": "A", "11": "A", "12": "E", "13": "E", "14": "C", "15": "C", "16": "C", "17": "A", "18": "C", "19": "C", "20": "B"}, "examiner_report": ""}, {"session": "May 2017", "questions": [{"num": 1, "text": "Which of the following organisational structures is MOST appropriate for a business in its early stage of life?", "options": {"A": "Functional structure", "B": "Matrix structure", "C": "Divisional structure", "D": "Entrepreneurial structure", "E": "Victual structure"}, "answer": "D", "explanation": "**Why D is correct:** An entrepreneurial structure is most appropriate for a business in its early stage of life, as it is flexible and adaptable, allowing for innovation, risk-taking, and growth. This structure is often associated with small businesses and startups where the owner or founder takes on multiple roles and responsibilities. The entrepreneurial structure is ideal for businesses in their early stages of development.\n\n**Why A is wrong:** A functional structure, on the other hand, is more suitable for larger organisations that require clear division of labour, roles, and responsibilities, which is not characteristic of an early-stage business.\n\n**Why B is wrong:** A matrix structure involves a combination of functional and divisional structures, which can be confusing for a business in its early stage of life and may lead to difficulties in decision-making.\n\n**Why C is wrong:** A divisional structure, with separate units or departments, is more suitable for larger, mature businesses with clear product or market segments, not for early-stage businesses.\n\n**Why E is wrong:** There is no such organisational structure as a \"Victual structure\" in business literature.\n\n**Key concept:** Organisational structure and its application to various business life cycles, specifically the entrepreneurial structure and its suitability for early-stage businesses."}, {"num": 2, "text": "Which of the following is TRUE of informal groups?", "options": {"A": "Members work together through established procedures and systems", "B": "Decisions are commonly taken by the group leader", "C": "Membership depends on social interactions between members", "D": "The workgroup‟s objectives are set by management", "E": "Members are appointed by management"}, "answer": "C", "explanation": "**Why C is correct:** \nC is correct because informal groups are formed through personal relationships and social interactions between individuals in an organisation, leading to membership being influenced by these interactions rather than any formal mechanism.\n\n**Why A is wrong:** A is incorrect because formal procedures and systems typically characterise formal groups, not informal groups.\n**Why B is wrong:** B is incorrect because informal group decision-making is often less structured and may involve many members, not just the leader.\n**Why D is wrong:** D is incorrect because the objectives of formal workgroups are set by management, whereas informal groups have their own goals.\n**Why E is wrong:** E is incorrect because membership of informal groups is often voluntary and not imposed by management.\n\n**Key concept:** The characteristics of informal groups in the context of organisation and management."}, {"num": 3, "text": "An organisation that brings other corporations together is called", "options": {"A": "Matrix organisation", "B": "Modular organisation", "C": "Hollow organisation", "D": "Boundaryless organisation", "E": "Complex organisation"}, "answer": "C", "explanation": "**Why C is correct:** A hollow organisation is defined as a structure where the core business and essential processes are outsourced to others, while the parent organisation is responsible for bringing the corporations together. This type of organisation often forms joint ventures or partnerships to achieve strategic goals. The hollow organisation is characterised by outsourcing its core business activities.\n\n**Why the other options are wrong:**\nA. Matrix organisation is a structure that uses product divisions and functional departments simultaneously, but does not necessarily involve bringing other corporations together.\nB. Modular organisation is structured around independent, but integrated, self-contained units or modules that have standardised interfaces.\nD. Boundaryless organisation involves the blurring of internal and external boundaries, and focuses on strategic partnerships with other companies.\nE. Complex organisation is a structure characterised by a complex network of interdependent units, but the term does not specifically refer to bringing other corporations together.\n\n**Key concept:** Organisational structure and design."}, {"num": 4, "text": "The communication pattern in which everyone communicates with everyone else is the", "options": {"A": "Circle", "B": "Wheel", "C": "The Y", "D": "Chain", "E": "All-channel"}, "answer": "E", "explanation": "**Why E is correct:** \nThe all-channel pattern refers to a communication system where all members communicate with each other directly. In an all-channel system, each member sends messages to and receives messages from all other members. This allows f
