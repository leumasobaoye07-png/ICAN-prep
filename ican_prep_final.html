that lower fuel prices could also be used to promote the accessibility of infrastructure to the wider population, by reducing the costs associated with building and maintaining roads and other infrastructure.\n\n**Key concept:** The key concept being tested is the potential effects of government policies on industry and the economy, specifically the effects of price subsidies on production and efficiency."}, {"num": 4, "text": "Which of the following is a feature of a multinational company?", "options": {"A": "The company produces core products", "B": "The company produces standardised products for all markets", "C": "It has the culture of the country where the head office is based", "D": "Management develops worldwide strategies for all their markets", "E": "The company produces products with only minimal design changes for individual national markets"}, "answer": "C", "explanation": "**Why C is correct:** A multinational company often incorporates the culture of its head office's country into its business practices, even when operating globally, to maintain consistency and brand identity.\n\n**Why the other options are wrong:**\nA. - This is incorrect as a multinational company can produce core products, but this is a characteristic of a conglomerate rather than a multinational company.\nB. - This option describes a characteristic of a transnational company, where standardised products are produced for all markets.\nD. - While this is a feature of a transnational company, a multinational company may not always have worldwide strategies for all their markets.\nE. - This option best describes a characteristic of a multinational company, where products are designed with minimal modifications for individual national markets.\n\n**Key concept:** The characteristics of multinational companies under the topic of Multinational Corporations."}, {"num": 5, "text": "Which of the following is an advantage of “sells style” of leadership?", "options": {"A": "Not dictatorial", "B": "Has greater interest and involvement for subordinates", "C": "Has stronger motivation amongst subordinates", "D": "Allows subordinates to contribute their knowledge and experience to the decision-making process", "E": "Provides opportunity for subordinates to gain better insights and understanding"}, "answer": "A", "explanation": "**Why A is correct:** The 'sells style' of leadership is characterized by not being dictatorial, which means leaders make efforts to listen to others and involve them in the decision-making process. This leadership style encourages collaboration and participation. It is distinct from authoritarian or autocratic management styles.\n\n**Why B is wrong:** B is wrong because the 'sells style' is actually associated with leaders who are not task-oriented and may not have greater interest and involvement for subordinates.\n\n**Why C is wrong:** C is incorrect as there is no direct link between the 'sells style' and motivation amongst subordinates, it is more focused on leadership approach rather than motivation.\n\n**Why D is wrong:** D is wrong because this option is better suited to the 'team management' or 'participative leadership' styles rather than the 'sells style'.\n\n**Why E is wrong:** E is incorrect because while selling style leaders may have their subordinates perform better it does not guarantee better insights and understanding among subordinates.\n\n**Key concept:** The specific leadership style being tested is the 'sells style', a leadership approach described by Blake and Mouton."}, {"num": 6, "text": "Which of the following is a limitation of video conferencing?", "options": {"A": "Eye contact", "B": "Telecommuting", "C": "Hiring and retention", "D": "Competitive advantage", "E": "Short-notice meetings"}, "answer": "A", "explanation": "**Why A is correct:** When using video conferencing, maintaining eye contact with participants or presenters can be challenging, disrupting the usual non-verbal cues essential in face-to-face communication. This can lead to distractions, misunderstandings, or impaired communication effectiveness. It affects the tone and engagement in meetings or presentations.\n\n**Why the other options are wrong:**\nA. B is wrong because telecommuting, or working remotely, can actually be a benefit facilitated by video conferencing, not a limitation.\nC. D is wrong because competitive advantage might be gained through adopting and effectively implementing video conferencing, making it an advantage rather than a limitation.\nE. E is wrong because video conferencing can facilitate short-notice meetings, making it a convenient option in today's digital age.\n\n**Key concept:** Effective use of technology in communication and collaboration within modern business settings."}, {"num": 7, "text": "Which of the following describes the general nature of the role of having concern for people’s feelings?", "options": {"A": "Plant", "B": "Monitor", "C": "Specialist", "D": "Evaluator", "E": "Coordinator"}, "answer": "E", "explanation": "**Why E is correct:** \nThe role of 'Coordinating' implies a manager ensuring that different aspects within an organisation work together smoothly, which often involves concern for people's feelings as they need to manage team dynamics, resolve conflicts and foster a positive working environment. A coordinator is also responsible for overseeing various functions within the organisation, which may require them to handle interpersonal interactions. This role involves consideration of employees' emotions and well-being.\n\n**Why the other options are wrong:**\nA. The role of 'Plant' is more associated with operations where manufacturing or production takes place, and is not directly linked to an employee's concern for people's feelings.\nB. A 'Monitor' is typically an auditor who tracks and investigates activities within an organisation, which may involve identifying areas for improvement but is not the primary focus of concern for people's feelings.\nC. A 'Specialist' often possesses a specific skill set or expertise in a particular area, but this does not directly imply a general concern for people's feelings.\nD. The role of 'Evaluator' involves assessing or reviewing the performance or efficiency of an individual, project or function, which is a distinct function from managing interpersonal relationships.\n\n**Key concept:** The importance of interpersonal skills and people management within an organisation, specifically how they contribute to a healthy work environment."}, {"num": 8, "text": "Bruce Tuckman provided an analysis of how small teams develop and change character over time. The following were presented as stages of team development, EXCEPT", "options": {"A": "Restoring", "B": "Forming", "C": "Norming", "D": "Performing", "E": "Storming"}, "answer": "A", "explanation": "**Why A is correct:** Bruce Tuckman did not include 'Restoring' in his original team development stages. 'Restoring' does not form part of his model of group development. Tuckman's model consists of four distinct stages, which are different from the provided option.\n\n**Why B is wrong:** B - Forming. Forming is indeed a stage in Bruce Tuckman's team development model, where team members are trying to establish their roles and find their place within the team.\n\n**Why C is wrong:** C - Norming. Norming is also a valid stage in Tuckman's model, where team members develop relationships and clarify expectations.\n\n**Why D is wrong:** D - Performing. Performing is another stage in Tuckman's development model, representing the stage at which team members have developed into an effective team.\n\n**Why E is wrong:** E - Storming. Storming is the final stage of Tuckman's model, where team members may experience conflict but have begun to understand and establish roles and communication within the team.\n\n**Key concept:** Bruce Tuckman's model of group development includes four stages: Forming, Storming, Norming, and Performing."}, {"num": 9, "text": "According to the works of Warren Bennis, which of the following characteristics describes a manager?", "options": {"A": "Develops", "B": "Innovates", "C": "Administers", "D": "Inspires trust", "E": "Transforms"}, "answer": "C", "explanation": "**Why C is correct:** Warren Bennis' works suggest that 'management' is more about the ability to administer (i.e., maintain and preserve) the organization as opposed to other key roles. Effective administration involves the efficient use of resources to achieve organizational goals.\n\n**Why other options are wrong:**\nA - Warren Bennis' work suggests that the entrepreneurial function is linked with innovation, which is not the primary function of a manager.\nB - Innovation is more associated with the entrepreneurial aspect of the organization and not directly linked to the primary role of a manager.\nD - Inspiring trust, although important for management, is a characteristic of leadership rather than management.\nE - Transformation is also an attribute of a leader rather than a manager, as it requires more strategic vision.\n\n**Key concept:** This question tests understanding of the different management functions and the distinction between management and leadership."}, {"num": 10, "text": "ONE of the essential features of Theory Z as put forward by Wiiliam Ouchi is", "options": {"A": "Life time employment machine is available for purchase at a cost of N160 million. The company expects", "B": "Collective responsibility", "C": "Non-specialised career path", "D": "Implicit (informal) control mechanisms", "E": "Wider concern for the employees and their families Use the following information to answer Questions 11 and 12 the machine to have a life of five years and to have a scrap value of N20 million at the end of the five year period. It has been estimated that it will generate additional profits over its life as follows: Year      Estimated cashflows (N’m) 1                40 2                80 3                60 4                30 5                10"}, "answer": "E", "explanation": "**Why E is correct:** William Ouchi's Theory Z emphasizes the importance of a broader focus on employee welfare beyond just salary and benefits, encompassing their personal and family lives.\n\n**Why the other options are wrong:**\nA. - This option is talking about a monetary amount and is not related to the features of Theory Z.\nB. - Collective responsibility is actually more associated with Theory X, where employees are seen as untrustworthy and individual responsibility is low.\nC. - Non-specialized career path is not a key feature of Theory Z.\nD. - Implicit control mechanisms is not mentioned in the context of William Ouchi's Theory Z.\n\n**Key concept:** This question tests your knowledge of organizational theory and management styles, specifically William Ouchi's Theory Z."}, {"num": 11, "text": "The return on (original) investment is", "options": {"A": "10%", "B": "15%", "C": "20%", "D": "25%", "E": "30%"}, "answer": "A", "explanation": "**Why A is correct:** The correct answer is 10% because it is the original cost price that is returned, usually in the form of dividends, interest, or capital gains.\n\n**Why the other options are wrong:**\nA.\nThis would be the result of calculating the rate of return, which is different from the return on original investment.\n\nB.\nThis option exceeds the value of the original investment, which is not feasible in this context.\n\nC.\nThis option is higher than expected for a return on the original investment and is not a realistic outcome.\n\nD.\nThis option still exceeds the value of the original investment and is unrealistic for this scenario.\n\nE.\nThis option is far too high and does not align with the concept of returning the original investment.\n\n**Key concept:** The calculation of return on original investment, a key concept in the calculation of investment returns and performance."}, {"num": 12, "text": "The return on average investment is", "options": {"A": "15.78%", "B": "16.78%", "C": "17.78%", "D": "18.78%", "E": "19.78%"}, "answer": "C", "explanation": "**Why C is correct:** Return on Average Investment (ROAI) is a measure of the returns generated by an investment portfolio, calculated as the average annual income from the investment divided by the initial investment value, multiplied by 100 to express it as a percentage, in this case 17.78%.\n\n**Why the other options are wrong:**\nA. This is incorrect because the specific percentage is not 15.78%.\nB. This is incorrect because the specific percentage is not 16.78%.\nD. This is incorrect because the specific percentage is not 18.78%.\nE. This is incorrect because the specific percentage is not 19.78%.\n\n**Key concept:** The question tests the understanding of the Return on Average Investment (ROAI) concept in the Business & Finance syllabus."}, {"num": 13, "text": "Which of the following is NOT a part of the espoused values of culture as propounded by Schein?", "options": {"A": "Philosophies", "B": "Ethics", "C": "Strategies", "D": "Processes", "E": "Goals"}, "answer": "D", "explanation": "**Why D is correct:** Schein's work on organizational culture does not directly include processes as part of its espoused values. Instead, processes are considered part of the observable artifacts of an organization's culture. Processes are more about the day-to-day activities, whereas espoused values focus on the underlying philosophies and statements that guide an organization.\n\n**Why A is wrong:** Philosophies are indeed a part of an organization's espoused values, according to Schein, which are the core beliefs and underlying assumptions that guide organizational behavior.\n\n**Why B is wrong:** Ethics are considered a type of goal or aspiration within Schein's framework of organizational culture, rather than a separate category of espoused values.\n\n**Why C is wrong:** Strategies are part of Schein's observed actions category of organizational culture, not its espoused values.\n\n**Why E is wrong:** Goals are indeed an integral part of an organization's espoused values, which represent a type of goal or aspiration for a specific outcome or state of being.\n\n**Key concept:** This question tests the understanding of Schein's framework for organizational culture, specifically the distinction between espoused values, observed actions, and artifacts."}, {"num": 14, "text": "Consequent upon the global pandemic, a company is about to take a decision to shut down a food processing plant. The management will therefore best describe one of the stakeholder groups that has small power to influence its decision but has a strong interest on the issue as a group.", "options": {"A": "Of key players", "B": "With minimal effort", "C": "To keep satisfied", "D": "To follow intently", "E": "To keep informed"}, "answer": "E", "explanation": "**Why E is correct:** The phrase 'To keep informed' accurately describes a stakeholder group with small power to influence a decision, but with a strong interest in the issue, which fits the context of the company shutting down a food processing plant. This group may be customers or local residents who are affected by the decision but have limited ability to impact it. \n\n**Why the other options are wrong:**\nA. Of key players - This option suggests a group with significant influence, not a group with small power to influence the decision.\nB. With minimal effort - This option is vague and does not describe a stakeholder group in the context of the decision.\nC. To keep satisfied - This option focuses on an outcome rather than describing a type of stakeholder group.\nD. To follow intently - This option implies that the stakeholder group wants to closely observe the decision-making process, not that they have small power to influence it.\n\n**Key concept:** Stakeholder analysis and categorization based on power and interest (Salancik and Pfeffer, 1977)."}, {"num": 15, "text": "Which of the following characteristics describes a formal organisation?", "options": {"A": "Network of social relationships", "B": "Focus on people and not the work", "C": "Develop common rules of behaviour and norms", "D": "Have organisation charts with job descriptions", "E": "Network of personal relationship"}, "answer": "D", "explanation": "**Why D is correct:** A formal organisation is typically characterised by a structured hierarchical system, with organisation charts outlining job roles and responsibilities. This structured system is a key aspect of formal organisations, making option D a correct description. It allows for effective management and implementation of organisational policies.\n\n**Why A is wrong:** A network of social relationships is a characteristic more commonly associated with informal organisations, rather than formal organisations.\n\n**Why B is wrong:** A focus on people rather than the work is a characteristic of informal organisations.\n\n**Why C is wrong:** While formal organisations do develop rules and norms, this is a characteristic shared with both formal and informal organisations, making it an insufficient description of a formal organisation.\n\n**Why E is wrong:** A network of personal relationships is a characteristic of informal organisations.\n\n**Key concept:** The organisational structure of businesses and the difference between formal and informal organisations."}, {"num": 16, "text": "The following are described as part of the disadvantages to offshore outsourcing, EXCEPT", "options": {"A": "Publicity for transferring jobs to other countries", "B": "Core competences", "C": "Political risk", "D": "Language differences", "E": "Poor communication"}, "answer": "B", "explanation": "**Why B is correct:** Core competences are actually considered as one of the advantages of outsourcing. Companies often outsource functions which are not their core competences, allowing them to focus on their strengths.\n\nA. Publicity for transferring jobs to other countries - This is indeed a disadvantage of offshore outsourcing, as it can lead to negative publicity and damage to the company's reputation.\nB. - There is no explanation for option B.\nC. Political risk - Political risk, such as changes in laws or regulations, can be a significant disadvantage of offshore outsourcing.\nD. Language differences - Language differences can cause communication barriers, leading to misunderstandings and errors.\nE. Poor communication - Poor communication can be a disadvantage of offshore outsourcing due to the geographical distance and language barriers.\n\n**Key concept:** Identifying the disadvantages of offshore outsourcing."}, {"num": 17, "text": "An arrangement between rival firms in an industry to operate the same policies on pricing is called", "options": {"A": "Cartel", "B": "Alliance", "C": "Franchising", "D": "Collaboration", "E": "Joint venture"}, "answer": "A", "explanation": "**Why A is correct:** A cartel refers to a group of firms within the same industry coordinating their actions, including pricing policies, to create a monopoly-like effect.\n\n**Why the other options are wrong:**\n- B. Alliance: An alliance is a loose collaboration between firms, not specifically focused on pricing policies.\n- C. Franchising: Franchising involves a parent company granting a license to use its brand, products, or services to a franchisee.\n- D. Collaboration: Collaboration is a general term for firms working together, which does not specifically imply a coordinated pricing policy.\n- E. Joint venture: A joint venture is a temporary partnership between two or more firms to pursue a specific project or business opportunity, not specifically related to pricing policies.\n\n**Key concept:** The formation and effects of anti-competitive collaborations, such as cartels."}, {"num": 18, "text": "The market for treasury bills is called", "options": {"A": "Money market", "B": "Discount market", "C": "Financial system", "D": "Capital market", "E": "Intermediation market"}, "answer": "A", "explanation": "**Why A is correct:** The money market is where short-term financial instruments, including treasury bills, are traded to provide funding for businesses and governments.\n\n**Why B is wrong:** The term 'discount market' is not a commonly used term to describe the market for treasury bills.\n**Why C is wrong:** The financial system is a broader concept that encompasses various markets, including the money market.\n**Why D is wrong:** The capital market is a market for medium and long-term securities, excluding treasury bills.\n**Why E is wrong:** An intermediation market is not a recognized term for the market of treasury bills.\n\n**Key concept:** Identification of financial markets - a key topic tested in the ICAN Business and Finance (Foundation Level) examination."}, {"num": 19, "text": "Most e-mail systems support the use of folders to help you manage and file your e-mails. The e-mail system will normally include some standard folders, EXCEPT", "options": {"A": "Inbox", "B": "Sent", "C": "Maps", "D": "Deleted", "E": "Drafts"}, "answer": "C", "explanation": "**Why C is correct:** The folder \"Maps\" is not a standard folder that is typically included in e-mail systems. This is because \"Maps\" is related to geographic information and navigation, which is not relevant to e-mail management. The use of \"Maps\" as a folder is unrelated to e-mail storage and retrieval.\n\n**Why the other options are wrong:**\nA. Inbox is a standard folder for storing incoming e-mails.\nB. Sent is a standard folder for storing e-mails that have been sent by the user.\nD. Deleted is a standard folder for temporarily storing e-mails that are waiting to be permanently deleted.\nE. Drafts is a standard folder for storing uncompleted or partially written e-mails.\n\n**Key concept:** The key concept tested here is the features and standard folders typically included in e-mail systems."}, {"num": 20, "text": "According to the Process theory, individuals are motivated differently and the strength of their motivation depends on a variety of factors. Which of the following is NOT a factor of motivation?", "options": {"A": "Wants", "B": "Rewards", "C": "Personality", "D": "Perceptions", "E": "Expectations Marking guide 1 mark for each correct option.                                            20 marks SECTION B:                   OPEN-ENDED QUESTIONS                        (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ATTEMPT ANY FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 a.   Explain the following business concepts: i. Business environment ii. Environmental scanning                                             (6 Marks) b.   State FOUR importance of environmental scanning                        (4 Marks) c.   State and explain the TWO methods of analysing environmental factors (10 Marks) (Total 20 Marks) QUESTION 2 The main stakeholders in a business organisation, internal or external, are those who exercise the greatest influence. Required: a.   Briefly explain the concept “stakeholder mapping” and state FIVE main features of employment.                                               (10 Marks) b.   Define the term “communication style” and explain briefly THREE components of communication style.                                          (10 Marks) (Total 20 Marks) QUESTION 3 a.   State TWO benefits and ONE drawback each of profession, employment and businesses with copious examples.                             (9 Marks) b.   State FIVE types of digital marketing.                                 (5 Marks) c.   State THREE reasons why government develop economic policy.     (6 Marks) (Total 20 Marks) QUESTION 4 a.   Business reports are written communication of factual information. Explain the following business report concepts: i.      Request for proposal ii.     Project progress report iii.    Performance appraisal report iv.     Feasibility report v.      Chairman’s annual report                                      (15 Marks) b.     State and explain TWO main policy approaches that governments use to meet macroeconomic objectives.                                       (5 Marks) (Total 20 Marks) QUESTION 5 a. Explain the following terms: i.     Business ethics                                                 (2 Marks) ii.    Whistle blowing                                                  (2 Marks) iii.   Ethical dilemma                                                  (2 Marks) iv.    Conflict of interests                                            (2 Marks) v.     Corporate code of ethics                                        (2 Marks) vi.    Principles-based code of ethics                                 (2 Marks) b.   State and explain TWO reasons why companies develop a code of ethics. (4 Marks) c.   It is a common assertion that the general public has high expectations of the accountancy profession. State TWO roles each that are expected of professional accountants and accountancy bodies in promoting ethical behaviour.    (4 Marks) (Total 20 Marks) QUESTION 6 a.   Explain the terms “motivation” and “productivity”.                      (5 Marks) b.   According to Vroom’s theory of motivation, state and explain TWO specific factors that determine the strength of an individual’s motivation. (5 Marks) c.   Achievement-motivated individuals are usually the ones who make things happen and get results. State FIVE distinctiveness of this group of individuals. (10 Marks) (Total 20 Marks) SECTION A"}, "answer": "A", "explanation": "**Why A is correct:** Wants are a need that has already been fulfilled, therefore, they cannot motivate an individual to take action. Motivation is driven by needs or unsatisfied wants. The Process theory focuses on the process of motivation rather than the source.\n\n**Why B is wrong:** B. Rewards - Rewards are a type of extrinsic motivator that can influence an individual's motivation through the prospect of gaining something desirable.\n\n**Why C is wrong:** C. Personality - Personality traits can play a significant role in an individual's motivation level and direction.\n\n**Why D is wrong:** D. Perceptions - Perceptions are an important factor in the Process theory of motivation as they influence how an individual evaluates and interprets their environment.\n\n**Why E is wrong:** E. Expectations - Expectations are a fundamental factor in motivation as they influence an individual's attitude and motivation towards specific tasks or goals.\n\n**Key concept:** The Process theory of motivation is a concept that explains how individuals are motivated through a series of processes, including needs, drives, and incentives."}], "answers": {"1": "A", "2": "B", "3": "C", "4": "C", "5": "A", "6": "A", "7": "E", "8": "A", "9": "C", "10": "E", "11": "A", "12": "C", "13": "D", "14": "E", "15": "D", "16": "B", "17": "A", "18": "A", "19": "C", "20": "A"}, "examiner_report": "This section of the paper comprises of twenty mandatory multiple choice questions. All candidates attempted the questions in this section. The questions tested candidates’ comprehension of the various aspects of the syllabus. Performance in this section was average. For better performance in future examinations, prospective candidates should cover the entire syllabus while preparing for this subject. ICAN study text and Pathfinder offer the required guidance. Marking guide Marks Marks Each correct option 1 20"}, {"session": "Nov 2022", "questions": [{"num": 1, "text": "Which of the following is NOT a feature of a professional?", "options": {"A": "A profession can be described as an occupation for which the individual has to acquire a special knowledge and skill", "B": "Professionals are usually paid a prescribed fee to render their services", "C": "Most professionals are regulated by professional body", "D": "Professionals are not to opt for a paid job", "E": "Professionals typically acquire specialised knowledge from higher institutions and specialised institutes"}, "answer": "D", "explanation": "**Why D is correct:** A professional is expected to earn a living by providing services to clients, so accepting paid jobs is not incompatible with being a professional.\n\n**Why the other options are wrong:**\nA. It is a characteristic of a profession to require specialized knowledge and skill.\nB. Professionals are typically paid for their services, but this does not necessarily mean they are paid a prescribed fee.\nC. Many professionals are indeed regulated by a professional body.\nE. It is true that professionals acquire specialized knowledge from higher institutions and specialized institutes.\n\n**Key concept:** Characteristics of a profession."}, {"num": 2, "text": "", "options": {"A": "manufacturer of soft drinks that has separate divisions for America, Europe, Far East, Africa, Middle East and the rest of the world is an example of Strategic business units (SBUs)", "B": "Geographical divisional structure", "C": "Divisional structure", "D": "Product divisional structure", "E": "Matrix structure"}, "answer": "B", "explanation": "**Why B is correct:** A geographical divisional structure is a form of divisional structure where the organization is divided based on geographical regions. This structure is suitable for multinational companies. The example given in the options, a manufacturer of soft drinks with divisions for America, Europe, Far East, and so on, is a classic illustration of this structure.\n\nA. This option is wrong because 'manufacturer of soft drinks that has separate divisions for America, Europe, Far East, Africa, Middle East and the rest' is just an example of what type of business uses divisional structure, not the description of a structure itself.\n\nB. This statement is already the correct answer.\n\nC. This option is wrong because divisional structure is a broader concept that can be further categorized into geographical, product, and functional divisions.\n\nD. This option is wrong because product divisional structure is a different type of divisional structure that organizes the company based on product types.\n\nE. Matrix structure is a different organizational structure that combines two or more structures, usually functional and divisional, and does not relate to geographical division."}, {"num": 3, "text": "Which type of culture is best-suited for a large organisation in a fairly stable business environment?", "options": {"A": "Task culture", "B": "Power culture", "C": "Boss culture", "D": "Personal culture", "E": "Role culture"}, "answer": "E", "explanation": "**Why E is correct:** Role culture is best-suited for a large organisation in a fairly stable business environment because it is structured and bureaucratic, allowing for efficient communication and decision-making across multiple levels. This structure promotes predictability, stability, and accountability. It is ideal for large organisations with a clear hierarchy.\n\n**Why the other options are wrong:**\nA. Task culture is best-suited for a crisis or emergency situation.\nB. Power culture is typically present in small organisations or start-ups, where a dominant leader or founder holds significant influence.\nC. Boss culture is often found in small, autocratic organisations where decision-making is centralized around a single leader.\nD. Personal culture is present in organisations with a strong leader who drives the vision, but it may not be suitable for the stability required in a large organisation.\n\n**Key concept:** Organisational culture types."}, {"num": 4, "text": "", "options": {"A": "law designed to protect individual against others collecting, holding and using information about them without their permission is called Data protection law", "B": "Employment law", "C": "Competition law", "D": "Health and safety law", "E": "Legalised law"}, "answer": "A", "explanation": "**Why A is correct:** \nA is correct because it refers to the Data Protection Act, which aims to protect individuals from the collection, storage, and use of their personal information without their consent.\n\n**Why B is wrong:** B is incorrect as employment law relates to the relationship between employers and employees.\n**Why C is wrong:** C is incorrect as competition law focuses on promoting competition and preventing anti-competitive practices in business.\n**Why D is wrong:** D is incorrect as health and safety law deals with ensuring a safe working environment and protecting employees from workplace hazards.\n**Why E is wrong:** E is incorrect as it is an ambiguous term and not relevant to this context.\n**Key concept:** Data Protection and the Data Protection Act are key concepts in this question."}, {"num": 5, "text": "Which of the following is NOT an example of economies of scale?", "options": {"A": "Generate better efficiency through larger quantities of output", "B": "Able to employ specialist managers to increase efficiencies", "C": "Able to buy and sell in retail at more optimal prices", "D": "Able to demand better interest rates with more assets as collateral", "E": "Firms clustering together to develop specialised labour force"}, "answer": "C", "explanation": "**Why C is correct:** Economies of scale do not apply to retail markets because it involves buying and selling in small quantities, which is the opposite of what economies of scale typically involve (large quantities). Retail businesses cannot benefit from reduced average costs due to the scale of operations. Optimal pricing is achieved through supply and demand, not economies of scale.\n\n**Why the other options are wrong:**\nA. Economies of scale can indeed lead to better efficiency through larger quantities of output.\nB. Specialist managers can increase efficiencies and contribute to economies of scale.\nD. Possessing large assets can allow a business to demand better interest rates, an example of economies of scale.\nE. Firms clustering together to develop a specialised labour force can lead to economies of scale.\n\n**Key concept:** Economies of scale is the term used to describe a situation where a business unit is able to reduce its costs per unit by expanding operations and producing or providing more goods and services."}, {"num": 6, "text": "The use of mathematical techniques to solve financial problems is called", "options": {"A": "Financial mathematics", "B": "Financial engineering", "C": "Financial accounting", "D": "Management accounting", "E": "Financial management"}, "answer": "B", "explanation": "**Why B is correct:** Financial engineering refers to the application of advanced mathematical and statistical techniques to solve complex financial problems, including risk management, pricing, and portfolio optimization. This field requires the use of techniques such as option pricing models, risk analysis, and derivatives. It is an essential area in finance where mathematical techniques are used to solve financial problems. \n\nA. Financial accounting refers to the process of maintaining and presenting financial information for a company, but it does not involve the use of advanced mathematical techniques.\nB. Financial engineering is the correct answer as defined above.\nC. Financial accounting focuses on financial reporting and compliance, not the application of mathematical techniques to solve financial problems.\nD. Management accounting is concerned with internal decision-making, but it does not involve the use of mathematical techniques in the same way as financial engineering.\nE. Financial management encompasses general management of finance but does not specifically refer to the use of mathematical techniques.\n\n**Key concept:** Advanced use of mathematical and statistical techniques to solve financial problems and manage risk."}, {"num": 7, "text": "", "options": {"A": "method of issuing new shares to a relatively small number of selected investors is called Rights issue", "B": "Public offer", "C": "Placing", "D": "Initial offer", "E": "General offer"}, "answer": "C", "explanation": "**Why C is correct:** A placing is a method of issuing new shares directly to a relatively small number of selected investors, often institutional investors or large shareholders. This method allows the company to raise capital quickly and discreetly. It is used by companies that prefer not to issue new shares to the general public.\n\n**Why A is wrong:** A rights issue is a method of issuing new shares to existing shareholders, usually with a discount to the market price, allowing them to purchase additional shares.\n**Why B is wrong:** A public offer is a method of issuing new shares to the general public, through an advertisement in the media or a prospectus issued to the investing public.\n**Why D is wrong:** An initial offer refers to the first public offer or listing of a company's shares on an exchange, such as an initial public offering (IPO).\n**Why E is wrong:** A general offer is not a term used to describe a specific method of issuing new shares.\n\n**Key concept:** This question tests the student's knowledge of methods of issuing new shares, a key concept in business finance."}, {"num": 8, "text": "", "options": {"A": "constant annual cash-flow to infinity is called Perpetuity", "B": "Sinking funds", "C": "Compound interest", "D": "Loan", "E": "Annuity"}, "answer": "A", "explanation": "**Why A is correct:** \nA is correct because a perpetual stream of constant annual cash-flows to infinity is indeed called a perpeutity. This concept is used in financial calculations, especially with annuities or fixed payments. Perpeutity is essentially an endless series of equal payments made at equal intervals.\n\n**Why the other options are wrong:**\nB. Sinking funds are a specific investment vehicle designed for long-term goals, unrelated to constant annual cash-flow to infinity.\nC. Compound interest is the concept of interest on interest, but not directly related to constant annual cash-flow to infinity.\nD. Loan is a type of financial agreement where one party borrows money from another, which is not directly related to constant annual cash-flow to infinity.\nE. Annuity is a series of equal payments made at equal intervals, but it does not necessarily extend to infinity.\n\n**Key concept:** The question tests the concept of 'perpeuty', which is an essential part of time value of money (TVOM) chapter in Financial Management."}, {"num": 9, "text": "", "options": {"A": "series of regular periodic payments of equal amount is called Interest payments", "B": "Sinking funds", "C": "Compound interest", "D": "Simple interest", "E": "Annuity"}, "answer": "E", "explanation": "**Why E is correct:** An annuity is defined as a series of regular periodic payments of equal amount, which matches the description in the stem.\n\n**Why the other options are wrong:**\nA. series of regular periodic payments of equal amount is called Interest payments - This is not the correct term, although interest may be involved.\nB. Sinking funds - This refers to a fund set aside to liquidate a long-term debt, not necessarily periodic payments.\nC. Compound interest - This is a method of calculating interest over time where the interest earned is reinvested.\nD. Simple interest - This is a method of calculating interest where the interest is calculated only on the principal amount and not on any accrued interest.\n\n**Key concept:** Definition of an Annuity."}, {"num": 10, "text": "The acronym „IESBA‟ denotes", "options": {"A": "International Ethical Standards Board for Accountants", "B": "International Ethics Standards Boards for Accountants", "C": "International Ethics Standard Board for Accountants", "D": "International Ethics Standards Board for Accountants", "E": "International Ethic Standard Board for Accountants"}, "answer": "D", "explanation": "**Why D is correct:** IESBA is the acronym for the professional body that issues the Code of Ethics for Professional Accountants, which is International Ethics Standards Board for Accountants. This organization is responsible for setting ethical standards for accountants worldwide. D is the correct answer as it correctly spells out the organization's full name.\n\n**Why the other options are wrong:**\nA. International Ethical Standards Board for Accountants - \"Ethical Standards\" should be \"Ethics Standards\".\nB. International Ethics Standards Boards for Accountants - \"Boards\" should be \"Board\" to maintain consistency.\nC. International Ethics Standard Board for Accountants - \"Standards\" should be \"Standards Board\" to be consistent with D.\nE. International Ethic Standard Board for Accountants - \"Ethic\" should be \"Ethics\" to maintain consistency with IESBA's actual name.\n\n**Key concept:** The IESBA Code of Ethics for Professional Accountants."}, {"num": 11, "text": "The front line management in a typical organisation is also called", "options": {"A": "Administrative management", "B": "Staff management", "C": "General management", "D": "Supervision", "E": "Middle level management"}, "answer": "D", "explanation": "**Why D is correct:** Front-line management in a typical organisation refers to the supervision of staff at the operational level, ensuring smooth execution of tasks. This involves directing and overseeing the activities of employees, which is a key responsibility of supervisors. Therefore, D. Supervision is the correct answer.\n\n**Why the other options are wrong:**\nA. Administrative management refers to the management function of providing support services, which is not the same as front-line management.\nB. Staff management involves dealing with human resources issues, such as recruitment and training, which is not the core of front-line management.\nC. General management refers to the overall management of an organisation, overseeing its overall strategy and direction, which is not specific to front-line management.\nE. Middle level management involves managing groups of departments or teams, which is above the level of front-line management."}, {"num": 12, "text": "The leadership model which states that effective leaders need full command of three aspects of leadership which include task, team and individual was propounded by", "options": {"A": "John Adair", "B": "Warren Bennis", "C": "John Kotter", "D": "Max Weber", "E": "Elton Mayo"}, "answer": "A", "explanation": "**Why A is correct:** John Adair's Action Centered Leadership model indeed emphasizes the need for effective leaders to possess skills in the three main aspects of leadership: task, team, and individual.\n\n**Why B is wrong:** Bennis's leadership model focuses on transformational leadership and the role of charisma in leadership.\n**Why C is wrong:** Kotter's model emphasizes leading change in organizations.\n**Why D is wrong:** Weber's theories primarily deal with bureaucracy, not leadership.\n**Why E is wrong:** Mayo's leadership model is centered around the Hawthorne studies, which focused on organizational behavior and employee satisfaction.\n\n**Key concept:** Leadership models and theories."}, {"num": 13, "text": "The expectancy theory of motivation was developed by Victor Vroom in the year", "options": {"A": "1954", "B": "1964", "C": "1974", "D": "1984", "E": "1994"}, "answer": "B", "explanation": "**Why B is correct:** Victor Vroom developed the expectancy theory of motivation in 1964, a concept where employees are motivated when they believe their efforts will lead to desired outcomes. This theory emphasizes the importance of expectations in employee motivation. The expectancy theory is widely used in organizational behavior and management.\n\n**Why the other options are wrong:**\nA. 1954 - This is the year Frederick Herzberg's two-factor theory was published.\nB. No other option is correct.\nC. 1974 - This year is associated with the publication of Douglas McGregor's Theory X and Theory Y.\nD. 1984 - This year is relevant to the publication of Michael Porter's work on competitive strategy.\nE. 1994 - This is not a relevant year for the development of the expectancy theory of motivation.\n\n**Key concept:** The expectancy theory of motivation."}, {"num": 14, "text": "Which of the following is NOT a team role as suggested by Belbin?", "options": {"A": "Team implementer", "B": "Specialist", "C": "Plant", "D": "Despot", "E": "Team organiser"}, "answer": "D", "explanation": "**Why D is correct:** Belbin identified eight team roles, including Team Implementer, Specialist, Plant, Team Organiser, Monitor/Evaluator, Company Worker, Resource Investigator, and Coordinator. Despot was not listed as one of Belbin's team roles, and it does not match the characteristics of his identified roles.\n\n**Why the other options are wrong:**\nA. Team implementer is one of Belbin's team roles.\nB. Specialist is also a team role identified by Belbin.\nC. Plant is another of Belbin's team roles.\nE. Team organiser is one of Belbin's team roles.\n\n**Key concept:** Belbin's Team Roles."}, {"num": 15, "text": "", "options": {"A": "written communication of factual information on a specific subject presented in an orderly and formal manner is called Official report", "B": "Formal communication", "C": "Business report", "D": "Business proposal", "E": "Horizontal communication"}, "answer": "A", "explanation": "**Why A is correct:** \nThis option accurately describes a document called an 'overview' or 'outline' which is often abbreviated as 'O', used for written communication that presents factual information in a formal and orderly manner.\n\n**Why the other options are wrong:**\nB. This option is too broad, as 'formal communication' encompasses various forms of written and oral communication.\nC. 'Business report' is a type of document that presents factual information and analysis, but it is not specifically referred to as just 'O'.\nD. A 'business proposal' is used for suggesting a plan or idea and is not typically characterized by the description provided in option A.\nE. 'Horizontal communication' refers to information flow between individuals at the same hierarchical level and has no relation to option A's description.\n\n**Key concept:** The question is testing the understanding of the types of formal communication documents used in a business setting."}, {"num": 16, "text": "", "options": {"A": "communication between people at a similar level in the organisation‟s management hierarchy is called Vertical communication", "B": "Oral communication", "C": "Written communication", "D": "Formal communication", "E": "Lateral communication"}, "answer": "E", "explanation": "**Why E is correct:** E is the correct answer because lateral communication refers to the exchange of information between individuals at the same level in an organisation's management hierarchy or between different departments.\n\n**Why the other options are wrong:**\nA. is incorrect because vertical communication involves communication between people at different levels in the organisation's management hierarchy.\nB. is incorrect because oral communication is a method of communication rather than a type of communication.\nC. is incorrect because written communication is another method of communication rather than a specific type.\nD. is incorrect because formal communication has a specific context and does not necessarily refer to the relationship of participants in the org chart.\n\n**Key concept:** The key concept tested here is types of organisational communication."}, {"num": 17, "text": "Which of the following is NOT a key issue to be addressed when preparing a business report?", "options": {"A": "Relevance", "B": "Impact", "C": "Cost effectiveness", "D": "Clarity", "E": "Draft"}, "answer": "E", "explanation": "**Why E is correct:** The draft stage of a business report is focused on the creation, rather than evaluation, of the report, making it not a key issue to be addressed when preparing the final report.\n\n**Why the other options are wrong:**\nA. Relevance is indeed a key issue, as the report should answer the management's information needs.\nB. Impact is crucial, as the report should have a positive impact on the organization.\nC. Cost effectiveness is essential, as the report should be an efficient use of resources.\nD. Clarity is vital, as the report should be easy to understand and interpret.\n\n**Key concept:** Effective Communication."}, {"num": 18, "text": "", "options": {"A": "fixed sum of money set aside by an organisation at regular intervals to achieve a specific sum at some future point in time is called Savings", "B": "Sinking fund", "C": "Investment", "D": "Strategic management", "E": "Loan notes"}, "answer": "B", "explanation": "**Why B is correct:** A sinking fund is a fund set aside by an organisation to achieve a specific sum at some future point in time, making option B the correct answer.\n\n**Why the other options are wrong:**\nA. Fixed sum of money set aside to achieve a specific sum at a future point in time is incorrect because it describes a sinking fund, not a fixed sum itself.\nB. (Already stated as the correct answer)\nC. Investment is incorrect because it is a purchase or acquisition of a financial asset, not a fund set aside for a future amount.\nD. Strategic management is incorrect because it refers to planning and management within an organisation, not a financial concept related to saving funds.\nE. Loan notes are incorrect because they are documents that evidence an amount borrowed from a lender, not a fund set aside by an organisation.\n \n**Key concept:** Amortisation of debt and sinking funds."}, {"num": 19, "text": "Shareholders‟ wealth could be increased by dividend payments and", "options": {"A": "Profitability", "B": "High share price", "C": "Interest", "D": "Surplus", "E": "Productivity"}, "answer": "B", "explanation": "**Why B is correct:** \nA high share price implies that shareholders have a more valuable investment, increasing their wealth. When a company's share price rises, shareholders can sell their shares at the higher price, resulting in a capital gain. Dividend payments can contribute to a high share price by attracting more investors and increasing demand for the company's shares.\n\n**Why the other options are wrong:**\nA. Profitability by itself doesn't guarantee a high share price, as it depends on multiple factors such as industry performance and market conditions.\nB. High profitability might attract investors and increase the share price, but it's not a direct indicator of increased wealth for shareholders.\nC. Interest is typically associated with debt financing, not shareholders' equity.\nD. Surplus refers to the excess of revenues over expenses, but it's not directly related to shareholder wealth.\nE. Productivity is a measure of efficiency, not a direct indicator of shareholder wealth.\n\n**Key concept:** The role of the stock market in increasing shareholder wealth through the impact of dividend payments on share price."}, {"num": 20, "text": "Which of the following is NOT an organic function of a large company?", "options": {"A": "Operations manager that wants to be successful in his or her business environment should", "B": "Finance", "C": "Strategic management", "D": "Administration", "E": "Procurement SECTION B:               OPEN-ENDED QUESTIONS                      (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ATTEMPT ANY FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 The dynamic nature of the business environment calls for managers of the twenty-first century to critically analyse their business environment for them to formulate and execute a highly competitive strategy that will aid the survival, growth and profitability of their organisations. Required: a.    List and explain briefly FIVE external stakeholders.              (10 Marks) b.    Explain briefly the following concepts: i.    Strategic alliance. ii.   Matrix organisation. iii.  Span of control. iv.   Supranational bodies. v.    Share awards.                                               (10 Marks) (Total 20 Marks) QUESTION 2 Organisations formulate financial plans and policies to guide financial managers on how to make effective financial decisions. Required: a.    Define the term “Corporate objective” and explain the THREE commonly - used financial objectives in most companies.                   (10 Marks) b.    State THREE expectations of a bank on how a company should use its overdraft facility.                                             (6 Marks) c.    State TWO disadvantages of Net Present Value (NPV) method.      (4 Marks) (Total 20 Marks) QUESTION 3 The following information was extracted from the books of Homom Nigeria Limited. Months            Sales    Materials     Wages Overheads N’000       N’000      N’000     N’000 February         40,000      20,400       7,600    3,800 March            42,000      20,000       7,600    4,200 April            46,000      19,600       8,000    4,600 May              50,000      20,000       8,400    4,800 June             60,000      21,600       9,000    5,000 i.   Sales collection were to be made as follows: 10% sales on cash basis. 50% of the credit sales are collected within one month of the sales and the balance in the following month. ii.   Payments are planned to be made for: Materials, 2 months after purchase. Wages, 80% in the month incurred and 20% in the following month. Overheads, 50% in the month incurred and 50% in the following month. iii. A machine will be installed in February at a cost of N100 million on which the monthly installments of N5 million is payable from April. iv. 10% dividend on preference share capital of N500 million will be paid in June. v. N40 million cash advance in respect of the sale of an automobile will be expensed in June. vi. Company income tax of N10 million is to be paid in June. vii. Balance at bank on April 1, 2022 is expected to be N16 million. Required: Prepare a monthly cash budget for the three months ending June, 2022. Show your workings.                                                (20 Marks) QUESTION 4 Employees differ in their basic motivational drive, therefore, it is the sole responsibility of the manager to find the best way to motivate his or her employees to get work done. Required: a.   Explain briefly the THREE primary mechanisms of reinforcement theory of motivation and state FOUR factors that shape the culture of an organisation.                                                 (10 Marks) b.   State FIVE categories of management responsibility as suggested by Peter Drucker.                                                     (10 Marks) (Total 20 Marks) QUESTION 5 An efficient manager maintains a culture of open and regular communication to resolve differences and create mutual understanding among members of the organisation. Required: a.    State FIVE characteristics of individual behaviour at workplace. (5 Marks) b.    Explain briefly the terms “electronic communication‟, „visual communication‟ and „non-verbal communication‟.                   (15 Marks) (Total 20 Marks) QUESTION 6 be able to make use of the various business analyses and models to know which products and markets to retain or grow. Required: a.    Explain briefly the concept of macroeconomics and state the THREE approaches that can be used to measure total economic activity during a given period of time.                                       (10 Marks) b.     List and explain briefly FIVE operations research techniques. (10 Marks) (Total 20 Marks) SOLUTIONS MCQ"}, "answer": "C", "explanation": "**Why C is correct:** Strategic management is not an organic function of a large company as it is considered a separate function and not an inherent or self-contained activity that occurs within the operational structure of the business. Organic functions focus on the core activities of production and sale of goods and services.\n\n**Why the other options are wrong:**\nA. Operations manager's role includes wanting to be successful in their business environment.\nB. Finance is a major function of a large company that includes financial planning, budgeting, and decision-making.\nD. Administration is a function that includes various support services such as human resources, information technology, and facility management.\nE. Procurement is a key part of the operational activities of buying goods and services.\n\n**Key concept:** The difference between organic and non-organic functions in a company, specifically highlighting that organic functions are core and operational while non-organic functions are separate."}], "answers": {"1": "D", "2": "B", "3": "E", "4": "A", "5": "C", "6": "B", "7": "C", "8": "A", "9": "E", "10": "D", "11": "D", "12": "A", "13": "B", "14": "D", "15": "A", "16": "E", "17": "E", "18": "B", "19": "B", "20": "C"}, "examiner_report": "Section A of the paper contains twenty compulsory multiple choice questions, and candidates attempted almost of the questions in this section. The questions test candidates‟ understanding of the various parts of the syllabus. Majority of the candidates attempted the question and performance was above average, Candidates are advised to fully cover the syllabus and make use of ICAN Study Text and Pathfinder for better performance in future examination. 66 NOT TO BE SOLD | Compiled by: Babatunde Isaiah | Email: ababatundeisaiah@gmail.com"}, {"session": "May 2023", "questions": [{"num": 1, "text": "The following features describe an ordinary partnership business, EXCEPT", "options": {"A": "There is an understanding that the partners‟ liabilities are limited to capital contributions", "B": "There is the risk of disagreement between partners", "C": "Partners bear the risk that decisions taken may turn out bad", "D": "A sleeping partner must be made personally liable for any unpaid debts of the business", "E": "Each partner‟s share of the profits is treated as an income for the purpose of calculating personal income tax"}, "answer": "D", "explanation": "**Why D is correct:** A sleeping partner is not made personally liable for any unpaid debts of the business. They are typically investors who do not participate in the management of the business and have limited liability. This is a key difference between a sleeping partner and a full partner.\n\nA. This option is incorrect as partners understand that their liabilities are generally unlimited in an ordinary partnership.\nB. This option is incorrect as disagreement among partners is indeed a feature of an ordinary partnership.\nC. This option is incorrect as partners do bear the risk that decisions taken may turn out bad.\nE. This option is incorrect as each partner's share of the profits is indeed treated as an income for the purpose of calculating personal income tax.\n\n**Key concept:** Unlimited liability in ordinary partnerships."}, {"num": 2, "text": "Which of the following may be considered as a disadvantage of a virtual organisation?", "options": {"A": "May lack culture", "B": "Has no physical hub", "C": "Has no centre of operations", "D": "May use part-time workers", "E": "May use self-employed individuals"}, "answer": "A", "explanation": "**Why A is correct:** A virtual organisation is a business that conducts operations through the use of information technology such as computers, telecommunications, and the internet, without the need for a physical presence. As a result, the organisation lacks the shared culture and community that develops within a traditional, brick-and-mortar organisation. This can lead to difficulties in fostering a sense of teamwork and collaboration among employees.\n\n**Why the other options are wrong:**\nB. Has no physical hub - A virtual organisation does not necessarily lack a physical hub, as it can still operate from various physical locations.\nC. Has no centre of operations - A virtual organisation can still have a centralised system of operations, even if it is not physically present.\nD. May use part-time workers - The use of part-time workers is not specific to virtual organisations, and can be employed by any type of business.\nE. May use self-employed individuals - The use of self-employed individuals is also not specific to virtual organisations, and can be employed by any type of business.\n\n**Key concept:** The key concept being tested in this question is the characteristics of a virtual organisation, highlighting the potential disadvantages of such a business structure."}, {"num": 3, "text": "In accordance with the provisions of CAMA 2020, which of the following is TRUE of a company limited by guarantee?", "options": {"A": "Must be owned by one person", "B": "N200,000 in nominal value of its share capital must have been issued", "C": "55% of the issued share capital of a company must have been paid up", "D": "The consent of the Attorney General of the Federation (“AGF”) must be obtained before incorporation", "E": "It is restricted from appointing a director to hold the office of the Chairman and Chief Executive Officer of the Company"}, "answer": "D", "explanation": "**Why D is correct:** The Companies and Allied Matters Act (CAMA) 2020 requires that every company limited by guarantee obtain the consent of the Attorney General of the Federation before incorporation. This provision ensures that the AGF is informed of any new entity formation. This requirement applies specifically to a Company Limited by Guarantee (CLG).\n\n**Why the other options are wrong:**\nA. This statement is false because a Company Limited by Guarantee (CLG) is not owned by one person; it is owned by guarantors.\nB. This statement is false because a Company Limited by Guarantee (CLG) does not have share capital, instead, it is capitalised by guarantors pledging to pay a nominal amount if the company is wound up.\nC. This statement is false because it does not relate specifically to the requirements of a Company Limited by Guarantee (CLG).\nE. This statement is false as there are no restrictions on appointing a director to hold the office of Chairman and Chief Executive Officer of a Company Limited by Guarantee (CLG).\n\n**Key concept:** Incorporated and Allied Matters Act 2020 (CAMA 2020) requirements for Company Limited by Guarantee (CLG) incorporation."}, {"num": 4, "text": "In respect of Public Limited Liability (PLC) companies, the position of CAMA 2020 is that upon incorporation", "options": {"A": "N200,000 in nominal value of its share capital must have been issued", "B": "N400,000 in nominal value of its share capital must have been issued", "C": "N2,000,000 in nominal value of its share capital must have been issued", "D": "N4,000,000 in nominal value of its share capital must have been issued", "E": "N20,000,000 in nominal value of its share capital must have been issued"}, "answer": "C", "explanation": "**Why C is correct:** CAMA 2020 requires that the minimum nominal value of share capital to be issued upon incorporation for a Public Limited Liability (PLC) company is N2,000,000. This is to ensure that new PLCs meet specific capital requirements for the public market. \n\n**Why B is wrong:** B is wrong because it states an incorrect minimum nominal value of share capital required upon incorporation for a PLC company.\n\n**Why D is wrong:** D is wrong because it exceeds the minimum required nominal value of share capital for a PLC company.\n\n**Why E is wrong:** E is wrong because it exceeds the minimum required nominal value of share capital for a PLC company.\n\n**Why A and Why F are not applicable:** They are wrong because A and the missing option F, would also respectively exceed or be lower than the minimum required nominal value of share capital for a PLC company.\n\n**Key concept:** The minimum share capital required for Public Limited Liability (PLC) company incorporation under the Companies and Allied Matters Act 2020 (CAMA 2020)."}, {"num": 5, "text": "", "options": {"A": "legally-binding promise, given in writing is termed Security", "B": "Covenant", "C": "Debt Relief", "D": "Warranties", "E": "Guarantee"}, "answer": "E", "explanation": "**Why E is correct:** A guarantee is a legally-binding promise, often given in writing, to ensure the fulfillment of an obligation or the fulfillment of a promise. This definition is a characteristic of a guarantee. It is the best match for the description provided.\n\n**Why the other options are wrong:**\nA. Legally-binding promise, given in writing is termed a contract, not security.\nB. A covenant is a contractual provision that affects the relationship between the parties to the agreement, not the type of binding promise described.\nC. Debt relief refers to a reduction or forgiveness of the debt owed by a borrower, not a binding promise.\nD. Warranties refer to promises of quality or performance about goods or services, which do not match the given description.\n\n**Key concept:** Guarantees are a type of assurance that is commonly used in commercial transactions to provide security or mitigate risk."}, {"num": 6, "text": "The following are characteristics of a limited liability partnership firm, EXCEPT", "options": {"A": "Capital for the business is provided by owners", "B": "Owned by several individuals working together", "C": "It does not require regulation of its financial reporting", "D": "Commercial decisions are made by senior partners", "E": "Liability for the unpaid debts and other obligations of the business is limited"}, "answer": "C", "explanation": "**Why C is correct:** Limited liability partnership (LLP) firms require regulation of their financial reporting, as per section 442 of the Companies Act 2006, and ICAEW's accounting requirements for LLPs. They need to maintain proper financial records and submit an 'Annual Return' and 'Accounts' to HMRC and Companies House. Their financial statements are not merely a requirement but also help stakeholders in making informed decisions.\n\n**Why A is wrong:** A is correct as it is indeed a characteristic of a limited liability partnership firm where capital for the business is provided by owners.\n\n**Why B is wrong:** B is correct as a limited liability partnership is formed by several individuals who are working together on a business basis, not necessarily as partners.\n\n**Why D is wrong:** D is correct as in an LLP, commercial decisions can indeed be made by senior partners or by any other decision-making body as agreed upon by the partners.\n\n**Why E is wrong:** E is correct as a limited liability partnership provides its members with limited liability, meaning that the liability for the unpaid debts and other obligations of the business is confined up to the amount they have invested."}, {"num": 7, "text": "Economic activities in a nation comprise of professional services businesses or employment. The following statements in respect of economic activities are correct, EXCEPT", "options": {"A": "Most businesses need employees to carry out their operations", "B": "Most employees do not contribute entrepreneurship to the economy", "C": "A growing economy does not need entrepreneurs and innovation to sustain its growth", "D": "Professionals and individuals in other specialised vocations contribute specialised skills", "E": "Professionals contribute value to clients and individuals by providing service of a high standard"}, "answer": "C", "explanation": "**Why C is correct:** A growing economy needs entrepreneurs and innovation to adapt and evolve, sustain economic growth, and create new opportunities. Without entrepreneurs and innovation, stagnation may occur, hindering long-term growth. This is evident as many examples show economies that have relied on a single industry or sector have struggled with decline when that industry contracted.\n\n**Why other options are wrong:**\nA. Most businesses need employees to carry out their operations - This is generally true as businesses cannot operate without personnel.\nB. Most employees do not contribute entrepreneurship to the economy - In many cases, employees bring innovative ideas and contribute to entrepreneurship by providing entrepreneurial spirit and skills in various forms.\nD. Professionals and individuals in other specialised vocations contribute specialised skills - This is correct as the provision of services in professional and skilled industries enhances economic development.\nE. Professionals contribute value to clients and individuals by providing service of a high standard - This statement is also correct as professional and skilled services offer value to both clients and the economy as a whole.\n\n**Key concept:** The role of entrepreneurship and innovation in sustaining economic growth."}, {"num": 8, "text": "", "options": {"A": "profession is an economic activity involving the provision of a personal service of a specialised nature. All the following features describe a profession, EXCEPT Main motive is to make a profit", "B": "Regulated by a professional body", "C": "Charges a fee for services rendered", "D": "Mandatory acquisition of a special knowledge and skill", "E": "Subject to discipline for breach of the code of conduct of the regulatory body"}, "answer": "A", "explanation": "**Why A is correct:** The definition of a profession in economics involves a personal service requiring special knowledge, skills, and training. A profession can indeed take many forms, but the key characteristics of specialization and personal service apply to all professions. This concept is relevant in understanding a profession as an economic activity.\n \n**Why B is wrong:** B only refers to professions being regulated by a professional body, which is not the complete definition of a profession.\n \n**Why C is wrong:** C discusses the payment structure for services rendered, which is a characteristic of certain professions but not all.\n \n**Why D is wrong:** D mentions the acquisition of special knowledge and skill, which is a component of being a profession, but does not complete the definition.\n \n**Why E is wrong:** E discusses the discipline and regulation within a profession, which is also an important aspect, but it does not encompass the complete definition of a profession.\n \n**Key concept:** The concept of Professions in Economics."}, {"num": 9, "text": "", "options": {"A": "firm plans to invest N20 million in a project with a life span of 3 years Projected cash inflows are as follows: Years    Cash flows (N Million) 1                8 2               10 3                8 If the cost of capital is 10%, calculate the NPV of the project N1.34 m", "B": "N1.44 m", "C": "N1.54 m", "D": "N1.64 m", "E": "N1.74 m"}, "answer": "C", "explanation": "**Why C is correct:** The correct answer is C - N1.54 m because it represents the present value of the future cash inflows using the present value of a cash flow formula.\n\n**A is wrong:** because there is not enough information to determine the expected rate of return or the discount rate.\n**B is wrong:** because it incorrectly assumes an infinite cash inflow.\n**D is wrong:** because it incorrectly assumes cash inflows will continue indefinitely.\n**E is wrong:** because it ignores the cash inflows in the future and focuses on the present value of the initial investment.\n\n**Key concept:** Time value of money."}, {"num": 10, "text": "Companies prepare annual reports and accounts for the purpose of evidencing", "options": {"A": "Efficiency", "B": "Reliability", "C": "Funding", "D": "Performance", "E": "Operation"}, "answer": "D", "explanation": "**Why D is correct:** The annual report provides a comprehensive overview of a company's financial performance, including income statements, balance sheets, and cash flow statements, which allows stakeholders to assess the company's success. This information enables investors and analysts to make informed decisions. The report also outlines the company's strategy and goals.\n\n**Why the other options are wrong:**\nA. Efficiency - While efficiency may be measured and reported in the annual report, it is not the primary purpose of the report.\nB. Reliability - Reliability is not a direct purpose of the annual report, but rather a characteristic of the financial statements presented.\nC. Funding - Funding is not the primary purpose of the annual report, although it may be a topic discussed within the report.\nE. Operation - Operation is not a direct purpose of the annual report, although it may be discussed within the report.\n\n**Key concept:** The primary purpose of a company's annual report is to provide stakeholders with evidence of their financial performance."}, {"num": 11, "text": "Process theory of motivation concentrate on the process by which individuals are motivated and the strength of that motivation. Which of the following is an example of Process theory?", "options": {"A": "Vroom‟s expectancy model", "B": "Maslow‟s hierarchy of needs", "C": "Weber‟s management theory", "D": "Stewart‟s management theory", "E": "Herzberg‟s hygiene and motivator factors"}, "answer": "A", "explanation": "**Why A is correct:** \nVroom's expectancy model is a process theory of motivation as it explains how motivation is developed through three components: valence, expectancy, and instrumentality. It examines the process by which an employee's motivation is developed and sustained. This theory helps explain how employees make decisions about their effort and motivation.\n\n**Why the other options are wrong:**\nA. Maslow's hierarchy of needs is a needs theory that classifies human needs into five categories.\nB. Weber's management theory and D. Stewart's management theory are classical management theories, which are not process theories of motivation.\nE. Herzberg's hygiene and motivator factors is also a needs theory that classifies needs into two categories.\n\n**Key concept:** Process theory of motivation refers to the theories that focus on the process of motivating employees and the strength of that motivation."}, {"num": 12, "text": "Market segmentation is important for strategic management. Which of the following is NOT a basis for market segmentation?", "options": {"A": "Customer", "B": "Products function", "C": "Geographical area", "D": "Demographic factors", "E": "Competitive activities"}, "answer": "E", "explanation": "**Why E is correct:** Market segmentation is based on distinct customer needs or characteristics to serve them effectively. Competitive activities, on the other hand, are external factors that should be considered in marketing strategy, but not as a basis for segmentation.\n\n**Why the other options are wrong:**\nA. Customer - This is a common basis for market segmentation, often through customer needs or characteristics.\nB. Products function - Functional product attributes can be used for segmentation, as in product-based segmentation.\nC. Geographical area - Geographical segmentation divides markets based on location or region.\nD. Demographic factors - Demographic factors such as age and income are often used for customer segmentation.\n\n**Key concept:** Market segmentation refers to the process of dividing a market into distinct groups of consumers or customers with similar needs or characteristics."}, {"num": 13, "text": "The following activities define the functions of management, EXCEPT", "options": {"A": "Monitoring actual performance", "B": "Setting targets for achievement", "C": "Putting organisational plans into action", "D": "Coordinating the activities of team colleagues", "E": "Converting sales income in a foreign currency into domestic currency"}, "answer": "E", "explanation": "**Why E is correct:** Converting sales income in a foreign currency into domestic currency is a function related to exchange and transaction processing, which is a key aspect of accounting, not management. This activity does not directly relate to the decision-making or control functions of management. It is also not considered a core management function.\n\n**Why A is wrong:** A is a function of management as monitoring actual performance is a key aspect of management's control function.\n**Why B is wrong:** B is a function of management as setting targets for achievement is a core part of management's planning function.\n**Why C is wrong:** C is a function of management as putting organisational plans into action is a key aspect of management's implementation function.\n**Why D is wrong:** D is a function of management as coordinating the activities of team colleagues is a core part of management's coordination function.\n\n**Key concept:** The key concept tested here is the functions of management, specifically identifying which activity does not belong to the core functions of management such as planning, organizing, leading, and controlling."}, {"num": 14, "text": "Which of the following is NOT within the scope of the functions of a supervisor?", "options": {"A": "Empower staff", "B": "Front line management", "C": "Administrative management", "D": "Staff development and training", "E": "Conceptualise corporate strategy"}, "answer": "E", "explanation": "**Why E is correct:** Conceptualising corporate strategy is typically the responsibility of top-level management or directors, who are responsible for setting the overall vision and direction of the organisation. This is beyond the scope of a supervisor's role.\n\n**A. Front line management:** A supervisor is indeed responsible for front line management, overseeing the daily operations of the team they manage.\n**B. Administrative management:** A supervisor is also responsible for administrative management, handling tasks such as resource allocation and budgeting.\n**C. Staff development and training:** A supervisor plays a key role in staff development and training, mentoring team members and identifying areas for improvement.\n**D. Empower staff:** Empowering staff is a critical function of a supervisor, who must delegate tasks and give team members the freedom to make decisions.\n\n**Key concept:** The key concept being tested is the role and responsibilities of a supervisor, specifically in relation to organisational hierarchy and management functions."}, {"num": 15, "text": "Slamming of a door, shaking of a head and remaining silent best describe", "options": {"A": "Verbal communication", "B": "Formal communication", "C": "Friendly communication", "D": "Non-verbal communication", "E": "Facial communication"}, "answer": "D", "explanation": "**Why D is correct:** \nNon-verbal communication involves conveying messages through facial expressions, body language, posture, and other physical actions, such as slamming a door, shaking one's head, and remaining silent. These actions can convey emotions and intentions without using spoken words. \n\n**Why the other options are wrong:**\nA. Verbal communication is communication using spoken words.\nB. Formal communication is a type of communication characterized by a professional tone and appropriate language.\nC. Friendly communication is a positive and informal type of communication, often through spoken language.\nE. Facial communication is a specific aspect of non-verbal communication referring to expressions and reactions of the face.\n\n**Key concept:** Types of communication, specifically non-verbal communication."}, {"num": 16, "text": "Which of the following financial decisions can impede the achievement of organisational objectives?", "options": {"A": "Investing short term cash surpluses", "B": "Rewarding equity holders appropriately", "C": "Protecting the organisation against financial risks", "D": "Financing long term expenditure with short term sources of funds", "E": "Maintaining a balance between long term and short term finance"}, "answer": "D", "explanation": "**Why D is correct:** Financing long term expenditure with short term sources of funds can lead to a mismatch betwee
