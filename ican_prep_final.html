n the duration of assets and liabilities, potentially putting the organisation at risk of not being able to meet its short term obligations. This is because short term sources of funds may not be available to meet long term commitments, hindering the organisation's ability to achieve its objectives. Such decisions can lead to liquidity crises and disrupt business operations.\n\n**Why the other options are wrong:**\nA. Investing short term cash surpluses is a prudent decision to earn a return on excess cash and manage liquidity risks.\nB. Rewarding equity holders appropriately is a key aspect of financial management that aligns with organisational objectives.\nC. Protecting the organisation against financial risks is a critical aspect of financial management that enables the achievement of organisational objectives.\nE. Maintaining a balance between long term and short term finance is essential for efficient financial management.\n\n**Key concept:** Managing liquidity risk in relation to financing long term expenditure."}, {"num": 17, "text": "Which of the following is NOT one of the five dimensions to differences in organisation culture as propounded by Hofstede?", "options": {"A": "Uncertainty avoidance dimension", "B": "Medium–termism orientation", "C": "Power-distance dimension", "D": "Individualism versus collectivism dimension", "E": "Masculinity versus femininity"}, "answer": "B", "explanation": "**Why B is correct:** Medium–termism orientation is not one of the five dimensions to differences in organisational culture as propounded by Hofstede. He originally identified power-distance dimension, individualism versus collectivism dimension, masculinity versus femininity, and uncertainty avoidance dimension. Medium-termism is actually associated with management or strategy.\n\n**Why the other options are wrong:**\nA. Uncertainty avoidance dimension is indeed one of the five dimensions to differences in organisational culture as propounded by Hofstede.\nC. Power-distance dimension is also one of the five dimensions to differences in organisational culture as propounded by Hofstede.\nD. Individualism versus collectivism dimension is indeed one of the five dimensions to differences in organisational culture as propounded by Hofstede.\nE. Masculinity versus femininity is also one of the five dimensions to differences in organisational culture as propounded by Hofstede.\n\n**Key concept:** The key concept tested here is the \"Five dimensions to differences in organisation culture as propounded by Hofstede\"."}, {"num": 18, "text": "Separating the risk and return characteristics of market investments from the individual investment decisions is known as (the)", "options": {"A": "Risk transformation", "B": "Separation Theorem", "C": "Financial intermediation", "D": "Maturity transformation", "E": "Amortisation"}, "answer": "B", "explanation": "**Why B is correct:** \nThe Separation Theorem, also known as the two-fund theorem, states that it is possible to separate the risk and return characteristics of a given investment strategy into two distinct portfolios: a risk-free portfolio and a risky asset portfolio.\n\n**Why the other options are wrong:**\nA. Risk transformation is a process that transforms one type of risk into another.\nB. Separation Theorem is the correct answer and cannot be wrong.\nC. Financial intermediation refers to the process of financial institutions acting as middlemen in the flow of funds between savers and investors.\nD. Maturity transformation is a process by which financial institutions transform short-term deposits into long-term loans.\nE. Amortisation is the process of spreading out the cost of an asset over its useful life.\n\n**Key concept:** The question tests the understanding of the Separation Theorem, a fundamental concept in finance and investments, especially in the context of portfolio management and optimization."}, {"num": 19, "text": "Whichof the following is NOT an example of money market transactions and instruments?", "options": {"A": "The interbank market", "B": "Treasury bills", "C": "Certificates of Deposit", "D": "The repo market", "E": "Bank deposits"}, "answer": "B", "explanation": "**Why B is correct:** Treasury bills are a type of fixed-income security issued by a government to finance its expenditures, and they are not considered part of the money market, but rather a type of fixed income security.\n\n**Why the other options are wrong:** \nA. The interbank market is an example of a money market transaction.\nC. Certificates of Deposit are also a type of money market instrument offered by commercial banks.\nD. The repo market is another example of a money market transaction where securities are sold with an agreement to repurchase at a later date.\nE. Bank deposits are essentially money market instruments, which include checking accounts, savings accounts, and other short-term savings products.\n\n**Key concept:** The question tests the distinction between money market transactions and instruments and other types of financial securities."}, {"num": 20, "text": "Reinforcing already communicated information signifies", "options": {"A": "Seriousness", "B": "Fidgeting", "C": "Disapproval", "D": "Recognition", "E": "Timidity SECTION B:            OPEN-ENDED QUESTIONS                            (80 MARKS) INSTRUCTION:          YOU ARE REQUIRED TO ATTEMPT ANY FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 a.    Explain the term „Stakeholders.                                      (2 Marks) b.    Using occupation as a basis, identify the economic activities of individuals. (3 Marks) c.    State FIVE main features of each category identified in 1(b).       (15 Marks) (Total 20 Marks) QUESTION 2 Johnson and Jacob Limited is considering whether to invest in one of these two projects. The expected cash flows are as stated below: Year          Project Blue   Project Pink N‟000         N‟000 0                  (33,000)      (30,000) 1                    18,000          3,000 2                     6,000          3,000 3                     3,000          6,000 4                    15,000        30,000 The company anticipates a cost of capital of 12%. Using Internal Rate of Return (IRR) method of investment appraisal, which of the projects should be selected? (Total 20 Marks) QUESTION 3 a.    Conflict arises between different workgroups or departments and between people in different workgroups. State FIVE- characteristics of conflicts.                    (10 Marks) b.   State and explain the FOUR leadership styles identified by Rensis Likert. (10 Marks) (Total 20 Marks) QUESTION 4 a.    Briefly explain TWO powers of a professional accounting organization. (5 Marks) b.    Identify THREE purposes of ICAN codes of ethics.                    (6 Marks) c.    State SIX safeguards created by profession, legislation or regulation against ethical threats and dilemmas.                                       (9 Marks) (Total 20 Marks) QUESTION 5 a.   Explain the following digital communication concepts: i.    Social media ii.    Digital marketing iii.    Websites iv.     Electronic mail v.     Social media management                                   (10 Marks) b.   State TEN uses of social media pages.                             (10 Marks) (Total 20 Marks) QUESTION 6 a.     Describe a matrix organisational structure and state its TWO main advantages.                                                        (5 Marks) b.     Describe a network organisational structure and state FOUR of its salient features.                                                          (5 Marks) c.     State FIVE reasons why the policy of subsidising imported petroleum products failed in Nigeria.                                       (10 Marks) (Total 20 Marks) SECTION A MCQ – SOLUTIONS"}, "answer": "A", "explanation": "**Why A is correct:** \nReinforcing already communicated information signifies that the message is valued and the speaker is serious about it, which is likely to increase the message's effectiveness. This is a key element of effective verbal and non-verbal communication. Reinforcing information conveys that the speaker believes the information is important.\n\n**Why B is wrong:** B. Fidgeting - Fidgeting is a non-verbal cue that typically suggests discomfort or lack of interest, not seriousness.\n**Why C is wrong:** C. Disapproval - Disapproval is a negative non-verbal cue, which contradicts the positive notion of reinforcing information.\n**Why D is wrong:** D. Recognition - Although recognition may involve acknowledging information, it doesn't necessarily imply that the information is serious or valued.\n**Why E is wrong:** E. Timidity - Timidity is a lack of boldness or confidence, which is not directly related to reinforcing already communicated information.\n\n**Key concept:** Non-verbal communication and verbal communication skills."}], "answers": {"1": "D", "2": "A", "3": "D", "4": "C", "5": "E", "6": "C", "7": "C", "8": "A", "9": "C", "10": "D", "11": "A", "12": "E", "13": "E", "14": "E", "15": "D", "16": "D", "17": "B", "18": "B", "19": "B", "20": "A"}, "examiner_report": "Section A of the paper comprises 20 mandatory multiple-choice questions. All candidates attempted the questions in this section. The questions test candidates‟ comprehension of the various aspects of the syllabus. 65 NOT TO BE SOLD | Compiled by: Babatunde Isaiah | Email: ababatundeisaiah@gmail.com About 60% of the candidates that attempted this section scored 50% of the marks allotted to the section. For better performance in future examinations, prospective candidates should cover the entire syllabus while preparing for this subject. ICAN study text and Pathfinder offer the required guidance."}, {"session": "Nov 2023", "questions": [{"num": 1, "text": "Which of the following management theorists made a study of Japanese companies and compared them with companies in the US?", "options": {"A": "William Ouchi", "B": "Henry Mintzberg", "C": "Douglas McGregor", "D": "Elton Mayo", "E": "Peter Drucker"}, "answer": "A", "explanation": "**Why A is correct:** William Ouchi made a study of Japanese companies and compared them with US companies, which led to his 'Theory Z' framework.\n\n**Why B is wrong:** Henry Mintzberg is known for his work on management structuring and organizational design, but not for comparing Japanese and US companies.\n**Why C is wrong:** Douglas McGregor is known for his Theory X and Theory Y, focusing on employee motivation and management styles.\n**Why D is wrong:** Elton Mayo is known for his work on human relations and the Hawthorne studies, examining the effects of social variables on employee productivity.\n**Why E is wrong:** Peter Drucker is a management theorist known for his work on modern organization and management, but not specifically for comparing Japanese and US companies.\n\n**Key concept:** Comparative organizational design and management practices between Japanese and US companies."}, {"num": 2, "text": "Which of the following is represented by the acronym “HTML”?", "options": {"A": "Hyper Test Mark Language", "B": "Hyper Text Mark Land", "C": "Hypo Text Markup Languages", "D": "Hypo Text Mark Language", "E": "Hyper Text Markup Language"}, "answer": "E", "explanation": "**Why E is correct:** \nE, Hyper Text Markup Language (HTML), is the standard markup language used to create web pages. It is represented by this acronym and is widely used for structuring and presenting content on the web. HTML is the building block of web development.\n\n**A is incorrect:**  The full form 'Hyper Test Mark Language' does not accurately describe the primary use of HTML in web development.\n\n**B is incorrect:** 'Hypo Text Mark Land' is a misleading description of HTML's role in structuring content.\n\n**C is incorrect:** 'Hypo Text Markup Languages' is incorrect because HTML is a singular markup language, not languages.\n\n**D is incorrect:** 'Hypo Text Mark Language' does not accurately represent the 'Hyper' aspect of HTML, which is crucial to its web-centric functionality.\n\n**Key concept:** This question tests understanding of the role and definition of HTML in web development, highlighting the importance of markup languages."}, {"num": 3, "text": "Which of the following is associated with junior managers and supervisors in an organisation?", "options": {"A": "Functional responsibilities", "B": "Efficiency control, quality control, control of waste, avoiding unnecessary spending", "C": "Co-ordination of activities of subordinates", "D": "Co-ordination with other work groups and functions", "E": "Monitoring and control"}, "answer": "B", "explanation": "**Why B is correct:** Junior managers and supervisors are responsible for the day-to-day operations of their departments and are concerned with achieving efficiency, quality, and cost control by eliminating waste and unnecessary expenses. This is an example of management control, which is a key aspect of their role. This is reflected in the option B.\n\n**Why the other options are wrong:**\nA. Functional responsibilities are usually associated with senior managers.\nC. Co-ordination of activities of subordinates is more typically associated with departmental heads or senior managers.\nD. Co-ordination with other work groups and functions is a higher-level responsibility typically held by senior managers.\nE. Monitoring and control is a broader term and can be associated with various levels of management, not just junior managers and supervisors.\n\n**Key concept:** Management control of junior managers and supervisors."}, {"num": 4, "text": "Which of the following is an advantage of a decentralised decision-making process?", "options": {"A": "Facilitates effective co-ordination of activities", "B": "Promotes the usage of initiative instead of getting instructions about what to do", "C": "Managers at head office are able to apply a „corporate view‟ to the entire business", "D": "Fewer managers might be needed", "E": "Uses specialised management support teams for the entire organisation possible"}, "answer": "B", "explanation": "**Why B is correct:** A decentralised decision-making process promotes flexibility and autonomy, allowing managers and employees to take initiative without needing to wait for instructions from higher authorities. This facilitates faster decision-making and encourages innovation. It also leads to a more responsive and agile organisation.\n\n**Why the other options are wrong:**\nA. **Facilitates effective co-ordination of activities** - A decentralised decision-making process can actually lead to a lack of co-ordination if there is no clear framework or governance structure.\nB. **Managers at head office are able to apply a „corporate view‟ to the entire business** - This is more aligned with a centred or centralised decision-making process, where head office managers are in control of corporate strategy.\nD. **Fewer managers might be needed** - A decentralised process may require more managers, not fewer, to oversee and direct the various business units.\nE. **Uses specialised management support teams for the entire organisation possible** - While specialised management support teams can be used in a decentralised decision-making process, this is not a direct advantage of decentralisation.\n\n**Key concept:** Key concept tested is the advantages and disadvantages of decentralised decision-making processes."}, {"num": 5, "text": "Calculate the present value, discounted at 12 percent, of receiving N300,000 at the end of year 6.", "options": {"A": "151,989.34", "B": "162,999.34", "C": "173,989.34", "D": "184,989.34", "E": "195,989.34"}, "answer": "A", "explanation": "**Why A is correct:** The correct answer is achieved by applying the present value formula for an amount received at the end of a fixed period, using the given annual discount rate of 12% to calculate the present value of N300,000 at the end of year 6.\n\n**Why other options are wrong:**\nA - The calculation of the present value is correct so no mistake in this option. \nB - This option is higher than the correct answer.\nC - This option is even higher and not applicable for the given scenario.\nD - This option does not reflect the correct calculation for the present value.\nE - This option is the highest and incorrect.\n\n**Key concept:** The present value of a future amount is a concept used in time value of money, specifically in the calculation of present value using periodic discount rates."}, {"num": 6, "text": "Which of the following features is INCORRECT in respect of payback period investment appraisal method?", "options": {"A": "It can be used to eliminate projects that will take too long to pay back", "B": "Often used by companies that have liquidity problems", "C": "Ignores the total cash returns from the project", "D": "Analyses accounting profits", "E": "Simple to calculate"}, "answer": "D", "explanation": "**Why D is correct:** Payback period is a short-term investment appraisal method that focuses on the initial cash outflow and the expected cash inflows to determine the time it takes for an investment to pay back its initial cost. It ignores the accounting profits and focuses on the timing of cash flows. Payback period is not concerned with the profitability of a project.\n\n**Why the other options are wrong:**\nA. It can be used to eliminate projects that will take too long to pay back.\nB. Often used by companies that have liquidity problems.\nC. Ignores the total cash returns from the project.\nE. Simple to calculate.\n\n**Key concept:** Time value of money is not the key concept here, but rather, the specific topic tested is the description of a short-term investment appraisal method, specifically the payback period."}, {"num": 7, "text": "Which of the following is TRUE of a finance lease?", "options": {"A": "The leased asset is reported in the statement of financial position of the lessor as a non-current asset", "B": "The lessor is responsible for insurance running and maintenance costs for the asset", "C": "The purchase cost of the leased asset is paid by the lessor", "D": "The lessee cannot claim the tax depreciation allowances", "E": "The lessee is the legal owner of the asset"}, "answer": "C", "explanation": "**Why C is correct:** A finance lease transfers the major risks and rewards of ownership to the lessee, but the lessor purchases the asset and grants the lessee a lease agreement. This makes the purchase cost of the leased asset a liability for the lessor, thus it is reported as such in their accounts.\n\n **A:** Incorrect, because in a sale and lease-back or finance lease, the leased asset is reported as a non-current liability by the lessor, not a non-current asset.\n\n **B:** Incorrect, because in a finance lease, the lessee is responsible for the operating expenses such as insurance running and maintenance costs, not the lessor.\n\n **D:** Incorrect, because the lessee is still taxually responsible for the asset if the lease is a finance lease; tax depreciation is still a liability of the lessee.\n\n **E:** Incorrect, because in a finance lease, the lessee is not the legal owner of the asset, the lessor is, and the lessee is responsible for the operating expenses, major risks and rewards."}, {"num": 8, "text": "Which of the following is NOT a feature of Net Present Value (NPV) method of investment appraisal.", "options": {"A": "It considers liquidity as means of evaluating capital project", "B": "It makes use of cost of capital or discount rate", "C": "It takes into consideration time-value-of-money", "D": "It takes account of the timing of the cash flows", "E": "It evaluates all cash flows from the project"}, "answer": "A", "explanation": "**Why A is correct:** The NPV method does not explicitly consider liquidity as a means of evaluating capital projects. NPV focuses on the present value of future cash flows, not the physical liquidity of the cash flows. This is because NPV is designed to assess the profitability of a project, not its cash management efficiency.\n\n**Why B is wrong:** B. It makes use of cost of capital or discount rate - This is a feature of the NPV method, as it uses the cost of capital or discount rate to calculate the present value of cash flows.\n\n**Why C is wrong:** C. It takes into consideration time-value-of-money - This is a key feature of the NPV method, as it takes into account the time-value-of-money through the discounting process.\n\n**Why D is wrong:** D. It takes account of the timing of the cash flows - The NPV method does take into account the timing of cash flows through the discounting process, where earlier cash flows are discounted more heavily than later cash flows.\n\n**Why E is wrong:** E. It evaluates all cash flows from the project - The NPV method does evaluate all cash flows from a project, including both inflows (e.g., cash received) and outflows (e.g., cash expended).\n\n**Key concept:** The key concept tested here is the features of the Net Present Value (NPV) method of investment appraisal."}, {"num": 9, "text": "Which of the following is NOT an example of a Non-government organisation?", "options": {"A": "Delight and Partners", "B": "Lagos Digital Village", "C": "Murtala Mohammed Foundation", "D": "Nigeria Health Care Project", "E": "Women in Management and Business"}, "answer": "A", "explanation": "**Why A is correct:** Delight and Partners is a Private Sector Organisation, not a Non-government organisation. It is likely a business or consulting firm providing services. Private sector entities are not considered Non-government organisations.\n\n**B. Lagos Digital Village is wrong:** Lagos Digital Village is a Non-government organisation as it is an initiative focused on promoting technology and digital skills in the community.\n\n**C. Murtala Mohammed Foundation is wrong:** Murtala Mohammed Foundation is a Non-government organisation established in honour of a former military head of state, indicating its charitable and non-governmental nature.\n\n**D. Nigeria Health Care Project is wrong:** Nigeria Health Care Project is likely a Non-government organisation, as indicated by the term \"Project\", which often refers to initiatives or organisations focused on addressing specific social issues.\n\n**E. Women in Management and Business is wrong:** Women in Management and Business is a Non-government organisation that focuses on promoting the development of women in business and management, indicating its non-governmental and charitable nature.\n\n**Key concept:** Non-government organisations (NGOs) are entities that are not controlled by the government and often involve charitable or social causes, such as health, education, or community development."}, {"num": 10, "text": "Which of the following is NOT a disadvantage of a joint venture?", "options": {"A": "Flexibility can be restricted", "B": "Degree of partners‟ involvement may not be equal", "C": "Clash of cultures and management styles may impair the success of the venture", "D": "It has unclear and unrealistic objectives", "E": "Eradicates the risk of discrimination"}, "answer": "E", "explanation": "**Why E is correct:** \nA joint venture is formed between two or more partners who collaborate in business operations, which inherently involves risk. Therefore, it does not eradicate the risk of discrimination, as partners may have differing opinions and priorities that could negatively impact the business. This risk still exists in a joint venture.\n\n**Why the other options are wrong:**\nA. Flexibility can be restricted in a joint venture due to the need for partners to agree on business decisions.\nB. Degree of partners' involvement may not be equal in a joint venture, posing challenges to decision-making and collaboration.\nC. Clash of cultures and management styles may indeed impair the success of a joint venture, requiring careful planning and management to mitigate their impact.\n\n**Key concept:** Identifying the disadvantages of a joint venture."}, {"num": 11, "text": "Which of the following best describes a divisional organisation structure?", "options": {"A": "A structural organisation", "B": "A centralised organisation", "C": "A decentralised organisation", "D": "A transitional organisation", "E": "A regional organisation"}, "answer": "C", "explanation": "**Why C is correct:** A divisional organisation structure is characterised by decentralisation, where decision-making authority is devolved to lower levels, such as product divisions or geographic regions. This allows for more autonomy and responsiveness to local needs.\n\n**Why A is wrong:** A structural organisation (Option A) typically refers to the physical layout of an organisation, not its hierarchy or decision-making authority.\n\n**Why B is wrong:** A centralised organisation (Option B) typically means that decision-making authority is concentrated at the top level, which is the opposite of divisional organisations.\n\n**Why D is wrong:** A transitional organisation (Option D) is not a commonly used term in organisational theory, especially in relation to divisional structures.\n\n**Why E is wrong:** A regional organisation (Option E) may be a type of divisional structure, but it's not the most accurate description of the decentralised feature.\n\n**Key concept:** Decentralised Organisation Structures."}, {"num": 12, "text": "", "options": {"A": "body that has responsibility or oversight of more than one country is Strategic apex body", "B": "Supranational body", "C": "National government", "D": "Transnational body", "E": "Strategic body"}, "answer": "B", "explanation": "**Why B is correct:** \nA Supranational body is an organization with authority over more than one country. Examples include the European Union, which makes laws and policies binding on its member states. This fits the definition of a Strategic apex body in a broader context of governance.\n\n**Why the other options are wrong:**\nA. A Strategic apex body typically refers to the highest level of decision-making within an organization, not necessarily a body that oversees more than one country.\nD. A Transnational body refers to organizations operating across national boundaries but may not necessarily have authority over more than one country.\nE. A Strategic body can be part of an organization but may not necessarily refer to a body that oversees more than one country or the highest level of decision-making.\nC. National government refers to the top-level government of a country, not a body that oversees more than one country.\n\n**Key concept:** This question tests the concept of Strategic apex body in the context of governance and organizational structure."}, {"num": 13, "text": "Which of the following is concerned with internal reporting to decision- makers?", "options": {"A": "Financial management", "B": "Financial accounting", "C": "Strategic management performance", "D": "Management accounting", "E": "Finance"}, "answer": "D", "explanation": "**Why D is correct:** Management accounting is concerned with providing internal information to decision-makers within an organization for planning and control purposes. It focuses on providing relevant and timely data to support informed decision-making. This includes budgets, management reports, and other internal information.\n\n**Why the other options are wrong:**\nA. Financial management focuses on the overall management of an organization's finances, including financial planning, funding, and risk management.\nB. Financial accounting is concerned with the preparation of external financial reports, including the balance sheet, income statement, and cash flow statement, for stakeholders such as investors and creditors.\nC. Strategic management performance relates to the evaluation of an organization's overall performance in relation to its strategic goals and objectives.\nE. Finance refers to the management of an organization's money and financial resources, but it is broader than management accounting and focuses more on external financial transactions.\n\n**Key concept:** Internal reporting to decision-makers, which is a key function of management accounting."}, {"num": 14, "text": "Which of the following best describes the concept that an accountant must NOT allow his professional or business judgement to be affected by conflict of interest?", "options": {"A": "Due care", "B": "Objectivity", "C": "Professional competence", "D": "Confidentiality", "E": "Integrity"}, "answer": "B", "explanation": "**Why B is correct:** \nObjectivity refers to maintaining impartiality and independence in judgment, especially in situations where there are conflicts of interest, ensuring that professional judgments are made without bias.\n\n**Why the other options are wrong:**\nA. Due care is about the level of diligence required in performing tasks, but it does not specifically relate to conflict of interest.\nB. Professional competence refers to the technical skills and knowledge required to perform accounting tasks, but it is not directly related to impartiality.\nC. Confidentiality is about keeping sensitive information secure, whereas this question is about maintaining impartiality.\nD. Integrity is a broader concept that encompasses honesty and morality, but it does not specifically address conflict of interest.\n\n**Key concept:** \nObjectivity is a core principle that accounting professionals must adhere to when addressing conflict of interest situations in order to maintain their professional judgment."}, {"num": 15, "text": "The process by which a professional accountant reports suspicions of illegal or improper behaviour to a person in authority is", "options": {"A": "Due care", "B": "Surveillance", "C": "Strategic alert", "D": "Professionalism", "E": "Whistleblowing"}, "answer": "E", "explanation": "**Why E is correct:** Whistleblowing refers to the act of reporting or disclosing suspicions of illegal or improper behavior within an organization to a person in authority outside the normal chain of command. It is an ethical principle and often regulated by laws and professional codes of conduct, such as those set out by ICAS and ICAEW. This concept is essential in the accountant's code of ethics.\n\n**Why the other options are wrong:**\nA. Due care refers to the accountant's responsibility to exercise care and diligence in their professional and business activities, which does not necessarily involve reporting suspicions of wrongdoing.\nB. Surveillance is the monitoring of an individual or situation, often in a covert manner, which is not related to whistleblowing.\nC. Strategic alert is a management tool used to identify potential issues in advance but does not involve the reporting of wrongdoing.\nD. Professionalism is a broad concept encompassing the application of professional standards and ethics, rather than a specific action like whistleblowing.\n\n**Key concept:** Accountability and whistleblowing procedures in professional accounting practice."}, {"num": 16, "text": "Which of the following management principles best describes employees awareness of where they stand in the organisation's hierarchy?", "options": {"A": "Unity of command", "B": "Unity of direction", "C": "Scalar chain", "D": "Order", "E": "Equity"}, "answer": "D", "explanation": "**Why D is correct:** Order principle emphasizes that every superior subordinates relationship in an organization is a part of a clear and well-defined chain of command where all employees are aware of the levels of authority above and below them. This clarity prevents confusion or overlapping lines of authority and enhances an organizational structure's effectiveness.\n\n**Why the other options are wrong:**\nA. Unity of command refers to the situation where an individual employee receives orders from only one superior.\nB. Unity of direction implies that all employees in an organization work towards the same objective or goals.\nC. Scalar chain refers to the line of authority which exists within an organization when an employee's supervisor also has a supervisor, and so on, in a straight line.\nE. Equity implies fairness and justice in an organization in terms of treatment of employees and job opportunities.\n\n**Key concept:** The management principle of Order emphasizes the need for clear lines of authority and accountability in an organizational structure."}, {"num": 17, "text": "The reason one has for acting or behaving in a particular way is", "options": {"A": "Stimulus", "B": "Ego", "C": "Motivation", "D": "Maturity", "E": "Emotional intelligence"}, "answer": "A", "explanation": "**Why A is correct:** A stimulus refers to an external or internal cue that triggers an individual's response or reaction. This stimulus can be either internal, such as a thought or feeling, or external, like an event or situation. In behavior, a stimulus is the initial cause that sets off a response.\n\n**Why the other options are wrong:**\nA. B (Incorrect): Ego refers to a person's sense of identity, which includes their values, self-image, and self-esteem. It is not the reason for one's behavior.\nB (Incorrect): Maturity is a state of being fully developed physically, emotionally, and mentally, but it does not directly relate to why an individual behaves in a particular way.\nC. (Incorrect): Motivation is a force that drives an individual to achieve a goal or behave in a certain way, but it is not the initial cause or stimulus.\nD. (Incorrect): Emotional intelligence refers to an individual's ability to recognize and understand emotions in themselves and others but is not a reason for one's behavior.\nE. (Incorrect): Emotional intelligence involves perceiving and influencing emotions in oneself and others but is not a reason for why one behaves in a particular way.\n\n**Key concept:** The concept tested is \"Stimulus\" in the context of the behavior and motivation theory."}, {"num": 18, "text": "Which of the following is NOT an example of intrinsic rewards?", "options": {"A": "Sense of achievement in doing the work", "B": "Sense of recognition for doing the work", "C": "Enjoying the status that the job provides", "D": "Award of a company car", "E": "Pride in doing the work"}, "answer": "D", "explanation": "**Why D is correct:** An intrinsic reward is something that comes from within an individual as a result of their own actions or the work they do, such as satisfaction, pride, or a sense of achievement. The award of a company car is an extrinsic reward as it is a tangible benefit provided by the employer, not related to the employee's internal feelings or motivations. This is distinct from the other options.\n\nA. Sense of achievement in doing the work - This is an intrinsic reward, as the individual derives satisfaction from completing the task.\nB. Sense of recognition for doing the work - This is also an intrinsic reward, as the individual experiences pride and recognition from within.\nC. Enjoying the status that the job provides - This can be considered an intrinsic reward, as the individual derives satisfaction from their work and the status it brings.\nE. Pride in doing the work - Similar to the other options, this is an intrinsic reward that comes from the individual's internal feelings of satisfaction and pride.\n\n**Key concept:** The key concept tested in this question is the distinction between intrinsic and extrinsic rewards, which is a fundamental area of study in motivation and human behavior theory."}, {"num": 19, "text": "", "options": {"A": "project team in an organisation is often made up of individuals from different Ethnic groups", "B": "Functional areas", "C": "Matrix structures", "D": "Social backgrounds", "E": "Organisations"}, "answer": "B", "explanation": "**Why B is correct:** A project team in an organisation is often made up of individuals from different functional areas, such as marketing, finance, or operations, due to the diverse skills required for the project.\n\n**Why A is wrong:** A project team is not necessarily made up of individuals from different ethnic groups, which is unrelated to the structure of teams within an organisation.\n**Why C is wrong:** Matrix structures involve a combination of functional and project-based structures, which is a different concept from the functional areas.\n**Why D is wrong:** A project team may not be representative of the entire organisation, and social backgrounds are not relevant to the composition of a project team.\n**Why E is wrong:** Organisations in general may have different structures, but the question specifically asks about project teams within organisations.\n\n**Key concept:** The question tests the understanding of the concept of \"Functional Areas, which is a key principle of Organisation and Management as covered in the ICAN Business & Finance (Foundation Level) syllabus."}, {"num": 20, "text": "", "options": {"A": "message could fail to prompt the intended response in any of the following situations, EXCEPT The recipient of the message was not paying proper attention", "B": "The recipient does not have the knowledge to understand the message", "C": "The recipient has a personal likeness of the sender", "D": "The recipient is in conflict with the sender", "E": "The recipient gets the message but then forgets it SECTION B:         OPEN-ENDED QUESTIONS                            (80 MARKS) INSTRUCTION:       YOU ARE REQUIRED TO ATTEMPT ANY FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 According to Cole and Kelly “An organisation is a group of people with common purpose who work together to achieve shared goals”. a.    Define the term group cohesion and explain briefly FIVE characteristics of an effective team.                                      (10 Marks) b.    Explain briefly the following concepts: i.     Formal organisation ii.    Organisational structure iii.   Flat organisation iv.    Outsourcing v.     Shared services                                          (10 Marks) (Total 20 Marks) QUESTION 2 Managers must be well informed that environmental factors are determinants for organisations‟ survival and success, as these factors have a bearing on the strategy and other decisions of the organisation. a.    Explain briefly the FOUR features of bureaucracy and state FOUR reasons for the growth of bureaucracy as summarised by Rosemary Stewart. (10 Marks) b.   Explain briefly the following concepts: i.     Game theory ii.     Self-regulation theory iii.    Motivation iv.     Self-efficacy v.      Scalar chain                                             (10 Marks) (Total 20 Marks) QUESTION 3 Modern organisations now focus on managing their employees rather than knowing how to do their work well. a.    Explain briefly the assumptions that guide reinforcement theory and THREE ways reinforcement theory could be used in the business environment.                                                (10 Marks) b.    List the TEN principles of management as suggested by Lyndall Urwick and briefly explain FIVE of them.                           (10 Marks) (Total 20 Marks) QUESTION 4 Management and organisations have acknowledged that business analyses and communication models are strategic tools for reducing risks. a.    Explain briefly the concept “Strategic position analysis” and state FOUR main features of entrepreneurial organisation.                (10 Marks) b.    Define the term “communication style” and explain briefly THREE components of communication style.                     (10 Marks) (Total 20 Marks) QUESTION 5 a. Managers think about non-financial issues as well as financial issues when making outsourcing decisions. i. Explain SIX non-financial considerations that will be relevant to a make-or-buy decision.                                          (6 Marks) ii. Describe with the aid of an example in each case, two non-financial benefits from outsourcing work to an external supplier.         (4 Marks) b.    Sustainable development has been defined as the „development that meets the needs of the present without compromising the ability of future generations to meet their own needs.‟ A problem with accounting for sustainable development is to identify what „sustainable development‟ actually means. Identify FOUR practical difficulties with this definition.          (10 Marks) (Total 20 Marks) QUESTION 6 a.     Briefly explain the concept “Economic stagnation”.                 (2 Marks) b.     State the THREE policy approaches used by governments to meet macroeconomic objectives.                                     (3 Marks) c.     List and explain briefly FOUR operations research techniques.      (8 Marks) d.     Safeguards are actions or other measures that may eliminate threats or reduce them to an acceptable level. Explain SEVEN safeguards created by the Profession in this regards. (7 Marks) (Total 20 Marks) SECTION A MCQ - SOLUTIONS"}, "answer": "C", "explanation": "**Why C is correct:** A personal likeness (such as a family or personal relationship) between the recipient and sender is unlikely to affect the message's promptness. In fact, a personal relationship often facilitates understanding. Therefore, C is an exception to situations where a message could fail to prompt the intended response.\n\n**Why the other options are wrong:**\nA. Message failure is possible in these situations.\nB. Lack of knowledge by the recipient is a valid reason for message failure.\nD. Conflict with the sender can hinder message understanding.\nE. Message failure due to memory loss is common.\n\n**Key concept:** Effective Communication, specifically the factors that may impact the intended response."}], "answers": {"1": "A", "2": "E", "3": "B", "4": "B", "5": "A", "6": "D", "7": "C", "8": "A", "9": "A", "10": "E", "11": "C", "12": "B", "13": "D", "14": "B", "15": "E", "16": "D", "17": "A", "18": "D", "19": "B", "20": "C"}, "examiner_report": "Section A of the paper comprises twenty mandatory multiple-choice questions. The questions test candidates‟ knowledge of the various aspects of the syllabus. This section is compulsory and was attempted by all the candidates and their performance was above average. Candidates should be encouraged to cover all aspects of the syllabus and the study text. ICAN study text and Pathfinder for better performance in future examinations of the institute. Marking guide MCQs 1-20 1 mark each for any correct option stated up to a maximum of 20 marks 20 Marks"}, {"session": "May 2024", "questions": [{"num": 1, "text": "Which of the following best describes the objective of a Not-for-profit organisation?", "options": {"A": "Maximising benefits", "B": "Maximising of shareholders‟ wealth", "C": "Earn a return for the owners", "D": "Increase in market value", "E": "Capital growth"}, "answer": "A", "explanation": "**Why A is correct:** \nA Not-for-profit organisation is established to serve the public benefit, and its primary goal is to maximise benefits to its stakeholders while distributing remaining funds for community purposes.\n\n- **B.** Maximising of shareholders‟ wealth is incorrect because Not-for-profit organisations do not have shareholders and distribute their revenue for community purposes rather than to investors.\n- **C.** Earn a return for the owners is incorrect because Not-for-profit organisations do not have owners who receive returns; instead, any surpluses are distributed for community benefit.\n- **D.** Increase in market value is incorrect because it relates to a profit-seeking company's objective, not that of a Not-for-profit organisation.\n- **E.** Capital growth is incorrect because while some Not-for-profit organisations may seek capital growth, their primary objective is to serve the public benefit, not to increase their assets.\n**Key concept:** The objective of Not-for-profit organisations."}, {"num": 2, "text": "Co-operatives form of business are owned by the", "options": {"A": "Owners", "B": "Managers", "C": "Members", "D": "Investors", "E": "Governments"}, "answer": "C", "explanation": "**Why C is correct:** \nCo-operatives are a form of business entity owned and controlled by their members, who share resources and collaborate for a common goal. In a co-operative, the members have a stake in the business and participate in decision-making, making it distinct from other business structures. The ownership is typically distributed among the members, who benefit directly from the business operations.\n\n**Why A is wrong:** A is incorrect because owners typically refer to shareholders or investors in a company, not members in a co-operative.\n\n**Why B is wrong:** B is incorrect because managers are responsible for the operational aspects of a business, but they are not the owners in a co-operative.\n\n**Why D is wrong:** D is incorrect because investors are typically external parties providing financing to a business, not the owners in a co-operative.\n\n**Why E is wrong:** E is incorrect because governments may have regulatory oversight of co-operatives, but they do not own or govern co-operatives directly.\n\n**Key concept:** The key concept tested is the definition of co-operatives as a business form, specifically identifying their ownership structure, in compliance with the Financial Accounting Standards (FAS) 1-14, 41 and 17 (FRS 102)."}, {"num": 3, "text": "Which of the following is the focus of an informal organisation?", "options": {"A": "Process", "B": "Plan", "C": "Work", "D": "People", "E": "Organising"}, "answer": "D", "explanation": "**Why D is correct:** \nAn informal organisation focuses on people and social relationships that may be outside formal structures and reporting lines, such as friendships, family relationships, and social bonds within a workplace. The key characteristic of an informal organisation is its reliance on people and their interactions. It often exists alongside formal organisations.\n\n**Why the other options are wrong:**\nA. Process - This is a characteristic of a formal organisation, where tasks are carried out in a structured manner according to established procedures.\nB. Plan - Formal organisations have plans and strategies that are developed and implemented through established processes.\nC. Work - Both formal and informal organisations involve work activities, but the focus of a formal organisation is on structured work processes.\nE. Organising - This is a characteristic of formal organisations, which are structured and organised to achieve specific goals.\n\n**Key concept:** The difference between formal and informal organisations."}, {"num": 4, "text": "Which of the following is NOT an aspect of employment law?", "options": {"A": "Minimum wage", "B": "Working conditions", "C": "Cash flow", "D": "Redundancy", "E": "Discrimination"}, "answer": "C", "explanation": "**Why C is correct:** Cash flow is a financial accounting concept, which deals with the movement of money into and out of a business. It is not directly related to employment law, which focuses on the rights, duties, and obligations of employers and employees. \n\nA. Minimum wage - This is a concept in employment law that regulates the amount of money employers must pay employees.\nB. Working conditions - This aspect of employment law deals with the rights of employees to a safe and healthy working environment.\nD. Redundancy - This aspect of employment law deals with the process of dismissing employees due to redundancy or downsizing.\nE. Discrimination - This aspect of employment law regulates the treatment of employees, ensuring that they are not discriminated based on factors such as age, sex, or disability.\n\n**Key concept:** This question tests understanding of the key aspect of employment law relevant to financial accounting exam."}, {"num": 5, "text": "The purpose of data protection law is to protect the", "options": {"A": "Managers", "B": "Owners", "C": "Governments", "D": "Individuals", "E": "Investors"}, "answer": "D", "explanation": "**Why D is correct:** Data protection law is designed to safeguard the rights of individuals with regards to the collection, storage, and use of their personal data, thereby providing them with control and protection from unauthorized access or misuse.\n\n**Why the other options are wrong:**\nA. Managers - Managers are not the primary focus of data protection law.\nB. Owners - Owners may have some rights under data protection law, but the primary purpose is to protect individuals, not specifically owners.\nC. Governments - Governments may be involved in enforcing data protection law, but it is not aimed at protecting governments themselves.\nE. Investors - Investors are not the primary focus of data protection law; it primarily concerns the protection of individuals' personal data."}, {"num": 6, "text": "Which of the following is NOT a feature of a profession?", "options": {"A": "Admit new members to the profession", "B": "Award qualifications to individuals who achieve a required standard of skill or competence", "C": "Expel members from the profession, for professional conduct", "D": "High entry requirements", "E": "An extensive period of rigorous academic training in a particular area"}, "answer": "C", "explanation": "**Why C is correct:** \nProfessions are self-regulating bodies where members regulate themselves, not the body regulating its members through expulsion. Members who make a mistake in their professional conduct can choose to leave the profession voluntarily, or be subject to disciplinary action that might result in their qualification being 'struck off'. Professions do not normally expel members.\n\n**Why the other options are wrong:**\nA. Admit new members to the profession - is a feature of most professions.\nB. Award qualifications to individuals who achieve a required standard of skill or competence - is a primary function of professions.\nD. High entry requirements - is a characteristic of many professions.\nE. An extensive period of rigorous academic training in a particular area - is often the case for professions.\n\n**Key concept:** The key concept tested here is the characteristics of a profession."}, {"num": 7, "text": "The decisions and actions of all professional accountants in an organisation are guided by", "options": {"A": "Organisational culture", "B": "Management", "C": "Professional trainings", "D": "Core values", "E": "Corporate code of ethics"}, "answer": "E", "explanation": "**Why E is correct:** The corporate code of ethics serves as a framework that guides the professional decisions and actions of all accountants within an organisation, ensuring they adhere to the required standards of professional conduct. It encompasses values, principles, and rules that direct the behaviour of accounting professionals. Compliance with the code is essential for maintaining the accounting profession's trust and integrity.\n\n**Why the other options are wrong:**\nA. Organisational culture refers to the overall atmosphere and work environment within an organisation but does not directly guide professional accounting decisions and actions.\nB. Management, while overseeing organisational operations, may not have direct control over the actions of accounting professionals, especially in terms of professional code compliance.\nC. Professional trainings educate and inform accounting professionals but do not serve as a guiding framework for their decisions and actions.\nD. Core values represent an organisation's guiding principles but are not universally applicable to all accounting professionals and do not provide the comprehensive framework for professional conduct required by the code.\n\n**Key concept:** The question tests the understanding of the role of a corporate code of ethics in guiding the professional decisions and actions of accounting professionals as per the requirements of the ICAP exam syllabus."}, {"num": 8, "text": "An organisation that is not defined by, or limited to, the horizontal, vertical, or external boundaries imposed by a predefined structure is called a/an", "options": {"A": "Matrix organisation", "B": "Boundaryless organisation", "C": "Divisonal organisation", "D": "Virtual organisation", "E": "Entrepreneurial organisation"}, "answer": "B", "explanation": "**Why B is correct:** A boundaryless organisation is characterized by flexibility, adaptability, and a flat structure that transcends traditional boundaries, making it a suitable description of an organisation not limited by predefined structures.\n\n**Why A is wrong:** A matrix organisation uses a combination of functional and project-based structures, but still relies on predefined boundaries.\n\n**Why C is wrong:** A divisional organisation is a type of structure where the organisation is divided into separate business units, with well-defined boundaries between them.\n\n**Why D is wrong:** A virtual organisation relies on a network of independent contractors and partners, typically with limited formal boundaries, but can still be structured in a traditional sense.\n\n**Why E is wrong:** An entrepreneurial organisation is characterized by innovation, risk-taking, and adaptability, but isn't necessarily limited by predefined structures.\n\n**Key concept:** Organisational structure and design principles."}, {"num": 9, "text": "Which of the following best describes the promotion of team spirit and unity among employees in an organisation?", "options": {"A": "Togetherness", "B": "Equity", "C": "Esprit de Corps", "D": "Scalar Chain", "E": "Division of Work"}, "answer": "C", "explanation": "**Why C is correct:** Esprit de Corps refers to the feeling of belonging and unity among members of an organisation, contributing to team spirit and morale. It is often associated with pride in one's company or team, fostering a sense of camaraderie and cohesion among employees. This concept is essential in maintaining a positive and productive workplace.\n\n**Why the other options are wrong:**\nA. Togetherness is a broader concept that encompasses the idea of being together, but it does not specifically refer to the promotion of team spirit and unity in an organisational context.\nB. Equity refers to fairness and impartial treatment in an organisation, which while important, is not directly related to promoting team spirit and unity.\nD. Scalar Chain refers to the line of authority within an organisation, showing the hierarchical relationship between supervisors and their subordinates.\nE. Division of Work refers to the allocation of tasks and responsibilities within an organisation, which contributes to efficiency but not directly to the promotion of team spirit and unity.\n\n**Key concept:** Fostering Teamwork and Communication."}, {"num": 10, "text": "According to McClelland motivation theory, a N-ach person seeks", "options": {"A": "Authority", "B": "Achievement", "C": "Power", "D": "Affiliation", "E": "Effort"}, "answer": "B", "explanation": "**Why B is correct:** According to McClelland motivation theory, there are three types of individuals (n-achievers, n-affiliates, and n-achievers with a high need for power). An n-achiever is the highest achieving category and is motivated by the desire for achievement. They strive for accomplishment and excellence in their work.\n\n**Why the other options are wrong:**\nA. A person with a high need for authority is typically an n-achiever with a high need for power.\nC. Power is associated with n-achievers with a high need for power.\nD. Affiliation is the motivation type of an n-affiliate, not an n-achiever.\nE. Effort is a general trait and does not specifically relate to the n-achiever motivation type.\n\n**Key concept:** Maslow's and McClelland's motivation theories."}, {"num": 11, "text": "Which of the following is NOT a characteristic of a successful work team?", "options": {"A": "The team should have a complex purpose", "B": "The team should have effective leadership", "C": "Its area of authority should be clearly defined", "D": "Provide benefits to the business", "E": "Morale or team spirit should be high"}, "answer": "A", "explanation": "**Why A is correct:** A successful work team typically has a clear and simple purpose, allowing them to focus on their objectives. A complex purpose can lead to confusion and disorganization. This would hinder the team's productivity and efficiency.\n\n**Why B is wrong:** B. Effective leadership is a key characteristic of a successful work team, enabling them to achieve their goals.\n\n**Why C is wrong:** C. Its area of authority being clearly defined helps the team to know what they are responsible for and avoid conflicts.\n\n**Why D is wrong:** D. Providing benefits to the business is a direct consequence of a successful work team, demonstrating their value and contribution.\n\n**Why E is wrong:** E. A high morale or team spirit helps to increase motivation and cooperation among team members, which in turn contributes to a successful work team.\n\n**Key concept:** Management and Leadership - Teamwork."}, {"num": 12, "text": "Which of the following does NOT describe the need for effective communication?", "options": {"A": "Instructions and guidelines are properly understood", "B": "Individuals know what they are expected to do", "C": "Better co-ordination between people and groups", "D": "Arguments and conflicts in the work place are reduced", "E": "Openness, understanding and trust are eliminated"}, "answer": "E", "explanation": "**Why E is correct:** Effective communication in a work setting often leads to openness, understanding, and trust among team members and individuals. Without effective communication, the opposite is likely to occur, as individuals may misinterpret instructions, have difficulty in working together, and develop misunderstandings that escalate into conflicts. The statement that openness, understanding, and trust are eliminated directly contradicts the purpose of effective communication.\n\n**Why the other options are wrong:**\nA. Instructions and guidelines are properly understood as a direct result of effective communication.\nB. Individuals know what is expected of them when instructions are clearly communicated.\nC. Better coordination between people and groups is facilitated by effective communication.\nD. Arguments and conflicts in the workplace are typically reduced, not eliminated, through effective communication.\n\n**Key concept:** The need for effective communication is a fundamental principle of organizational behavior and business studies."}, {"num": 13, "text": "Which of the following components of a report is of a top priority?", "options": {"A": "Subject", "B": "Writer", "C": "Objective", "D": "Reader", "E": "Structure"}, "answer": "D", "explanation": "**Why D is correct:** The reader is a top priority in a report as it directly influences the content and presentation of the information, ensuring the reader can easily understand and use the information provided. The reader's needs and expectations must be considered to make the report effective. This involves identifying the intended recipient of the report.\n\n**A. Why A is wrong:** The subject of a report refers to the main topic or issue being addressed, but it is not a top priority.\n\n**B. Why B is wrong:** The writer of a report is not typically a priority, as the report should be written objectively with the reader in focus.\n\n**C. Why C is wrong:** Although the objective of a report (its purpose and intended outcome) is crucial, it is not necessarily a top priority. The reader's needs take precedence.\n\n**D. Why D is wrong (this one should say \"Why E. is wrong\"):** The structure of a report is important but not a top priority, as it is more concerned with the organization and layout of the content rather than the reader.\n\n**E. Why E is wrong (this one should say \"Why this option is not correct but rather refer to the one above\"):** This response should not have an E option, it should be \"Why this option is not correct: the key information to answer the question was above\". But the answer is already provided for option D.\n\n**Key concept:** The key concept tested is Understanding the importance of considering the reader's needs in report writing."}, {"num": 14, "text": "Which of the following is NOT a feature of effective report?", "options": {"A": "Fit for purpose", "B": "Decisive", "C": "Persuasive", "D": "Correct in fact and language", "E": "Lasting"}, "answer": "E", "explanation": "**Why E is correct:** A lasting report refers to a report that is prepared for immediate use, rather than one that has enduring value or relevance. This is often the case for routine or regular reports. The term \"lasting\" implies a level of permanence that isn't a defining characteristic of an effective report.\n\n**A. Fit for purpose**\nThis is a feature of an effective report. \n\n**B. Decisive**\nThis is a feature of an effective report.\n\n**C. Persuasive**\nThis is a feature of an effective report.\n\n**D. Correct in fact and language**\nThis is a feature of an effective report.\n\n**Key concept:** The characteristics of an effective report align with the fundamental principle of report preparation in ACCA/ICAN's syllabus: that reports must be useful, relevant, and meet the needs of their intended users."}, {"num": 15, "text": "Which of the following does NOT represent short-dated financial instruments?", "options": {"A": "Treasury bills", "B": "Bills of exchange", "C": "Commercial paper", "D": "Certificates of deposit", "E": "Equity finance"}, "answer": "E", "explanation": "**Why E is correct:** Equity finance represents a long-term source of finance for companies and is not considered short-dated.\n\nA. Treasury bills are a form of short-term government debt, which typically matures within a year.\nB. Bills of exchange are short-term debt instruments used for payment obligations between parties.\nC. Commercial paper is an unsecured, short-term debt instrument used by companies.\nD. Certificates of deposit are time deposits offered by commercial banks with specified maturity dates.\n\n**Key concept:** Classification of financial instruments."}, {"num": 16, "text": "", "options": {"A": "method of issuing new shares for cash to a relatively small number of selected investors is called Financing", "B": "Public offer", "C": "Rights issue", "D": "Placing", "E": "Private offer"}, "answer": "D", "explanation": "**Why D is correct:** Placing is a method of issuing new shares for cash to a relatively small number of selected investors. This option is more specific and correct in its description. It represents a targeted method of share issuance.\n\nA. method of issuing new shares for cash to a relatively small number of selected investors is called Financing - Incorrect, Financing is a broad term for company funding.\n\nB. Public offer - Incorrect, a public offer involves offering shares to the general public.\n\nC. Rights issue - Incorrect, a rights issue is an offer of shares to existing shareholders.\n\nE. Private offer - Incorrect, a private offer is similar to a placing but may involve more than just a small number of investors."}, {"num": 17, "text": "Calculate the present value, discounted at 15 percent, of receiving N500,000 at the end of year 4", "options": {"A": "N245,836.22", "B": "N255,846.32", "C": "N265,856.42", "D": "N275,866.52", "E": "N285,876.62"}, "answer": "E", "explanation": "**Why E is correct:** The correct answer E, N285,876.62, is obtained by using the formula for present value, PV = FV / (1 + r)^n, where PV is present value, FV is future value, r is discount rate, and n is number of years. We calculate PV by first calculating the factor (1 + r)^n and then dividing the FV by this factor. In this case, the present value calculated equals N285,876.62.\n\n**Why A is wrong:** A, N245,836.22, is incorrect because it is calculated using an interest rate that is too low and/or an incorrect number of years, or an incorrect value for the future amount.\n\n**Why B is wrong:** B, N255,846.32, is incorrect because it is calculated using an interest rate or a number of years that is too low to produce the given amount.\n\n**Why C is wrong:** C, N265,856.42, is incorrect because it is calculated using an interest rate or a number of years that is too low to produce the given amount.\n\n**Why D is wrong:** D, N275,866.52, is incorrect because it is calculated using an interest rate or a number of years that is too low to produce the given amount.\n\n**Why E is wrong:** Actually, in this explanation, option E is the correct answer, and the other explanations should be written for the wrong options."}, {"num": 18, "text": "Which of the following is an advantage of a partnership form of business?", "options": {"A": "Unlimited liability for the individual partners", "B": "Minimal organisational effort and costs", "C": "Limited ability to raise large sums of money", "D": "Dissolved upon the death of any of the partners", "E": "Dissolved upon the withdrawal of any of the partner"}, "answer": "B", "explanation": "**Why B is correct:** A partnership form of business requires minimal organisational effort and costs since there's no formal registration process required and partners share the responsibilities among themselves. This is in contrast to more complex business entities like companies that need to comply with numerous regulations and reporting requirements. As a result, partnerships can be established with minimal formalities.\n\n**Why the other options are wrong:**\nA. Unlimited liability for the individual partners is actually a disadvantage of a partnership form of business, as partners are liable for the business debts beyond their invested capital.\nB. This option is correct, as stated above.\nC. A partnership can raise large sums of money through loans from financial institutions or partners investing more capital, so this is not a limitation of partnerships.\nD. A partnership is not dissolved upon the death of any of the partners; instead, the partnership typically continues with the remaining partners unless agreed otherwise in the partnership deed.\nE. A partnership is not dissolved upon the withdrawal of any partner; however, the partnership deed outlines the process for removing partners, which can result in dissolution of the partnership under certain circumstances."}, {"num": 19, "text": "Calculate the present value, discounted at 6 percent, of receiving N300,000 at the end of year 5", "options": {"A": "N222,175.45", "B": "N223,176.45", "C": "N224,177.45", "D": "N225,178.45", "E": "N226,179.45"}, "answer": "C", "explanation": "**Why C is correct:** To calculate the present value discounted at 6 percent of receiving N300,000 at the end of year 5, we use the formula PV = FV / (1 + r)^n. Plugging in the given values, where FV = N300,000, r = 0.06, and n = 5, the PV is calculated as A = 300,000 / (1 + 0.06)^5 = N224,177.45. This matches option C.\n\n**Why other options are wrong:**\nA. It is less than the expected present value.\nB. It is higher than option C but without recalculating, we know that option C is correct.\nD. The difference between this option and the correct answer is small, suggesting that D might be an option worth considering but it is not the correct answer.\nE. The calculated PV is below N226,179.45, hence option E is incorrect.\n\n**Key concept:** Present Value calculation using the formula PV = FV / (1 + r)^n, which is a key concept in ICAN Business & Finance (Foundation Level) syllabus."}, {"num": 20, "text": "", "options": {"A": "series of regular or periodic payments of equal amounts are called Sinking funds", "B": "Premium", "C": "Annuities", "D": "Interest", "E": "Direct transfer SECTION B:          OPEN-ENDED QUESTIONS                      (80 MARKS) INSTRUCTION:        YOU ARE REQUIRED TO ATTEMPT FOUR OUT OF THE SIX QUESTIONS IN THIS SECTION QUESTION 1 As maintained by Harold Koontz “management is an art of creating an environment in which people can perform and individuals can co-operate towards attainment of group goals”. a. Define the term “Self-efficacy”.                             (2 Marks) b. Briefly explain FOUR ways in which self-efficacy impact human functions. (8 Marks) c. Briefly explain the following concepts: i. Management by objectives (MBO); ii. Intrinsic rewards; iii. Unity of direction; iv. Communication style; v. Queuing theory;                                                (10 Marks) (Total 20 Marks) QUESTION 2 a. Briefly explain the term “Financial engineering”.               (3 Marks) b. Describe the relationship between financial accounting and management accounting.                                                     (4 Marks) c. State FIVE examples of Nigerian bond markets hosted by the Nigerian Exchange Limited (NGX).                                           (5 Marks) d. Explain briefly the following financial concepts. i.    Certificate of deposits (CDS) ii. Commercial paper (CP) iii. Treasury bills (TB) iv. Banker‟s acceptances (BAs)                                   (8 Marks) (Total 20 Marks) QUESTION 3 a. Explain briefly FIVE ethical threats that could compromise a professional accountant‟s ability to comply with relevant laws and regulations. (5 Marks) b. Within the framework of a capital budget and strategic planning, state the FIVE steps of investment appraisal.                                (5 Marks) c.   When companies retain profits in the business, the increase in retained profits adds to equity reserves. i. Explain TWO benefits of retaining profits in the business.         (4 Marks) ii. Explain THREE reasons why there could be a limit to the amount of earnings available for retention.                                 (6 Marks) (Total 20 Marks) QUESTION 4 a. Define the term “Stakeholder”.                                           (2 Marks) Explain briefly THREE internal stakeholders of a company.                (6 Marks) b. State FOUR advantages and FOUR disadvantages of Joint ventures.          (8 Marks) c. On the basis of qualification, nature of work, establishment and motive; distinguish between profession and employment.                            (4 Marks) (Total 20 Marks) QUESTION 5 a. Conflict usually has a negative impact on the effectiveness of an organisation i. Explain SIX causes of conflict in an organisation.         (6 Marks) ii. Explain FOUR characteristics of conflict.                 (4 Marks) b. Explain briefly THREE implications of expectancy theory for management. (6 Marks) c. State TWO disadvantages of Management by Objective (MBO).             (4 Marks) (Total 20 Marks) QUESTION 6 Managers that do not design effective communication models risk the long-run survival of their organisations. a.   Define the term “Formal communication”.                           (21/2 Marks) b.   State FIVE attributes of effective communication system.          (71/2 Marks) c.   List SIX features of effective reports.                             (6 Marks) d.   State FOUR features of bad reports.                                 (4 Marks) (Total 20 Marks) SECTION A PART I - MULTIPLE CHOICE ANSWERS"}, "answer": "C", "explanation": "**Why C is correct:** An annuity refers to a series of regular or periodic payments of equal amounts, which can be used to make regular payments to investors.\n\n**Why A is wrong:** A series of regular or periodic payments of equal amounts is actually associated with sinking funds but not specifically as annuities, although it has a similar structure.\n\n**Why B is wrong:** Premiums relate to the initial payment made to enter into an insurance contract or a loan.\n\n**Why D is wrong:** Interest refers to the cost or earnings generated from borrowed money or invested capital.\n\n**Why E is wrong:** Direct transfer refers to transferring funds directly from one account to another account without involving an intermediary.\n\n**Key concept:** The key concept tested in this question is the definition of an annuity, specifically the type of payment streams associated with an annuity."}], "answers": {"1": "A", "2": "C", "3": "D", "4": "C", "5": "D", "6": "C", "7": "E", "8": "B", "9": "C", "10": "B", "11": "A", "12": "E", "13": "D", "14": "E", "15": "E", "16": "D", "17": "E", "18": "B", "19": "C", "20": "C"}, "examiner_report": "Section A of the paper comprises of twenty mandatory multiple-choice questions. The questions test candidates‟ comprehension of the various aspects of the syllabus. This section is compulsory and was attempted by almost all the candidates. All the candidates attempted the questions and more than 50% of the candidates scored above average. Candidates should be encouraged to cover all aspects of the syllabus. ICAN study text and Pathfinder offer the required guidance. Marking guide Section A MCQs 1-20 Award 1 mark each for any correct option stated, up to a maximum of 20 marks 20 Marks"}, {"session": "Nov 2024", "questions": [{"num": 1, "text": "Which of the following is a disadvantage of a flat organisation?", "options": {"A": "Possibility of poor communication between the top and bottom of the organisation", "B": "Senior management can be far-removed from the business activities", "C": "The cost of the middle levels managers might exceed the benefits they provide", "D": "Empowering employees may be problematic", "E": "Attracting and retaining talented managers may be difficult"}, "answer": "E", "explanation": "**Why E is correct:** \nA flat organisation, which is also known as a flat structure or low organisational structure, may struggle to attract and retain talented managers due to the limited career progression opportunities. This can make it challenging for the organisation to achieve its goals. As a result, skilled managers may prefer working for organisations with more hierarchical structures.\n\n**Why the other options are wrong:**\nA. Flat organisations are actually more likely to promote effective communication between top and bottom levels, as there are fewer layers.\nB. In reality, flat organisations tend to have closer communication and involvement from senior management, making them less separated from business activities.\nC. Eliminating the middle levels of management in a flat organisation can reduce costs.\nD. Flat organisations are designed to empower employees and promote decision-making authority at the lower levels, which can actually be beneficial.\nKey concept: Flat organisations refer to a management structure that has fewer levels of hierarchy and less bureaucracy."}, {"num": 2, "text": "Which of the following is associated with senior managers and top managers in an organisation?", "options": {"A": "Decide strategy", "B": "Functional responsibilities", "C": "Monitoring and control", "D": "Short-term planning", "E": "Employee discipline and morale"}, "answer": "A", "explanation": "**Why A is correct:** Senior managers and top managers are typically associated with high-level decision-making, which includes deciding the overall strategy of the organisation. This involves setting long-term goals and developing overall plans to achieve them. It is a key responsibility of senior and top managers.\n\n**Why the other options are wrong:**\nA. Functional responsibilities are typically associated with middle management, who oversee specific departments within an organisation.\nB. Monitoring and control are typically the responsibility of middle and lower-level managers.\nC. Short-term planning is also typically associated with middle and lower-level managers who focus on daily or weekly tasks.\nD. Employee discipline and morale are typically the responsibility of HR managers or department heads.\n\n**Key concept:** Strategic decision-making."}, {"num": 3, "text": "Which of the following is an advantage of a centralised decision-making?", "options": {"A": "Facilitates quick response to changes in business conditions and events", "B": "Encourages innovation", "C": "Effective at applying standardisation of products in the organisation", "D": "Aids the development of the initiative and talent of junior managers", "E": "Reduces the workload of central management at head office"}, "answer": "C", "explanation": "**Why C is correct:** \nA centralised decision-making structure allows for the standardisation of products and policies across the organisation, which facilitates consistency and efficiency in production and delivery.\n\n**Why the other options are wrong:**\nA. Facilitated response to changes is a benefit of decentralised decision-making.\nB. Innovation is often encouraged by decentralised decision-making.\nD. Development of junior managers' initiative is more likely to occur in a decentralised structure.\nE. Decentralised decision-making can increase the workload of lower management levels.\n\n**Key concept:** The ability to apply standardisation of products in an organisation is a key advantage of a centralised decision-making structure."}, {"num": 4, "text": "Which of the following best describes the viability of a proposed undertaking from its technical, commercial and economic standpoints?", "options": {"A": "Operational report", "B": "Marketing report", "C": "Feasibility report", "D": "Appraisal report", "E": "Sales report"}, "answer": "C", "explanation": "**Why C is correct:** \nA feasibility report assesses the viability of a proposed undertaking by evaluating its technical, commercial, and economic aspects, making it the best answer. It reviews the likelihood of the project's success and identifies potential risks and opportunities. \n\n**Why the other options are wrong:** \nA. Operational report - Incorrect, as it focuses on the ongoing management and operations of a business rather than assessing the viability of a proposed project.\nB. Marketing report - Incorrect, as it primarily deals with product, price, promotion, and place strategies to sell a product or service.\nC. Feasibility report - Incorrect (already selected as the correct answer, placed here for clarity), but this is the correct answer for this specific question.\nD. Appraisal report - Incorrect, although this term can relate to evaluation, in the context of business finance, it is less commonly associated with technical, commercial, and economic assessment of business projects.\nE. Sales report - Incorrect, as it mainly focuses on sales performance and data analysis, not the evaluation of a proposed undertaking.\n\n**Key concept:** Technical, commercial, and economic assessment of a proposed undertaking is a key concept tested in assessing the viability of a new business or project idea."}, {"num": 5, "text": "Which of the following elements of a report is of top priority?", "options": {"A": "Objective", "B": "Structure", "C": "Subject", "D": "Reader", "E": "Writer"}, "answer": "D", "explanation": "**Why D is correct:** \nThe reader is the most important element of a report, as the report is fundamentally about communicating information to the reader, providing answers to their questions, and helping them make informed decisions.\n\n**Why the other options are wrong:**\nA. Objective is a crucial factor, but it is a secondary consideration that supports the primary focus on the reader.\nB. Structure is essential for clarity and organization, but it does not take priority over the reader's needs.\nC. Subject is the topic or issue being reported, but it is not the primary focus or priority in a report.\nE. Writer refers to the person creating the report, but the report is written for the reader, not the writer.\n\n**Key concept:** The importance of considering the reader when creating a report, as emphasized in Business and Professional Communication."}, {"num": 6, "text": "Which of the following phenomena WOULD NOT be explained by emotional intelligence?", "options": {"A": "Job performance", "B":
