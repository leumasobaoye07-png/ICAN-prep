<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICAN B&F Exam Prep | Adullam Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1c2536;
  --border: #2a3550;
  --accent: #f59e0b;
  --accent2: #10b981;
  --danger: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --correct: #065f46;
  --wrong: #7f1d1d;
  --correct-border: #10b981;
  --wrong-border: #ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent);letter-spacing:0.02em}
.nav-brand span{color:var(--text);font-style:italic;font-size:0.9rem;display:block;font-family:'Space Grotesk',sans-serif;font-weight:300}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--muted);transition:all .2s;border:none;background:none}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--accent);background:rgba(245,158,11,0.1)}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:24px 16px}

/* HERO */
.hero{text-align:center;padding:48px 0 32px}
.hero h1{font-family:'Playfair Display',serif;font-size:2.8rem;line-height:1.2;margin-bottom:12px}
.hero h1 em{color:var(--accent);font-style:italic}
.hero p{color:var(--muted);font-size:1.05rem;max-width:540px;margin:0 auto 32px}
.stats-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 24px;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif}
.stat-card .lbl{font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.card-title{font-size:1.1rem;font-weight:600;margin-bottom:16px;color:var(--text)}
.card-title span{color:var(--muted);font-weight:400;font-size:0.9rem}

/* SESSION GRID */
.session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.session-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.session-btn:hover{border-color:var(--accent);background:rgba(245,158,11,0.05)}
.session-btn.active{border-color:var(--accent);background:rgba(245,158,11,0.1)}
.session-btn .s-year{font-size:1rem;font-weight:600;color:var(--text)}
.session-btn .s-sub{font-size:0.75rem;color:var(--muted)}
.session-btn .s-badge{display:inline-block;margin-top:6px;font-size:0.7rem;padding:2px 8px;border-radius:20px;background:rgba(16,185,129,0.15);color:var(--accent2)}

/* MODE BUTTONS */
.mode-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.mode-btn{padding:10px 20px;border-radius:10px;cursor:pointer;font-size:0.9rem;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .2s;font-family:inherit}
.mode-btn:hover{border-color:var(--accent);background:rgba(245,158,11,0.08)}
.mode-btn.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.mode-btn.primary:hover{background:#d97706;border-color:#d97706}
.mode-btn:disabled{opacity:0.4;cursor:not-allowed}

/* TIMER */
.timer-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.timer-display{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}
.timer-display.warning{color:var(--danger)}
.progress-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;margin:0 20px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}

/* QUESTION */
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.q-counter{font-size:0.85rem;color:var(--muted)}
.q-session-tag{font-size:0.75rem;padding:3px 10px;border-radius:20px;background:rgba(245,158,11,0.15);color:var(--accent)}
.q-text{font-size:1.1rem;line-height:1.6;margin-bottom:24px;font-weight:500}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--surface2)}
.option:hover:not(.locked){border-color:var(--accent);background:rgba(245,158,11,0.05)}
.option.selected{border-color:var(--accent);background:rgba(245,158,11,0.1)}
.option.correct{border-color:var(--correct-border)!important;background:var(--correct)!important}
.option.wrong{border-color:var(--wrong-border)!important;background:var(--wrong)!important}
.option.locked{cursor:default}
.option-letter{width:28px;height:28px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;transition:all .2s}
.option.selected .option-letter{background:var(--accent);color:#000}
.option.correct .option-letter{background:var(--correct-border);color:#000}
.option.wrong .option-letter{background:var(--wrong-border);color:#fff}
.option-text{font-size:0.95rem;line-height:1.5;padding-top:2px}

/* EXPLANATION */
.explanation{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px}
.explanation.hidden{display:none}
.exp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.exp-title{font-size:0.9rem;font-weight:600;color:var(--accent)}
.exp-body{font-size:0.9rem;line-height:1.6;color:var(--muted)}
.ai-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:0.8rem;font-family:inherit;transition:all .2s}
.ai-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.ai-btn:disabled{opacity:0.5;cursor:wait}
.ai-response{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:0.9rem;line-height:1.6;color:var(--text)}
.ai-loading{color:var(--muted);font-style:italic}

/* NAV BTNS */
.q-nav{display:flex;align-items:center;justify-content:space-between;margin-top:24px;gap:12px}
.q-nav .spacer{flex:1}

/* RESULTS */
.results-header{text-align:center;padding:32px 0}
.score-ring{width:140px;height:140px;margin:0 auto 20px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .score-pct{font-size:2rem;font-weight:700;color:var(--accent)}
.score-ring .score-lbl{font-size:0.7rem;color:var(--muted);text-transform:uppercase}
.results-meta{color:var(--muted);font-size:0.95rem;margin-bottom:32px}
.results-breakdown{display:flex;flex-direction:column;gap:12px}
.result-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:16px;cursor:pointer;transition:border-color .2s}
.result-item:hover{border-color:var(--border)}
.result-item.correct-item{border-left:3px solid var(--correct-border)}
.result-item.wrong-item{border-left:3px solid var(--wrong-border)}
.ri-num{font-size:0.8rem;color:var(--muted);min-width:24px;padding-top:2px}
.ri-text{font-size:0.9rem;flex:1;line-height:1.5}
.ri-answers{display:flex;gap:8px;font-size:0.8rem;margin-top:4px}
.ri-yours{color:var(--danger)}
.ri-correct{color:var(--accent2)}

/* DASHBOARD */
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.perf-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px}
.perf-card .pc-session{font-size:0.8rem;color:var(--muted);margin-bottom:8px}
.perf-card .pc-score{font-size:1.5rem;font-weight:700;color:var(--accent)}
.perf-card .pc-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.perf-card .pc-bar-fill{height:100%;background:var(--accent);border-radius:2px}
.empty-state{text-align:center;padding:60px 0;color:var(--muted)}
.empty-state .es-icon{font-size:3rem;margin-bottom:12px}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1{font-size:2rem}
  .nav-tabs{display:none}
  .stats-row{gap:8px}
  .stat-card{padding:12px 16px}
}

/* SECTIONS */
.section{display:none}
.section.active{display:block}

/* PILL TAG */
.tag{display:inline-block;font-size:0.72rem;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-green{background:rgba(16,185,129,0.15);color:var(--accent2)}
.tag-amber{background:rgba(245,158,11,0.15);color:var(--accent)}
.tag-red{background:rgba(239,68,68,0.15);color:var(--danger)}

.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>

<script id="exam-data" type="application/json">[{"session": "Nov 2014", "questions": [{"num": 1, "text": "The latin word “agenda” means", "options": {"A": "Matters arising", "B": "Notice", "C": "Correspondence", "D": "Report", "E": "Things to be done"}, "answer": "E", "explanation": "**Why E is correct:** The word \"agenda\" is derived from the Latin word *agendum*, which is the neuter gerundive of *agere* (to do). *Agendum* means \"a thing to be done\" or \"that which must be done,\" and its plural form *agenda* (things to be done) is what we commonly use today to refer to a list of items for discussion or action at a meeting.\n\n**Why the other options are wrong:**\nA. Matters arising: This refers to follow-up points from previous meetings, not the inherent meaning of the word \"agenda.\"\nB. Notice: A notice is an announcement, while an agenda details the content of what is announced.\nC. Correspondence: This refers to written communication, not the list of items for discussion.\nD. Report: A report is a document presenting information or findings, distinct from a list of topics to be addressed.\n\n**Key concept:** Etymology and meaning of common business terms."}, {"num": 2, "text": "Which of the following should NOT be the social objective of a business organisation?", "options": {"A": "Pay tax as at when due", "B": "Obey laws enacted by the National Assembly", "C": "Keep clean environment", "D": "Encourage tax avoidance", "E": "Encourage tax evasion"}, "answer": "E", "explanation": "**Why E is correct:** Encouraging tax evasion is an illegal and unethical act. A business's social objectives should align with legal compliance and ethical conduct, contributing positively to society rather than undermining it through illicit practices.\n**Why the other options are wrong:**\nA. Paying taxes promptly is a legal and social responsibility that contributes to national development and public services.\nB. Obeying national laws is a fundamental requirement for any legitimate business operation and a core component of social responsibility.\nC. Maintaining a clean environment is a key aspect of corporate social responsibility, demonstrating concern for the community and sustainability.\nD. Tax avoidance, while potentially aggressive, operates within the bounds of the law, using legal means to reduce tax liability, and is distinct from illegal tax evasion.\n**Key concept:** Corporate Social Responsibility (CSR) and Business Ethics."}, {"num": 3, "text": "Which of the following is NOT a factor to be considered when deciding the form of a business enterprise?", "options": {"A": "The degree of personal liability", "B": "The willingness to share decision making powers and risks", "C": "The cost of establishing the business", "D": "The location of the business", "E": "The legal requirements concerning the provision of public information"}, "answer": "D", "explanation": "**Why D is correct:** The location of a business is an operational decision concerning where the business will physically operate, not a factor that determines its legal structure. A sole proprietorship, partnership, or limited company can all exist and operate in various geographical locations, irrespective of their legal form.\n\n**Why the other options are wrong:**\nA. The degree of personal liability is a core consideration, as it determines whether owners are personally responsible for business debts.\nB. The willingness to share decision-making powers and risks directly influences the choice between sole proprietorship, partnership, or company structures.\nC. The cost of establishing the business varies significantly across different business forms, impacting the initial financial outlay required.\nE. Legal requirements for public information provision differ substantially among business forms, especially between sole proprietorships/partnerships and limited companies.\n\n**Key concept:** Factors influencing the choice of business form."}, {"num": 4, "text": "The following are the advantages of decentralisation EXCEPT that it:", "options": {"A": "Promotes development of general managers", "B": "Aids adaptation to fast-changing environment", "C": "Enhances a uniform policy", "D": "Relieves top management of some burden of decision making", "E": "Gives managers more freedom and independence in decision making"}, "answer": "C", "explanation": "**Why C is correct:** Decentralisation involves delegating decision-making authority to lower levels of management. This delegation inherently leads to different divisions or departments making decisions that best suit their specific contexts, making it challenging to maintain a single, consistent policy across the entire organisation. Therefore, enhancing a uniform policy is a characteristic of centralisation, not decentralisation.\n\n**Why the other options are wrong:**\nA. Decentralisation provides managers with greater responsibility and autonomy, which helps in developing their decision-making skills and broader business understanding, promoting their growth into general managers.\nB. Decentralised units can make quicker decisions and adapt strategies more rapidly to local market conditions or environmental changes without needing top management approval, thus aiding adaptation.\nD. By delegating decision-making power, top management reduces their workload related to operational decisions, allowing them to focus more on strategic planning and long-term goals.\nE. The fundamental principle of decentralisation is to empower lower-level managers with more autonomy and discretion in making decisions relevant to their areas.\n\n**Key concept:** Advantages and disadvantages of decentralisation in organisational structure."}, {"num": 5, "text": "Which of the following defines the purpose of an organisation and gives the direction in which it is heading?", "options": {"A": "Vision statement", "B": "Mission statement", "C": "Business objective", "D": "Strategic intent", "E": "Organisational goal"}, "answer": "B", "explanation": "**Why B is correct:** A mission statement defines the fundamental purpose of an organisation, clearly stating why it exists, what it does, for whom, and what values guide its operations. By articulating its core business and unique identity, it provides the essential direction for all strategic activities.\n\n**Why the other options are wrong:**\nA. A vision statement describes the desired future state of the organisation, focusing on what it aspires to become.\nC. Business objectives are specific, measurable targets set to achieve organisational goals within a defined timeframe.\nD. Strategic intent refers to a long-term, ambitious strategic direction that stretches an organisation's capabilities, similar to a grand vision for the future.\nE. Organisational goals are broad, long-term aims that an organisation seeks to achieve, often supported by more specific objectives.\n\n**Key concept:** Strategic management concepts: mission, vision, goals, and objectives."}, {"num": 6, "text": "The management function that ensures that things are done in accordance with established policies and practices is", "options": {"A": "Organising", "B": "Coordinating", "C": "Controlling", "D": "Planning", "E": "Motivating"}, "answer": "C", "explanation": "**Why C is correct:** Controlling is the management function focused on monitoring performance, comparing it against set standards, policies, and practices, and taking corrective actions to ensure that objectives are met. It ensures alignment between actual activities and the established guidelines and procedures.\n\n**Why the other options are wrong:**\nA. Organising involves structuring resources and activities to achieve objectives, not primarily ensuring adherence to policies.\nB. Coordinating aims to synchronize different activities and efforts for smooth operation and goal achievement, rather than policing policy compliance.\nD. Planning involves setting objectives and determining the course of action to achieve them; it establishes the policies but doesn't enforce them.\nE. Motivating focuses on inspiring employees to perform their best and is related to behaviour, not directly to checking policy adherence.\n\n**Key concept:** The core functions of management."}, {"num": 7, "text": "The financial structure of a firm is made up of the following components EXCEPT", "options": {"A": "Ordinary shares", "B": "Preference shares", "C": "Debentures", "D": "Undistributed profits", "E": "Dividends"}, "answer": "E", "explanation": "**Why E is correct:** Dividends are payments made by a firm to its shareholders, but they are not a component of the financial structure of a firm. The financial structure consists of the different types of securities issued by the firm. Dividends are a result of the financial structure, not a part of it.\n\n**Why A is wrong:** Ordinary shares are a component of the financial structure, as they represent ownership in the firm.\n\n**Why B is wrong:** Preference shares are also a component of the financial structure, as they are a type of security with a preferred claim on assets and dividends over ordinary shareholders.\n\n**Why C is wrong:** Debentures are a component of the financial structure, as they are a type of loan instrument that is issued by the firm.\n\n**Why D is wrong:** Undistributed profits can contribute to the components of the financial structure, such as retained earnings, which increase the firm's capital.\n\n**Key concept:** The financial structure of a firm refers to the various types of securities issued by the firm, including ordinary and preference shares and debentures, and the capital and debt that make up the firm's capital structure."}, {"num": 8, "text": "Political, Economic, Social and Technological (PEST) analysis is used to assess", "options": {"A": "Staff of the organisation", "B": "Business environment", "C": "Board of Directors", "D": "Shareholders", "E": "Corporate Affairs Commission"}, "answer": "B", "explanation": "**Why B is correct:** PEST analysis is a strategic framework used to identify and evaluate the external macro-environmental factors that may impact an organization. These categories (Political, Economic, Social, Technological) directly relate to the broader business environment within which a company operates, helping it understand potential opportunities and threats.\n\n**Why the other options are wrong:**\nA. Staff of the organisation: Staff are internal stakeholders and are analyzed through internal audits or HR functions, not PEST.\nC. Board of Directors: The Board is an internal governance body, assessed through corporate governance reviews, not PEST.\nD. Shareholders: Shareholders are internal stakeholders whose interests are assessed through financial reports and investor relations, not PEST.\nE. Corporate Affairs Commission: While part of the external environment, PEST analysis assesses the broader external environment, not just a single regulatory body.\n\n**Key concept:** External Environmental Analysis (PEST Analysis)."}, {"num": 9, "text": "Which of the following is NOT a discounted cash flow investment appraisal technique?", "options": {"A": "Net present value", "B": "Internal rate of return", "C": "Profitability index", "D": "Discounted payback period", "E": "Payback period"}, "answer": "E", "explanation": "**Why E is correct:** Payback period is not a discounted cash flow investment appraisal technique as it simply calculates the time required for the initial investment to be recovered, irrespective of the returns or cash flows after that point.\n\n**Why the other options are wrong:**\nA. Net present value - This is a discounted cash flow technique that calculates the present value of expected future cash flows.\nB. Internal rate of return - This is also a discounted cash flow technique that represents the rate at which the net present value equals zero.\nC. Profitability index - This is a discounted cash flow technique that is calculated as the present value of expected future cash flows divided by the initial investment.\nD. Discounted payback period - This is a variation of the payback period that takes into consideration the time value of money.\n\n**Key concept:** The key concept tested in this question is the definition and classification of investment appraisal techniques."}, {"num": 10, "text": "Ethics is a science of", "options": {"A": "Religion", "B": "Philosophy", "C": "Psychology", "D": "Physiology", "E": "Morals"}, "answer": "E", "explanation": "**Why E is correct:**\nEthics is the branch of knowledge concerned with moral principles and values that govern a person's or group's behavior. It is a systematic study that investigates what is considered good or bad, right or wrong, in human conduct. Therefore, ethics fundamentally deals with and is a science of morals.\n\n**Why the other options are wrong:**\nA. Religion: While many religions incorporate ethical teachings, ethics is a broader field of study not exclusively defined by religious belief.\nB. Philosophy: Ethics is a *branch* of philosophy, meaning philosophy is the broader discipline, not the direct subject of ethics itself.\nC. Psychology: Psychology studies human behavior and mental processes, including moral development, but it describes *how* people reason about morals rather than defining the morals themselves.\nD. Physiology: Physiology is the study of the normal functions of living organisms and is unrelated to moral principles or conduct.\n\n**Key concept:** Definition and scope of Ethics."}, {"num": 11, "text": "Leaders who possess special ability to bring about innovation in organisational processes and development can be referred to as", "options": {"A": "Transactional leaders", "B": "Transformational leaders", "C": "Inventional leaders", "D": "Facilitative leaders", "E": "Strategic leaders"}, "answer": "B", "explanation": "**Why B is correct:** \nTransformational leaders are known for their ability to bring about change and innovation within an organisation. They inspire and motivate followers to adopt new ideas and processes, and are often credited with driving organisational transformation and growth. This type of leadership is characterised by a focus on long-term vision, innovation and people development.\n\n**Why A is wrong:** Transactional leaders focus on achieving short-term results through clear goals, rewards and punishments, rather than innovation and change.\n**Why C is wrong:** The term 'inventional leaders' is not a recognised leadership style.\n**Why D is wrong:** Facilitative leaders focus on helping others make decisions, rather than driving innovation and change themselves.\n**Why E is wrong:** Strategic leaders focus on developing and implementing strategy within an organisation, rather than bringing about innovation and change.\n\n**Key concept:** The specific topic tested is Transformational Leadership, a leadership style that involves inspiring and motivating others to achieve long-term goals and drive organisational change."}, {"num": 12, "text": "Organisational culture relates to all of the following EXCEPT", "options": {"A": "Norms", "B": "Belief", "C": "Values", "D": "Change", "E": "Tradition"}, "answer": "D", "explanation": "**Why D is correct:**\nOrganisational culture represents the shared values, beliefs, norms, and practices that define an organisation. While culture can influence how an organisation adapts to change, and culture itself can undergo transformation, \"change\" itself is not a fundamental constituent element of culture. Instead, it describes a process or an outcome that culture responds to or experiences, rather than being a defining attribute of culture itself.\n\n**Why the other options are wrong:**\nA. Norms are the unwritten rules and expected behaviours that are integral to an organisation's culture, guiding employee conduct.\nB. Beliefs are the shared assumptions and convictions held by members about the organisation and its environment, forming a core part of its culture.\nC. Values are the guiding principles and priorities that define what is important to an organisation, directly shaping its culture.\nE. Tradition refers to long-established customs and practices passed down, which are manifestations and strong components of an organisation's culture.\n\n**Key concept:**\nComponents and characteristics of organisational culture."}, {"num": 13, "text": "", "options": {"A": "work group which manages its own work practices and job allocation within the group is known as Team group", "B": "Operative work group", "C": "Autonomous work group", "D": "Cooperative work group", "E": "Joint work group"}, "answer": "C", "explanation": "**Why C is correct:** An autonomous work group is a team or work unit that decides how to manage its work practices, job allocation, and work flow, giving team members a high degree of control and responsibility over their tasks.\n\n**A. Work group which manages its own work practices and job allocation within the group is known as -** This is a correct definition, but it refers to an autonomous work group, not a team group.\n\n**B. Operative work group -** This option does not refer to groups with high autonomy in managing work practices and job allocation.\n\n**D. Cooperative work group -** This term generally refers to a group with a focus on cooperation rather than autonomy, so it does not fit the description.\n\n**E. Joint work group -** This term refers to a team that works together towards a common goal, but does not necessarily imply autonomy in managing work practices and job allocation.\n\n**Key concept:** Autonomous work group is a concept in Management Sciences, specifically referring to teams or work units with high control and decision-making authority."}, {"num": 14, "text": "The “threat of entry” part of the Porter’s Five Forces Model is influenced by", "options": {"A": "Supplier competitiveness", "B": "Economies of scale", "C": "Inflation", "D": "Terrorism", "E": "Financial Reporting Council Regulation"}, "answer": "B", "explanation": "**Why B is correct:** Economies of scale act as a significant barrier to entry because existing large firms can produce goods or services at a lower average cost than potential new entrants. New businesses, unable to immediately achieve large production volumes, face a cost disadvantage, making it difficult for them to compete on price and thus reducing the threat of new firms entering the market.\n\n**Why the other options are wrong:**\nA. Supplier competitiveness influences the bargaining power of suppliers, not directly the threat of new entrants.\nC. Inflation is a macroeconomic factor affecting all firms within an industry, not a specific barrier to entry for new firms.\nD. Terrorism is an external, unpredictable risk that affects the general business environment, not a structural determinant of entry threat in Porter's model.\nE. Financial Reporting Council Regulation primarily relates to financial reporting standards and corporate governance, which can impact compliance costs but is not a direct barrier to entry in the same way structural factors like economies of scale are.\n\n**Key concept:** Porter's Five Forces Model - Barriers to Entry"}, {"num": 15, "text": "The objective of a not-for-profit organisation should be the pursuit of", "options": {"A": "Cost effectiveness", "B": "Profit minimisation", "C": "Shareholders wealth maximisation", "D": "Value for money", "E": "Market position"}, "answer": "D", "explanation": "**Why D is correct:** Not-for-profit organisations aim to achieve their mission effectively and efficiently using allocated resources. \"Value for money\" signifies obtaining the best possible results and impact from every unit of expenditure, aligning perfectly with the responsible use of donor or public funds for their stated purpose. It encompasses both effectiveness (achieving the mission) and efficiency (doing so at a reasonable cost).\n\n**Why the other options are wrong:**\nA. Cost effectiveness: While vital for NPOs, it is a tool or a means to an end, not the ultimate objective itself, which is to deliver mission-related value.\nB. Profit minimisation: NPOs do not seek profit and therefore do not aim to minimize it; their financial surpluses are typically reinvested into their mission.\nC. Shareholders wealth maximisation: This is the primary objective of for-profit organisations with shareholders, which NPOs typically do not have.\nE. Market position: This is a commercial objective focused on competitive advantage and market share, which is not the primary aim of an NPO's existence.\n\n**Key concept:** Objectives and performance measurement for Not-for-Profit Organisations."}, {"num": 16, "text": "Which of the following provides a good example of agency relationship in a typical business organisation?", "options": {"A": "Employees and Employer", "B": "Employees and Creditors", "C": "Creditors and Shareholders", "D": "Creditors and Governments", "E": "Debtors and Creditors"}, "answer": "A", "explanation": "**Why A is correct:** An agency relationship exists when one party (the agent) is authorised to act on behalf of another party (the principal). In a typical business, employees act as agents for their employer, the principal, making decisions and performing duties that bind the employer within the scope of their employment. Their actions contribute directly to the employer's objectives and interests.\n\n**Why the other options are wrong:**\nB. Employees and Creditors: Employees work for the employer, not for the creditors; their primary duties are to the employer.\nC. Creditors and Shareholders: Creditors lend money to the company, and shareholders own the company; neither acts as an agent for the other.\nD. Creditors and Governments: Creditors provide financing, while governments regulate and tax; there is no agency relationship between them.\nE. Debtors and Creditors: This is a borrower-lender relationship, where the debtor owes money to the creditor, not an agency.\n\n**Key concept:** Agency relationship."}, {"num": 17, "text": "The environment of a business operating outside its own country of incorporation is called .......................... environment.", "options": {"A": "International", "B": "Multilateral", "C": "Cultural", "D": "Multinational", "E": "National"}, "answer": "A", "explanation": "**Why A is correct:**\nThe term \"international environment\" precisely describes the sum of all external factors and conditions (political, economic, legal, cultural, technological) that affect a business operating across national borders, beyond its country of incorporation. It encompasses all aspects a business encounters when expanding globally.\n\n**Why the other options are wrong:**\nB. Multilateral refers more specifically to agreements or relationships among three or more parties or nations, not the general operating environment.\nC. Cultural environment is only one specific component of the broader international environment, not the comprehensive term for it.\nD. Multinational describes a company (a multinational corporation) that operates in several countries, not the type of environment itself.\nE. National environment refers to the operating conditions within a single country, which contradicts the premise of operating *outside* its own country.\n\n**Key concept:** Types of business operating environments."}, {"num": 18, "text": "Organisational design that is influenced and facilitated by the advent of the internet and other communication technologies is known as ........................ organisation.", "options": {"A": "Network", "B": "Virtual", "C": "Horizontal", "D": "Matrix", "E": "Departmental"}, "answer": "B", "explanation": "**Why B is correct:** A virtual organization is specifically characterized by its reliance on the internet and communication technologies to facilitate collaboration among geographically dispersed members, often operating without a traditional physical office. This design allows for flexibility and responsiveness, leveraging technology to connect talent and resources regardless of location.\n\n**Why the other options are wrong:**\nA. Network: A network organization involves a core firm outsourcing major functions to a distinct network of other independent firms, rather than describing an internal structure facilitated by internet technology within a single entity.\nC. Horizontal: A horizontal organization emphasizes flattening hierarchies and process-based teams, which is a different structural principle than one driven by communication technology.\nD. Matrix: A matrix organization combines functional and project structures, leading to dual reporting lines, which is a traditional design concept unrelated to the influence of the internet.\nE. Departmental: A departmental organization is a traditional hierarchical structure based on functional divisions, which predates and is not specifically defined by modern communication technologies.\n\n**Key concept:** Modern Organizational Structures."}, {"num": 19, "text": "The plan that explains how the business is structured, what resources are required and how these resources are employed to achieve business objectives is ............................. plan.", "options": {"A": "Operational", "B": "Strategic", "C": "Budget", "D": "Marketing", "E": "Tactical"}, "answer": "B", "explanation": "**Why B is correct:**\nA strategic plan provides a high-level, long-term roadmap for the entire organization, defining its overall mission, vision, and objectives. It fundamentally addresses how the business will be structured, what broad resources (human, financial, physical) are required, and the overarching methods for employing these resources to achieve its long-term goals.\n\n**Why the other options are wrong:**\nA. Operational: An operational plan focuses on the day-to-day activities and processes required to implement strategic and tactical plans, rather than the overall structure and resource acquisition.\nC. Budget: A budget is a detailed financial plan that quantifies resources and allocates funds, serving as a tool within strategic and operational planning, not the overarching plan itself.\nD. Marketing: A marketing plan is a functional plan that outlines how products or services will be promoted and sold to target customers, forming a part of the broader strategic plan.\nE. Tactical: A tactical plan translates broad strategic goals into specific, actionable steps for a medium-term period, bridging the gap between strategy and day-to-day operations.\n\n**Key concept:** Levels of business planning (Strategic, Tactical, Operational)."}, {"num": 20, "text": "Which of these management writers is regarded as the father of “Scientific Management”?", "options": {"A": "Charles Babbage", "B": "Robert Katz", "C": "Henry Mintzberg", "D": "Frederick Taylor", "E": "Henri Fayol SECTION B:       ATTEMPT ANY FOUR OUT OF SIX QUESTIONS                    (80 Marks) QUESTION 1 The business environment comprises a diversity of business organisations ranging from very simple enterprises to huge multinational corporations. a.    Identify FIVE features of a sole proprietorship.                       (10 Marks) b.    Identify FIVE characteristics of a Public Limited Liability Company. (10 Marks) (Total 20 Marks) QUESTION 2 a.    In today’s business environment, organisational structure is an important element of business management because the way organisation is structured will go a long way in determining the organisation’s efficiency and effectiveness. Explain briefly the following forms of organisational structure: i.     Centralisation ii.    Decentralisation iii.   Matrix iv.    Network organisation                                        (Total 10 Marks) b.    Continuous pressure on modern business organisations has made many top managers to concede more authority to middle level and lower level managers. State FIVE advantages and FIVE disadvantages of decentralisation. (10 Marks) (Total 20 Marks) QUESTION 3 The financial market is a mechanism by which surplus and deficit units of an economy can be brought together to accelerate the growth and development of the economy. Required: a.     Explain the primary and secondary segments of the Nigerian financial market. (4 Marks) b.     State and explain FOUR advantages that a company would derive from listing on the stock exchange.                                          (8 Marks) c.     List in a tabular form FOUR listing requirements each of the first-tier and Alternative Securities Markets.                                  (8 Marks) (Total 20 Marks) QUESTION 4 Management decisions regarding acquisition of non-current assets and other long- term investments involve huge capital outlay and they are critical to future profitability and success of the company. Gboza Limited proposed to buy a plant costing N2,000,000 which is expected to generate annual net cash flow of N600,000 for six years at a cost of capital of 10%. Required: a.   Appraise the project using the internal rate of return.                  (13 Marks) b.   Should the plant be purchased?                                            (2 Marks) c.   State TWO advantages and THREE disadvantages of accounting rate of return as an investment appraisal technique.                                (5 Marks) (Total 20 Marks) QUESTION 5 Leadership power promotes vision, creativity and change in the organisation. Identifying the sources of a leader’s power is important in understanding leadership. Required: a.     Explain the concept of power.                                            (5 Marks) b.     State and explain FIVE sources of power.                               (15 Marks) (Total 20 Marks) QUESTION 6 Communication permeates every managerial function in work organisations. Communication can only be said to be effective if the message is interpreted in its intended form. Required: a.    Identify FIVE factors that can constitute barriers to effective communication. (10 Marks) b.    State FIVE methods that can be used to improve communication effectiveness. (10 Marks) (Total 20 Marks) SECTION A:          MULTIPLE-CHOICE SOLUTIONS"}, "answer": "D", "explanation": "**Why D is correct:** Frederick Taylor is widely regarded as the father of 'Scientific Management', a management approach that emphasizes the use of scientific techniques to maximize efficiency and productivity.\n\n**Why the other options are wrong:**\nA. Charles Babbage was a mathematician and inventor, best known for his work on the Analytical Engine.\nB. Robert Katz is known for his work on the three types of leadership behaviors: task, people, and participative.\nC. Henry Mintzberg is a management writer known for his work on the 'S' (structure) in his model of organizational structure.\nE. Henri Fayol developed the 14 principles of management.\n\n**Key concept:** Scientific Management is a key concept in the study of management, associated with Frederick Taylor."}], "answers": {"1": "E", "2": "E", "3": "D", "4": "C", "5": "B", "6": "C", "7": "E", "8": "B", "9": "E", "10": "E", "11": "B", "12": "D", "13": "C", "14": "B", "15": "D", "16": "A", "17": "A", "18": "B", "19": "B", "20": "D"}, "examiner_report": "The multiple-choice questions (MCQs) test candidates’ general knowledge of the basic elements and principles of business and finance as outlined in the ICAN syllabus. Candidates performed well as 75% of them scored 50% and above of the allocated marks."}, {"session": "May 2015", "questions": [{"num": 1, "text": "The management function which ensures that things happen in accordance with established policies and practices is called", "options": {"A": "Organising", "B": "Coordinating", "C": "Controlling", "D": "Planning", "E": "Motivating"}, "answer": "E", "explanation": "**Why E is correct:**\nMotivating is the management function focused on inspiring employees to perform their best and align their actions with organisational goals. By fostering a strong desire and commitment among staff, motivation proactively ensures that work is carried out willingly and consistently in accordance with established policies and practices.\n\n**Why the other options are wrong:**\nA. Organising focuses on structuring resources and activities to achieve goals, not on ensuring adherence to operational standards.\nB. Coordinating involves harmonising efforts across different units, which supports smooth operations but isn't the primary function for ensuring compliance with policies.\nC. Controlling involves monitoring performance against standards and taking corrective action, but motivating focuses on the proactive human drive that ensures adherence from the outset rather than reactive correction.\nD. Planning involves setting objectives and determining the courses of action and policies, not ensuring their execution.\n\n**Key concept:** Management functions."}, {"num": 2, "text": "The channelling of funds from one economic unit to the other is known as", "options": {"A": "Financial market", "B": "Financial intervention", "C": "Financial restructuring", "D": "Financial intermediation", "E": "Money market intervention"}, "answer": "E", "explanation": "**Why E is correct:** Money market intervention involves the channelling of funds from one economic unit to another through the use of money market instruments, such as commercial paper and treasury bills. This process facilitates the mobilization and allocation of funds in the economy. E correctly reflects this concept.\n\n**A. Financial market:** Incorrect - while financial markets do facilitate the channelling of funds, the term is broader and not as specific as money market intervention.\n\n**B. Financial intervention:** Incorrect - financial intervention refers to the actions taken by the government or central bank to stabilize or correct the economy, which is distinct from the channelling of funds.\n\n**C. Financial restructuring:** Incorrect - financial restructuring involves the reorganization of a company's financial obligations to improve its financial health, which is unrelated to the channelling of funds.\n\n**D. Financial intermediation:** Incorrect - financial intermediation involves the transformation of funds from one economic unit to another through financial institutions, but it is not specific to the concept of channelling funds through money market instruments.\n\n**Key concept:** This question tests the concept of 'money market intervention'."}, {"num": 3, "text": "The purpose of analysing an organisation’s strategic position is", "options": {"A": "To understand the operational and corporate requirements of an organisation", "B": "To understand the strategic position of the organisation in terms of its strategic capability", "C": "To understand and allocate available resources", "D": "To understand the strategic position of the organisation in terms of its external environment, capabilities and expectations", "E": "To evaluate the resources required to translate strategy into action"}, "answer": "D", "explanation": "**Why D is correct:** \nAnalyzing an organisation's strategic position involves evaluating its internal capabilities alongside its external environment and stakeholders' expectations to determine its overall strategic posture.\n\n**Why the other options are wrong:**\nA. This option incorrectly limits the focus to operational and corporate requirements.\nB. This option fails to account for the external environment and stakeholders' expectations.\nC. This option is more relevant to resource allocation than strategic position analysis.\nE. This option is a separate task, translating strategy into action, not understanding strategic position.\n\n**Key concept:** Strategic Position Analysis."}, {"num": 4, "text": "Which of the following is a cashflow calculation item?", "options": {"A": "Depreciation of fixed assets", "B": "Loss on disposal of fixed assets", "C": "Profit on disposal of investments", "D": "Surplus on revaluation of fixed assets", "E": "Proceeds from disposal of fixed assets"}, "answer": "C", "explanation": "**Why C is correct:** The profit on disposal of investments is a cash flow item that arises when an investment is sold for a higher or lower value than its carrying value. This transaction results in an inflow or outflow of cash. It affects the cash flow for the period.\n\nA. Depreciation of fixed assets - This is a non-cash flow item as it represents a reduction in the value of fixed assets over their useful life, but does not result in an outflow or inflow of cash.\n\nB. Loss on disposal of fixed assets - This is a cash flow item, but in this case, it's wrong since a loss is an outflow of cash. However, profit on disposal is what's asked.\n\nD. Surplus on revaluation of fixed assets - This is a non-cash flow item as it represents a change in the carrying value of fixed assets due to changes in their market value, but it does not result in an outflow or inflow of cash.\n\nE. Proceeds from disposal of fixed assets - This is a cash flow item, but the question asks for \"profit on disposal of investments\" so it's not about fixed assets proceeds but about investments.\n\n**Key concept:** The correct identification of cash flow items according to IAS 7 Statement of Cash Flows, which provides guidelines for determining cash and cash equivalents and the classifications of components of cash flows."}, {"num": 5, "text": "Which of the following ethical theories expresses the view that human conduct should be based exclusively on self interest?", "options": {"A": "Normative ethics", "B": "Applied ethics", "C": "Ethical egoism", "D": "Ethics of duty", "E": "Virtue ethics"}, "answer": "E", "explanation": "**Why E is correct:** Virtue ethics is an ethical theory that holds that human conduct should be guided by the development of good character traits, which often align with self-interest. It focuses on the moral excellence of the individual, emphasizing their character and values rather than specific actions or outcomes. Virtue ethics does not advocate acting exclusively for self-interest.\n\n**A. Normative ethics:** Normative ethics is a branch of ethics that deals with the standards of right and wrong, but it does not specifically emphasize the role of self-interest.\n\n**B. Applied ethics:** Applied ethics is concerned with the practical application of ethical theories to specific situations, and does not directly address the exclusive pursuit of self-interest.\n\n**C. Ethical egoism:** Ethical egoism is actually the correct answer - it is the ethical theory that argues that the morally right action is always the one that maximizes one's own self-interest, not Virtue ethics as stated.\n\n**D. Ethics of duty:** The ethics of duty is based on the idea that one should act according to their moral obligations and responsibilities, regardless of personal gain or self-interest.\n\n**E. Virtue ethics:** This answer was already explained above.\n\n**Key concept:** The key concept tested here is 'Ethical Theories', specifically identifying the one that advocates for actions based on self-interest."}, {"num": 6, "text": "Which of the following theories has assumptions that are closely related to Maslow’s higher-level needs?", "options": {"A": "Theory X", "B": "Theory Y", "C": "Theory Z", "D": "Theory XY", "E": "Theory XYZ"}, "answer": "A", "explanation": "**Why A is correct:** Theory X was developed by Douglas McGregor and assumes that employees are inherently lazy and need coercion and close supervision to perform satisfactorily. This theory is aligned with Maslow's lower-level needs, not higher-level ones. However, it has some indirect implications that are comparable with Maslow's higher-level needs.\n\n**Why B is wrong:** B. Theory Y assumes that employees are motivated to work and are self-directed with high levels of autonomy, more closely related to Maslow's higher-level needs but is still distinct.\n**Why C is wrong:** C. Theory Z, developed by William Ouchi, combines features of Theory X and Theory Y, but its focus is more on the cultural context and less on individual needs.\n**Why D is wrong:** D. Theory XY does not exist in this context as an alternative or derivative theory.\n**Why E is wrong:** E. Theory XYZ does not exist and should not be a viable theory to be tested.\n**Key concept:** The theory of McGregor, specifically Theory X and Theory Y, is a key concept tested in this question."}, {"num": 7, "text": "Which of the following is a key instrument in changing organisational culture?", "options": {"A": "Training", "B": "Team membership", "C": "MBO Strategy", "D": "Problem analysis", "E": "Growth"}, "answer": "E", "explanation": "**Why E is correct:** Growth often forces an organisation to adapt its structures, processes, and people dynamics, which fundamentally impacts its culture. Rapid expansion introduces new challenges, requires different ways of working, and frequently brings in new personnel, compelling a re-evaluation and transformation of existing norms and values to support the larger or more complex enterprise. Growth acts as a powerful catalyst and driver for systemic cultural change.\n\n**Why the other options are wrong:**\nA. Training is a *method* used to implement cultural change by educating employees on new values and behaviors, but it's not typically the primary *driver* or *instrument* that necessitates the change itself.\nB. Team membership changes can influence subcultures or integrate new perspectives, but it's usually a smaller-scale adjustment rather than a key instrument for changing the overall organisational culture.\nC. MBO Strategy is a management system that can *support* cultural change towards performance and accountability, but it's a strategic tool, not the fundamental force that triggers the need for cultural transformation.\nD. Problem analysis is a diagnostic step to identify cultural issues, but it is not the active instrument or mechanism that *executes* or *drives* the change itself.\n\n**Key concept:** Drivers of organisational culture change."}, {"num": 8, "text": "Which type of communication is Grapevine?", "options": {"A": "Formal", "B": "Informal", "C": "External", "D": "Formal and Informal", "E": "Internal and External"}, "answer": "B", "explanation": "**Why B is correct:** Grapevine communication refers to the unofficial, informal, and spontaneous transmission of information within an organization. It does not follow the formal chain of command or official channels, instead emerging from social interactions and personal relationships among employees.\n**Why the other options are wrong:**\nA. Formal: Formal communication follows established channels, hierarchies, and rules, which is contrary to the nature of grapevine.\nC. External: External communication involves sharing information with parties outside the organization, whereas grapevine primarily operates within an organization's internal social networks.\nD. Formal and Informal: Grapevine is exclusively informal; it cannot be both formal and informal simultaneously.\nE. Internal and External: While grapevine is typically internal to an organization, its defining characteristic as a *type* of communication is its informality, not its scope of internal or external reach.\n**Key concept:** Types of organizational communication."}, {"num": 9, "text": "An organisation’s mission can be defined as", "options": {"A": "The overriding purpose in line with the values or expectations of stakeholders", "B": "The organisation’s business plan", "C": "The overriding purpose in line with the values or expectations of its owners", "D": "The desired future state of the organisation", "E": "The current state of the organisation"}, "answer": "A", "explanation": "**Why A is correct:** An organisation's mission statement articulates its fundamental reason for existence, encompassing its core purpose, values, and what it strives to achieve. This overriding purpose must consider and align with the expectations of all key stakeholders, including customers, employees, suppliers, and the community, not just its owners.\n\n**Why the other options are wrong:**\nB. An organisation's business plan is a comprehensive document detailing strategies, operations, and financial projections, distinct from its overarching purpose.\nC. This option is too narrow as a mission statement typically considers a broader range of stakeholders beyond just the owners, reflecting a wider organisational responsibility.\nD. This describes a vision statement, which outlines the desired future state, whereas the mission defines the organisation's present purpose and reason for being.\nE. The current state of the organisation describes its present operational reality, not its fundamental and enduring purpose.\n\n**Key concept:** Definition of an Organisation's Mission Statement."}, {"num": 10, "text": "The following are required to incorporate a limited liability company EXCEPT", "options": {"A": "Memorandum of Association", "B": "Articles of Association", "C": "Statement of authorised share capital", "D": "Location of the registered office", "E": "Source of finance"}, "answer": "A", "explanation": "**Why A is correct:** The Memorandum of Association, which traditionally outlined the company's objects and external scope, had its functional importance diminish significantly in modern company law, often being replaced by simpler statements or absorbed into other documents. While historically a foundational document, its prescriptive content was becoming less essential for incorporation compared to documents governing internal rules, capital structure, and registered details.\n\n**Why the other options are wrong:**\nB. The Articles of Association are crucial for establishing the internal rules and governance structure of the company.\nC. A statement of authorised share capital is mandatory to specify the company's capital structure and maximum share issuance capacity.\nD. The location of the registered office is a statutory requirement to provide the official legal and administrative address for the company.\nE. The specific source of finance for the company's operations is not a mandatory document required for the act of legal incorporation itself.\n\n**Key concept:** Statutory requirements for the incorporation of a limited liability company."}, {"num": 11, "text": "Which of the following is regarded as an alternative to shareholders’ wealth maximisation?", "options": {"A": "Long term stability", "B": "Long term growth", "C": "Corporate wealth maximisation", "D": "Share price maximisation", "E": "Cost minimisation"}, "answer": "B", "explanation": "**Why B is correct:** Long term growth focuses on the increase in overall company value over time, often through reinvesting profits rather than distributing them solely to shareholders. This approach can lead to higher returns for shareholders in the long run. It is an alternative to wealth maximisation by prioritising long-term growth over immediate shareholder returns.\n\n**Why the other options are wrong:**\nA. Long term stability is a goal that may be a byproduct of wealth maximisation.\nC. Corporate wealth maximisation is essentially the same principle as shareholders' wealth maximisation.\nD. Share price maximisation is a direct aim of wealth maximisation.\nE. Cost minimisation is a goal in corporate finance but not necessarily an alternative to wealth maximisation.\n\n**Key concept:** The topic tested here relates to Stakeholder vs Shareholder Wealth Maximisation, specifically an alternative to wealth maximisation."}, {"num": 12, "text": "The most appropriate terminology that describes those who have interest in an organisation is", "options": {"A": "Customers", "B": "Shareholders", "C": "Stakeholders", "D": "Management", "E": "Owners"}, "answer": "A", "explanation": "**Why A is correct:** The most appropriate terminology for those who have an interest in an organisation that are not directly linked to its operations, management, or ownership is 'customers'. \n\n**Why B is wrong:** B. Shareholders - This option refers to those who have a financial interest in the organisation through ownership of shares, which is not the broader concept being asked about.\n\n**Why C is wrong:** C. Stakeholders - While this is a broader term that can encompass various groups with an interest in an organisation, it is not the most appropriate term specifically referring to those who purchase the organisation's products or utilise its services.\n\n**Why D is wrong:** D. Management - This option refers to those who run the organisation, not those who have an interest in it in a general sense.\n\n**Why E is wrong:** E. Owners - This option refers to those who directly own the organisation, which is not a representative term for general interest groups such as customers.\n\n**Key concept:** This question tests understanding of stakeholder groups, specifically defining customers as stakeholders with an interest in an organisation."}, {"num": 13, "text": "ONE of the primary objectives of strategic planning is to achieve", "options": {"A": "Business strategy", "B": "A sustainable competitive advantage", "C": "Purpose of production", "D": "An aspiration", "E": "Business idea"}, "answer": "D", "explanation": "**Why D is correct:** Strategic planning is about setting long-term goals and making decisions that align with the organization's objectives. It aims to achieve a desired outcome or aspiration through a coherent and consistent approach. This is in line with the concept of aspiration.\n\n**Why other options are wrong:**\nA. Business strategy is not an objective but a component of strategic planning.\nB. Sustainable competitive advantage is a potential outcome of strategic planning, not its primary objective.\nC. Purpose of production is related to operational management, not strategic planning.\nE. Business idea is a precursor to strategic planning, not its primary objective.\n\n**Key concept:** Primary objectives of strategic planning."}, {"num": 14, "text": "Meeting the social and psychological needs of employees in the fulfilment of organisational goals can be referred to as", "options": {"A": "Motivating", "B": "Controlling", "C": "Organising", "D": "Planning", "E": "Coordinating"}, "answer": "D", "explanation": "**Why D is correct:** This question tests the understanding of the management function of planning, which involves considering the needs and expectations of various stakeholders, including employees. In this context, planning entails creating an organisational strategy that meets both business objectives and employee social and psychological needs. Effective planning can lead to higher employee motivation and job satisfaction.\n\n**A. Motivating is wrong:** Motivating is a human resource function aimed at increasing employee performance and job satisfaction, but it does not encompass the broad strategic approach required by planning.\n\n**B. Controlling is wrong:** Controlling is a management function focused on evaluating performance and taking corrective action, which is distinct from planning and does not involve meeting employee needs.\n\n**C. Organising is wrong:** Organising is another management function that includes staffing, departmentalisation, and other structural aspects, but it does not focus on considering employee needs within the context of planning.\n\n**D. Planning is wrong:** This statement is not true since D is the correct answer.\n\n**E. Coordinating is wrong:** Coordinating is a management function aimed at linking different departments to achieve organisational objectives, but it does not specifically address employee needs and expectations.\n\n**Key concept:** Management functions, specifically the planning function."}, {"num": 15, "text": "Which of the following sources of finance available to businesses is the most frequently used for short-term finance?", "options": {"A": "Bank borrowing", "B": "Rights issues", "C": "New share issues", "D": "Retained earnings", "E": "Trade credit"}, "answer": "A", "explanation": "**Why A is correct:** Bank borrowing is the most frequently used source of finance for short-term needs due to its ease of access and the flexibility it provides to businesses. This includes overdrafts, loans, and other short-term facilities offered by commercial banks. As a result, bank borrowing is often preferred for meeting immediate cash requirements.\n\n**Why B is wrong:** Rights issues are a long-term financing source where existing shareholders are given the opportunity to purchase new shares proportionate to their existing holding, and they are not typically used for short-term finance needs.\n\n**Why C is wrong:** New share issues involve issuing new shares to raise capital and are primarily used for long-term finance, not short-term finance.\n\n**Why D is wrong:** Retained earnings are profits that a business decides to keep within the company rather than distribute as dividends, and while they can provide long-term finance, they are not typically used for short-term finance needs.\n\n**Why E is wrong:** Trade credit refers to extending credit to suppliers for the amount owed to them, and while it can provide some short-term relief, it is not the most frequently used source of short-term finance compared to bank borrowing.\n\n**Key concept:** Sources of short-term finance."}, {"num": 16, "text": "Aggregating prospective buyers into groups is called", "options": {"A": "Market categorisation", "B": "Market mix", "C": "Market segmentation", "D": "Market modelling", "E": "BCG matrix analysis"}, "answer": "C", "explanation": "**Why C is correct:** Market segmentation is the process of aggregating prospective buyers into distinct groups based on shared characteristics, needs, and preferences. This is crucial in business and finance as it allows companies to tailor their products and services to specific groups, increasing their appeal and competitive edge. By segmenting the market, companies can effectively target and cater to the needs of different customer groups.\n\n**A. Market categorisation is wrong**: Market categorisation is not the same as segmentation, as it typically involves grouping based on general characteristics rather than specific needs and preferences.\n\n**B. Market mix is wrong**: Market mix refers to the combination of product, price, promotion, and place to create a unique marketing strategy, and is not related to aggregating prospective buyers.\n\n**D. Market modelling is wrong**: Market modelling involves creating mathematical or statistical models to estimate market demand or other market variables, but does not involve grouping buyers into categories.\n\n**E. BCG matrix analysis is wrong**: BCG matrix analysis is a strategic management tool used to evaluate business units based on their market growth rate and relative market share, and is not directly related to market segmentation.\n\n**Key concept:** Market Segmentation."}, {"num": 17, "text": "The decision rule for the acceptance of investment using Net Present Value (NPV) method is, accept if the", "options": {"A": "NPV ≥ 0", "B": "NPV > 0", "C": "NPV < 0", "D": "NPV ≤ 0", "E": "NPV = 0"}, "answer": "C", "explanation": "**Why C is correct:** When using the Net Present Value (NPV) method, a project is accepted if the NPV is negative when considering only the incremental costs and benefits. It represents an outflow of cash over time, and a negative result is desired in this context. Therefore, C, NPV < 0, is the correct decision rule for accepting an investment.\n\n**Why A is wrong:** A, NPV ≥ 0, suggests accepting the investment regardless of the present value of costs and benefits, which contradicts the purpose of using the NPV method.\n\n**Why B is wrong:** B, NPV > 0, implies rejecting investments with a positive present value, which is counterintuitive as it implies rejecting opportunities for future gains.\n\n**Why D is wrong:** D, NPV ≤ 0, implies accepting investments only when there is zero NPV, which overlooks the potential for a project to generate more than its costs.\n\n**Why E is wrong:** E, NPV = 0, suggests accepting investments only when there are no net future gains, which ignores potential profits."}, {"num": 18, "text": "Which of these is NOT a financial instrument traded in the money market?", "options": {"A": "Treasury Bills", "B": "Call money", "C": "Development stock", "D": "Stabilization securities", "E": "Bill Finance scheme"}, "answer": "E", "explanation": "**Why E is correct:** \nBill finance schemes are a type of off-balance sheet financing where a company leases or finances another company's assets. They do not directly belong to the money market, which focuses on short-term instruments. Bill finance schemes involve long-term agreements.\n\n**Why the other options are wrong:**\nA. Treasury Bills are a type of short-term government debt and are traded in the money market.\nB. Call money is a type of short-term loan and is traded in the money market.\nC. Development stocks also can be referred to as a type short-term financing that's typically government guaranteed.\nD. Stabilization securities, often in the form of stabilizing bonds or other short term notes can be found in the money market.\n\n**Key concept:** The key concept being tested here is the characteristics of financial instruments traded in the money market, specifically focusing on the types of instruments that are excluded, such as off-balance sheet financing instruments."}, {"num": 19, "text": "", "options": {"A": "leadership style in which the leader has the authority to withhold or give reward and punishment is referred to as ………………. style Democratic leadership", "B": "Participative leadership", "C": "Contingency leadership", "D": "Autocratic leadership", "E": "Laissez faire leadership"}, "answer": "D", "explanation": "**Why D is correct:** Autocratic leadership is a leadership style where the leader has complete control and authority over decision-making and employees are expected to follow orders without question.\n\n**A - Wrong:**  This leadership style, where the leader has the authority to withhold or give reward and punishment, refers to a characteristic feature of autocratic, not any other listed type of leadership.\n\n**B - Wrong:** Participative leadership allows for employee involvement and participation in decision-making, not a leader who withholds or gives rewards and punishment unilaterally.\n\n**C - Wrong:** Contingency leadership refers to a leadership style that adapts to the situation or environment and changes accordingly, not a specific style of authority distribution.\n\n**D - Not relevant:** This option was already identified as the correct answer.\n\n**E - Wrong:** Laissez faire leadership is a leadership style where the leader does not exert control over employees and instead delegates decision-making to them, not a style characterized by authority to withhold or give reward and punishment.\n\n**Key Concept:** Describing different leadership styles is a key concept tested in this question, specifically identifying and explaining the characteristics of autocratic leadership."}, {"num": 20, "text": "The process of transmission of information from one person, group or organisation to another is called", "options": {"A": "Decoding", "B": "Communication", "C": "Globalization", "D": "Presentation", "E": "Translation SECTION B:                   ATTEMPT ANY FOUR OUT OF SIX QUESTIONS (80 Marks) QUESTION 1 a.   State FIVE features of each of the following: i.     Memorandum of Association                                                (5 Marks) ii.    Articles of Association                                                  (5 Marks) iii.   Public Sector Entity                                                     (5 Marks) b.   Identify FIVE advantages of a partnership business.                      (5 Marks) (Total 20 Marks) QUESTION 2 Businesses do not operate in a vacuum. There is a combination of internal and external factors that affect how businesses function. State and explain any FOUR external environmental factors that affect a business. (20 Marks) QUESTION 3 In every country, governments have important roles to play in order to achieve desired economic goals. Required: a. State FIVE reasons for the increasing role of Government in the Nigerian Financial System. (10 Marks) b.   State FIVE mechanisms for government intervention in the financial system. (10 Marks) (Total 20 Marks) QUESTION 4 In evaluating capital investment projects, relevant inflows and outflows expected to be generated and used by the proposed capital investment must be determined prior to the commencement of the project. Required: a.   List and explain FOUR major cashflow items to be included in a capital investment project. (8 Marks) b.   i. Explain the payback period technique of investment appraisal.        (4 Marks) ii. State TWO advantages and TWO disadvantages of payback period. (8 Marks) (Total 20 Marks) QUESTION 5 Abraham Maslow proposes that human beings are motivated by multiple needs which are arranged in a hierarchical order. a.     List and explain the FIVE general types of human needs in ascending order. (15 Marks) b.     Write briefly on the following: i.      Hygiene factors ii.     Motivators                                                        (5 Marks) (Total 20 Marks) QUESTION 6 a.     Describe the Boston Consulting Group (BCG) matrix.                          (4 Marks) b.     Explain the product-market strategy that might be chosen for products in each quadrant of the matrix.                                            (12 Marks) c.     List TWO weaknesses of the BCG matrix as a model for strategic analysis. (4 Marks) (Total 20 Marks) MCQ"}, "answer": "C", "explanation": "**Why C is correct:** Globalization refers to the process of increased worldwide interaction, where information is shared across different regions and cultures, making it a suitable definition for the transmission of information from one person, group, or organization to another.\n\n**Why the other options are wrong:**\nA. Decoding is the interpretation of the meaning of a message.\nB. Communication is the act of giving or exchanging information, but it is not the process of transmission itself.\nD. Presentation is the act of showing or displaying information.\nE. Translation refers to changing the language of a message, but it is not the process of transmission.\n\n**Key concept:** Information Sharing Process."}], "answers": {"1": "E", "2": "E", "3": "D", "4": "C", "5": "E", "6": "A", "7": "E", "8": "B", "9": "A", "10": "A", "11": "B", "12": "A", "13": "D", "14": "D", "15": "A", "16": "C", "17": "C", "18": "E", "19": "D", "20": "C"}, "examiner_report": ""}, {"session": "Nov 2015", "questions": [{"num": 1, "text": "The latin word “agenda” means", "options": {"A": "Matters arising", "B": "Notice", "C": "Correspondence", "D": "Report", "E": "Things to be done"}, "answer": null}, {"num": 2, "text": "Which of the following should NOT be the objective of a business organisation?", "options": {"A": "Pay tax as at when due", "B": "Obey laws enacted by the National Assembly", "C": "Keep clean environment", "D": "Encourage tax avoidance", "E": "Encourage tax evasion"}, "answer": null}, {"num": 3, "text": "Which of the following is NOT a factor to be considered when deciding the form of a business enterprise?", "options": {"A": "The degree of personal liability", "B": "The willingness to share decision making powers and risks", "C": "The cost of establishing the business", "D": "The location of the business", "E": "The legal requirements concerning the provision of public information"}, "answer": null}, {"num": 4, "text": "The following are advantages of decentralisation EXCEPT that it", "options": {"A": "Promotes development of general managers", "B": "Aids adaptation to fast-changing environment", "C": "Enhances a uniform policy", "D": "Relieves top management of some burden of decision making", "E": "Gives managers more freedom and independence in decision making"}, "answer": null}, {"num": 6, "text": "Management function is synonymous with", "options": {"A": "Management process", "B": "Scientific management", "C": "Managerial roles", "D": "Managerial skills", "E": "Strategic management"}, "answer": null}, {"num": 7, "text": "Which of the following statements is NOT true of objectives?", "options": {"A": "Specific", "B": "Measurable", "C": "Time bound", "D": "Relevant to the context of the vision of an organisation", "E": "Achievable within the undefined time frame"}, "answer": null}, {"num": 8, "text": "Which of the underlisted short-term finance sources can be regarded as a spontaneous source of short term fund?", "options": {"A": "Bank overdrafts", "B": "Accruals", "C": "Line of credit", "D": "Revolving credit agreement", "E": "Commercial paper"}, "answer": null}, {"num": 9, "text": "Which of the following is NOT a feature of SWOT analysis?", "options": {"A": "Strategic gap", "B": "Competitive threats", "C": "Opportunities availability", "D": "Weaknesses", "E": "Competitive advantage"}, "answer": null}, {"num": 10, "text": "The formula for calculating Net Present Value (NPV) of investment is n ct", "options": {"A": "               C t 1 1  r t o t n  ct ", "B": " t 0  1  r    Co n ct", "C": " t 1   1  r t   Co n ct", "D": " 1  r  t 1 t 1  Co n cn", "E": " 1  n  C t 1 r         o Where C1, C2, C3...........represent cashflow in years 1,2,3,...........n C0 is the initial capital outlay n is the expected life of the investment t = 1 up to including t=n"}, "answer": null}, {"num": 11, "text": "The virtue ethics theory was propounded by", "options": {"A": "Immanuel Kant", "B": "Aristotle", "C": "Socrates", "D": "Plato", "E": "Hegel"}, "answer": null}, {"num": 12, "text": "The extent to which the individual perceives that effective performance will lead to desired rewards is described as", "options": {"A": "Expectancy", "B": "Instrumentality", "C": "Valance", "D": "Perception", "E": "Productivity"}, "answer": null}, {"num": 13, "text": "The appropriate term for anything that a firm does better especially when compared to rival firms is called", "options": {"A": "Opportunities", "B": "Core competence", "C": "Performance", "D": "Competitive advantage", "E": "Capability"}, "answer": null}, {"num": 14, "text": "Which of the following is NOT a barrier to effective communication?", "options": {"A": "Status differences", "B": "Fear", "C": "Information overload", "D": "Information download", "E": "Verbal difficulties"}, "answer": null}, {"num": 15, "text": "Communication that flows from the superior to the subordinates and back from the subordinates to the superior is called .....................communication", "options": {"A": "Vertical", "B": "Horizontal", "C": "External", "D": "Oral", "E": "Written"}, "answer": null}, {"num": 16, "text": "Strategy in the public sector differs from that in the private sector because", "options": {"A": "They do not have customers", "B": "They do not have stakeholders", "C": "Planning horizons are determined by political considerations rather than market conditions", "D": "They do not have to make a profit", "E": "They do not manage cost"}, "answer": null}, {"num": 17, "text": "Which of the following is NOT an advantage of a partnership business?", "options": {"A": "More financial resources", "B": "Registration with Corporate Affairs Commission", "C": "Payment of Corporate Income Tax", "D": "Sharing of risk and loses", "E": "Continuity"}, "answer": null}, {"num": 18, "text": "Which of the following options is NOT a functional strategy?", "options": {"A": "Marketing strategy", "B": "Production strategy", "C": "Personnel strategy", "D": "Financial strategy", "E": "Diversification strategy"}, "answer": null}, {"num": 19, "text": "Which of the following is NOT a standard example of business communication method?", "options": {"A": "Circulars", "B": "Newsletters", "C": "memorandum", "D": "Requisition", "E": "Telegram"}, "answer": null}, {"num": 20, "text": "Which of the following is NOT correct about a professional accountant?", "options": {"A": "Providing crucial contributions to streamline business plans firm has recently collected the following data in respect of its capital structure,", "B": "Serving as part of management team of any organisation", "C": "Specialising in finance and accounting matters only", "D": "Involved in wide range of activities beyond finance reporting and accounting matters", "E": "Procuring capital for current and future success of the company SECTION B: ANSWER ANY FOUR OUT OF SIX QUESTIONS IN THIS SECTION (80 Marks) QUESTION 1 The world in which businesses operate has become increasingly uncertain. By planning and identifying future risks and opportunities, businesses can act immediately to help create the most favourable future outcome and achieve goals and objectives. a.    State FIVE reasons for planning.                                        (5 Marks) b.    Explain briefly THREE types of planning, considering time horizon. (15 Marks) (Total 20 Marks) QUESTION 2 expected earnings per share and required rate of return. Capital Structure       Expected Earnings        Required Debt Ratio                Per Share         Rate of Return %                        N                   % 0                      3.10                  14 10                     3.80                  16 20                     4.60                  17 30                     5.25                  19 40                     5.70                  20 50                     5.00                  22 60                     4.50                  24 You are required to: a.    Compute the estimated share values.                              (10 Marks) b.    D
